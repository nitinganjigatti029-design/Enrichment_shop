<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>ZooEnrich · Accept Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="tokens.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="data.js?v=20260430g"></script>
  <script src="app.js?v=20260430g"></script>
  <style>
    /* ============================================================
       Page chrome — sticky top header + stepper rail
       ============================================================ */
    body { background: var(--page) !important; }

    .page-shell { max-width: 1200px; margin: 0 auto; padding: 0 24px 96px; }
    @media (max-width: 768px) { .page-shell { padding: 0 14px 80px; } }

    .ao-header {
      position: sticky; top: 0; z-index: 50;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .ao-header-row {
      display: flex; align-items: center; gap: 16px;
      max-width: 1200px; margin: 0 auto; padding: 14px 24px;
      min-height: 64px;
    }
    @media (max-width: 768px) { .ao-header-row { padding: 12px 14px; gap: 10px; } }

    .ao-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted); font-size: 13px; font-weight: 600;
      padding: 8px 12px; border-radius: 10px; transition: .15s;
      flex-shrink: 0;
    }
    .ao-back:hover { color: var(--brand); background: var(--brand-soft); }
    .ao-title {
      font-size: 16px; font-weight: 800; color: var(--text);
      letter-spacing: -0.01em;
      flex-shrink: 0;
    }
    .ao-title .id-mono { font-family: ui-monospace, Menlo, monospace; }
    .ao-buyer-chip {
      flex: 1; min-width: 0; display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px; background: var(--card-subtle); border: 1px solid var(--border);
      border-radius: 999px; font-size: 12.5px; color: var(--text); font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .ao-buyer-chip strong { color: var(--text); font-weight: 700; }
    .ao-buyer-chip .sep { color: var(--text-subtle); margin: 0 2px; }
    .ao-buyer-chip .total { color: var(--brand-hover); font-weight: 800; font-variant-numeric: tabular-nums; }
    @media (max-width: 768px) { .ao-buyer-chip { display: none; } }

    .ao-cancel {
      padding: 9px 16px; border-radius: 999px;
      background: #fff; color: var(--text-muted); border: 1px solid var(--border);
      font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 6px; transition: .15s;
    }
    .ao-cancel:hover { color: var(--danger); border-color: var(--danger); background: var(--danger-bg); }

    /* Stepper rail */
    .stepper-rail {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 18px 0 4px; flex-wrap: wrap;
    }
    .step-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 999px;
      font-size: 12.5px; font-weight: 700;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text-muted);
      transition: .2s ease;
    }
    .step-pill .badge {
      width: 22px; height: 22px; border-radius: 999px;
      background: #F1F2F4; color: var(--text-muted);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800;
    }
    .step-pill.active { color: #fff; background: var(--brand); border-color: var(--brand);
      box-shadow: 0 4px 10px -3px rgba(55,189,105,.45); }
    .step-pill.active .badge { background: rgba(255,255,255,.25); color: #fff; }
    .step-pill.complete { color: var(--brand-hover); background: var(--brand-soft); border-color: var(--brand); }
    .step-pill.complete .badge { background: var(--brand); color: #fff; }
    .step-pill.locked { opacity: .5; }
    .step-arrow { color: var(--text-subtle); font-size: 14px; }

    /* ============================================================
       Accordion cards
       ============================================================ */
    .accord-stack {
      max-width: 880px; margin: 22px auto 0;
      display: flex; flex-direction: column; gap: 18px;
    }
    /* Single-panel layout (replaces the accordion stepper) */
    .ao-panel { max-width: 880px; margin: 22px auto 24px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: var(--shadow-xs); }
    .ao-panel-help { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
    .ao-note-block { margin-top: 12px; }
    .ao-note-label { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .ao-note-opt { font-weight: 600; color: var(--text-muted); font-size: 12px; margin-left: 4px; }
    .ao-note-help { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; line-height: 1.45; }
    .ao-foot {
      position: sticky; bottom: 0; z-index: 20;
      margin: 22px -24px -24px; padding: 14px 24px;
      background: var(--card);
      border-top: 1px solid var(--border);
      border-bottom-left-radius: 16px; border-bottom-right-radius: 16px;
      display: flex; justify-content: flex-end; align-items: center; gap: 10px; flex-wrap: wrap;
      box-shadow: 0 -6px 18px -12px rgba(0,0,0,.12);
    }
    @media (max-width: 600px) {
      .ao-panel { padding: 18px; margin: 14px 12px 24px; border-radius: 14px; }
      .ao-foot { margin: 18px -18px -18px; padding: 12px 18px; border-bottom-left-radius: 14px; border-bottom-right-radius: 14px; justify-content: stretch; }
      .ao-foot .cta-btn { flex: 1; justify-content: center; }
    }
    .accord {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: clip; /* clip so radius works without breaking sticky descendants */
      transition: border-color .2s, box-shadow .2s;
    }
    .accord.active { border-color: var(--brand); box-shadow: 0 6px 18px -8px rgba(55,189,105,.25); }
    .accord.complete { border-color: #BDE8CD; }
    .accord.locked { background: #FBFBFC; }

    /* Header row of each card */
    .accord-head {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; cursor: pointer;
      user-select: none;
      transition: background .15s;
    }
    .accord.locked .accord-head { cursor: not-allowed; }
    .accord:not(.locked):not(.active) .accord-head:hover { background: var(--card-subtle); }

    .accord-num {
      width: 30px; height: 30px; border-radius: 999px;
      background: #F1F2F4; color: var(--text-muted);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
      transition: .2s;
    }
    .accord.active .accord-num { background: var(--brand); color: #fff; }
    .accord.complete .accord-num { background: var(--brand); color: #fff; }
    .accord.complete .accord-num i { width: 16px; height: 16px; }

    .accord-title-block { flex: 1; min-width: 0; }
    .accord-title {
      font-size: 14.5px; font-weight: 800; color: var(--text); letter-spacing: -.01em;
    }
    .accord.locked .accord-title { color: var(--text-muted); font-weight: 700; }
    .accord-summary {
      font-size: 12.5px; color: var(--text-muted);
      margin-top: 3px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .accord.complete .accord-summary { color: var(--brand-hover); font-weight: 600; }

    .accord-edit {
      font-size: 12px; color: var(--brand-hover); font-weight: 700;
      padding: 6px 12px; border-radius: 8px;
      background: var(--brand-soft); border: 1px solid transparent;
      display: inline-flex; align-items: center; gap: 5px;
      transition: .15s;
    }
    .accord-edit:hover { background: var(--brand); color: #fff; }
    .accord-lock { color: var(--text-subtle); display: inline-flex; }
    .accord-caret {
      width: 30px; height: 30px; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: transform .2s ease;
    }
    .accord:not(.active) .accord-caret { transform: rotate(-90deg); }

    /* Body — animated height via JS */
    .accord-body {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height .25s ease-out, opacity .2s ease-out;
    }
    .accord.active > .accord-body {
      max-height: 4000px;
      opacity: 1;
      transition: max-height .3s ease-out, opacity .25s ease-out .05s;
    }
    .accord-body-inner { padding: 4px 20px 20px; }
    .accord-body-help {
      font-size: 13px; color: var(--text-muted); margin-bottom: 14px;
      line-height: 1.5;
    }

    /* Body footer (Continue / Back / Skip) */
    .accord-foot {
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
      margin-top: 18px; padding-top: 16px; border-top: 1px dashed var(--border);
    }
    .accord-foot .left, .accord-foot .right { display: inline-flex; align-items: center; gap: 8px; }

    /* CTA buttons (mirroring detail page tokens) */
    .cta-btn {
      padding: 10px 18px; border-radius: 999px;
      font-size: 13.5px; font-weight: 700;
      cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
      border: 1px solid transparent; transition: .15s;
      white-space: nowrap;
    }
    .cta-primary {
      background: var(--brand); color: #fff; border-color: var(--brand);
      box-shadow: 0 4px 10px -3px rgba(55,189,105,.45);
    }
    .cta-primary:hover { background: var(--brand-hover); transform: translateY(-1px);
      box-shadow: 0 6px 14px -3px rgba(55,189,105,.55); }
    .cta-ghost { background: #fff; color: var(--text); border-color: var(--border); }
    .cta-ghost:hover { border-color: var(--border-strong); background: #F9FAFB; }

    /* ============================================================
       Step 1 — Review (mirrored from modal styles)
       ============================================================ */
    .step-item { padding: 12px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; background: var(--card); }
    .step-item .row1 { display: flex; align-items: center; gap: 12px; }
    .step-item .row1 .thumb { width: 52px; height: 52px; border-radius: 10px; background: var(--card-subtle); overflow: hidden; flex-shrink: 0; }
    .step-item .row1 .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .step-item .row1 .ttl { font-size: 13.5px; font-weight: 700; color: var(--text); }
    .step-item .row1 .sub { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
    .step-item .inputs { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .step-item .inputs .field { flex: 1; min-width: 120px; }
    .step-item .inputs label { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; display: block; }
    .step-item .inputs input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; outline: none; font-family: var(--font); background: var(--card); }
    .step-item .inputs input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .step-item .line-total { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 1px; flex-shrink: 0; }
    .step-item .line-total .lab { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); }
    .step-item .line-total .val { font-size: 16px; font-weight: 800; color: var(--brand-hover); font-variant-numeric: tabular-nums; line-height: 1.1; }
    .step-item .cat-btn { margin-top: 10px; padding: 8px 12px; background: var(--brand-soft); color: var(--brand-hover); border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: .15s; }
    .step-item .cat-btn:hover { background: var(--brand); color: #fff; }
    .step-item .cat-added { margin-top: 10px; padding: 8px 12px; background: var(--brand-soft); color: var(--brand-hover); border-radius: 8px; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }
    .subtotal-bar { margin-top: 8px; padding: 12px 14px; background: var(--brand-soft); border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .subtotal-bar .lab { color: var(--brand-hover); font-weight: 600; }
    .subtotal-bar .val { color: var(--text); font-weight: 800; font-size: 16px; font-variant-numeric: tabular-nums; }

    /* Step 2 — delivery picker */
    .days-big { display: flex; align-items: center; gap: 10px; justify-content: center; margin: 10px 0 6px; }
    .days-input { width: 110px; padding: 14px 16px; border: 2px solid var(--brand); border-radius: 14px;
      font-size: 38px; font-weight: 800; color: var(--text); text-align: center;
      outline: none; font-family: var(--font); -moz-appearance: textfield;
    }
    .days-input::-webkit-outer-spin-button, .days-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .days-input:focus { box-shadow: 0 0 0 4px rgba(55,189,105,.18); }
    .days-step-btn { width: 44px; height: 44px; border-radius: 12px;
      background: var(--brand-soft); color: var(--brand-hover); border: none;
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      transition: .15s;
    }
    .days-step-btn:hover { background: var(--brand); color: #fff; }
    .days-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-align: center; }

    .preset-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 12px 0 18px; }
    .preset-chip { padding: 8px 14px; border-radius: 999px; border: 1.5px solid var(--border); background: var(--card); font-size: 12.5px; font-weight: 700; color: var(--text); cursor: pointer; transition: .15s; }
    .preset-chip:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-soft); }
    .preset-chip.active { border-color: var(--brand); color: #fff; background: var(--brand); box-shadow: 0 3px 8px -2px rgba(55,189,105,.4); }

    .date-preview { padding: 14px 18px; background: linear-gradient(135deg, var(--brand-soft) 0%, #F0FDF4 100%); border: 1.5px solid var(--brand); border-radius: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .date-preview .ic { width: 42px; height: 42px; border-radius: 10px; background: var(--brand); color: #fff; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .date-preview .txt .lab { font-size: 11px; font-weight: 700; color: var(--brand-hover); text-transform: uppercase; letter-spacing: .05em; }
    .date-preview .txt .big { font-size: 18px; font-weight: 800; color: var(--text); margin-top: 2px; letter-spacing: -0.01em; }

    .hint { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 10px; font-size: 12px; color: #6D4B00; line-height: 1.45; margin-bottom: 12px; }
    .hint i { color: #A16207; margin-top: 2px; flex-shrink: 0; }

    .buffer-toggle { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--card-subtle); border-radius: 10px; font-size: 13px; cursor: pointer; }
    .buffer-toggle input { margin: 0; }
    .buffer-toggle .tg-lab { font-weight: 600; color: var(--text); }
    .buffer-toggle .tg-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }

    /* Per-item compact delivery widget (inside Review step) */
    .item-delivery { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
    .item-delivery-head { font-size: 11.5px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .delivery-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .days-mini { display: inline-flex; align-items: center; gap: 2px; background: var(--card); border: 1.5px solid var(--brand); border-radius: 10px; padding: 2px 4px; }
    .days-mini button { width: 28px; height: 28px; border: 0; border-radius: 8px; background: var(--brand-soft); color: var(--brand-hover); font-size: 16px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: .12s; }
    .days-mini button:hover { background: var(--brand); color: #fff; }
    .days-mini input { width: 44px; text-align: center; border: 0; padding: 4px 0; font-size: 15px; font-weight: 800; color: var(--text); background: transparent; }
    .days-mini input::-webkit-outer-spin-button, .days-mini input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .days-mini .unit { font-size: 11.5px; color: var(--text-muted); padding-right: 4px; font-weight: 600; }
    .preset-chips-mini { display: inline-flex; gap: 6px; flex-wrap: wrap; }
    .preset-chips-mini button { padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border); background: var(--card); font-size: 11.5px; font-weight: 700; color: var(--text); cursor: pointer; transition: .15s; }
    .preset-chips-mini button:hover { border-color: var(--brand); color: var(--brand); }
    .preset-chips-mini button.active { background: var(--brand); border-color: var(--brand); color: #fff; box-shadow: 0 2px 6px -2px rgba(55,189,105,.4); }
    .delivery-date { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--brand-hover); font-weight: 700; }
    .delivery-date i { color: var(--brand); }
    .delivery-date strong { color: var(--text); font-weight: 800; }
    .buffer-mini { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); cursor: pointer; user-select: none; }
    .buffer-mini input { margin: 0; }
    .buffer-mini .tg-sub { color: var(--text-muted); font-size: 11px; }

    /* ============================================================
       Per-item Fulfilment block (In-house / Vendor toggle)
       ============================================================ */
    .fulfilment-block { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .fulfilment-head { font-size: 11.5px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .fulfilment-radio-row {
      display: inline-flex; flex-wrap: wrap; align-items: center; gap: 24px;
      padding: 8px 12px; background: var(--card-subtle);
      border: 1px solid var(--border); border-radius: 10px;
    }
    .fl-radio {
      display: inline-flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none; padding: 4px 0;
    }
    .fl-radio input[type="radio"] {
      position: absolute; opacity: 0; pointer-events: none;
    }
    .fl-radio-dot {
      width: 16px; height: 16px; border-radius: 999px;
      border: 1.5px solid var(--border-strong, #C9CDD3);
      background: #fff; flex-shrink: 0; position: relative;
      transition: border-color .15s, box-shadow .15s;
    }
    .fl-radio:hover .fl-radio-dot { border-color: var(--brand); }
    .fl-radio input[type="radio"]:checked + .fl-radio-dot {
      border-color: var(--brand);
      box-shadow: inset 0 0 0 4px var(--brand);
    }
    .fl-radio input[type="radio"]:focus-visible + .fl-radio-dot {
      box-shadow: 0 0 0 3px rgba(55,189,105,.25), inset 0 0 0 4px var(--brand);
    }
    .fl-radio-lbl {
      font-size: 13px; font-weight: 500; color: var(--text);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .fl-radio-lbl i { color: var(--text-muted); }
    .fl-radio input[type="radio"]:checked ~ .fl-radio-lbl { font-weight: 700; }
    .fl-radio input[type="radio"]:checked ~ .fl-radio-lbl i { color: var(--brand-hover); }

    .vendor-details {
      max-height: 0; opacity: 0; overflow: hidden;
      transition: max-height .24s ease, opacity .18s ease, margin-top .24s ease, padding .24s ease, border-color .24s ease;
      background: #FAFBFC; border: 1px solid transparent; border-radius: 12px;
      padding: 0 16px; margin-top: 0;
    }
    .vendor-details.is-open {
      max-height: 600px; opacity: 1;
      padding: 14px 16px; margin-top: 10px;
      border-color: var(--border);
    }
    .vendor-grid {
      display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px 14px;
    }
    @media (max-width: 600px) {
      .vendor-grid { grid-template-columns: 1fr; }
    }
    .vendor-field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .vendor-field label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .vendor-field label .req { color: var(--danger); font-weight: 800; }
    .vendor-input-wrap { position: relative; display: flex; align-items: center; }
    .vendor-input-wrap .prefix {
      position: absolute; left: 12px;
      font-size: 13px; font-weight: 700; color: var(--text-muted);
      pointer-events: none;
    }
    .vendor-field input {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 1px solid var(--border); font-size: 13px;
      outline: none; font-family: var(--font); background: #fff;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    .vendor-field input.has-prefix { padding-left: 24px; }
    .vendor-field input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .vendor-field input.fl-err {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, .12);
      animation: shake-x .24s ease-out;
    }
    .vendor-helper {
      font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.4;
    }
    .vendor-footnote {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px dashed var(--border);
      display: flex; align-items: center; justify-content: flex-end; gap: 6px;
      font-size: 11.5px; color: var(--text-muted); font-style: italic;
    }
    .vendor-footnote i { color: var(--text-muted); }

    /* Step 3 — note + price */
    .note-area { width: 100%; min-height: 100px; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 13.5px; color: var(--text); outline: none; resize: vertical; font-family: var(--font); line-height: 1.5; }
    .note-area:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .revise-toggle { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--card-subtle); border-radius: 10px; font-size: 13px; margin-top: 14px; cursor: pointer; }
    .price-revise { margin-top: 12px; padding: 14px; background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 10px; display: none; }
    .price-revise.open { display: block; }
    .price-revise label { font-size: 12px; font-weight: 700; color: #A16207; margin-bottom: 6px; display: block; }
    .price-revise input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #FDE68A; font-size: 15px; font-weight: 700; color: var(--text); outline: none; font-family: var(--font); background: #fff; }

    /* Step 4 — confirm review card (read-only) */
    .review-card { background: var(--brand-soft); border: 1.5px solid var(--brand); border-radius: 14px; padding: 18px; }
    .review-section + .review-section { margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--brand); }
    .review-section-head {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      margin-bottom: 8px;
    }
    .review-section-head .lab {
      font-size: 11.5px; font-weight: 800; color: var(--brand-hover);
      text-transform: uppercase; letter-spacing: .04em;
    }
    .review-section-head .edit-chip {
      font-size: 11.5px; font-weight: 700; color: var(--brand-hover);
      padding: 4px 10px; border-radius: 999px; background: #fff;
      border: 1px solid var(--brand); cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
      transition: .15s;
    }
    .review-section-head .edit-chip:hover { background: var(--brand); color: #fff; }
    .review-kv { display: grid; grid-template-columns: 130px 1fr; gap: 8px 16px; font-size: 13.5px; }
    .review-kv .k { color: var(--brand-hover); font-weight: 600; }
    .review-kv .v { color: var(--text); font-weight: 700; }
    .review-kv .v.big { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
    .review-line { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 12.5px; color: var(--text); }
    .review-line .thm { width: 30px; height: 30px; border-radius: 6px; overflow: hidden; flex-shrink: 0; background: var(--card); }
    .review-line .thm img { width: 100%; height: 100%; object-fit: cover; }
    .review-line .nm { flex: 1; }
    .review-line .tot { font-weight: 700; font-variant-numeric: tabular-nums; }
    .review-note {
      margin-top: 6px;
      font-size: 12.5px; color: var(--text); line-height: 1.5;
      background: #fff; padding: 10px 12px; border-radius: 10px;
    }
    .review-note strong { color: var(--brand-hover); }

    /* Empty / error state */
    .empty-state {
      max-width: 560px; margin: 80px auto 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px; text-align: center;
    }
    .empty-state .ic { width: 56px; height: 56px; border-radius: 14px;
      background: var(--brand-soft); color: var(--brand-hover);
      display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    .empty-state h2 { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 13.5px; color: var(--text-muted); margin-bottom: 18px; line-height: 1.5; }

    /* Locked shake */
    @keyframes shake-x {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(2px); }
    }
    .accord.locked.shake { animation: shake-x .24s ease-out; }

    /* Toasts */
    .toast-stack { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
    .toast { pointer-events: auto; min-width: 260px; max-width: 90vw; padding: 12px 18px; background: var(--text); color: #fff; border-radius: 12px; box-shadow: var(--shadow-lg); font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 10px; animation: toastIn .28s cubic-bezier(.2,.8,.2,1) both; }
    .toast.success { background: var(--brand); }
    .toast.warn { background: var(--warning); color: #3B2A00; }
    .toast i { flex-shrink: 0; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(10px); } }
    .toast.out { animation: toastOut .28s cubic-bezier(.2,.8,.2,1) both; }
  </style>
</head>

const inINR = n => '₹' + Number(n).toLocaleString('en-IN');
const fmtDateLong = iso => new Date(iso).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
const fmtDateMed = iso => new Date(iso).toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});
const escapeHtml = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function getParam(name){ const m = new URLSearchParams(window.location.search); return m.get(name); }

function toast(msg, kind='default') {
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = `toast ${kind==='success'?'success':kind==='warn'?'warn':''}`;

/* ============================================================

};

function computeDeliveryFor(days) {
  const d = new Date();
  d.setDate(d.getDate() + (Number(days) || 0));
  return d;
}
function maxItemDays() {
  return state.items.length ? Math.max(...state.items.map(it => it.days)) : 0;
}
function subtotal() { return state.items.reduce((t, it) => t + it.qty * it.unit, 0); }
function finalTotal() { return subtotal(); }

/* ============================================================
   Wiring
   ============================================================ */
function wireBody() {
  // qty / unit / days inputs
  document.querySelectorAll('input[data-item-idx][data-field]').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.itemIdx;
      const field = e.target.dataset.field;
      if (field === 'bufferAdded') return; // checkbox handled below
      let val;
      if (field === 'days') val = Math.max(1, Math.min(180, +e.target.value || 1));
      else val = Math.max(0, +e.target.value || 0);
      state.items[i][field] = val;
      if (field === 'days') {
        refreshItemDelivery(i);
      } else {
        const st = subtotal();
        const bar = document.querySelector('.subtotal-bar .val');
        if (bar) bar.textContent = inINR(st);
        const lineTotal = e.target.closest('.step-item').querySelector('.line-total .val');
        if (lineTotal) lineTotal.textContent = inINR(state.items[i].qty * state.items[i].unit);
        const hdrTotal = document.getElementById('hdrTotal');
        if (hdrTotal) hdrTotal.textContent = inINR(st);
      }
    });
  });

  // per-item +/- buttons
  document.querySelectorAll('button[data-item-idx][data-delivery-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.itemIdx;
      const delta = btn.dataset.deliveryAction === 'inc' ? 1 : -1;
      state.items[i].days = Math.max(1, Math.min(180, state.items[i].days + delta));
      const inp = document.querySelector(`input[data-item-idx="${i}"][data-field="days"]`);
      if (inp) inp.value = state.items[i].days;
      refreshItemDelivery(i);
    });
  });

  // per-item preset chips
  document.querySelectorAll('button[data-item-idx][data-preset]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.itemIdx;
      const days = +btn.dataset.preset;
      state.items[i].days = days;
      state.items[i].bufferAdded = false;
      const inp = document.querySelector(`input[data-item-idx="${i}"][data-field="days"]`);
      if (inp) inp.value = days;
      const bufChk = document.querySelector(`input[data-item-idx="${i}"][data-field="bufferAdded"]`);
      if (bufChk) bufChk.checked = false;
      refreshItemDelivery(i);
    });
  });

  // per-item buffer toggle
  document.querySelectorAll('input[data-item-idx][data-field="bufferAdded"]').forEach(chk => {
    chk.addEventListener('change', e => {
      const i = +e.target.dataset.itemIdx;
      const wasOn = state.items[i].bufferAdded;
      if (e.target.checked && !wasOn) state.items[i].days += 3;
      else if (!e.target.checked && wasOn) state.items[i].days = Math.max(1, state.items[i].days - 3);
      state.items[i].bufferAdded = e.target.checked;
      const inp = document.querySelector(`input[data-item-idx="${i}"][data-field="days"]`);
      if (inp) inp.value = state.items[i].days;
      refreshItemDelivery(i);
    });
  });

  // Note textarea
  const noteA = document.getElementById('noteArea');
  if (noteA) noteA.addEventListener('input', e => state.note = e.target.value);

  // Fulfilment mode radios
  document.querySelectorAll('input[type="radio"][data-fl-mode]').forEach(r => {
    r.addEventListener('change', e => {
      if (!e.target.checked) return;
      const i = +e.target.dataset.itemIdx;
      const newMode = e.target.dataset.flMode;
      state.items[i].fulfilment.mode = newMode;
      // Default the vendor ETA to in-house preview if blank, on first switch to vendor
      if (newMode === 'vendor' && !state.items[i].fulfilment.vendor.eta) {
        const d = computeDeliveryFor(state.items[i].days);
        const iso = d.toISOString().slice(0, 10); // YYYY-MM-DD
        state.items[i].fulfilment.vendor.eta = iso;
        const etaInp = document.querySelector(`input[data-item-idx="${i}"][data-fl-vfield="eta"]`);
        if (etaInp) etaInp.value = iso;
      }
      refreshFulfilmentBlock(i);
    });
  });

  // Vendor field inputs (name, cost, ref, eta)
  document.querySelectorAll('input[data-item-idx][data-fl-vfield]').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.itemIdx;
      const f = e.target.dataset.flVfield;
      let v = e.target.value;
      if (f === 'cost') {
        v = String(v).replace(/[^0-9]/g, '');
        if (e.target.value !== v) e.target.value = v;
      }
      state.items[i].fulfilment.vendor[f] = v;
      if (f === 'name') clearVendorErr(i, 'name');
      if (f === 'eta') clearVendorErr(i, 'eta');
    });
  });
}

function clearVendorErr(i, field) {
  const sel = `input[data-item-idx="${i}"][data-fl-vfield="${field}"]`;
  const inp = document.querySelector(sel);
  if (inp) inp.classList.remove('fl-err');
}

function refreshFulfilmentBlock(i) {
  const it = state.items[i];
  const panel = document.querySelector(`[data-vendor-details-for="${i}"]`);
  if (!panel) return;
  if (it.fulfilment.mode === 'vendor') {
    panel.classList.add('is-open');
  } else {
    panel.classList.remove('is-open');
  }
  if (window.lucide?.createIcons) window.lucide.createIcons();
}

function refreshItemDelivery(i) {
  const it = state.items[i];
  const preview = computeDeliveryFor(it.days);
  const dateChip = document.querySelector(`[data-delivery-preview-for="${i}"] strong`);
  if (dateChip) dateChip.textContent = fmtDateLong(preview);
  document.querySelectorAll(`button[data-item-idx="${i}"][data-preset]`).forEach(c => {
    if (+c.dataset.preset === it.days) c.classList.add('active');
    else c.classList.remove('active');
  });
}

function cancelFlow() {
  if (!currentOrder) { window.location.href = 'admin_orders_1.html'; return; }
  window.location.href = `admin_order_detail_1.html?id=${encodeURIComponent(currentOrder.id)}`;
}

function confirmAccept() {
  // 1. Validate vendor lines
  let firstInvalidEl = null;
  let invalidCount = 0;
  state.items.forEach((it, i) => {
    if (it.fulfilment && it.fulfilment.mode === 'vendor') {
      const v = it.fulfilment.vendor || {};
      const nameOk = String(v.name || '').trim().length > 0;
      const etaOk = !!String(v.eta || '').trim();
      if (!nameOk) {
        const inp = document.querySelector(`input[data-item-idx="${i}"][data-fl-vfield="name"]`);
        if (inp) {
          inp.classList.add('fl-err');
          if (!firstInvalidEl) firstInvalidEl = inp;
        }
        invalidCount++;
      }
      if (!etaOk) {
        const inp = document.querySelector(`input[data-item-idx="${i}"][data-fl-vfield="eta"]`);
        if (inp) {
          inp.classList.add('fl-err');
          if (!firstInvalidEl) firstInvalidEl = inp;
        }
        invalidCount++;
      }
    }
  });
  if (invalidCount > 0) {
    if (firstInvalidEl) {
      try { firstInvalidEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (e) {}
      try { firstInvalidEl.focus({ preventScroll: true }); } catch (e) {}
    }
    toast('Please complete the vendor block for marked lines', 'warn');
    return;
  }

  // 2. Persist per-line fulfilment
  if (window.ZE && ZE.orders && ZE.orders.lineFulfilment) {
    state.items.forEach((it, i) => {
      const f = it.fulfilment || { mode: 'inhouse' };
      if (f.mode === 'vendor') {
        const v = f.vendor || {};
        ZE.orders.lineFulfilment.set(currentOrder.id, i, {
          mode: 'vendor',
          vendor: {
            name: String(v.name || '').trim(),
            cost: v.cost === '' || v.cost == null ? null : Number(v.cost) || 0,
            ref: String(v.ref || '').trim(),
            eta: v.eta || null
          }
        });
      } else {
        ZE.orders.lineFulfilment.set(currentOrder.id, i, { mode: 'inhouse' });
      }
    });
  }

  // 3. Remember vendor names for autocomplete
  if (window.ZE && ZE.outsourceVendors && ZE.outsourceVendors.add) {
    const seen = new Set();
    state.items.forEach(it => {
      if (it.fulfilment && it.fulfilment.mode === 'vendor') {
        const nm = String(it.fulfilment.vendor && it.fulfilment.vendor.name || '').trim();
        if (nm && !seen.has(nm.toLowerCase())) {
          seen.add(nm.toLowerCase());
          ZE.outsourceVendors.add(nm);
        }
      }
    });
  }

  toast('Order accepted · buyer notified', 'success');
  setTimeout(() => {
    if (!currentOrder) return;
    window.location.href = `admin_order_detail_1.html?id=${encodeURIComponent(currentOrder.id)}`;
  }, 600);
}

/* ============================================================
   Boot
   ============================================================ */
function renderEmptyState(reason) {
  const main = document.getElementById('pageMain');
  document.getElementById('aoHeaderRow').innerHTML = `
    <a href="admin_orders_1.html" class="ao-back"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back to orders</a>
    <div class="ao-title">Accept order</div>
    <div style="flex:1;"></div>
  `;
  main.innerHTML = `
    <div class="empty-state">
      <div class="ic"><i data-lucide="search-x" class="w-7 h-7"></i></div>
      <h2>Order not found</h2>
      <p>${escapeHtml(reason || "We couldn't find an order matching that id.")} Try opening this flow from the order detail page.</p>
      <a href="admin_orders_1.html" class="cta-btn cta-primary"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back to orders</a>
    </div>
  `;
  if (window.lucide?.createIcons) window.lucide.createIcons();
}

function boot() {
  const id = getParam('id');
  if (!id) { renderEmptyState('No order id was provided in the URL.'); return; }
  const o = ORDERS.find(x => x.id === id);
  if (!o) { renderEmptyState(`No order with id "${id}".`); return; }
  currentOrder = o;
  // Initialise items snapshot
  state.items = o.items.map(it => ({
    qty: it.qty, unit: it.unit,
    sku: it.p.sku, name: it.p.name, img: it.p.img,
    note: it.note, custom: CUSTOM_IDS.has(it.p.sku),
    days: 14, bufferAdded: false
  }));
  // Hydrate fulfilment from persistence so re-opening restores choices
  const persisted = (window.ZE && ZE.orders && ZE.orders.lineFulfilment)
    ? ZE.orders.lineFulfilment.forOrder(currentOrder.id) : {};
  state.items.forEach((it, i) => {
    const p = persisted[i] || persisted[String(i)];
    it.fulfilment = p
      ? { mode: p.mode || 'inhouse', vendor: p.vendor || { name: '', cost: '', ref: '', eta: '' } }
      : { mode: 'inhouse', vendor: { name: '', cost: '', ref: '', eta: '' } };
    if (!it.fulfilment.vendor) it.fulfilment.vendor = { name: '', cost: '', ref: '', eta: '' };
    // Coerce cost to string for input value binding
    if (it.fulfilment.vendor.cost == null) it.fulfilment.vendor.cost = '';
    if (it.fulfilment.vendor.ref == null) it.fulfilment.vendor.ref = '';
    if (it.fulfilment.vendor.eta == null) it.fulfilment.vendor.eta = '';
    if (it.fulfilment.vendor.name == null) it.fulfilment.vendor.name = '';
  });
  state.note = '';

  renderHeader();
  renderAll();
}
boot();
</script>
