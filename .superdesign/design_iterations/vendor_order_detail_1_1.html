<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>ZooEnrich · Vendor Order Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="tokens.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 0 32px; }
    @media (max-width: 768px) { .page-wrap { padding: 0 16px; } }

    /* =========== Vendor header (UNIFIED — copied from vendor_orders_1_2.html) =========== */
    .app-header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .app-header .row { display: flex; align-items: center; gap: 20px; height: 68px; }
    .brand-mark { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 19px; color: var(--text); flex-shrink: 0; text-decoration: none; }
    .brand-mark .logo-box { width: 32px; height: 32px; border-radius: 10px; background: var(--brand); color: #fff; display: inline-flex; align-items: center; justify-content: center; }
    .v-nav { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; overflow-x: auto; scrollbar-width: none; }
    .v-nav::-webkit-scrollbar { display: none; }
    .v-nav a { display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; color: var(--text-muted); white-space: nowrap; text-decoration: none; transition: .15s; }
    .v-nav a:hover { color: var(--text); background: #F1F2F4; }
    .v-nav a.active { background: var(--brand-soft); color: var(--brand-hover); }
    .v-nav a .nav-badge { min-width: 20px; height: 20px; padding: 0 6px; background: var(--danger); color: #fff; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; margin-left: 2px; }
    .v-right { margin-left: auto; display: inline-flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .v-avatar-wrap { position: relative; }
    .v-avatar-btn { display: inline-flex; align-items: center; gap: 10px; padding: 4px 10px 4px 4px; border-radius: 999px; border: 1px solid var(--border); background: var(--card); cursor: pointer; transition: .15s; }
    .v-avatar-btn:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .v-avatar-btn img { width: 32px; height: 32px; border-radius: 999px; object-fit: cover; background: var(--card-subtle); }
    .v-avatar-btn .v-name { font-size: 13px; font-weight: 600; color: var(--text); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .v-menu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 220px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 8px; display: none; z-index: 80; }
    .v-menu.open { display: block; }
    .v-menu a, .v-menu button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 12px; border-radius: 10px; font-size: 13px; color: var(--text); background: transparent; border: none; cursor: pointer; text-align: left; text-decoration: none; }
    .v-menu a:hover, .v-menu button:hover { background: #F1F2F4; }
    .v-menu .divider { height: 1px; background: var(--border); margin: 6px 4px; }
    .v-menu .muted { color: var(--text-muted); font-size: 12px; padding: 6px 12px; }
    @media (max-width: 900px) {
      .v-nav { display: none !important; }
      .v-avatar-btn .v-name { display: none; }
      .app-header .row { gap: 12px !important; }
    }
    @media (max-width: 400px) { .brand-mark > span:not(.logo-box) { display: none; } }

    /* Vendor mobile drawer */
    .vendor-menu-btn { display: none; width: 40px; height: 40px; border-radius: 10px; background: #F1F2F4; border: none; align-items: center; justify-content: center; cursor: pointer; color: var(--text); flex-shrink: 0; }
    .vendor-menu-btn:hover { background: var(--brand-soft); color: var(--brand); }
    @media (max-width: 900px) { .vendor-menu-btn { display: inline-flex; } }
    .vendor-drawer-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); opacity: 0; pointer-events: none; transition: .2s; z-index: 90; }
    .vendor-drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .vendor-drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; max-width: 85vw; background: var(--card); transform: translateX(-100%); transition: .25s cubic-bezier(.2,.8,.2,1); z-index: 100; display: flex; flex-direction: column; box-shadow: 6px 0 20px rgba(0,0,0,.15); }
    .vendor-drawer.open { transform: translateX(0); }
    .vd-head { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); }
    .vd-head .brand-mark { font-size: 17px; }
    .vd-close { width: 36px; height: 36px; border-radius: 10px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .vd-close:hover { background: #F1F2F4; color: var(--text); }
    .vd-nav { display: flex; flex-direction: column; padding: 12px 0; gap: 2px; flex: 1; overflow-y: auto; }
    .vd-nav a { display: flex; align-items: center; gap: 12px; padding: 14px 18px; color: var(--text); font-size: 14px; font-weight: 500; text-decoration: none; }
    .vd-nav a:hover, .vd-nav a.active { background: var(--brand-soft); color: var(--brand-hover); }
    .vd-nav a i { color: var(--text-muted); }
    .vd-nav a:hover i, .vd-nav a.active i { color: var(--brand-hover); }
    .vd-nav a .nav-badge { min-width: 20px; height: 20px; padding: 0 6px; background: var(--danger); color: #fff; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; margin-left: auto; }
    .vd-foot { padding: 14px 16px; border-top: 1px solid var(--border); }
    .vd-foot .btn-ghost { width: 100%; padding: 11px 14px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .vd-foot .btn-ghost:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

    /* ================= Detail page structure ================= */
    .crumbs { font-size: 12px; color: var(--text-muted); padding: 22px 0 6px; display: flex; gap: 8px; align-items: center; }
    .crumbs a:hover { color: var(--brand); }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; font-weight: 600; padding: 6px 0; transition: .15s; }
    .back-link:hover { color: var(--brand); }

    /* Sample banner */
    .sample-banner { background: #FFF9DB; border: 1px solid #FDE68A; border-radius: 12px; padding: 10px 16px; font-size: 12.5px; color: #6D4B00; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .sample-banner i { color: #A16207; }

    /* Head block */
    .detail-head { display: flex; gap: 18px; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; margin-bottom: 20px; }
    .dh-left { flex: 1; min-width: 260px; }
    .dh-id-row { display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .dh-id { font-family: ui-monospace, Menlo, monospace; font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.01em; }
    .chip-big { display: inline-flex; align-items: center; gap: 7px; padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
    .chip-placed           { background: #F1F2F4;           color: #6B7280; }
    .chip-confirmed        { background: var(--brand-soft); color: #006D35; }
    .chip-in_production    { background: #FEF3C7;           color: #A16207; }
    .chip-packed           { background: #D1FAE5;           color: #065F46; }
    .chip-shipped          { background: #CFFAFE;           color: #0891B2; }
    .chip-out_for_delivery { background: #A7F3D0;           color: #065F46; }
    .chip-delivered        { background: var(--brand);      color: #fff; }
    .chip-cancelled        { background: var(--danger);     color: #fff; }
    .chip-returned         { background: #FDE68A;           color: #92400E; }

    .sla-big { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 800; padding: 6px 14px; border-radius: 999px; }
    .sla-big.urgent { background: var(--danger-bg); color: var(--danger); }
    .sla-big.warn { background: #FFF8CC; color: #A16207; }
    .sla-big.ok { background: var(--brand-soft); color: var(--brand-hover); }

    .dh-meta { display: flex; gap: 14px; flex-wrap: wrap; font-size: 13px; color: var(--text-muted); margin-top: 4px; align-items: center; }
    .dh-meta .sep { color: var(--text-subtle); }
    .dh-meta strong { color: var(--text); font-weight: 600; }

    .cta-group { display: inline-flex; gap: 8px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
    .cta-btn { padding: 10px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; border: 1px solid transparent; transition: .15s; white-space: nowrap; }
    .cta-primary { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 4px 10px -3px rgba(55,189,105,.45); }
    .cta-primary:hover { background: var(--brand-hover); transform: translateY(-1px); box-shadow: 0 6px 14px -3px rgba(55,189,105,.55); }
    .cta-warn { background: var(--warning); color: #3B2A00; border-color: var(--warning); }
    .cta-warn:hover { background: #D1A716; }
    .cta-ghost { background: #fff; color: var(--text); border-color: var(--border); }
    .cta-ghost:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .cta-danger { background: #fff; color: var(--danger); border-color: #F5C2CB; }
    .cta-danger:hover { background: var(--danger-bg); border-color: var(--danger); }

    /* ============== Two-column layout ============== */
    .grid { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(0, 1fr); gap: 20px; padding-bottom: 80px; }
    @media (max-width: 960px) { .grid { grid-template-columns: 1fr; } }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow-xs); overflow: hidden; }
    .card + .card { margin-top: 16px; }
    .card-head { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--border); }
    .card-head h3 { font-size: 14px; font-weight: 700; color: var(--text); display: inline-flex; align-items: center; gap: 8px; }
    .card-head h3 i { color: var(--brand); }
    .card-head .tiny { font-size: 12px; color: var(--text-muted); }
    .card-body { padding: 18px 20px; }

    /* Progress tracker */
    .track-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 22px 20px 26px; }
    .track-step { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; position: relative; }
    .track-step .dot { width: 32px; height: 32px; border-radius: 999px; background: #F1F2F4; color: var(--text-muted); display: inline-flex; align-items: center; justify-content: center; border: 2px solid var(--border); font-weight: 700; font-size: 12px; z-index: 2; position: relative; transition: .3s; }
    .track-step.done .dot { background: var(--brand-soft); color: var(--brand); border-color: var(--brand); }
    .track-step.current .dot { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(55,189,105,.18); }
    .track-step .lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); line-height: 1.25; }
    .track-step.done .lbl, .track-step.current .lbl { color: var(--text); }
    .track-step .when { font-size: 10px; color: var(--text-subtle); }
    .track-step:not(:last-child)::after { content: ''; position: absolute; top: 15px; left: calc(50% + 18px); right: calc(-50% + 18px); height: 2px; background: var(--border); z-index: 1; }
    .track-step.done:not(:last-child)::after { background: var(--brand); }
    @media (max-width: 720px) {
      .track-grid { grid-template-columns: 1fr; gap: 14px; padding: 18px; }
      .track-step { flex-direction: row; align-items: flex-start; text-align: left; gap: 10px; }
      .track-step:not(:last-child)::after { left: 15px; top: 32px; bottom: -14px; right: auto; width: 2px; height: auto; }
    }

    /* Line items */
    .item { display: flex; gap: 14px; padding: 16px 20px; border-top: 1px solid var(--border); }
    .item:first-child { border-top: none; }
    .item .thumb { width: 80px; height: 80px; border-radius: 12px; overflow: hidden; background: var(--card-subtle); flex-shrink: 0; }
    .item .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .item .meta { flex: 1; min-width: 0; }
    .item .title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .item .sku { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .item .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
    .item-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 600; padding: 3px 8px; border-radius: 999px; background: var(--card-subtle); border: 1px solid var(--border); color: var(--text); }
    .item-chip.species { background: var(--brand-soft); color: var(--brand-hover); border-color: transparent; }
    .item-chip.species img { width: 14px; height: 14px; border-radius: 999px; object-fit: cover; }
    .item-chip.custom { background: #FFF8CC; color: #8A6D00; border-color: transparent; }
    .item .desc { font-size: 12.5px; color: var(--text-muted); margin-top: 8px; line-height: 1.45; }
    .item .price-line { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; font-size: 13px; gap: 8px; flex-wrap: wrap; }
    .item .price-line .left { color: var(--text-muted); }
    .item .price-line .left strong { color: var(--text); font-weight: 700; }
    .item .price-line .right { font-size: 15px; font-weight: 800; color: var(--text); }
    .item .add-cat { font-size: 11.5px; color: var(--brand); font-weight: 700; display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 999px; background: var(--brand-soft); margin-top: 8px; cursor: pointer; border: none; transition: .15s; }
    .item .add-cat:hover { background: var(--brand); color: #fff; }
    .item .added-badge { font-size: 11px; color: var(--brand-hover); font-weight: 700; display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 999px; background: var(--brand-soft); margin-top: 8px; }

    /* Address & tracking cards */
    .kv { display: grid; grid-template-columns: 120px 1fr; gap: 8px 16px; font-size: 13px; }
    .kv .k { color: var(--text-muted); font-weight: 500; }
    .kv .v { color: var(--text); font-weight: 600; }

    .track-card { display: flex; gap: 12px; flex-direction: column; }
    .awb-pill { font-family: ui-monospace, Menlo, monospace; font-size: 12px; font-weight: 700; color: var(--text); background: #F1F2F4; padding: 4px 10px; border-radius: 6px; display: inline-flex; gap: 4px; }
    .tr-event { display: flex; align-items: flex-start; gap: 10px; padding: 12px; background: var(--brand-soft); border-radius: 10px; }
    .tr-event i { color: var(--brand); margin-top: 2px; }
    .tr-event .nm { font-size: 13px; font-weight: 700; color: var(--text); }
    .tr-event .sub { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }

    /* Right column cards */
    .buyer-card-big { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 22px 20px 18px; }
    .buyer-card-big .ba { width: 74px; height: 74px; border-radius: 999px; object-fit: cover; border: 3px solid var(--card); box-shadow: var(--shadow-sm); margin-bottom: 12px; }
    .buyer-card-big .nm { font-size: 16px; font-weight: 700; color: var(--text); }
    .buyer-card-big .role { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .buyer-card-big .zoo { font-size: 12.5px; color: var(--text); margin-top: 4px; display: inline-flex; align-items: center; gap: 4px; }
    .buyer-card-big .stats { display: flex; gap: 14px; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); width: 100%; justify-content: center; font-size: 12px; color: var(--text-muted); }
    .buyer-card-big .stats strong { color: var(--text); font-weight: 700; }
    .buyer-card-big .stats .star { color: #E4B819; }
    .buyer-card-big .contact { display: flex; gap: 8px; margin-top: 14px; width: 100%; }
    .buyer-card-big .contact button { flex: 1; padding: 9px 12px; border-radius: 10px; border: 1px solid var(--border); background: #fff; font-size: 12px; font-weight: 700; color: var(--text); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 5px; transition: .15s; }
    .buyer-card-big .contact button:hover { background: var(--brand-soft); color: var(--brand); border-color: var(--brand); }
    .buyer-card-big .contact button.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .buyer-card-big .contact button.primary:hover { background: var(--brand-hover); }

    /* Chat preview */
    .chat-prev { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .prev-msg { display: flex; gap: 8px; }
    .prev-msg img { width: 28px; height: 28px; border-radius: 999px; flex-shrink: 0; object-fit: cover; }
    .prev-msg .bubble { background: var(--card-subtle); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 12.5px; color: var(--text); line-height: 1.4; flex: 1; min-width: 0; }
    .prev-msg .bubble .who { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .prev-msg .bubble .txt { color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .chat-open-btn { width: 100%; margin-top: 6px; padding: 10px; background: var(--brand-soft); border: none; border-radius: 10px; color: var(--brand-hover); font-weight: 700; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: .15s; }
    .chat-open-btn:hover { background: var(--brand); color: #fff; }
    .chat-empty { padding: 20px; text-align: center; font-size: 12.5px; color: var(--text-muted); }

    /* Math card */
    .math-line { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; }
    .math-line .lab { color: var(--text-muted); }
    .math-line .val { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
    .math-line .val.neg { color: var(--danger); }
    .math-divider { height: 1px; background: var(--border); margin: 6px 0; }
    .payout-line { display: flex; justify-content: space-between; padding: 10px 0 2px; font-size: 14px; }
    .payout-line .lab { color: var(--text); font-weight: 800; }
    .payout-line .val { color: var(--brand); font-weight: 800; font-size: 18px; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

    /* Timestamps card */
    .ts-line { display: flex; justify-content: space-between; padding: 7px 0; font-size: 12.5px; }
    .ts-line .lab { color: var(--text-muted); }
    .ts-line .val { color: var(--text); font-weight: 600; }

    /* ============== Chat side sheet (copied from vendor_orders_1_2.html) ============== */
    .chat-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity .2s ease; z-index: 110; }
    .chat-overlay.open { opacity: 1; pointer-events: auto; }
    .chat-sheet { position: fixed; top: 0; right: 0; bottom: 0; width: 540px; max-width: 95vw; background: var(--card); box-shadow: -20px 0 50px -12px rgba(15,23,42,.22); transform: translateX(100%); transition: transform .32s cubic-bezier(.2,.8,.2,1); z-index: 120; display: flex; flex-direction: column; overflow: hidden; }
    .chat-sheet.open { transform: translateX(0); }
    .chat-sheet .chat-panel { display: flex; flex-direction: column; flex: 1; min-height: 0; border: none; background: var(--card); }
    .chat-sheet .messages { flex: 1; max-height: none; }
    @media (max-width: 600px) { .chat-sheet { width: 100vw; max-width: 100vw; } }

    .chat-panel { display: none; border-top: 1px solid var(--border); background: #FAFBFC; }
    .chat-head { padding: 14px 22px; display: flex; gap: 14px; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
    .chat-head .c-av { width: 40px; height: 40px; border-radius: 999px; overflow: hidden; background: var(--card-subtle); flex-shrink: 0; position: relative; }
    .chat-head .c-av img { width: 100%; height: 100%; object-fit: cover; }
    .chat-head .c-av .pres { position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-radius: 999px; background: var(--brand); border: 2px solid var(--card); }
    .chat-head .c-body { flex: 1; min-width: 0; }
    .chat-head .c-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .chat-head .c-sub { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .chat-head .c-sub .dot { color: var(--text-subtle); }
    .chat-head .c-sub .pres-dot { width: 6px; height: 6px; background: var(--brand); border-radius: 999px; display: inline-block; }
    .chat-head .c-actions { display: inline-flex; gap: 6px; align-items: center; }
    .chat-head .c-btn { width: 34px; height: 34px; border-radius: 10px; background: transparent; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: var(--text-muted); transition: .15s; }
    .chat-head .c-btn:hover { background: #F1F2F4; color: var(--text); }

    .spec-strip { padding: 10px 22px; background: #F4F6F8; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 11px; color: var(--text-muted); }

const inINR = n => '₹' + Number(n).toLocaleString('en-IN');
const fmtDate = iso => new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const fmtDateLong = iso => new Date(iso).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
const fmtDateMed = iso => new Date(iso).toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});
const escapeHtml = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function slaBig(h){ if (h==null) return ''; if (h<0) return `<span class="sla-big urgent"><i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> ${Math.abs(h)}h over SLA</span>`; if (h<=12) return `<span class="sla-big urgent"><i data-lucide="timer" class="w-3.5 h-3.5"></i> ${h}h left to accept</span>`; if (h<=24) return `<span class="sla-big warn"><i data-lucide="timer" class="w-3.5 h-3.5"></i> ${h}h left to accept</span>`; return `<span class="sla-big ok"><i data-lucide="clock" class="w-3.5 h-3.5"></i> ${h}h left</span>`; }

/* ============ Step timeline ============ */
function timelineSteps(o) {
  const steps = [
    { key:'placed',        lbl:'New Request' },
    { key:'confirmed',     lbl:'Approved' },
    { key:'in_production', lbl:'In Production' },
    { key:'packed',        lbl:'Ready to Ship' },
    { key:'shipped',       lbl:'Shipped' },
    { key:'delivered',     lbl:'Delivered' }
  ];
  const order = ['placed','confirmed','in_production','packed','shipped','out_for_delivery','delivered'];
  let currentIdx = order.indexOf(o.status);
  if (o.status === 'out_for_delivery') currentIdx = 4; // map to shipped
  if (o.status === 'cancelled' || o.status === 'returned') currentIdx = -1; // show all as inactive
  return steps.map((s, i) => {
    let cls = '';
    let when = '';
    if (currentIdx >= 0) {
      if (i < currentIdx) cls = 'done';
      else if (i === currentIdx) cls = 'current';
    }
    if (i === 0 && o.createdAt) when = fmtDate(o.createdAt);
    if (i === 1 && o.approvedAt) when = fmtDate(o.approvedAt);
    if (i === 3 && o.packedAt) when = fmtDate(o.packedAt);
    if (i === 5 && o.deliveredAt) when = fmtDate(o.deliveredAt);
    return `<div class="track-step ${cls}">
      <div class="dot">${cls==='done' ? '<i data-lucide=\'check\' class=\'w-3.5 h-3.5\'></i>' : (i+1)}</div>
      <div class="lbl">${s.lbl}</div>
      ${when?`<div class="when">${when}</div>`:''}
    </div>`;
  }).join('');
}

}

/* ============ State-aware CTA group (reused on swap after revert/accept) ============ */
const REVERTABLE_STATUSES = ['confirmed','in_production','packed','shipped','out_for_delivery'];
// Chain of forward progression; earlier targets for revert come from this array
const STATUS_CHAIN = ['placed','confirmed','in_production','packed','shipped','out_for_delivery'];
const REVERT_TARGET_DESC = {
  placed: 'Restart the conversation — buyer will need to re-confirm',
  confirmed: 'Production paused — order goes back to the approved queue',
  in_production: 'Pause packing — fabrication still ongoing',
  packed: 'Unship — goods come back to packed / ready-to-ship',
  shipped: 'Recall from out-for-delivery — goods in transit'
};
function validRevertTargets(status) {
  const i = STATUS_CHAIN.indexOf(status);
  if (i <= 0) return [];
  // Return closest-first (i-1, i-2, …, 0)
  return STATUS_CHAIN.slice(0, i).reverse();
}
function revertBtn(o) {
  if (!REVERTABLE_STATUSES.includes(o.status)) return '';
  return `<button class="cta-btn cta-ghost" onclick="openRevertModal()" title="Move this order to an earlier state"><i data-lucide="corner-up-left" class="w-4 h-4"></i> Revert state</button>`;
}
function stateCTAs(o) {
  let ctas = '';
  if (o.status === 'placed') {
    ctas = `
      <button class="cta-btn cta-primary" onclick="openAcceptModal()"><i data-lucide="sparkles" class="w-4 h-4"></i> Accept &amp; Confirm</button>
      <button class="cta-btn cta-ghost" onclick="toast('Queued for later · reminders in 24h','warn')"><i data-lucide="timer" class="w-4 h-4"></i> Queue for later</button>
      <button class="cta-btn cta-danger" onclick="openGen('decline')"><i data-lucide="x" class="w-4 h-4"></i> Decline</button>`;
  } else if (o.status === 'confirmed') {
    ctas = `
      <button class="cta-btn cta-primary" onclick="toast('Moved to In Production','success')"><i data-lucide="hammer" class="w-4 h-4"></i> Mark In Production</button>
      <button class="cta-btn cta-ghost" onclick="openChatSheet('${o.id}')"><i data-lucide="message-square" class="w-4 h-4"></i> Chat buyer</button>`;
  } else if (o.status === 'in_production') {
    ctas = `
      <button class="cta-btn cta-primary" onclick="openGen('progress')"><i data-lucide="pencil" class="w-4 h-4"></i> Update Progress</button>
      <button class="cta-btn cta-ghost" onclick="toast('Ready to Ship · buyer notified','success')"><i data-lucide="package-check" class="w-4 h-4"></i> Mark Ready to Ship</button>`;
  } else if (o.status === 'packed') {
    ctas = `
      <button class="cta-btn cta-warn" onclick="openGen('label')"><i data-lucide="printer" class="w-4 h-4"></i> Generate courier label</button>
      <button class="cta-btn cta-primary" onclick="openGen('shipped')"><i data-lucide="truck" class="w-4 h-4"></i> Mark Shipped</button>`;
  } else if (o.status === 'shipped' || o.status === 'out_for_delivery') {
    ctas = `
      <button class="cta-btn cta-primary" onclick="openGen('tracking')"><i data-lucide="pencil" class="w-4 h-4"></i> Update Tracking</button>
      <button class="cta-btn cta-ghost" onclick="openChatSheet('${o.id}')"><i data-lucide="message-square" class="w-4 h-4"></i> Chat buyer</button>`;
  } else if (o.status === 'delivered') {
    ctas = `
      <button class="cta-btn cta-primary" onclick="toast('Invoice downloaded','success')"><i data-lucide="download" class="w-4 h-4"></i> Download Invoice</button>
      <button class="cta-btn cta-ghost" onclick="toast('Review requested · buyer nudged','success')"><i data-lucide="star" class="w-4 h-4"></i> Request Review</button>`;
  } else if (o.status === 'cancelled') {
    ctas = `
      <button class="cta-btn cta-ghost" onclick="openGen('reason')"><i data-lucide="eye" class="w-4 h-4"></i> View reason</button>
      <button class="cta-btn cta-ghost" onclick="openChatSheet('${o.id}')"><i data-lucide="message-square" class="w-4 h-4"></i> Chat buyer</button>`;
  } else if (o.status === 'returned') {
    ctas = `
      <a class="cta-btn cta-primary" href="returns_vendor_1.html?id=${o.id}"><i data-lucide="rotate-ccw" class="w-4 h-4"></i> Manage Return</a>`;
  }
  return ctas + revertBtn(o);
}

/* ============ Revert to earlier state modal ============ */
let revertState = { target: null, reason: '' };

function openRevertModal() {
  if (!currentOrder || !REVERTABLE_STATUSES.includes(currentOrder.status)) return;
  const targets = validRevertTargets(currentOrder.status);
  revertState = { target: targets[0] || null, reason: '' };
  renderRevertModal();
  document.getElementById('revertOverlay').classList.add('open');
}
function closeRevertModal() {
  document.getElementById('revertOverlay').classList.remove('open');
}
function renderRevertModal() {
  const o = currentOrder;
  const modal = document.getElementById('revertModal');
  const targets = validRevertTargets(o.status);
  const targetsHtml = targets.map(k => `
    <label class="revert-target ${revertState.target === k ? 'selected' : ''}" data-target="${k}">
      <span class="rt-radio"></span>
      <span class="rt-body">
        <span class="rt-name">${escapeHtml(STATUS_LABEL[k])}</span>
        <span class="rt-desc">${escapeHtml(REVERT_TARGET_DESC[k] || '')}</span>
      </span>
    </label>`).join('');
  const reasonLen = revertState.reason.trim().length;
  const valid = reasonLen >= 15 && revertState.target;
  modal.innerHTML = `
    <div class="modal-head">
      <div class="title" id="revertTitle"><i data-lucide="corner-up-left" class="w-5 h-5"></i> Revert order to earlier state</div>
      <button class="modal-close" onclick="closeRevertModal()"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div class="modal-body">
      <div class="revert-banner">
        <i data-lucide="alert-triangle" class="w-4 h-4"></i>
        <div>Buyer will be notified of this change. Reverting backward is a last resort — use only when forward progress truly isn't possible.</div>
      </div>
      <div class="revert-current">Current state: <span class="chip-big chip-${o.status}"><i data-lucide="${STATUS_ICON[o.status]}" class="w-3.5 h-3.5"></i> ${escapeHtml(STATUS_LABEL[o.status])}</span></div>
      <label class="revert-label">Revert to</label>
      <div class="revert-targets" id="revertTargets">${targetsHtml}</div>
      <label class="revert-label" style="margin-top:16px;">Reason <span style="color:var(--danger);font-weight:700;">*</span> <span style="font-weight:500;color:var(--text-muted);">(visible to buyer)</span></label>
      <textarea class="revert-reason" id="revertReason" placeholder="e.g., Material shortage — need to pause production until new batch arrives next week">${escapeHtml(revertState.reason)}</textarea>
      <div class="revert-count ${reasonLen >= 15 ? 'ok' : ''}" id="revertCount">${reasonLen} / 15 min chars${reasonLen >= 15 ? ' ✓' : ''}</div>
    </div>
    <div class="modal-foot" style="justify-content:flex-end;">
      <button class="cta-btn cta-ghost" onclick="closeRevertModal()">Cancel</button>
      <button class="cta-btn cta-primary" id="revertConfirmBtn" ${valid?'':'disabled'} onclick="confirmRevert()"><i data-lucide="corner-up-left" class="w-4 h-4"></i> Confirm revert</button>
    </div>`;
  // Wire target radio clicks
  modal.querySelectorAll('.revert-target').forEach(el => {
    el.addEventListener('click', () => {
      revertState.target = el.dataset.target;
      modal.querySelectorAll('.revert-target').forEach(x => x.classList.toggle('selected', x.dataset.target === revertState.target));
      updateRevertConfirmBtn();
    });
  });
  // Wire reason textarea
  const ta = modal.querySelector('#revertReason');
  ta.addEventListener('input', e => {
    revertState.reason = e.target.value;
    const len = revertState.reason.trim().length;
    const counter = modal.querySelector('#revertCount');
    counter.textContent = `${len} / 15 min chars${len >= 15 ? ' ✓' : ''}`;
    counter.classList.toggle('ok', len >= 15);
    ta.classList.remove('invalid');
    updateRevertConfirmBtn();
  });
  if (window.lucide?.createIcons) window.lucide.createIcons();
}
function updateRevertConfirmBtn() {
  const btn = document.getElementById('revertConfirmBtn');
  if (!btn) return;
  const valid = revertState.reason.trim().length >= 15 && revertState.target;
  btn.disabled = !valid;
}
function confirmRevert() {
  const reason = revertState.reason.trim();
  const target = revertState.target;
  if (reason.length < 15 || !target) {
    const ta = document.getElementById('revertReason');
    if (ta) { ta.classList.add('invalid'); ta.focus(); }
    return;
  }
  const o = currentOrder;
  const oldStatus = o.status;
  const oldLabel = STATUS_LABEL[oldStatus];
  const newLabel = STATUS_LABEL[target];
  // Mutate order
  o.status = target;
  // Clear now-invalid forward timestamps/fields
  if (STATUS_CHAIN.indexOf(target) < STATUS_CHAIN.indexOf('packed')) { delete o.packedAt; delete o.shipBy; delete o.suggestedCarrier; }
  if (STATUS_CHAIN.indexOf(target) < STATUS_CHAIN.indexOf('shipped')) { delete o.tracking; }
  if (STATUS_CHAIN.indexOf(target) < STATUS_CHAIN.indexOf('in_production')) { delete o.productionStage; }
  if (STATUS_CHAIN.indexOf(target) < STATUS_CHAIN.indexOf('confirmed')) { delete o.approvedAt; delete o.readyBy; }
  // Push chat system message
  if (!o.chat) o.chat = [];
  o.chat.push({ sys: 'warn', body: `Vendor reverted from ${oldLabel} to ${newLabel} — ${reason}` });
  // Close modal
  closeRevertModal();
  // Toast
  toast(`Order reverted to ${newLabel} · buyer notified`, 'warn');
  // Update chip
  const chip = document.querySelector('.dh-id-row .chip-big');
  if (chip) {
    chip.className = `chip-big chip-${target}`;
    chip.innerHTML = `<i data-lucide="${STATUS_ICON[target]}" class="w-3.5 h-3.5"></i> ${STATUS_LABEL[target]}`;
  }
  // Swap CTAs
  const ctaGrp = document.querySelector('.cta-group');
  if (ctaGrp) ctaGrp.innerHTML = stateCTAs(o);
  // Update timeline
  const track = document.querySelector('.track-grid');
  if (track) track.innerHTML = timelineSteps(o);
  // If chat sheet is open for this order, live-insert the system chip
  const sheet = document.getElementById('chatSheet');
  if (sheet && sheet.classList.contains('open')) {
    const panel = sheet.querySelector(`[data-chat-for="${o.id}"]`);
    if (panel) {
      const msgs = panel.querySelector('.messages');
      if (msgs) {
        msgs.insertAdjacentHTML('beforeend', `<div class="sys-chip warn"><i data-lucide="clock" class="w-3 h-3"></i> ${escapeHtml('Vendor reverted from ' + oldLabel + ' to ' + newLabel + ' — ' + reason)}</div>`);
        msgs.scrollTop = msgs.scrollHeight;
      }
    }
  }
  if (window.lucide?.createIcons) window.lucide.createIcons();
}

function openChatSheet(orderId) {
  const o = ORDERS.find(x => x.id === orderId) || currentOrder;
  if (!o) return;
  const sheet = document.getElementById('chatSheet');
  const overlay = document.getElementById('chatOverlay');
  sheet.innerHTML = chatPanel(o);
  sheet.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  sheet.querySelectorAll('[data-close-chat]').forEach(btn => btn.addEventListener('click', closeChatSheet));
  const ta = sheet.querySelector('.comp-wrap textarea');
  const sendBtn = sheet.querySelector('.send-btn');
  if (ta && sendBtn) {
    ta.addEventListener('input', () => {
      sendBtn.disabled = !ta.value.trim();
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
    });
    ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendInSheet(ta, sendBtn); } });
    sendBtn.addEventListener('click', () => sendInSheet(ta, sendBtn));
    setTimeout(() => ta.focus(), 300);
  }
  setTimeout(() => { const msgs = sheet.querySelector('.messages'); if (msgs) msgs.scrollTop = msgs.scrollHeight; }, 40);
  if (window.lucide?.createIcons) window.lucide.createIcons();
}
function closeChatSheet() {
  document.getElementById('chatSheet').classList.remove('open');
  document.getElementById('chatOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function sendInSheet(ta, sendBtn) {
  const text = ta.value.trim();
  if (!text) return;
  const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit', minute:'2-digit'});
  const msgs = document.querySelector('#chatSheet .messages');
  msgs.insertAdjacentHTML('beforeend', `<div class="msg me"><div><div class="msg-bubble">${escapeHtml(text).replace(/\n/g,'<br/>')}</div><div class="msg-meta">${now} <i data-lucide="check-check" class="w-3 h-3 tk"></i></div></div></div>`);
  ta.value = ''; ta.style.height = 'auto'; sendBtn.disabled = true;
  msgs.scrollTop = msgs.scrollHeight;
  if (window.lucide?.createIcons) window.lucide.createIcons();
}

/* ============ Accept Modal (3 steps + review) ============ */
let acceptState = {
  step: 1,            // 1 = items, 2 = days, 3 = note, 4 = review
  days: 14,
  note: '',
  reviseTotal: null,
  addedToCat: {},     // sku -> true
  items: []           // live copy {qty, unit}
};

function openAcceptModal() {
  if (!currentOrder) return;
  // Reset state from order
  acceptState = {
    step: 1,
    days: 14,
    note: '',
    reviseTotal: null,
    addedToCat: {},
    items: currentOrder.items.map(it => ({ qty: it.qty, unit: it.unit, sku: it.p.sku, name: it.p.name, img: it.p.img, note: it.note, custom: CUSTOM_IDS.has(it.p.sku) }))
  };
  renderAcceptModal();
  document.getElementById('acceptOverlay').classList.add('open');
}
function closeAcceptModal() {
  document.getElementById('acceptOverlay').classList.remove('open');
}

function computeDelivery() {
  const d = new Date();
  d.setDate(d.getDate() + acceptState.days);
  return d;
}

function renderAcceptModal() {
  const modal = document.getElementById('acceptModal');
  const s = acceptState.step;
  const subtotal = acceptState.items.reduce((t,it)=>t + it.qty * it.unit, 0);

  const progress = `
    <div class="step-progress">
      <div class="sp ${s>1?'done':(s===1?'active':'')}"><span class="sn">${s>1?'✓':'1'}</span><span>Review</span></div>
      <div class="sp ${s>2?'done':(s===2?'active':'')}"><span class="sn">${s>2?'✓':'2'}</span><span>Delivery</span></div>
      <div class="sp ${s>3?'done':(s===3?'active':'')}"><span class="sn">${s>3?'✓':'3'}</span><span>Note</span></div>
      <div class="sp ${s===4?'active':''}"><span class="sn">4</span><span>Confirm</span></div>
    </div>`;

  let body = '';
  let foot = '';

  if (s === 1) {
    const itemsHtml = acceptState.items.map((it, idx) => {
      const addCatBtn = it.custom
        ? (acceptState.addedToCat[it.sku]
           ? `<div class="cat-added"><i data-lucide="check-circle" class="w-3 h-3"></i> Added to your catalog</div>`

      return `<div class="step-item ${it.custom?'custom':''}">
        <div class="row1">

          <div style="flex:1;min-width:0;">
            <div class="ttl">${escapeHtml(it.name)}</div>
            <div class="sub">SKU ${it.sku}${it.custom?' · <span style="color:#A16207;font-weight:700;">Not in your catalog</span>':''}</div>
          </div>
        </div>
        <div class="inputs">
          <div class="field"><label>Quantity</label><input type="number" min="1" value="${it.qty}" data-item-idx="${idx}" data-field="qty"/></div>
          <div class="field"><label>Unit price (₹)</label><input type="number" min="0" value="${it.unit}" data-item-idx="${idx}" data-field="unit"/></div>
        </div>
        ${it.note ? `<div style="font-size:11.5px;color:var(--text-muted);margin-top:10px;line-height:1.4;"><strong style="color:var(--text);">Buyer spec:</strong> ${escapeHtml(it.note)}</div>` : ''}
        ${addCatBtn}
        <div class="line-total"><div class="lab">Line total</div><div class="val">${inINR(it.qty * it.unit)}</div></div>
      </div>`;
    }).join('');

    body = `
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Review quantities and pricing. For any items not yet in your catalog, you can add them with a single click.</div>
      ${itemsHtml}
      <div class="subtotal-bar"><div class="lab">Running subtotal</div><div class="val">${inINR(subtotal)}</div></div>`;
    foot = `
      <button class="cta-btn cta-ghost" onclick="closeAcceptModal()">Cancel</button>
      <button class="cta-btn cta-primary" onclick="nextStep()">Continue <i data-lucide="arrow-right" class="w-4 h-4"></i></button>`;
  }

  else if (s === 2) {
    const preview = computeDelivery();
    const presets = [
      { lbl:'1 week', days:7 },
      { lbl:'2 weeks', days:14 },
      { lbl:'3 weeks', days:21 },
      { lbl:'1 month', days:30 }
    ];
    body = `
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Tell the buyer how many days you need to deliver. They'll see a countdown on their side and a clear "Delivers by" date.</div>

      </div>

      <div class="preset-chips" id="presetChips">
        ${presets.map(p => `<button class="preset-chip ${p.days === acceptState.days?'active':''}" data-days="${p.days}">${p.lbl}</button>`).join('')}
      </div>

        <div class="ic"><i data-lucide="calendar-check" class="w-5 h-5"></i></div>

        </div>
      </div>

      <div class="hint"><i data-lucide="info" class="w-3.5 h-3.5"></i><div>Include buffer for any rework requests. Buyers see this as a live countdown, so shorter but reliable beats optimistic.</div></div>

      <label class="buffer-toggle">
        <input type="checkbox" id="bufferChk" ${acceptState.bufferAdded?'checked':''}/>
        <div>
          <div class="tg-lab">Add 3-day risk padding</div>
          <div class="tg-sub">Recommended for items with weather-dependent materials</div>
        </div>
      </label>`;
    foot = `
      <button class="cta-btn cta-ghost" onclick="prevStep()"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back</button>
      <button class="cta-btn cta-primary" onclick="nextStep()">Continue <i data-lucide="arrow-right" class="w-4 h-4"></i></button>`;
  }

  else if (s === 3) {
    body = `
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Optionally add a note. Buyers appreciate clarity around spec, pricing adjustments, or schedule caveats.</div>

      <label class="label" style="font-size:12px;font-weight:700;color:var(--text);display:block;margin-bottom:6px;">Note to buyer</label>
      <textarea class="note-area" id="noteArea" placeholder="e.g., Teak will be kiln-dried. Silicone corners add ₹6k — reflected in total.">${escapeHtml(acceptState.note)}</textarea>

      <label class="revise-toggle">
        <input type="checkbox" id="reviseChk" ${acceptState.reviseTotal != null ? 'checked':''}/>

          <div class="tg-lab">Price adjusted? Show new total</div>
          <div class="tg-sub">Useful if buyer asked for add-ons or specs changed</div>
        </div>
      </label>

      <div class="price-revise ${acceptState.reviseTotal != null ? 'open':''}" id="priceReviseBox">

      </div>`;
    foot = `
      <button class="cta-btn cta-ghost" onclick="prevStep()"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back</button>

  }

  else if (s === 4) {

    body = `

      </div>`;
    foot = `
      <button class="cta-btn cta-ghost" onclick="prevStep()"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back to edit</button>

  modal.innerHTML = `
    <div class="modal-head">
      <div class="title" id="acceptTitle"><i data-lucide="sparkles" class="w-5 h-5"></i> Accept order ${currentOrder.id}</div>
      <button class="modal-close" onclick="closeAcceptModal()"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>

    <div class="modal-foot">${progress}${foot}</div>`;

  if (window.lucide?.createIcons) window.lucide.createIcons();
  wireAcceptModal();
}

function wireAcceptModal() {
  // Step 1 qty/unit wiring
  document.querySelectorAll('[data-item-idx]').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = +e.target.dataset.itemIdx;
      const field = e.target.dataset.field;
      const val = Math.max(0, +e.target.value || 0);
      acceptState.items[idx][field] = val;
      const st = acceptState.items.reduce((t,it)=>t + it.qty * it.unit, 0);
      const bar = document.querySelector('.subtotal-bar .val');
      if (bar) bar.textContent = inINR(st);
      const lineTotal = e.target.closest('.step-item').querySelector('.line-total .val');
      if (lineTotal) lineTotal.textContent = inINR(acceptState.items[idx].qty * acceptState.items[idx].unit);
    });
  });
  // Step 2
  const daysInput = document.getElementById('daysInput');
  if (daysInput) {
    daysInput.addEventListener('input', e => {
      let v = Math.max(1, Math.min(180, +e.target.value || 1));
      acceptState.days = v;
      updateDatePreview();
      highlightPreset();
    });
  }
  document.querySelectorAll('#presetChips .preset-chip').forEach(c => c.addEventListener('click', () => {
    acceptState.days = +c.dataset.days;
    if (daysInput) daysInput.value = acceptState.days;
    updateDatePreview();
    highlightPreset();
  }));
  const bufferChk = document.getElementById('bufferChk');
  if (bufferChk) bufferChk.addEventListener('change', e => {
    const wasOn = acceptState.bufferAdded;
    if (e.target.checked && !wasOn) { acceptState.days += 3; }
    else if (!e.target.checked && wasOn) { acceptState.days = Math.max(1, acceptState.days - 3); }
    acceptState.bufferAdded = e.target.checked;
    if (daysInput) daysInput.value = acceptState.days;
    updateDatePreview();
    highlightPreset();
  });
  // Step 3
  const noteA = document.getElementById('noteArea');
  if (noteA) noteA.addEventListener('input', e => acceptState.note = e.target.value);
  const reviseChk = document.getElementById('reviseChk');
  if (reviseChk) reviseChk.addEventListener('change', e => {
    const box = document.getElementById('priceReviseBox');
    if (e.target.checked) {
      box.classList.add('open');
      const st = acceptState.items.reduce((t,it)=>t + it.qty * it.unit, 0);
      acceptState.reviseTotal = st;
    } else {
      box.classList.remove('open');
      acceptState.reviseTotal = null;
    }
  });
  const reviseInp = document.getElementById('reviseInput');
  if (reviseInp) reviseInp.addEventListener('input', e => { acceptState.reviseTotal = Math.max(0, +e.target.value || 0); });
}

function updateDatePreview() {
  const el = document.getElementById('deliveryPreview');
  if (el) el.textContent = fmtDateLong(computeDelivery());
}
function highlightPreset() {
  document.querySelectorAll('#presetChips .preset-chip').forEach(c => {
    if (+c.dataset.days === acceptState.days) c.classList.add('active');
    else c.classList.remove('active');
  });
}
function tweakDays(delta) {
  acceptState.days = Math.max(1, Math.min(180, acceptState.days + delta));
  const di = document.getElementById('daysInput');
  if (di) di.value = acceptState.days;
  updateDatePreview();
  highlightPreset();
}
function nextStep() {
  if (acceptState.step < 4) { acceptState.step++; renderAcceptModal(); }
}
function prevStep() {
  if (acceptState.step > 1) { acceptState.step--; renderAcceptModal(); }
}
function confirmAccept() {
  const preview = computeDelivery();
  closeAcceptModal();
  toast(`Order accepted · ETA ${acceptState.days} days · delivers by ${fmtDateMed(preview)}`, 'success');
  // Simulate status change: update chip & CTA section
  setTimeout(() => {
    currentOrder.status = 'confirmed';
    currentOrder.approvedAt = new Date().toISOString();
    const chip = document.querySelector('.dh-id-row .chip-big');
    if (chip) { chip.className = 'chip-big chip-confirmed'; chip.innerHTML = '<i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Approved'; }
    const sla = document.querySelector('.dh-id-row .sla-big');
    if (sla) sla.remove();
    const ctaGrp = document.querySelector('.cta-group');
    if (ctaGrp) ctaGrp.innerHTML = stateCTAs(currentOrder);
    const track = document.querySelector('.track-grid');
    if (track) track.innerHTML = timelineSteps(currentOrder);
    if (window.lucide?.createIcons) window.lucide.createIcons();
  }, 100);
}

        <option>Tomorrow 2-4 PM</option>
      </select>
      <div style="font-size:11.5px;color:var(--text-muted);margin-top:8px;">Label will be emailed to your printing address.</div>`;
    primary = 'Generate label';
    primaryCb = () => { closeGen(); toast('Label sent to your inbox', 'success'); };
  } else if (kind === 'shipped') {
    title = '<i data-lucide="truck" class="w-5 h-5" style="color:var(--brand)"></i> Mark shipped';
    body = `<label class="label" style="font-size:12px;font-weight:700;">AWB / Tracking number</label>
      <input type="text" class="input" placeholder="e.g., DLV-7H29-8842" style="margin-bottom:10px;"/>
      <label class="label" style="font-size:12px;font-weight:700;">Carrier</label>
      <select class="input" style="margin-bottom:10px;">
        <option>Delhivery Freight</option>
        <option>Porter Freight</option>
        <option>BlueDart Surface</option>
      </select>`;
    primary = 'Mark shipped';
    primaryCb = () => { closeGen(); toast('Marked shipped · buyer can now track','success'); };
  } else if (kind === 'tracking') {
    title = '<i data-lucide="pencil" class="w-5 h-5" style="color:var(--brand)"></i> Update tracking';
    body = `<label class="label" style="font-size:12px;font-weight:700;">Latest event</label>
      <input type="text" class="input" placeholder="e.g., Arrived at Mysuru hub" style="margin-bottom:10px;"/>
      <label class="label" style="font-size:12px;font-weight:700;">Location</label>
      <input type="text" class="input" placeholder="e.g., Mysuru"/>`;
    primary = 'Save';
    primaryCb = () => { closeGen(); toast('Tracking updated','success'); };
  } else if (kind === 'reason') {
    title = '<i data-lucide="info" class="w-5 h-5" style="color:var(--danger)"></i> Cancellation reason';
    body = `<div style="padding:14px;background:var(--danger-bg);border-radius:10px;color:var(--text);font-size:13.5px;line-height:1.5;">
      ${escapeHtml(currentOrder?.cancelReason || '—')}
    </div>`;
    primary = 'Close';
    primaryCb = () => closeGen();
  }
  modal.innerHTML = `
    <div class="modal-head">
      <div class="title" style="gap:6px;">${title}</div>
      <button class="modal-close" onclick="closeGen()"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot" style="justify-content:flex-end;">
      <button class="cta-btn cta-ghost" onclick="closeGen()">Cancel</button>
      <button class="cta-btn cta-primary" id="genPrimary">${primary}</button>
    </div>`;
  overlay.classList.add('open');
  document.getElementById('genPrimary').addEventListener('click', primaryCb);
  if (window.lucide?.createIcons) window.lucide.createIcons();
}
function closeGen() { document.getElementById('genOverlay').classList.remove('open'); }

/* ============ Toasts ============ */
function toast(msg, kind='default') {
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = `toast ${kind==='success'?'success':kind==='warn'?'warn':''}`;
  const icon = kind==='success'?'check-circle':kind==='warn'?'alert-triangle':'info';
  el.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i><span>${escapeHtml(msg)}</span>`;
  stack.appendChild(el);
  if (window.lucide?.createIcons) window.lucide.createIcons();
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 2800);
}

/* ============ Boot ============ */
let currentOrder = null;
function boot() {
  const id = getParam('id');
  let o = null;
  if (id) o = ORDERS.find(x => x.id === id);
  if (!o) o = ORDERS.find(x => x.status === 'placed') || ORDERS[0];
  currentOrder = o;
  document.getElementById('pageMain').innerHTML = renderDetail(o);
  if (window.lucide?.createIcons) window.lucide.createIcons();
  // Overlay click-to-close
  document.getElementById('chatOverlay').addEventListener('click', closeChatSheet);
  document.getElementById('acceptOverlay').addEventListener('click', e => { if (e.target.id === 'acceptOverlay') closeAcceptModal(); });
  document.getElementById('catOverlay').addEventListener('click', e => { if (e.target.id === 'catOverlay') closeCatalogModal(); });
  document.getElementById('genOverlay').addEventListener('click', e => { if (e.target.id === 'genOverlay') closeGen(); });
  document.getElementById('revertOverlay').addEventListener('click', e => { if (e.target.id === 'revertOverlay') closeRevertModal(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('catOverlay').classList.contains('open')) closeCatalogModal();
      else if (document.getElementById('acceptOverlay').classList.contains('open')) closeAcceptModal();
      else if (document.getElementById('revertOverlay').classList.contains('open')) closeRevertModal();
      else if (document.getElementById('genOverlay').classList.contains('open')) closeGen();
      else closeChatSheet();
    }
  });
}

/* Unified header: mobile drawer + avatar menu */
(function(){
  const menuBtn = document.getElementById('vendorMenuBtn');
  const drawer  = document.getElementById('vDrawer');
  const overlay = document.getElementById('vDrawerOverlay');
  const closeBtn = drawer && drawer.querySelector('.vd-close');
  function openDrawer(){ drawer.classList.add('open'); overlay.classList.add('open'); drawer.setAttribute('aria-hidden','false'); }
  function closeDrawer(){ drawer.classList.remove('open'); overlay.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); }
  if (menuBtn) menuBtn.addEventListener('click', openDrawer);
  if (overlay) overlay.addEventListener('click', closeDrawer);
  if (closeBtn) closeBtn.addEventListener('click', closeDrawer);

  const avatarBtn = document.getElementById('avatarBtn');
  const vMenu = document.getElementById('vMenu');
  if (avatarBtn && vMenu) {
    avatarBtn.addEventListener('click', e => { e.stopPropagation(); vMenu.classList.toggle('open'); });
    document.addEventListener('click', e => { if (!vMenu.contains(e.target) && e.target !== avatarBtn) vMenu.classList.remove('open'); });
  }
})();

boot();
</script>
