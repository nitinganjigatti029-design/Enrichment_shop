<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>ZooEnrich · Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="tokens.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <style>
    /* =========== Page layout =========== */
    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 0 32px; }

    /* =========== Header (cloned from index_1) =========== */
    .app-header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .app-header .row { display: flex; align-items: center; gap: 20px; height: 72px; }
    .brand-mark { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; color: var(--text); letter-spacing: -0.01em; }
    .brand-mark .logo-box { width: 32px; height: 32px; border-radius: 10px; background: var(--brand); color: #fff; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px -3px rgba(55,189,105,.5); }

    .search-pill { flex: 1; max-width: 560px; height: 48px; background: #F1F2F4; border-radius: 999px; display: flex; align-items: center; gap: 10px; padding: 0 18px; color: var(--text-muted); transition: .15s; border: 1.5px solid transparent; }
    .search-pill:focus-within { background: #fff; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(55,189,105,.12); }
    .search-pill input { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); }
    .search-pill .kbd { background: #fff; border: 1px solid var(--border); color: var(--text-muted); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }

    .header-actions { display: flex; align-items: center; gap: 6px; }
    .header-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 10px; border-radius: 12px; color: var(--text-muted); cursor: pointer; transition: .15s; background: transparent; border: none; position: relative; min-width: 64px; }
    .header-btn:hover { background: #F1F2F4; color: var(--text); }
    .header-btn.active { background: var(--brand-soft); color: var(--brand-hover); }
    .header-btn span { font-size: 11px; font-weight: 500; margin-top: 3px; }
    .header-btn .badge-dot { position: absolute; top: 4px; right: 12px; min-width: 18px; height: 18px; padding: 0 5px; background: var(--danger); color: #fff; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 2px solid #fff; }
    .avatar { width: 40px; height: 40px; border-radius: 999px; object-fit: cover; border: 2px solid var(--border); margin-left: 8px; cursor: pointer; }

    /* =========== Page header strip =========== */
    .crumbs { font-size: 12px; color: var(--text-muted); padding: 22px 0 10px; display: flex; align-items: center; gap: 8px; }
    .crumbs a { color: var(--text-muted); }
    .crumbs a:hover { color: var(--brand); }
    .crumbs .sep { color: var(--text-subtle); }

    .page-head-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .page-head-row h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); display: inline-flex; align-items: center; gap: 12px; }
    .page-head-row h1 .count-badge { font-size: 12px; font-weight: 600; background: #F1F2F4; color: var(--text-muted); padding: 4px 10px; border-radius: 999px; letter-spacing: 0; }

    /* =========== Tabs row (seg-control style) =========== */
    .tabs-wrap { margin-bottom: 22px; }
    .tabs { display: inline-flex; background: #F1F2F4; padding: 4px; border-radius: 999px; gap: 4px; flex-wrap: wrap; }
    .tabs button { padding: 9px 18px; border-radius: 999px; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: .15s; display: inline-flex; align-items: center; gap: 8px; }
    .tabs button:hover { color: var(--text); }
    .tabs button.active { background: var(--brand); color: #fff; box-shadow: 0 2px 6px -2px rgba(55,189,105,.5); }
    .tabs button .count-pill { font-size: 11px; font-weight: 700; background: rgba(255,255,255,.25); padding: 1px 7px; border-radius: 999px; }
    .tabs button:not(.active) .count-pill { background: #fff; color: var(--text-muted); }

    /* =========== Order list =========== */
    .orders-list { display: flex; flex-direction: column; gap: 18px; padding-bottom: 60px; }

    .order-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: var(--shadow-xs); transition: .2s ease; cursor: pointer; }
    .order-card:hover { box-shadow: var(--shadow-sm); border-color: var(--border-strong); transform: translateY(-1px); }

    .oc-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .oc-top-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
    .oc-date { font-size: 12px; color: var(--text-muted); display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }

    .oc-idrow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .oc-id { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0; }

    /* Status chip colour map (new status model) */
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
    .chip .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; opacity: 0.8; }
    .chip-placed           { background: #F1F2F4;          color: #6B7280; }
    .chip-pending_approval { background: #FFF9DB;          color: #A16207; }
    .chip-confirmed        { background: var(--brand-soft); color: #006D35; }
    .chip-packed           { background: #FEF3C7;          color: #A16207; }
    .chip-shipped          { background: #CFFAFE;          color: #0891B2; }
    .chip-out_for_delivery { background: #A7F3D0;          color: #065F46; }
    .chip-delivered        { background: var(--brand);     color: #fff; }
    .chip-cancelled        { background: var(--danger);    color: #fff; }

    /* Approval strip */
    .approval-strip {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 10px; font-size: 12.5px; margin-bottom: 10px;
      line-height: 1.45;
    }
    .approval-strip i { flex-shrink: 0; }
    .approval-strip.pending  { background: #FFF9DB; border-left: 3px solid #E4B819; color: #6D4B00; font-style: italic; }
    .approval-strip.approved { background: var(--brand-soft); border-left: 3px solid var(--brand); color: #006D35; }
    .approval-strip.rejected { background: #FFE5EA; border-left: 3px solid var(--danger); color: #B00020; }

    /* Shipping-to under Sold by */
    .shipping-to { display: inline-flex; align-items: center; gap: 5px; color: var(--text-muted); font-size: 12px; }
    .shipping-to i { color: var(--text-subtle); }

    .chip-priority { background: #FFE5EA; color: #B00020; }
    .chip-priority.high { background: #FFF8CC; color: #8A6D00; }
    .chip-priority.critical { background: var(--danger); color: #fff; }

    .chip-species { background: var(--brand-soft); color: var(--brand-hover); padding: 4px 10px 4px 4px; display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; font-size: 12px; font-weight: 600; text-transform: none; letter-spacing: 0; }
    .chip-species .sp-avatar { width: 20px; height: 20px; border-radius: 999px; object-fit: cover; flex-shrink: 0; }

    /* Sold by + Ready by row */
    .oc-vendor-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .sold-by { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 12px; text-decoration: none; transition: color .15s; }
    .sold-by:hover { color: var(--brand); }
    .sold-by:hover .vendor-name { color: var(--brand); }
    .sold-by img.vendor-logo { width: 16px; height: 16px; border-radius: 999px; object-fit: cover; flex-shrink: 0; }
    .sold-by .vendor-name { color: var(--text); font-weight: 600; transition: color .15s; }
    .ready-by-chip { background: var(--brand-soft); color: var(--brand-hover); padding: 3px 9px; border-radius: 999px; font-size: 11px; display: inline-flex; gap: 4px; align-items: center; font-weight: 600; }
    .awaiting-vendor-note { font-size: 12px; font-style: italic; color: #A16207; display: inline-flex; align-items: center; gap: 5px; }

    /* Avatar dropdown */
    .avatar-wrap { position: relative; margin-left: 8px; }
    .avatar-menu { position: absolute; top: calc(100% + 8px); right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-md); min-width: 200px; padding: 6px; z-index: 60; opacity: 0; transform: translateY(-4px); pointer-events: none; transition: .15s; }
    .avatar-menu.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .avatar-menu .menu-header { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
    .avatar-menu .menu-header .name { font-size: 13px; font-weight: 600; color: var(--text); }
    .avatar-menu .menu-header .email { font-size: 11px; color: var(--text-muted); margin-top: 2px; word-break: break-all; }
    .avatar-menu a, .avatar-menu button { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; padding: 9px 12px; border-radius: 8px; font-size: 13px; color: var(--text); background: transparent; border: none; cursor: pointer; transition: .12s; }
    .avatar-menu a:hover, .avatar-menu button:hover { background: var(--card-subtle); color: var(--brand-hover); }
    .avatar-menu .menu-sep { height: 1px; background: var(--border); margin: 6px 0; }
    .avatar-menu .sign-out { color: var(--danger); }
    .signin-pill { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 999px; background: var(--brand); color: #fff; font-size: 13px; font-weight: 600; text-decoration: none; margin-left: 8px; transition: .15s; }
    .signin-pill:hover { background: var(--brand-hover); }

    /* Tracking line */
    .oc-tracking { background: var(--card-subtle); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
    .oc-tracking .track-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px; color: var(--text-muted); }
    .oc-tracking .track-row .awb { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; color: var(--text); font-weight: 600; }
    .oc-tracking .track-row .carrier-name { color: var(--text); font-weight: 600; }
    .oc-tracking .track-row .sep-dot { color: var(--text-subtle); }
    .oc-tracking .event-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 13px; color: var(--text); }
    .oc-tracking .event-row .evt-note { font-weight: 500; }
    .oc-tracking .event-row .evt-loc,
    .oc-tracking .event-row .evt-time { color: var(--text-muted); font-weight: 400; font-size: 12px; }
    .oc-tracking.awaiting { background: #FFFBEB; border-color: #FCD34D; }
    .oc-tracking.awaiting .event-row { color: #A16207; font-weight: 500; }

    /* Items preview */
    .oc-items { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .oc-thumbs { display: flex; align-items: center; }
    .oc-thumbs .thumb { position: relative; width: 56px; height: 56px; border-radius: 12px; overflow: hidden; background: var(--card-subtle); border: 2px solid #fff; margin-left: -8px; box-shadow: var(--shadow-xs); }
    .oc-thumbs .thumb:first-child { margin-left: 0; }
    .oc-thumbs .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .oc-thumbs .thumb .qty-ov { position: absolute; right: 3px; bottom: 3px; background: rgba(15,23,42,.85); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 6px; }
    .oc-thumbs .more { width: 56px; height: 56px; border-radius: 12px; background: #F1F2F4; color: var(--text-muted); font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; margin-left: -8px; border: 2px solid #fff; }
    .oc-item-names { font-size: 13px; color: var(--text-muted); flex: 1; min-width: 0; }
    .oc-item-names strong { color: var(--text); font-weight: 600; }
    .oc-item-count { font-size: 12px; color: var(--text-muted); margin-left: auto; }

    /* Bottom row */
    .oc-bottom { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-top: 14px; border-top: 1px dashed var(--border); flex-wrap: wrap; }
    .oc-total { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
    .oc-total .sub-label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-right: 6px; display: block; }

    .oc-actions { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn-sm { padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; border: 1px solid transparent; transition: .15s; }
    .btn-sm-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn-sm-primary:hover { background: var(--brand-hover); border-color: var(--brand-hover); }
    .btn-sm-ghost { background: #fff; color: var(--text); border-color: var(--border); }
    .btn-sm-ghost:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .btn-sm-danger { background: #fff; color: var(--danger); border-color: #F5C2CB; }
    .btn-sm-danger:hover { background: var(--danger-bg); border-color: var(--danger); }
    .btn-sm[disabled] { opacity: 0.5; cursor: not-allowed; }

    /* Clear delivered ghost */
    .ghost-link { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: .15s; }
    .ghost-link:hover { color: var(--text); border-color: var(--border-strong); background: #F9FAFB; }

    /* Empty state */
    .empty-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
    .empty-wrap .big-ico { width: 96px; height: 96px; border-radius: 999px; background: var(--brand-soft); color: var(--brand); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 18px; }
    .empty-wrap h3 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-wrap p { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; max-width: 420px; }

    /* =========== Toast =========== */
    .ze-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0F172A; color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 10px 30px -8px rgba(0,0,0,.4); opacity: 0; pointer-events: none; transition: .25s; z-index: 100; max-width: 360px; }
    .ze-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* =========== Responsive =========== */
    @media (max-width: 900px) {
      .app-header .row, .site-header-inner { height: 60px !important; gap: 10px; }
      .search-pill { display: none !important; }
      .header-btn span { display: none !important; }
      .header-btn { min-width: 40px !important; padding: 8px !important; }
      .page-wrap { padding: 0 16px !important; }
      .page-head-row h1 { font-size: 22px; }
    }
    @media (max-width: 700px) {
      .oc-bottom { flex-direction: column; align-items: stretch; }
      .oc-actions { justify-content: stretch; width: 100%; }
      .oc-actions .btn-sm { flex: 1; justify-content: center; min-height: 40px; }
      .tabs-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-left: -16px; margin-right: -16px; padding: 0 16px; }
      .tabs { width: max-content; overflow-x: visible; flex-wrap: nowrap !important; }
      .tabs button { flex-shrink: 0; }
      .oc-top { gap: 8px; }
      .oc-top-left { flex: 1; min-width: 0; }
      .oc-vendor-row { gap: 8px; row-gap: 6px; }
      .sold-by { flex-basis: 100%; }
      .oc-tracking .track-row, .oc-tracking .event-row { font-size: 12px; }
      .oc-tracking .track-row .awb { font-size: 11px; }
      .order-card { padding: 16px; }
      .page-head-row { flex-wrap: wrap; }
    }
    @media (max-width: 500px) {
      .oc-actions { flex-direction: column; gap: 8px; }
      .oc-actions .btn-sm { width: 100%; flex: none; }
      .oc-items { gap: 10px; }
      .oc-item-count { margin-left: 0; flex-basis: 100%; }
      .oc-total { font-size: 20px; }
      .page-head-row h1 { font-size: 20px; }
    }
  </style>
</head>
<body data-device="desktop">
<div class="device-shell"><div class="device-inner">

  <!-- =============== HEADER =============== -->
  <header class="app-header">
    <div class="page-wrap row">
      <a href="index_1.html" class="brand-mark">
        <span class="logo-box"><i data-lucide="paw-print" class="w-4 h-4"></i></span>
        <span>ZooEnrich</span>
      </a>

      <label class="search-pill">
        <i data-lucide="search" class="w-4 h-4"></i>
        <input type="text" placeholder="Search orders, products…"/>
        <span class="kbd">⌘K</span>
      </label>

      <div class="header-actions">
        <button class="header-btn active" type="button" id="ordersBtn">
          <i data-lucide="package" class="w-5 h-5"></i><span>Orders</span>
          <span class="badge-dot" id="ordersBadge" style="display:none">0</span>
        </button>
        <button class="header-btn" type="button" id="savedBtn">
          <i data-lucide="heart" class="w-5 h-5"></i><span>Saved</span>
          <span class="badge-dot" id="savedBadge" style="display:none">0</span>
        </button>
        <button class="header-btn" type="button" id="cartBtn">
          <i data-lucide="shopping-bag" class="w-5 h-5"></i><span>Cart</span>
          <span class="badge-dot" id="cartBadge" style="display:none">0</span>
        </button>
        <div id="userSlot"></div>
      </div>
    </div>
  </header>

  <!-- =============== PAGE BODY =============== -->
  <div class="page-wrap">
    <!-- Breadcrumb -->
    <div class="crumbs">
      <a href="index_1.html">Home</a>
      <span class="sep">·</span>
      <span style="color:var(--text); font-weight:600">Orders</span>
    </div>

    <!-- Page head -->
    <div class="page-head-row">
      <h1>Your orders <span class="count-badge" id="totalCountBadge">0 orders</span></h1>
      <button class="ghost-link" id="clearDeliveredBtn" type="button">
        <i data-lucide="check-check" class="w-4 h-4"></i> Clear delivered
      </button>
    </div>

    <!-- Tabs -->
    <div class="tabs-wrap">
      <div class="tabs" id="tabsRow">
        <button data-tab="pending_approval">Awaiting approval <span class="count-pill" data-count="pending_approval">0</span></button>
        <button data-tab="all" class="active">All <span class="count-pill" data-count="all">0</span></button>
        <button data-tab="in_transit">In transit <span class="count-pill" data-count="in_transit">0</span></button>
        <button data-tab="delivered">Delivered <span class="count-pill" data-count="delivered">0</span></button>
        <button data-tab="cancelled">Cancelled <span class="count-pill" data-count="cancelled">0</span></button>
      </div>
    </div>

    <!-- Order list -->
    <div class="orders-list" id="ordersList"></div>
  </div>

</div></div>

<!-- Toast -->
<div class="ze-toast" id="toast"></div>

<!-- =============== SCRIPTS =============== -->
<script>
(function(){
  const DB = window.DB;
  const ZE = window.ZE;

  /* ---------- Sign-in guard: vendors redirected ---------- */
  try {
    if (ZE && ZE.user && typeof ZE.user.role === 'function' && ZE.user.role() === 'vendor') {
      window.location.replace('vendor_orders_1.html');
      return;
    }
  } catch (e) { /* ignore */ }

  /* ---------- State ---------- */
  const state = {
    tab: 'all'
  };

  /* ---------- Status label dictionary ---------- */
  const STATUS_LABELS = {
    pending_approval: 'Awaiting approval',
    placed: 'Placed',
    confirmed: 'Confirmed',
    packed: 'Packed',
    shipped: 'Shipped',
    out_for_delivery: 'Out for delivery',
    delivered: 'Delivered',
    cancelled: 'Cancelled'
  };
  const STATUS_ICONS = {
    pending_approval: 'hourglass',
    placed: 'clipboard-list',
    confirmed: 'check-circle',
    packed: 'package',
    shipped: 'truck',
    out_for_delivery: 'navigation',
    delivered: 'check-check',
    cancelled: 'x'
  };
  const IN_TRANSIT_SET = new Set(['placed','confirmed','packed','shipped','out_for_delivery']);

  /* ---------- Data: merge user orders + demo orders ---------- */
  function getMergedOrders() {
    const userOrders = (ZE.orders.read() || []).map(o => Object.assign({}, o, { source: o.source || 'user' }));
    const demoOrders = (DB.DEMO_ORDERS || []).map(o => Object.assign({}, o, { source: o.source || 'demo' }));
    const all = userOrders.concat(demoOrders);
    all.sort((a, b) => {
      const ta = new Date(a.createdAt).getTime() || 0;
      const tb = new Date(b.createdAt).getTime() || 0;
      return tb - ta;
    });
    return all;
  }

  /* ---------- Helpers ---------- */
  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso || '';
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch (e) { return iso || ''; }
  }

  // Relative time: "2h ago", "yesterday", "3 days ago"
  function relTime(iso) {
    if (!iso) return '';
    const t = new Date(iso).getTime();
    if (isNaN(t)) return '';
    const now = Date.now();
    const diff = Math.max(0, now - t);
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    if (days === 1) return 'yesterday';
    if (days < 7) return days + ' days ago';
    const wks = Math.floor(days / 7);
    if (wks < 5) return wks + ' week' + (wks === 1 ? '' : 's') + ' ago';
    const mths = Math.floor(days / 30);
    if (mths < 12) return mths + ' month' + (mths === 1 ? '' : 's') + ' ago';
    const yrs = Math.floor(days / 365);
    return yrs + ' year' + (yrs === 1 ? '' : 's') + ' ago';
  }

  function statusChip(status) {
    const label = STATUS_LABELS[status] || status;
    const ico = STATUS_ICONS[status] || 'circle';
    return `<span class="chip chip-${status}"><i data-lucide="${ico}" class="w-3 h-3"></i> ${label}</span>`;
  }
  function priorityChip(p) {
    if (!p || p === 'Normal') return '';
    const cls = p === 'Critical' ? 'critical' : (p === 'High' ? 'high' : '');
    return `<span class="chip chip-priority ${cls}"><i data-lucide="alert-triangle" class="w-3 h-3"></i> ${p}</span>`;
  }
  function speciesChip(spId) {
    if (!spId) return '';
    const sp = DB.byId(DB.SPECIES, spId);
    if (!sp) return '';
    return `<span class="chip-species">
      <span class="img-frame img-frame-sm" style="width:20px; height:20px; display:inline-block;">
        <img class="sp-avatar" src="https://image.pollinations.ai/prompt/${encodeURIComponent(sp.imgQ)}?width=60&height=60&seed=${sp.seed}&nologo=true" alt="${sp.name}" loading="lazy"/>
      </span>
      ${sp.name}
    </span>`;
  }

  function carrierName(carrierId) {
    if (!carrierId) return '';
    const list = DB.CARRIERS || [];
    const c = list.find(x => x.id === carrierId || x.code === carrierId || x.name === carrierId);
    return c ? c.name : carrierId;
  }

  function trackingBlock(o) {
    const tr = o.tracking;
    const hasCarrier = tr && tr.carrier;
    const events = (tr && tr.events) ? tr.events.slice() : [];
    // latest event: last in array
    const latest = events.length ? events[events.length - 1] : null;

    // Awaiting approval — yellow callout
    if (o.status === 'pending_approval') {
      const approver = DB.byId(DB.USERS, o.approverId);
      const aName = (approver && approver.name) || '—';
      return `<div class="oc-tracking awaiting">
        <div class="event-row">
          <i data-lucide="hourglass" class="w-4 h-4"></i>
          <span class="evt-note">Awaiting ${aName}'s approval before dispatch</span>
        </div>
      </div>`;
    }

    // If cancelled with no meaningful tracking, show cancelled note
    if (o.status === 'cancelled' && !hasCarrier) {
      return `<div class="oc-tracking awaiting">
        <div class="event-row">
          <i data-lucide="x-circle" class="w-4 h-4"></i>
          <span class="evt-note">Order cancelled</span>
        </div>
      </div>`;
    }

    if (!hasCarrier) {
      return `<div class="oc-tracking awaiting">
        <div class="event-row">
          <i data-lucide="clock" class="w-4 h-4"></i>
          <span class="evt-note">Awaiting pickup by courier</span>
        </div>
      </div>`;
    }

    const cName = carrierName(tr.carrier);
    const awb = tr.number ? `AWB ${tr.number}` : '';
    const eventHtml = latest ? `
      <div class="event-row">
        <i data-lucide="map-pin" class="w-4 h-4" style="color:var(--brand)"></i>
        <span class="evt-note">${latest.note || STATUS_LABELS[latest.status] || latest.status || 'Update'}</span>
        ${latest.location ? `<span class="sep-dot">·</span><span class="evt-loc">${latest.location}</span>` : ''}
        ${latest.at ? `<span class="sep-dot">·</span><span class="evt-time">${relTime(latest.at)}</span>` : ''}
      </div>` : `
      <div class="event-row">
        <i data-lucide="clock" class="w-4 h-4"></i>
        <span class="evt-note">Awaiting first scan</span>
      </div>`;

    return `<div class="oc-tracking">
      <div class="track-row">
        <i data-lucide="truck" class="w-3.5 h-3.5"></i>
        <span class="carrier-name">${cName}</span>
        ${awb ? `<span class="sep-dot">·</span><span class="awb">${awb}</span>` : ''}
      </div>
      ${eventHtml}
    </div>`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2000);
  }

  /* ---------- Render ---------- */
  function render() {
    const all = getMergedOrders();

    // Total count badge
    document.getElementById('totalCountBadge').textContent =
      all.length + ' ' + (all.length === 1 ? 'order' : 'orders');

    // Tab counts
    const counts = { all: all.length, pending_approval: 0, in_transit: 0, delivered: 0, cancelled: 0 };
    all.forEach(o => {
      if (o.status === 'pending_approval') counts.pending_approval++;
      else if (IN_TRANSIT_SET.has(o.status)) counts.in_transit++;
      else if (o.status === 'delivered') counts.delivered++;
      else if (o.status === 'cancelled') counts.cancelled++;
    });
    document.querySelectorAll('[data-count]').forEach(el => {
      el.textContent = counts[el.dataset.count] || 0;
    });

    // Filter by tab
    let filtered;
    if (state.tab === 'all') filtered = all;
    else if (state.tab === 'in_transit') filtered = all.filter(o => IN_TRANSIT_SET.has(o.status));
    else filtered = all.filter(o => o.status === state.tab);

    const list = document.getElementById('ordersList');
    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty-wrap anim-in">
          <span class="big-ico"><i data-lucide="package-search" class="w-10 h-10"></i></span>
          <h3>No orders here yet</h3>
          <p>Placed orders appear here with live tracking.</p>
          <a href="index_1.html" class="btn btn-brand" style="text-decoration:none">
            <i data-lucide="arrow-right" class="w-4 h-4"></i> Browse enrichments
          </a>
        </div>`;
      ZE.refreshIcons();
      return;
    }

    list.innerHTML = filtered.map(o => renderCard(o)).join('');
    bindCardEvents(filtered);
    ZE.refreshIcons();
  }

  function renderCard(o) {
    const items = o.items || [];
    const firstThree = items.slice(0, 3);
    const moreCount = items.length - firstThree.length;
    const totalItems = DB.orderItemCount ? DB.orderItemCount(o) : items.reduce((s, it) => s + (it.qty || 0), 0);
    const orderTotal = DB.orderTotal ? DB.orderTotal(o) : (o.total || 0);

    const thumbsHtml = firstThree.map(it => {
      const p = DB.byId(DB.PRODUCTS, it.productId);
      if (!p) return '';
      return `<div class="thumb img-frame">
        <img src="${p.imgSmall}" alt="${p.name}" loading="lazy"/>
        ${it.qty > 1 ? `<span class="qty-ov">×${it.qty}</span>` : ''}
      </div>`;
    }).join('');
    const moreHtml = moreCount > 0 ? `<div class="more">+${moreCount}</div>` : '';

    const firstTwoNames = items.slice(0, 2).map(it => {
      const p = DB.byId(DB.PRODUCTS, it.productId);
      return p ? p.name : '';
    }).filter(Boolean);
    const remaining = items.length - firstTwoNames.length;
    const namesLine = firstTwoNames.length
      ? `<strong>${firstTwoNames.join('</strong>, <strong>')}</strong>${remaining > 0 ? ' and ' + remaining + ' more' : ''}`
      : '<em>No items</em>';

    const canCancel = o.source === 'user' && (o.status === 'placed' || o.status === 'confirmed' || o.status === 'pending_approval');

    // Vendor + ready-by strip
    const vendor = o.vendorId ? DB.byId(DB.VENDORS, o.vendorId) : null;
    const showReadyBy = !!(o.vendorResponse && o.vendorResponse.estimatedReadyBy)
      && o.status !== 'delivered' && o.status !== 'cancelled';
    const readyByChip = showReadyBy
      ? `<span class="ready-by-chip"><i data-lucide="clock" class="w-3 h-3"></i> Ready by ${fmtDate(o.vendorResponse.estimatedReadyBy)}</span>`
      : '';
    const awaitingNote = (o.status === 'placed' && !o.vendorResponse)
      ? `<span class="awaiting-vendor-note"><i data-lucide="hourglass" class="w-3 h-3"></i> Awaiting vendor response</span>`
      : '';

    // Shipping-to
    const site = o.siteId ? DB.byId(DB.SITES, o.siteId) : null;
    const shippingToHtml = site
      ? `<span class="shipping-to"><i data-lucide="map-pin" class="w-4 h-4"></i> Shipping to: ${site.name}, ${site.city || ''}</span>`
      : '';

    let vendorRow = '';
    if (vendor) {
      const logo = (DB.vendorLogo ? DB.vendorLogo(vendor) : (vendor.logo || ''));
      vendorRow = `<div class="oc-vendor-row">
        <a href="vendor_store_1.html?id=${encodeURIComponent(vendor.id)}" class="sold-by" onclick="event.stopPropagation();">
          <img class="vendor-logo" src="${logo}" alt="${vendor.name}" loading="lazy"/>
          <span>Sold by <span class="vendor-name">${vendor.name}</span></span>
        </a>
        ${readyByChip}
        ${awaitingNote}
      </div>
      ${shippingToHtml ? `<div class="oc-vendor-row" style="margin-top:-4px;">${shippingToHtml}</div>` : ''}`;
    } else if (readyByChip || awaitingNote || shippingToHtml) {
      vendorRow = `<div class="oc-vendor-row">${readyByChip}${awaitingNote}${shippingToHtml}</div>`;
    }

    // Approval strip
    let approvalStripHtml = '';
    if (o.requiresApproval === true) {
      const approver = DB.byId(DB.USERS, o.approverId);
      const aName = (approver && approver.name) || '—';
      if (o.approvalStatus === 'pending') {
        approvalStripHtml = `<div class="approval-strip pending">
          <i data-lucide="hourglass" class="w-4 h-4"></i>
          <span>Awaiting approval from ${aName}</span>
        </div>`;
      } else if (o.approvalStatus === 'approved') {
        const when = o.approvedAt ? fmtDate(o.approvedAt) : '';
        approvalStripHtml = `<div class="approval-strip approved">
          <i data-lucide="check-circle" class="w-4 h-4"></i>
          <span>Approved by ${aName}${when ? ' on ' + when : ''}</span>
        </div>`;
      } else if (o.approvalStatus === 'rejected') {
        const reason = o.rejectReason || '';
        approvalStripHtml = `<div class="approval-strip rejected">
          <i data-lucide="x-circle" class="w-4 h-4"></i>
          <span>Rejected by ${aName}${reason ? ' — ' + reason : ''}</span>
        </div>`;
      }
    }

    return `
      <article class="order-card anim-in" data-id="${o.id}">
        <div class="oc-top">
          <div class="oc-top-left">
            ${statusChip(o.status)}
            ${priorityChip(o.priority)}
            ${speciesChip(o.species)}
          </div>
          <span class="oc-date">
            <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
            ${fmtDate(o.createdAt)}
          </span>
        </div>

        <div class="oc-idrow">
          <span class="oc-id">${o.id}</span>
        </div>

        ${vendorRow}

        ${approvalStripHtml}

        ${trackingBlock(o)}

        <div class="oc-items">
          <div class="oc-thumbs">
            ${thumbsHtml}
            ${moreHtml}
          </div>
          <div class="oc-item-names">${namesLine}</div>
          <div class="oc-item-count">${totalItems} ${totalItems === 1 ? 'item' : 'items'}</div>
        </div>

        <div class="oc-bottom">
          <div class="oc-total">
            <span class="sub-label">Order total</span>${DB.fmtINR(orderTotal)}
          </div>
          <div class="oc-actions">
            <button class="btn-sm btn-sm-primary" data-action="track" data-id="${o.id}">
              <i data-lucide="map-pin" class="w-4 h-4"></i> Track order
            </button>
            <button class="btn-sm btn-sm-ghost" data-action="reorder" data-id="${o.id}">
              <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reorder
            </button>
            ${canCancel ? `<button class="btn-sm btn-sm-danger" data-action="cancel" data-id="${o.id}">
              <i data-lucide="x" class="w-4 h-4"></i> Cancel
            </button>` : ''}
          </div>
        </div>
      </article>`;
  }

  function bindCardEvents(filtered) {
    // Card-level click → detail page (ignore clicks on buttons)
    document.querySelectorAll('.order-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-action]')) return;
        const id = card.dataset.id;
        window.location.href = 'order_detail_1.html?id=' + encodeURIComponent(id);
      });
    });

    document.querySelectorAll('[data-action="track"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        window.location.href = 'order_detail_1.html?id=' + encodeURIComponent(id);
      });
    });

    document.querySelectorAll('[data-action="reorder"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const o = filtered.find(x => x.id === id);
        if (!o) return;
        let n = 0;
        const orderSpecies = o.speciesId || o.species || null;
        (o.items || []).forEach(it => {
          if (!it.productId || !it.qty) return;
          const spId = it.speciesId || orderSpecies;
          if (!spId) return;
          ZE.cart.addLine({
            productId: it.productId,
            speciesId: spId,
            enclosureId: it.enclosureId || o.enclosureId || null,
            qty: it.qty,
            note: it.note || null
          });
          n++;
        });
        showToast('Added ' + n + ' line' + (n === 1 ? '' : 's') + ' to cart · Go to cart');
        setTimeout(() => { window.location.href = 'index_1.html'; }, 700);
      });
    });

    document.querySelectorAll('[data-action="cancel"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        if (!confirm('Cancel order ' + id + '?')) return;
        ZE.orders.cancel(id);
        showToast('Order ' + id + ' cancelled');
        render();
      });
    });
  }

  /* ---------- Tabs ---------- */
  document.querySelectorAll('#tabsRow button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#tabsRow button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      state.tab = b.dataset.tab;
      render();
    });
  });

  /* ---------- Header button nav ---------- */
  document.getElementById('savedBtn').addEventListener('click', () => {
    window.location.href = 'saved_1.html';
  });
  document.getElementById('cartBtn').addEventListener('click', () => {
    window.location.href = 'cart_1.html';
  });
  document.getElementById('ordersBtn').addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  /* ---------- Clear delivered (user orders only) ---------- */
  document.getElementById('clearDeliveredBtn').addEventListener('click', () => {
    const existing = ZE.orders.read() || [];
    const remaining = existing.filter(o => o.status !== 'delivered');
    const removed = existing.length - remaining.length;
    if (removed === 0) {
      showToast('No delivered user orders to clear');
      return;
    }
    localStorage.setItem('ze_orders_v1', JSON.stringify(remaining));
    ZE.emit('orders:change', remaining);
    showToast('Cleared ' + removed + ' delivered order' + (removed === 1 ? '' : 's'));
  });

  /* ---------- Header: user slot (avatar dropdown or sign-in pill) ---------- */
  function renderUserSlot() {
    const slot = document.getElementById('userSlot');
    if (!slot) return;
    const role = (ZE && ZE.user && ZE.user.role) ? ZE.user.role() : null;
    const user = (role && ZE.user.resolve) ? ZE.user.resolve() : null;

    if (!role || !user) {
      slot.innerHTML = `<a href="login_1.html" class="signin-pill">
        <i data-lucide="log-in" class="w-4 h-4"></i> Sign in
      </a>`;
      ZE.refreshIcons();
      return;
    }

    const avatarUrl = user.avatar || user.photo || 'https://image.pollinations.ai/prompt/professional%20zoo%20biologist%20portrait%20headshot%20smile?width=80&height=80&seed=401&nologo=true';
    const name = user.name || user.fullName || 'Account';
    const email = user.email || '';

    slot.innerHTML = `
      <div class="avatar-wrap">
        <img class="avatar" id="avatarTrigger" src="${avatarUrl}" alt="${name}" loading="eager" style="margin-left:0;"/>
        <div class="avatar-menu" id="avatarMenu" role="menu">
          <div class="menu-header">
            <div class="name">${name}</div>
            ${email ? `<div class="email">${email}</div>` : ''}
          </div>
          <a href="profile_1.html" role="menuitem"><i data-lucide="user" class="w-4 h-4"></i> Profile</a>
          <a href="orders_1.html" role="menuitem"><i data-lucide="package" class="w-4 h-4"></i> Orders</a>
          <a href="saved_1.html" role="menuitem"><i data-lucide="heart" class="w-4 h-4"></i> Saved</a>
          <div class="menu-sep"></div>
          <button type="button" class="sign-out" id="signOutBtn" role="menuitem">
            <i data-lucide="log-out" class="w-4 h-4"></i> Sign out
          </button>
        </div>
      </div>`;

    const trigger = document.getElementById('avatarTrigger');
    const menu = document.getElementById('avatarMenu');
    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      menu.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (!menu.contains(e.target) && e.target !== trigger) menu.classList.remove('open');
    });
    const signOut = document.getElementById('signOutBtn');
    if (signOut) {
      signOut.addEventListener('click', () => {
        if (ZE.user && ZE.user.signOut) ZE.user.signOut();
        window.location.href = 'login_1.html';
      });
    }

    ZE.refreshIcons();
  }

  /* ---------- Header badges ---------- */
  function renderBadges() {
    const cartN = ZE.cart.count();
    const cartB = document.getElementById('cartBadge');
    if (cartN > 0) { cartB.style.display = 'inline-flex'; cartB.textContent = cartN; }
    else cartB.style.display = 'none';

    const savN = ZE.saved.count();
    const savB = document.getElementById('savedBadge');
    if (savN > 0) { savB.style.display = 'inline-flex'; savB.textContent = savN; }
    else savB.style.display = 'none';

    const ordN = ZE.orders.count();
    const ordB = document.getElementById('ordersBadge');
    if (ordN > 0) { ordB.style.display = 'inline-flex'; ordB.textContent = ordN; }
    else ordB.style.display = 'none';
  }

  /* ---------- Subscribe ---------- */
  ZE.on('orders:change', () => { render(); renderBadges(); });
  ZE.on('cart:change',   renderBadges);
  ZE.on('saved:change',  renderBadges);
  ZE.on('user:change',   renderUserSlot);

  /* ---------- Initial render ---------- */
  render();
  renderBadges();
  renderUserSlot();
  ZE.init();
})();
</script>
</body>
</html>
