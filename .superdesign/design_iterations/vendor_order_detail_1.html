<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>ZooEnrich Vendor · Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="tokens.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <style>
    /* =========== Page layout =========== */
    .page-wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
    @media (max-width: 768px) { .page-wrap { padding: 0 16px; } }

    /* =========== Vendor header (UNIFIED) =========== */
    .app-header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .app-header .row { display: flex; align-items: center; gap: 20px; height: 68px; }
    .brand-mark { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 19px; color: var(--text); flex-shrink: 0; text-decoration: none; }
    .brand-mark .logo-box { width: 32px; height: 32px; border-radius: 10px; background: var(--brand); color: #fff; display: inline-flex; align-items: center; justify-content: center; }

    .v-nav { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; overflow-x: auto; scrollbar-width: none; }
    .v-nav::-webkit-scrollbar { display: none; }
    .v-nav a { display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; color: var(--text-muted); white-space: nowrap; text-decoration: none; transition: .15s; }
    .v-nav a:hover { color: var(--text); background: #F1F2F4; }
    .v-nav a.active { background: var(--brand-soft); color: var(--brand-hover); }
    .v-nav a .nav-badge { min-width: 20px; height: 20px; padding: 0 6px; background: var(--danger); color: #fff; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; margin-left: 2px; }

    .v-right { margin-left: auto; display: inline-flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .v-avatar-wrap { position: relative; }
    .v-avatar-btn { display: inline-flex; align-items: center; gap: 10px; padding: 4px 10px 4px 4px; border-radius: 999px; border: 1px solid var(--border); background: var(--card); cursor: pointer; transition: .15s; }
    .v-avatar-btn:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .v-avatar-btn img { width: 32px; height: 32px; border-radius: 999px; object-fit: cover; background: var(--card-subtle); }
    .v-avatar-btn .v-name { font-size: 13px; font-weight: 600; color: var(--text); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .v-menu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 220px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 8px; display: none; z-index: 80; }
    .v-menu.open { display: block; }
    .v-menu a, .v-menu button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 12px; border-radius: 10px; font-size: 13px; color: var(--text); background: transparent; border: none; cursor: pointer; text-align: left; text-decoration: none; }
    .v-menu a:hover, .v-menu button:hover { background: #F1F2F4; }
    .v-menu .divider { height: 1px; background: var(--border); margin: 6px 4px; }
    .v-menu .muted { color: var(--text-muted); font-size: 12px; padding: 6px 12px; }

    @media (max-width: 900px) {
      .v-avatar-btn .v-name { display: none; }
      .v-nav { display: none !important; }
      .app-header .row { gap: 12px !important; }
    }
    @media (max-width: 400px) {
      .brand-mark > span:not(.logo-box) { display: none; }
    }

    /* =========== Shared vendor mobile drawer =========== */
    .vendor-menu-btn { display: none; width: 40px; height: 40px; border-radius: 10px; background: #F1F2F4; border: none; align-items: center; justify-content: center; cursor: pointer; color: var(--text); flex-shrink: 0; }
    .vendor-menu-btn:hover { background: var(--brand-soft); color: var(--brand); }
    @media (max-width: 900px) { .vendor-menu-btn { display: inline-flex; } }
    .vendor-drawer-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); opacity: 0; pointer-events: none; transition: .2s; z-index: 90; }
    .vendor-drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .vendor-drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; max-width: 85vw; background: var(--card); transform: translateX(-100%); transition: .25s cubic-bezier(.2,.8,.2,1); z-index: 100; display: flex; flex-direction: column; box-shadow: 6px 0 20px rgba(0,0,0,.15); }
    .vendor-drawer.open { transform: translateX(0); }
    .vd-head { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); }
    .vd-head .brand-mark { font-size: 17px; }
    .vd-close { width: 36px; height: 36px; border-radius: 10px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .vd-close:hover { background: #F1F2F4; color: var(--text); }
    .vd-nav { display: flex; flex-direction: column; padding: 12px 0; gap: 2px; flex: 1; overflow-y: auto; }
    .vd-nav a { display: flex; align-items: center; gap: 12px; padding: 14px 18px; color: var(--text); font-size: 14px; font-weight: 500; text-decoration: none; }
    .vd-nav a:hover, .vd-nav a.active { background: var(--brand-soft); color: var(--brand-hover); }
    .vd-nav a i { color: var(--text-muted); }
    .vd-nav a:hover i, .vd-nav a.active i { color: var(--brand-hover); }
    .vd-nav a .nav-badge { min-width: 20px; height: 20px; padding: 0 6px; background: var(--danger); color: #fff; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; margin-left: auto; }
    .vd-foot { padding: 14px 16px; border-top: 1px solid var(--border); }
    .vd-foot .btn-ghost { width: 100%; padding: 11px 14px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .vd-foot .btn-ghost:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

    /* mobile polish */
    @media (max-width: 900px) {
      .detail-grid { gap: 16px; }
      .top-row h1 { font-size: 22px; }
      .big-total { font-size: 22px; }
    }
    @media (max-width: 640px) {
      .tl-step { grid-template-columns: 40px 1fr; gap: 10px; }
      .tl-badge { width: 32px; height: 32px; }
      .tl-step::before { left: 15px; top: 32px; }
      .tl-name { font-size: 14px; }
      .callout-actions { flex-direction: column; align-items: stretch; }
      .callout-actions button, .callout-actions a { width: 100%; justify-content: center; }
      .field-row > .field { flex-basis: 100%; min-width: 0; }
      .field .input, .field select, .field textarea { width: 100%; }
    }

    /* =========== Breadcrumb =========== */
    .crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); padding: 18px 0 6px; flex-wrap: wrap; }
    .crumbs a { color: var(--text-muted); transition: .15s; }
    .crumbs a:hover { color: var(--brand); }
    .crumbs .sep { color: var(--text-subtle); }
    .crumbs .current { color: var(--text); font-weight: 600; font-family: ui-monospace, Menlo, monospace; }

    /* =========== Top row =========== */
    .top-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin: 8px 0 24px; flex-wrap: wrap; }
    .top-row .eyebrow { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 4px; }
    .top-row h1 { font-size: 30px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .top-row h1 .num { font-family: ui-monospace, Menlo, monospace; font-weight: 600; letter-spacing: -0.01em; }
    .top-row-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
    .big-total { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -0.01em; line-height: 1; }
    .big-total-lbl { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 2px; }

    /* =========== Chips =========== */
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
    .chip-placed           { background: #F1F2F4;           color: #6B7280; }
    .chip-confirmed        { background: var(--brand-soft); color: #006D35; }
    .chip-packed           { background: #FEF3C7;           color: #A16207; }
    .chip-shipped          { background: #CFFAFE;           color: #0891B2; }
    .chip-out_for_delivery { background: #A7F3D0;           color: #065F46; }
    .chip-delivered        { background: var(--brand);      color: #fff;    }
    .chip-cancelled        { background: var(--danger);     color: #fff;    }

    .chip-priority-high     { background: #FEF3C7;       color: #A16207; }
    .chip-priority-critical { background: var(--danger); color: #fff;    }

    /* =========== Two-column grid =========== */
    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 60%) minmax(0, 40%);
      gap: 24px;
      padding-bottom: 60px;
    }
    @media (max-width: 900px) {
      .detail-grid { grid-template-columns: 1fr; }
    }

    /* =========== Card =========== */
    .d-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: var(--shadow-xs); }
    .d-card + .d-card { margin-top: 18px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
    .card-head h3 { font-size: 16px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .card-head h3 i { color: var(--brand); }
    .card-head .meta { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    /* =========== Callout cards (action hero) =========== */
    .callout { border-radius: 16px; padding: 22px; border-left: 5px solid var(--brand); background: var(--brand-soft); box-shadow: var(--shadow-xs); }
    .callout h2 { font-size: 18px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 10px; }
    .callout h2 i { width: 22px; height: 22px; }
    .callout .sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
    .callout-body { margin-top: 16px; }
    .callout-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }

    .callout-yellow { background: #FFF8CC; border-left-color: #E4B819; }
    .callout-yellow h2 i { color: #A16207; }
    .callout-green  { background: var(--brand-soft); border-left-color: var(--brand); }
    .callout-green h2 i { color: var(--brand-hover); }
    .callout-teal   { background: #CFFAFE; border-left-color: #0891B2; }
    .callout-teal h2 i { color: #0891B2; }
    .callout-shipped{ background: #ECFDF5; border-left-color: #10B981; }
    .callout-shipped h2 i { color: #059669; }
    .callout-red    { background: var(--danger-bg); border-left-color: var(--danger); }
    .callout-red h2 i { color: var(--danger); }

    /* =========== Segmented control =========== */
    .segbar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .seg-btn { padding: 10px 16px; border-radius: 999px; border: 1.5px solid #F5E7A3; background: #fff; color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; transition: .15s; }
    .seg-btn:hover { border-color: #E4B819; }
    .seg-btn.active { background: #A16207; color: #fff; border-color: #A16207; box-shadow: 0 4px 10px -3px rgba(161,98,7,.45); }

    .field { margin-top: 14px; }
    .field-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .field-row > .field { flex: 1; min-width: 220px; margin-top: 0; }
    .field .label { display: block; font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    .field .input, .field select, .field textarea { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--card); font-size: 14px; color: var(--text); outline: none; transition: .15s; font-family: var(--font); }
    .field .input:focus, .field select:focus, .field textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .field textarea { resize: vertical; min-height: 64px; }
    .field .hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .char-count { font-size: 11px; color: var(--text-subtle); text-align: right; margin-top: 4px; }

    .preview-line { margin-top: 14px; padding: 12px 14px; background: rgba(255,255,255,.6); border: 1px dashed rgba(161,98,7,.35); border-radius: 10px; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .preview-line b { color: #A16207; font-weight: 700; }
    .preview-line i { color: #A16207; width: 16px; height: 16px; }

    .btn-decline { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); }
    .btn-decline:hover { background: var(--danger); color: #fff; }
    .btn-confirm { background: #A16207; color: #fff; box-shadow: 0 4px 10px -3px rgba(161,98,7,.5); }
    .btn-confirm:hover { background: #854D06; }
    .btn-pack { background: var(--brand); color: #fff; box-shadow: 0 4px 10px -3px rgba(55,189,105,.5); }
    .btn-pack:hover { background: var(--brand-hover); }
    .btn-ship { background: #0891B2; color: #fff; box-shadow: 0 4px 10px -3px rgba(8,145,178,.5); }
    .btn-ship:hover { background: #0E7490; }

    .readonly-note { margin-top: 14px; padding: 12px 14px; background: rgba(255,255,255,.5); border-radius: 10px; font-size: 13px; color: var(--text-muted); font-style: italic; display: flex; align-items: center; gap: 8px; }

    .ship-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 12px; }
    @media (max-width: 640px) { .ship-info-grid { grid-template-columns: 1fr; } }
    .ship-info-grid .lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }
    .ship-info-grid .val { font-size: 14px; color: var(--text); font-weight: 600; margin-top: 3px; }

    .awb-box { display: inline-flex; align-items: center; gap: 6px; background: #fff; padding: 6px 10px 6px 12px; border-radius: 8px; font-family: ui-monospace, Menlo, monospace; font-size: 13px; font-weight: 600; color: var(--text); border: 1px solid var(--border); }
    .awb-box button { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 6px; display: inline-flex; align-items: center; transition: .15s; }
    .awb-box button:hover { color: var(--brand); background: var(--brand-soft); }

    /* =========== Tracking timeline =========== */
    .tl { position: relative; padding: 4px 0 4px 4px; }
    .tl-step { position: relative; display: grid; grid-template-columns: 52px 1fr; gap: 14px; padding-bottom: 26px; }
    .tl-step:last-child { padding-bottom: 0; }
    .tl-badge { width: 40px; height: 40px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; border: 2px solid var(--border); background: #fff; color: var(--text-subtle); flex-shrink: 0; transition: .25s; z-index: 2; position: relative; }
    .tl-step.done .tl-badge { background: var(--brand); border-color: var(--brand); color: #fff; box-shadow: 0 2px 6px -1px rgba(55,189,105,.35); }
    .tl-step.current .tl-badge { background: var(--brand-soft); border-color: var(--brand); color: var(--brand-hover); animation: pulse-ring 1.6s ease-out infinite; }
    .tl-step.future .tl-badge { background: #F9FAFB; border-color: var(--border); color: var(--text-subtle); }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(55,189,105,.55); }
      70%  { box-shadow: 0 0 0 12px rgba(55,189,105,0); }
      100% { box-shadow: 0 0 0 0 rgba(55,189,105,0); }
    }
    .tl-step::before { content: ''; position: absolute; left: 19px; top: 40px; bottom: -2px; width: 2px; background: var(--border); z-index: 1; }
    .tl-step:last-child::before { display: none; }
    .tl-step.done::before, .tl-step.current::before { background: var(--brand); }

    .tl-body { min-width: 0; padding-top: 8px; }
    .tl-name { font-size: 15px; font-weight: 600; color: var(--text); text-transform: capitalize; }
    .tl-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .tl-meta .dot { display: inline-block; margin: 0 6px; color: var(--text-subtle); }
    .tl-note { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .tl-pending { font-size: 12px; color: var(--text-subtle); margin-top: 4px; font-style: italic; }

    .tl-cancelled-banner { margin-top: 12px; padding: 12px 14px; border-radius: 12px; background: #FFE5EA; border: 1px solid rgba(233,51,83,.25); color: #B00020; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
    .tl-cancelled-banner i { color: var(--danger); }

    /* =========== Buyer / side cards =========== */
    .buyer-row { display: flex; align-items: center; gap: 12px; }
    .buyer-ava { width: 48px; height: 48px; border-radius: 999px; background: var(--brand-soft); color: var(--brand-hover); display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; flex-shrink: 0; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--border); }
    .buyer-mid { min-width: 0; }
    .buyer-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .buyer-title { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .species-pill { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; padding: 4px 10px; background: #F1F2F4; color: var(--text); border-radius: 999px; font-size: 11px; font-weight: 600; }

    .addr-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .addr-site { font-size: 13px; color: var(--brand-hover); font-weight: 600; margin-top: 2px; }
    .addr-lines { font-size: 13px; color: var(--text-muted); line-height: 1.55; margin-top: 8px; }
    .addr-phone { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 13px; color: var(--text); font-weight: 500; }
    .addr-phone i { color: var(--text-muted); }

    .item-row { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: .15s; border-radius: 10px; margin: 0 -8px; padding-left: 8px; padding-right: 8px; }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: #F9FAFB; }
    .item-thumb { width: 56px; height: 56px; border-radius: 10px; overflow: hidden; flex-shrink: 0; background: var(--card-subtle); }
    .item-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .item-mid { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .item-config { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .item-qty-chip { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #F1F2F4; color: var(--text); font-size: 11px; font-weight: 700; margin-right: 8px; }
    .item-price { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .item-right { text-align: right; }
    .item-line-total { font-size: 14px; font-weight: 700; color: var(--text); }

    .sum-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; padding: 8px 0; }
    .sum-row .lbl { color: var(--text-muted); }
    .sum-row .val { color: var(--text); font-weight: 600; }
    .sum-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .sum-total { font-size: 18px; font-weight: 800; }

    .recap-row { display: flex; justify-content: space-between; align-items: flex-start; font-size: 13px; padding: 7px 0; gap: 10px; }
    .recap-row .lbl { color: var(--text-muted); flex-shrink: 0; }
    .recap-row .val { color: var(--text); font-weight: 600; text-align: right; }

    /* =========== Toast =========== */
    .ze-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0F172A; color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 10px 30px -8px rgba(0,0,0,.4); opacity: 0; pointer-events: none; transition: .25s; z-index: 100; max-width: 360px; }
    .ze-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* =========== Not found / wrong vendor =========== */
    .nf-wrap { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 72px 24px; gap: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin: 40px 0; }
    .nf-wrap .big-ico { width: 80px; height: 80px; border-radius: 999px; background: var(--danger-bg); color: var(--danger); display: inline-flex; align-items: center; justify-content: center; }
    .nf-wrap h3 { font-size: 22px; font-weight: 700; color: var(--text); }
    .nf-wrap p { font-size: 14px; color: var(--text-muted); max-width: 420px; line-height: 1.55; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body data-device="desktop">
<div class="device-shell"><div class="device-inner">

  <!-- =============== VENDOR HEADER =============== -->
  <header class="app-header">
    <div class="page-wrap row">
      <a href="vendor_dashboard_1.html" class="brand-mark">

<div class="ze-toast" id="toast"></div>

<!-- =============== SCRIPTS =============== -->
<script>
(function(){
  const DB = window.DB;
  const ZE = window.ZE;

  /* ---------- Page guard ---------- */
  if (!ZE.user.requireRole('vendor')) {
    return; // user is being redirected to login_1.html
  }

  const CURRENT_VENDOR = ZE.user.resolve();

  /* ---------- Status chain & icons ---------- */
  const CHAIN = ['placed', 'confirmed', 'packed', 'shipped', 'out_for_delivery', 'delivered'];
  const STATUS_META = {
    placed:           { label: 'Placed',           ico: 'file-text' },
    confirmed:        { label: 'Confirmed',        ico: 'check' },
    packed:           { label: 'Packed',           ico: 'box' },
    shipped:          { label: 'Shipped',          ico: 'truck' },
    out_for_delivery: { label: 'Out for delivery', ico: 'map-pin' },
    delivered:        { label: 'Delivered',        ico: 'package-check' },
    cancelled:        { label: 'Cancelled',        ico: 'x-circle' }
  };

  /* ---------- Helpers ---------- */
  function getOrderId() {
    const p = new URLSearchParams(window.location.search);
    return p.get('id');
  }
  function lookupOrder(id) {
    if (!id) return null;
    let o = ZE.orders.byId(id);
    if (o) return Object.assign({}, o, { _sourceKind: 'user' });
    if (DB.DEMO_ORDERS) {
      const demo = DB.DEMO_ORDERS.find(x => x.id === id);
      if (demo) return Object.assign({}, demo, { _sourceKind: 'demo' });
    }
    return null;
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
    } catch (e) { return iso; }
  }
  function fmtDateTime(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    } catch (e) { return iso; }
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2400);
  }
  function addDays(iso, days) {
    const base = iso ? Date.parse(iso) : Date.now();
    if (!isFinite(base)) return null;
    return new Date(base + days * 86400000).toISOString();
  }

  /* ---------- Chips ---------- */
  function statusChip(status) {
    const meta = STATUS_META[status] || STATUS_META.placed;
    return `<span class="chip chip-${status}"><i data-lucide="${meta.ico}" class="w-3.5 h-3.5"></i> ${meta.label.toUpperCase()}</span>`;
  }
  function priorityChip(p) {
    if (!p || p === 'Normal') return '';
    if (p === 'Critical') return `<span class="chip chip-priority-critical"><i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> CRITICAL</span>`;
    if (p === 'High')     return `<span class="chip chip-priority-high"><i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> HIGH</span>`;
    return '';
  }

  /* ---------- Vendor header fill ---------- */
  function fillVendorHeader() {
    if (!CURRENT_VENDOR) return;
    const nameEl = document.getElementById('vName') || document.getElementById('vendorNameLbl');
    const cityEl = document.getElementById('vendorCityLbl');
    const logoEl = document.getElementById('vAvatar') || document.getElementById('vendorLogoImg');
    const emailEl = document.getElementById('vMenuEmail');
    if (nameEl) nameEl.textContent = CURRENT_VENDOR.name || 'Vendor';
    if (cityEl) cityEl.textContent = (CURRENT_VENDOR.city || '') + (CURRENT_VENDOR.state ? ', ' + CURRENT_VENDOR.state : '');
    if (logoEl) {
      const src = DB.vendorLogo(CURRENT_VENDOR);
      if (src) { logoEl.src = src; logoEl.alt = CURRENT_VENDOR.name; }
    }
    if (emailEl && CURRENT_VENDOR.name) emailEl.textContent = 'Signed in as ' + CURRENT_VENDOR.name;
  }

  /* ---------- Error states ---------- */
  function renderNotYourOrder(order, id) {
    document.getElementById('crumbId').textContent = id || 'Order';
    document.title = 'ZooEnrich Vendor · Not your order';
    const wrongVendor = DB.byId(DB.VENDORS, order && order.vendorId);
    document.getElementById('detailRoot').innerHTML = `
      <div class="nf-wrap anim-in">
        <span class="big-ico"><i data-lucide="shield-alert" class="w-10 h-10"></i></span>
        <h3>Not your order</h3>
        <p>Order <strong>${escapeHtml(id || '—')}</strong> belongs to <strong>${escapeHtml(wrongVendor ? wrongVendor.name : 'another vendor')}</strong>. You're signed in as <strong>${escapeHtml(CURRENT_VENDOR ? CURRENT_VENDOR.name : '—')}</strong>, so you can't view or act on it.</p>
        <a href="vendor_orders_1.html" class="btn btn-brand" style="text-decoration:none">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to your orders
        </a>
      </div>`;
    ZE.refreshIcons();
  }
  function renderNotFound(id) {
    document.getElementById('crumbId').textContent = id || 'Order';
    document.title = 'ZooEnrich Vendor · Order not found';
    document.getElementById('detailRoot').innerHTML = `
      <div class="nf-wrap anim-in">
        <span class="big-ico" style="background:var(--brand-soft); color:var(--brand)"><i data-lucide="package-search" class="w-10 h-10"></i></span>
        <h3>Order not found</h3>
        <p>We couldn't find order <strong>${escapeHtml(id || '—')}</strong>. It may have been removed or the link is incorrect.</p>
        <a href="vendor_orders_1.html" class="btn btn-brand" style="text-decoration:none">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to your orders
        </a>
      </div>`;
    ZE.refreshIcons();
  }

  /* ---------- Hero action card (varies by status) ---------- */
  function renderAction(order) {
    const status = order.status;

    if (status === 'placed') {
      const opts = [
        { k:'1',  label:'1 day' },
        { k:'3',  label:'3 days' },
        { k:'7',  label:'1 week' },
        { k:'14', label:'2 weeks' },
        { k:'custom', label:'Custom…' }
      ];
      const segs = opts.map(o =>
        `<button type="button" class="seg-btn${o.k==='7'?' active':''}" data-days="${o.k}">${o.label}</button>`
      ).join('');
      return `
        <div class="callout callout-yellow anim-in" id="actionCallout">
          <h2><i data-lucide="hourglass" class="w-5 h-5"></i> Respond to this order</h2>
          <div class="sub">The buyer is waiting for you to confirm a delivery timeline.</div>
          <div class="callout-body">
            <label class="label" style="font-size:12px; font-weight:700; color:var(--text); margin-bottom:8px; text-transform:uppercase; letter-spacing:.04em; display:block;">Days to complete</label>
            <div class="segbar" id="segBar">${segs}</div>

            <div class="field" id="customWrap" style="display:none">
              <label class="label">Custom days</label>
              <input class="input" type="number" id="customDays" min="1" max="60" placeholder="e.g. 10"/>
              <div class="hint">Between 1 and 60 days.</div>
            </div>

            <div class="field">
              <label class="label">Note to buyer (optional)</label>
              <textarea id="respNote" maxlength="160" placeholder="e.g. Batch production — we'll dispatch as soon as it's cured."></textarea>
              <div class="char-count"><span id="noteCount">0</span> / 160</div>
            </div>

            <div class="preview-line" id="previewLine">
              <i data-lucide="calendar-check" class="w-4 h-4"></i>
              <span>Ready by: <b id="previewDate">—</b></span>
            </div>
          </div>
          <div class="callout-actions">
            <button class="btn btn-confirm" id="confirmBtn" type="button">
              <i data-lucide="check-circle-2" class="w-4 h-4"></i> Confirm order
            </button>
            <button class="btn btn-decline" id="declineBtn" type="button">
              <i data-lucide="x" class="w-4 h-4"></i> Decline order
            </button>
          </div>
        </div>`;
    }

    if (status === 'confirmed') {
      const vr = order.vendorResponse || {};
      const readyBy = vr.estimatedReadyBy ? fmtDate(vr.estimatedReadyBy) : '—';
      const note = vr.note && vr.note.length ? vr.note : '—';
      return `
        <div class="callout callout-green anim-in">
          <h2><i data-lucide="factory" class="w-5 h-5"></i> Production in progress</h2>
          <div class="sub">You've committed to this order. Mark it packed once it's ready to ship.</div>
          <div class="callout-body">
            <div class="ship-info-grid">
              <div>
                <div class="lbl">Ready by</div>
                <div class="val">${escapeHtml(readyBy)}</div>
              </div>
              <div>
                <div class="lbl">Days committed</div>
                <div class="val">${vr.daysToComplete != null ? escapeHtml(String(vr.daysToComplete)) + ' day' + (vr.daysToComplete===1?'':'s') : '—'}</div>
              </div>
            </div>
            <div class="field">
              <div class="lbl" style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em;">Your note</div>
              <div class="val" style="font-size:14px; color:var(--text); margin-top:3px; font-style:${note==='—'?'italic':'normal'}; ${note==='—'?'color:var(--text-subtle);':''}">${escapeHtml(note)}</div>
            </div>
          </div>
          <div class="callout-actions">
            <button class="btn btn-pack" id="packBtn" type="button">
              <i data-lucide="box" class="w-4 h-4"></i> Mark as Packed
            </button>
          </div>
        </div>`;
    }

    if (status === 'packed') {
      const carriers = Array.isArray(DB.CARRIERS) ? DB.CARRIERS : [];
      const opts = carriers.map(c => `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)}</option>`).join('');
      return `
        <div class="callout callout-teal anim-in">
          <h2><i data-lucide="package-check" class="w-5 h-5"></i> Ready to ship</h2>
          <div class="sub">Your goods are packed. Pick a carrier and enter the AWB number to dispatch.</div>
          <div class="callout-body">
            <div class="field-row">
              <div class="field">
                <label class="label">Carrier</label>
                <select id="carrierSelect">
                  <option value="">Select courier…</option>
                  ${opts}
                </select>
              </div>
              <div class="field">
                <label class="label">AWB / Tracking number</label>
                <input class="input" id="awbInput" type="text" placeholder="e.g. BD2385901147"/>
              </div>
            </div>
          </div>
          <div class="callout-actions">
            <button class="btn btn-ship" id="shipBtn" type="button">
              <i data-lucide="truck" class="w-4 h-4"></i> Ship order
            </button>
          </div>
        </div>`;
    }

    if (status === 'shipped' || status === 'out_for_delivery' || status === 'delivered') {
      const t = order.tracking || {};
      const events = Array.isArray(t.events) ? t.events : [];
      const deliveredEvent = events.find(e => e.status === 'delivered');
      const deliveredOn = deliveredEvent ? fmtDate(deliveredEvent.at) : null;
      return `
        <div class="callout callout-shipped anim-in">
          <h2><i data-lucide="truck" class="w-5 h-5"></i> Order shipped</h2>
          <div class="sub">${status === 'delivered' ? 'This order has been delivered.' : (status === 'out_for_delivery' ? 'Out for delivery — with the courier now.' : 'In transit with the courier.')}</div>
          <div class="callout-body">
            <div class="ship-info-grid">
              <div>
                <div class="lbl">Carrier</div>
                <div class="val">${escapeHtml(t.carrier || '—')}</div>
              </div>
              <div>
                <div class="lbl">AWB number</div>
                <div class="val">
                  <span class="awb-box">
                    <span>${escapeHtml(t.number || '—')}</span>
                    ${t.number ? `<button type="button" id="copyAwbBtn" title="Copy AWB"><i data-lucide="copy" class="w-3.5 h-3.5"></i></button>` : ''}
                  </span>
                </div>
              </div>
              <div>
                <div class="lbl">Estimated delivery</div>
                <div class="val">${escapeHtml(fmtDate(t.eta))}</div>
              </div>
              <div>
                <div class="lbl">${deliveredOn ? 'Delivered on' : 'Status'}</div>
                <div class="val">${deliveredOn ? escapeHtml(deliveredOn) : escapeHtml(STATUS_META[status].label)}</div>
              </div>
            </div>
            ${t.url ? `
              <div style="margin-top:14px;">
                <a class="btn btn-outline" href="${escapeHtml(t.url)}" target="_blank" rel="noopener" style="text-decoration:none">
                  <i data-lucide="external-link" class="w-4 h-4"></i> Track on ${escapeHtml(t.carrier || 'carrier')} website
                </a>
              </div>` : ''}
            <div class="readonly-note">
              <i data-lucide="check-circle-2" class="w-4 h-4"></i>
              No further action required.
            </div>
          </div>
        </div>`;
    }

    if (status === 'cancelled') {
      const events = (order.tracking && Array.isArray(order.tracking.events)) ? order.tracking.events : [];
      const last = events.length ? events[events.length - 1] : null;
      const reason = (last && last.note) ? last.note : '—';
      return `
        <div class="callout callout-red anim-in">
          <h2><i data-lucide="x-circle" class="w-5 h-5"></i> Order cancelled</h2>
          <div class="sub">This order has been cancelled and can no longer be fulfilled.</div>
          <div class="callout-body">
            <div class="field" style="margin-top:4px;">
              <div class="lbl" style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em;">Reason</div>
              <div class="val" style="font-size:14px; color:var(--text); margin-top:3px;">${escapeHtml(reason)}</div>
            </div>
          </div>
        </div>`;
    }

    return '';
  }

  /* ---------- Timeline ---------- */
  function renderTimeline(order) {
    const events = Array.isArray(order.tracking && order.tracking.events) ? order.tracking.events : [];
    const curIdx = CHAIN.indexOf(order.status);
    const isCancelled = order.status === 'cancelled';

    const eventsByStatus = {};
    events.forEach(e => { eventsByStatus[e.status] = e; });

    let reached = -1;
    events.forEach(e => {
      const i = CHAIN.indexOf(e.status);
      if (i > reached) reached = i;
    });

    const rows = CHAIN.map((s, i) => {
      let cls;
      if (isCancelled) {
        cls = (i <= reached) ? 'done' : 'future';
      } else if (i < curIdx) {
        cls = 'done';
      } else if (i === curIdx) {
        cls = 'current';
      } else {
        cls = 'future';
      }

      const meta = STATUS_META[s];
      const ev = eventsByStatus[s];
      const ico = (cls === 'done') ? 'check' : meta.ico;

      let bodyDetails;
      if (ev) {
        const loc = ev.location ? `<span class="dot">·</span>${escapeHtml(ev.location)}` : '';
        bodyDetails = `
          <div class="tl-meta">${escapeHtml(fmtDateTime(ev.at))}${loc}</div>
          ${ev.note ? `<div class="tl-note">${escapeHtml(ev.note)}</div>` : ''}`;
      } else {
        bodyDetails = `<div class="tl-pending">Pending</div>`;
      }

      return `
        <div class="tl-step ${cls}">
          <span class="tl-badge"><i data-lucide="${ico}" class="w-4 h-4"></i></span>
          <div class="tl-body">
            <div class="tl-name">${meta.label}</div>
            ${bodyDetails}
          </div>
        </div>`;
    }).join('');

    const cancelledBanner = isCancelled ? `
      <div class="tl-cancelled-banner">
        <i data-lucide="x-circle" class="w-4 h-4"></i>
        <span>This order was cancelled. Later tracking steps were not completed.</span>
      </div>` : '';

    return `
      <div class="d-card">
        <div class="card-head">
          <h3><i data-lucide="route" class="w-4 h-4"></i> Tracking</h3>
        </div>
        <div class="tl">${rows}</div>
        ${cancelledBanner}
      </div>`;
  }

  /* ---------- Right column ---------- */
  function initials(name) {
    if (!name) return '—';
    return name.split(/\s+/).filter(Boolean).slice(0,2).map(s => s[0].toUpperCase()).join('');
  }

  function renderBuyer(order) {
    const buyer = DB.byId(DB.USERS, order.createdBy) || {};
    const species = DB.byId(DB.SPECIES, order.species);
    const speciesName = species ? (species.name || species.label || species.id) : null;
    return `
      <div class="d-card">
        <div class="card-head">
          <h3><i data-lucide="user-round" class="w-4 h-4"></i> Buyer</h3>
        </div>
        <div class="buyer-row">
          <span class="buyer-ava">${escapeHtml(initials(buyer.name))}</span>
          <div class="buyer-mid">
            <div class="buyer-name">${escapeHtml(buyer.name || '—')}</div>
            <div class="buyer-title">${escapeHtml(buyer.title || buyer.role || '—')}</div>
          </div>
        </div>
        ${speciesName ? `<div><span class="species-pill"><i data-lucide="paw-print" class="w-3 h-3"></i> ${escapeHtml(speciesName)}</span></div>` : ''}
        <div class="addr-phone" style="margin-top:12px;">
          <i data-lucide="phone" class="w-3.5 h-3.5"></i> —
        </div>
      </div>`;
  }

  function renderAddress(order) {
    const a = order.shippingAddress || {};
    return `
      <div class="d-card">
        <div class="card-head">
          <h3><i data-lucide="map-pin" class="w-4 h-4"></i> Shipping to</h3>
        </div>
        <div>
          <div class="addr-name">${escapeHtml(a.name || '—')}</div>
          ${a.site ? `<div class="addr-site">${escapeHtml(a.site)}</div>` : ''}
          <div class="addr-lines">
            ${a.line1 ? escapeHtml(a.line1) + '<br/>' : ''}
            ${a.line2 ? escapeHtml(a.line2) + '<br/>' : ''}
            ${escapeHtml(a.city || '')}${a.city && a.state ? ', ' : ''}${escapeHtml(a.state || '')}${a.pincode ? ' – ' + escapeHtml(a.pincode) : ''}
          </div>
          ${a.phone ? `<div class="addr-phone"><i data-lucide="phone" class="w-3.5 h-3.5"></i> ${escapeHtml(a.phone)}</div>` : ''}
        </div>
      </div>`;
  }

  function renderItems(order) {
    const items = order.items || [];
    const rows = items.map(it => {
      const p = DB.byId(DB.PRODUCTS, it.productId);
      if (!p) return '';
      const unit = p.price.material + p.price.labor;
      const configStr = it.config
        ? Object.entries(it.config).map(([k,v]) => `${k.charAt(0).toUpperCase()+k.slice(1)} ${v}`).join(' · ')
        : '';
      return `
        <div class="item-row" data-prod="${p.id}">
          <div class="item-thumb img-frame"><img src="${p.imgSmall}" alt="${escapeHtml(p.name)}" loading="lazy"/></div>
          <div class="item-mid">
            <div class="item-name">${escapeHtml(p.name)}</div>
            ${configStr ? `<div class="item-config">${escapeHtml(configStr)}</div>` : ''}
            <div class="item-price">
              <span class="item-qty-chip">Qty ${it.qty}</span>
              <span>${DB.fmtINR(unit)} each</span>
            </div>
          </div>
          <div class="item-right">
            <div class="item-line-total">${DB.fmtINR(unit * it.qty)}</div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="d-card">
        <div class="card-head">
          <h3><i data-lucide="package-2" class="w-4 h-4"></i> Items to fulfill <span style="color:var(--text-subtle); font-weight:500; font-size:13px; margin-left:4px;">(${items.length})</span></h3>
        </div>
        <div>${rows || '<div class="tl-pending">No items in this order</div>'}</div>
      </div>`;
  }

  function renderSummary(order) {
    const subtotal = order.subtotal || 0;
    const fee = order.shippingFee || 0;
    const total = (typeof order.total === 'number') ? order.total : (subtotal + fee);
    return `
      <div class="d-card">
        <div class="card-head">
          <h3><i data-lucide="receipt" class="w-4 h-4"></i> Order summary</h3>
        </div>
        <div>
          <div class="sum-row"><span class="lbl">Subtotal</span><span class="val">${DB.fmtINR(subtotal)}</span></div>
          <div class="sum-row">
            <span class="lbl">Shipping${order.shippingMethod ? ' · ' + escapeHtml(order.shippingMethod) : ''}</span>
            <span class="val">${DB.fmtINR(fee)}</span>
          </div>
          <div class="sum-divider"></div>
          <div class="sum-row sum-total"><span>Total</span><span>${DB.fmtINR(total)}</span></div>
        </div>
      </div>`;
  }

  function renderRecap(order) {
    const vr = order.vendorResponse;
    if (!vr) return '';
    return `
      <div class="d-card">
        <div class="card-head">
          <h3><i data-lucide="clipboard-check" class="w-4 h-4"></i> Your response</h3>
        </div>
        <div>
          <div class="recap-row"><span class="lbl">Responded on</span><span class="val">${escapeHtml(fmtDateTime(vr.respondedAt))}</span></div>
          <div class="recap-row"><span class="lbl">Days committed</span><span class="val">${escapeHtml(String(vr.daysToComplete || '—'))}</span></div>
          <div class="recap-row"><span class="lbl">Ready by</span><span class="val">${escapeHtml(fmtDate(vr.estimatedReadyBy))}</span></div>
          ${vr.note ? `<div class="recap-row"><span class="lbl">Note</span><span class="val" style="max-width:220px;">${escapeHtml(vr.note)}</span></div>` : ''}
        </div>
      </div>`;
  }

  /* ---------- Master render ---------- */
  function render(order) {
    document.title = 'ZooEnrich Vendor · Order ' + order.id;
    document.getElementById('crumbId').textContent = order.id;

    const total = (typeof order.total === 'number') ? order.total : ((order.subtotal || 0) + (order.shippingFee || 0));

    const root = document.getElementById('detailRoot');
    root.innerHTML = `
      <div class="top-row anim-in">
        <div>
          <div class="eyebrow">Placed on ${escapeHtml(fmtDateTime(order.createdAt))}</div>
          <h1>
            Order <span class="num">${escapeHtml(order.id)}</span>
            ${statusChip(order.status)}
            ${priorityChip(order.priority)}
          </h1>
        </div>
        <div class="top-row-right">
          <div style="text-align:right">
            <div class="big-total-lbl">Order total</div>
            <div class="big-total">${DB.fmtINR(total)}</div>
          </div>
        </div>
      </div>

      <div class="detail-grid">
        <!-- LEFT -->
        <div>
          ${renderAction(order)}
          <div style="margin-top:18px;">
            ${renderTimeline(order)}
          </div>
        </div>
        <!-- RIGHT -->
        <div>
          ${renderBuyer(order)}
          ${renderAddress(order)}
          ${renderItems(order)}
          ${renderSummary(order)}
          ${renderRecap(order)}
        </div>
      </div>
    `;

    wireActions(order);
    ZE.refreshIcons();
  }

  /* ---------- Action wiring ---------- */
  function wireActions(order) {
    // Item rows → product detail (new tab)
    document.querySelectorAll('.item-row[data-prod]').forEach(row => {
      row.addEventListener('click', () => {
        window.open('product_detail_1.html?id=' + row.dataset.prod, '_blank', 'noopener');
      });
    });

    const isDemo = !ZE.orders.byId(order.id);

    /* ----- PLACED: confirm / decline ----- */
    if (order.status === 'placed') {
      const segBar = document.getElementById('segBar');
      const customWrap = document.getElementById('customWrap');
      const customDays = document.getElementById('customDays');
      const respNote = document.getElementById('respNote');
      const noteCount = document.getElementById('noteCount');
      const previewDate = document.getElementById('previewDate');

      let selectedDays = 7;

      function updatePreview() {
        const iso = addDays(order.createdAt, selectedDays);
        if (previewDate) previewDate.textContent = iso ? fmtDate(iso) : '—';
      }
      updatePreview();

      if (segBar) {
        segBar.querySelectorAll('.seg-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            segBar.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const k = btn.dataset.days;
            if (k === 'custom') {
              customWrap.style.display = '';
              const v = Number(customDays.value);
              if (isFinite(v) && v >= 1) { selectedDays = Math.min(60, Math.max(1, Math.round(v))); }
              customDays.focus();
            } else {
              customWrap.style.display = 'none';
              selectedDays = Number(k);
            }
            updatePreview();
          });
        });
      }
      if (customDays) {
        customDays.addEventListener('input', () => {
          const v = Number(customDays.value);
          if (isFinite(v) && v >= 1) {
            selectedDays = Math.min(60, Math.max(1, Math.round(v)));
            updatePreview();
          }
        });
      }
      if (respNote && noteCount) {
        respNote.addEventListener('input', () => {
          noteCount.textContent = String(respNote.value.length);
        });
      }

      const confirmBtn = document.getElementById('confirmBtn');
      if (confirmBtn) {
        confirmBtn.addEventListener('click', () => {
          if (isDemo) {
            showToast('Demo orders are read-only — action simulated only');
            return;
          }
          const note = respNote && respNote.value.trim() ? respNote.value.trim() : undefined;
          const res = ZE.orders.respondAsVendor(order.id, { daysToComplete: selectedDays, note });
          if (res) {
            showToast('Order confirmed · buyer notified');
            setTimeout(() => window.location.reload(), 500);
          } else {
            showToast('Unable to confirm — please retry');
          }
        });
      }

      const declineBtn = document.getElementById('declineBtn');
      if (declineBtn) {
        declineBtn.addEventListener('click', () => {
          const reason = window.prompt('Why are you declining this order? (This reason will be shown to the buyer.)');
          if (reason == null) return;
          const r = String(reason).trim();
          if (!r) { showToast('Cancellation needs a reason'); return; }
          if (isDemo) {
            showToast('Demo orders are read-only — action simulated only');
            return;
          }
          ZE.orders.cancel(order.id);
          showToast('Order declined');
          setTimeout(() => window.location.reload(), 500);
        });
      }
    }

    /* ----- CONFIRMED: mark packed ----- */
    if (order.status === 'confirmed') {
      const packBtn = document.getElementById('packBtn');
      if (packBtn) {
        packBtn.addEventListener('click', () => {
          if (isDemo) {
            showToast('Demo orders are read-only — action simulated only');
            return;
          }
          const res = ZE.orders.markPacked(order.id);
          if (res) {
            showToast('Marked as packed');
            setTimeout(() => window.location.reload(), 500);
          } else {
            showToast('Unable to mark packed — please retry');
          }
        });
      }
    }

    /* ----- PACKED: ship ----- */
    if (order.status === 'packed') {
      const shipBtn = document.getElementById('shipBtn');
      if (shipBtn) {
        shipBtn.addEventListener('click', () => {
          const carrier = document.getElementById('carrierSelect').value;
          const number = (document.getElementById('awbInput').value || '').trim();
          if (!carrier) { showToast('Please pick a carrier'); return; }
          if (!number)  { showToast('Please enter an AWB number'); return; }
          if (isDemo) {
            showToast('Demo orders are read-only — action simulated only');
            return;
          }
          const res = ZE.orders.markShipped(order.id, { carrier, number });
          if (res) {
            showToast('Order shipped · tracking recorded');
            setTimeout(() => window.location.reload(), 500);
          } else {
            showToast('Unable to ship — please retry');
          }
        });
      }
    }

    /* ----- SHIPPED+: AWB copy ----- */
    const copyBtn = document.getElementById('copyAwbBtn');
    if (copyBtn) {
      copyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const n = (order.tracking && order.tracking.number) || '';
        if (!n) return;
        const write = navigator.clipboard && navigator.clipboard.writeText
          ? navigator.clipboard.writeText(n)
          : Promise.reject();
        write.then(() => showToast('AWB copied: ' + n))
             .catch(() => {
               const ta = document.createElement('textarea');
               ta.value = n; document.body.appendChild(ta); ta.select();
               try { document.execCommand('copy'); showToast('AWB copied: ' + n); }
               catch (err) { showToast('Copy failed'); }
               document.body.removeChild(ta);
             });
      });
    }
  }

  /* ---------- Boot ---------- */
  document.addEventListener('DOMContentLoaded', () => {
    fillVendorHeader();

    const id = getOrderId();
    const order = lookupOrder(id);

    if (!order) {
      renderNotFound(id);
    } else if (!CURRENT_VENDOR || order.vendorId !== CURRENT_VENDOR.id) {
      renderNotYourOrder(order, id);
    } else {
      render(order);
    }

    // Reload on external order changes
    ZE.on('orders:change', () => {
      // simple: reload to reflect latest state
      window.location.reload();
    });

    // ---------- Vendor mobile drawer ----------
    (function initVendorDrawer(){
      const btn = document.getElementById('vendorMenuBtn');
      const dr  = document.getElementById('vDrawer');
      const ov  = document.getElementById('vDrawerOverlay');
      if (!btn || !dr || !ov) return;
      const openDr = () => { dr.classList.add('open'); ov.classList.add('open'); dr.setAttribute('aria-hidden','false'); };
      const closeDr = () => { dr.classList.remove('open'); ov.classList.remove('open'); dr.setAttribute('aria-hidden','true'); };
      btn.addEventListener('click', openDr);
      ov.addEventListener('click', closeDr);
      dr.querySelector('.vd-close').addEventListener('click', closeDr);
      const sf = document.getElementById('vDrawerStorefront');
      if (sf && CURRENT_VENDOR && CURRENT_VENDOR.id) sf.href = 'vendor_store_1.html?id=' + encodeURIComponent(CURRENT_VENDOR.id);
      const so = document.getElementById('vDrawerSignOut');
      if (so) so.addEventListener('click', () => { ZE.user.signOut(); window.location.assign('login_1.html'); });
    })();

    // ---------- Avatar dropdown menu ----------
    (function initAvatarMenu(){
      const avatarBtn = document.getElementById('avatarBtn');
      const vMenu = document.getElementById('vMenu');
      if (!avatarBtn || !vMenu) return;
      avatarBtn.addEventListener('click', (e) => { e.stopPropagation(); vMenu.classList.toggle('open'); });
      document.addEventListener('click', (e) => { if (!vMenu.contains(e.target) && e.target !== avatarBtn && !avatarBtn.contains(e.target)) vMenu.classList.remove('open'); });
      const so = document.getElementById('btnSignOut');
      if (so) so.addEventListener('click', () => { ZE.user.signOut(); window.location.assign('login_1.html'); });
    })();

    ZE.init();
  });
})();
</script>
</body>
