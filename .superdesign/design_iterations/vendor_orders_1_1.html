    items:[ {p:PROD.ropeBridge, qty:2} ],
    returnTag:'Full refund ₹94,600 on 2 Apr · store credit offered for next order' }
];

/* =========== Helpers =========== */
const STATUS = {
  placed:'New request', quoted:'Offer sent', queued:'Queued',
  confirmed:'Confirmed', in_production:'In production', packed:'Packed · ready',
  shipped:'Shipped', out_for_delivery:'Out for delivery', delivered:'Delivered',
  cancelled:'Cancelled', returned:'Return / rework'
};
const STATUS_ICON = {
  placed:'inbox', quoted:'sparkles', queued:'timer',
  confirmed:'check-circle', in_production:'hammer', packed:'package-check',
  shipped:'truck', out_for_delivery:'navigation', delivered:'check-check',
  cancelled:'x', returned:'rotate-ccw'
};
const TAB_BUCKETS = {
  awaiting: o => o.status === 'placed',
  quoted:   o => o.status === 'quoted',
  in_production: o => o.status === 'confirmed' || o.status === 'in_production',
  ready:    o => o.status === 'packed',
  shipped:  o => o.status === 'shipped' || o.status === 'out_for_delivery',
  delivered:o => o.status === 'delivered',
  cancelled:o => o.status === 'cancelled' || o.status === 'returned',
  all:      () => true
};
function inINR(n){ return '₹' + Number(n).toLocaleString('en-IN'); }
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function relTime(iso){ const t=new Date(iso).getTime(); const d=Date.now()-t; const m=Math.floor(d/60000); if(m<1) return 'just now'; if(m<60) return m+'m ago'; const h=Math.floor(m/60); if(h<24) return h+'h ago'; const dd=Math.floor(h/24); if(dd===1) return 'yesterday'; if(dd<7) return dd+'d ago'; if(dd<30) return Math.floor(dd/7)+'wk ago'; return Math.floor(dd/30)+'mo ago'; }

function chip(st){ return `<span class="chip chip-${st}"><i data-lucide="${STATUS_ICON[st]}" class="w-3 h-3"></i> ${STATUS[st]}</span>`; }
function priorityChip(p){ if(!p||p==='Normal') return ''; const cls = p==='Critical'?'critical':(p==='High'?'high':''); return `<span class="chip chip-priority ${cls}"><i data-lucide="alert-triangle" class="w-3 h-3"></i> ${p}</span>`; }
function speciesChip(spId){ const s=SPECIES[spId]; if(!s) return ''; return `<span class="chip-species"><img src="https://image.pollinations.ai/prompt/${encodeURIComponent(s.name+' portrait')}?width=40&height=40&seed=${s.seed}&nologo=true" alt=""/>${s.name}</span>`; }

function buyerChip(b){ return `<div class="buyer-chip">
  <img class="buyer-av" src="https://image.pollinations.ai/prompt/professional%20zoo%20staff%20portrait%20headshot%20smile?width=80&height=80&seed=${b.seed}&nologo=true" alt=""/>
  <div><div class="buyer-nm">${b.nm}</div><div class="buyer-zoo">${b.zoo}</div></div>
</div>`; }

function slaBadge(hours){
  if (hours == null) return '';
  if (hours < 0) return `<span class="sla-badge urgent"><i data-lucide="alert-circle" class="w-3 h-3"></i> SLA breached · ${Math.abs(hours)}h over</span>`;
  if (hours <= 12) return `<span class="sla-badge urgent"><i data-lucide="timer" class="w-3 h-3"></i> ${hours}h left</span>`;
  if (hours <= 24) return `<span class="sla-badge warn"><i data-lucide="timer" class="w-3 h-3"></i> ${hours}h left</span>`;
  return `<span class="sla-badge ok"><i data-lucide="clock" class="w-3 h-3"></i> ${hours}h left</span>`;
}

/* =========== Context row per status =========== */
function contextRow(o) {
  if (o.status === 'placed') {
    if (o.chatTag === 'queued') {
      return `<div class="callout queued">
        <span><i data-lucide="timer" class="w-4 h-4"></i> <strong>You queued this</strong> — buyer is checking back. Last message: "${o.lastMsg}"</span>
        <a href="chat_1.html" class="cta-link">Open chat →</a>
      </div>`;
    }
    return `<div class="callout awaiting">
      <span><i data-lucide="message-circle" class="w-4 h-4"></i> <strong>${o.chatTag==='clarifying'?'Clarifying with buyer':'New request · needs first response'}</strong> · "${o.lastMsg}"</span>
      <a href="chat_1.html" class="cta-link">Reply →</a>
    </div>`;
  }
  if (o.status === 'quoted') {
    return `<div class="callout quoted">
      <span><i data-lucide="sparkles" class="w-4 h-4"></i> Your offer: <strong>${inINR(o.offer.quote)}</strong> · <strong>${o.offer.days} days</strong> · expires in <strong>${o.offer.expiresIn}</strong>${o.offer.countered?' · buyer counter-proposed':''}</span>
      <a href="chat_1.html" class="cta-link">View thread →</a>
    </div>`;
  }
  if (o.status === 'confirmed') {
    return `<div class="callout confirmed">
      <span><i data-lucide="check-circle" class="w-4 h-4"></i> <strong>Approved</strong> — begin fabrication. Production stage: <strong>${o.productionStage}</strong> · Ready by <strong>${fmtDate(o.readyBy)}</strong></span>
    </div>`;
  }
  if (o.status === 'in_production') {
    return `<div class="callout readyby">
      <span><i data-lucide="hammer" class="w-4 h-4" style="color:#A16207"></i> <strong>${o.productionStage}</strong> · Ready by <strong>${fmtDate(o.readyBy)}</strong></span>
    </div>`;
  }
  if (o.status === 'packed') {
    return `<div class="callout readyby" style="background:#D1FAE5;border-left-color:var(--brand);color:#065F46;">
      <span><i data-lucide="package-check" class="w-4 h-4"></i> <strong>Packed &amp; ready</strong> · ship by <strong>${o.shipBy}</strong> · suggested: ${o.suggestedCarrier}</span>
    </div>`;
  }
  if (o.status === 'shipped' || o.status === 'out_for_delivery') {
    const t = o.tracking;
    return `<div class="track">
      <div class="line-1"><i data-lucide="truck" class="w-3.5 h-3.5"></i><span class="carrier">${t.carrier}</span><span class="sep">·</span><span class="awb">AWB ${t.awb}</span></div>
      <div class="line-2"><i data-lucide="map-pin" class="w-4 h-4"></i><span>${t.event.note}</span><span class="sep">·</span><span class="loc">${t.event.loc}</span><span class="sep">·</span><span class="tm">${t.event.rel}</span></div>
    </div>`;
  }
  if (o.status === 'delivered') {
    const rStars = o.rating ? `${'★'.repeat(o.rating)}${'☆'.repeat(5-o.rating)}` : 'No rating yet';
    return `<div class="callout confirmed">
      <span><i data-lucide="check-check" class="w-4 h-4"></i> Delivered ${relTime(o.deliveredAt)} via ${o.tracking?.carrier || ''} · <strong>${rStars}</strong>${o.invoiced?' · Invoice issued':''}</span>
    </div>`;
  }
  if (o.status === 'cancelled') {
    return `<div class="callout cancelled">
      <span><i data-lucide="x-circle" class="w-4 h-4"></i> ${o.cancelReason}</span>
    </div>`;
  }
  if (o.status === 'returned') {
    return `<div class="callout returned">
      <span><i data-lucide="rotate-ccw" class="w-4 h-4"></i> <strong>${o.returnStage}</strong> — ${o.returnTag}</span>
      <a href="returns_vendor_1.html" class="cta-link">Manage return →</a>
    </div>`;
  }
  return '';
}

/* =========== Action row per status =========== */
function actions(o) {
  if (o.status === 'placed') {
    return `
      <a href="chat_1.html" class="btn-sm btn-info" data-stop><i data-lucide="message-square" class="w-4 h-4"></i> Open chat</a>
      <button class="btn-sm btn-primary" data-stop><i data-lucide="sparkles" class="w-4 h-4"></i> Send offer</button>
      <button class="btn-sm btn-ghost" data-stop><i data-lucide="timer" class="w-4 h-4"></i> Queue</button>
      <button class="btn-sm btn-danger" data-stop><i data-lucide="x" class="w-4 h-4"></i> Decline</button>`;
  }
  if (o.status === 'quoted') {
    return `
      <a href="chat_1.html" class="btn-sm btn-info" data-stop><i data-lucide="message-square" class="w-4 h-4"></i> Open thread</a>
      <button class="btn-sm btn-primary" data-stop><i data-lucide="pencil" class="w-4 h-4"></i> Update offer</button>
      <button class="btn-sm btn-ghost" data-stop><i data-lucide="bell" class="w-4 h-4"></i> Nudge buyer</button>`;
  }
  if (o.status === 'confirmed') {
    return `
      <button class="btn-sm btn-primary" data-stop><i data-lucide="hammer" class="w-4 h-4"></i> Mark in production</button>
      <a href="chat_1.html" class="btn-sm btn-ghost" data-stop><i data-lucide="message-square" class="w-4 h-4"></i> Chat buyer</a>`;
  }
  if (o.status === 'in_production') {
    return `
      <button class="btn-sm btn-primary" data-stop><i data-lucide="package-check" class="w-4 h-4"></i> Mark ready to ship</button>
      <button class="btn-sm btn-ghost" data-stop><i data-lucide="pencil" class="w-4 h-4"></i> Update ETA</button>
      <a href="chat_1.html" class="btn-sm btn-ghost" data-stop><i data-lucide="message-square" class="w-4 h-4"></i> Notify buyer</a>`;
  }
  if (o.status === 'packed') {
    return `
      <button class="btn-sm btn-warn" data-stop><i data-lucide="printer" class="w-4 h-4"></i> Generate label</button>
      <button class="btn-sm btn-primary" data-stop><i data-lucide="truck" class="w-4 h-4"></i> Mark shipped</button>
      <button class="btn-sm btn-ghost" data-stop><i data-lucide="file-text" class="w-4 h-4"></i> Manifest</button>`;
  }
  if (o.status === 'shipped' || o.status === 'out_for_delivery') {
    return `
      <button class="btn-sm btn-primary" data-stop><i data-lucide="map-pin" class="w-4 h-4"></i> Track</button>
      <button class="btn-sm btn-ghost" data-stop><i data-lucide="pencil" class="w-4 h-4"></i> Update tracking</button>
      <a href="chat_1.html" class="btn-sm btn-ghost" data-stop><i data-lucide="message-square" class="w-4 h-4"></i> Chat</a>`;
  }
  if (o.status === 'delivered') {
    const invBtn = o.invoiced ? `<button class="btn-sm btn-ghost" data-stop><i data-lucide="download" class="w-4 h-4"></i> Download invoice</button>`
                              : `<button class="btn-sm btn-primary" data-stop><i data-lucide="file-text" class="w-4 h-4"></i> Mark invoiced</button>`;
    return `${invBtn}
      <button class="btn-sm btn-ghost" data-stop><i data-lucide="star" class="w-4 h-4"></i> Request review</button>
      <a href="chat_1.html" class="btn-sm btn-ghost" data-stop><i data-lucide="message-square" class="w-4 h-4"></i> Chat</a>`;
  }
  if (o.status === 'cancelled') {
    return `
      <button class="btn-sm btn-ghost" data-stop><i data-lucide="eye" class="w-4 h-4"></i> View reason</button>
      <a href="chat_1.html" class="btn-sm btn-ghost" data-stop><i data-lucide="message-square" class="w-4 h-4"></i> Chat buyer</a>`;
  }
  if (o.status === 'returned') {
    return `
      <a href="returns_vendor_1.html" class="btn-sm btn-primary" data-stop><i data-lucide="rotate-ccw" class="w-4 h-4"></i> Manage return</a>
      <a href="chat_1.html" class="btn-sm btn-ghost" data-stop><i data-lucide="message-square" class="w-4 h-4"></i> Chat buyer</a>`;
  }
  return '';
}

/* =========== Render =========== */
function renderCard(o) {
  const b = BUYERS[o.buyer];
  const firstThree = o.items.slice(0,3);
  const more = o.items.length - firstThree.length;
  const totalQty = o.items.reduce((s,it)=>s+it.qty,0);
  const thumbs = firstThree.map(it => `<div class="th"><img src="${it.p.img}" alt="" loading="lazy"/>${it.qty>1?`<span class="qty">×${it.qty}</span>`:''}</div>`).join('');
  const moreHtml = more>0 ? `<div class="more">+${more}</div>` : '';
  const names = o.items.slice(0,2).map(it => it.p.name);
  const namesLine = `<strong>${names.join('</strong>, <strong>')}</strong>${(o.items.length-names.length)>0 ? ' and '+(o.items.length-names.length)+' more' : ''}`;

  const slaCls = o.slaHoursLeft != null ? (o.slaHoursLeft < 0 || o.slaHoursLeft <= 12 ? 'sla-urgent' : (o.slaHoursLeft <= 24 ? 'sla-warn' : '')) : '';

  return `<article class="oc ${slaCls}" data-id="${o.id}">
    <div class="oc-top">
      <div class="oc-left">
        <span class="oc-id">${o.id}</span>
        ${buyerChip(b)}
      </div>
      <div style="display:inline-flex; align-items:center; gap:8px; flex-wrap:wrap;">
        ${o.slaHoursLeft != null ? slaBadge(o.slaHoursLeft) : ''}
        <span class="oc-date"><i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${fmtDate(o.createdAt)}</span>
      </div>
    </div>

    <div class="oc-chips">
      ${chip(o.status)}
      ${priorityChip(o.priority)}
      ${speciesChip(o.species)}
    </div>

    <div class="ctx">${contextRow(o)}</div>

    <div class="oc-items">
      <div class="thumbs">${thumbs}${moreHtml}</div>
      <div class="items-meta">${namesLine} · <strong>${totalQty}</strong> ${totalQty===1?'unit':'units'}</div>
    </div>

    <div class="oc-bot">
      <div class="oc-total"><span class="lab">Order value</span>${inINR(o.total)}</div>
      <div class="oc-actions">${actions(o)}</div>
    </div>
  </article>`;
}

let state = { tab: 'awaiting' };

function render(){
  // Counts
  const counts = {};
  Object.keys(TAB_BUCKETS).forEach(k => counts[k] = ORDERS.filter(TAB_BUCKETS[k]).length);
  Object.keys(counts).forEach(k => { const el = document.querySelector(`[data-count="${k}"]`); if (el) el.textContent = counts[k]; });
  document.getElementById('urgBubble').textContent = counts.awaiting + ' need response';
  document.getElementById('navBadge').textContent = counts.awaiting + counts.ready;

  // Filter + sort (newest first)
  const filtered = ORDERS.filter(TAB_BUCKETS[state.tab] || (()=>true))
    .slice()
    .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

  const host = document.getElementById('list');
  if (!filtered.length) {
    host.innerHTML = `<div class="empty"><div class="ic"><i data-lucide="package-search" class="w-8 h-8"></i></div><h3>No orders in this tab</h3><p>They'll show up here when buyers place them.</p></div>`;
  } else {
    host.innerHTML = filtered.map(renderCard).join('');
  }
  host.querySelectorAll('.oc').forEach(c => c.addEventListener('click', e => {
    if (e.target.closest('[data-stop]')) return;
    window.location.href = 'vendor_order_detail_1.html?id=' + c.dataset.id;
  }));
  host.querySelectorAll('[data-stop]').forEach(b => b.addEventListener('click', e => e.stopPropagation()));
  if (window.lucide?.createIcons) window.lucide.createIcons();
}

document.querySelectorAll('#tabsRow button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('#tabsRow button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  state.tab = b.dataset.tab;
  render();
  window.scrollTo({top: 120, behavior: 'smooth'});
}));

render();
</script>
</body>
</html>
