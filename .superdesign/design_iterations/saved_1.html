<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>ZooEnrich · Saved</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="tokens.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="data.js?v=20260430e"></script>
  <script src="app.js?v=20260430e"></script>
  <style>
    /* =========== Page layout =========== */
    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 0 32px; }

    /* =========== Header (cloned from index_1.html) =========== */
    .app-header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .app-header .row { display: flex; align-items: center; gap: 20px; height: 72px; }
    .brand-mark { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; color: var(--text); letter-spacing: -0.01em; }
    .brand-mark .logo-box { width: 32px; height: 32px; border-radius: 10px; background: var(--brand); color: #fff; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px -3px rgba(55,189,105,.5); }

    .search-pill { flex: 1; max-width: 560px; height: 48px; background: #F1F2F4; border-radius: 999px; display: flex; align-items: center; gap: 10px; padding: 0 18px; color: var(--text-muted); transition: .15s; border: 1.5px solid transparent; }
    .search-pill:focus-within { background: #fff; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(55,189,105,.12); }
    .search-pill input { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); }
    .search-pill .kbd { background: #fff; border: 1px solid var(--border); color: var(--text-muted); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }

    .header-actions { display: flex; align-items: center; gap: 6px; }
    .header-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 10px; border-radius: 12px; color: var(--text-muted); cursor: pointer; transition: .15s; background: transparent; border: none; position: relative; min-width: 64px; }
    .header-btn:hover { background: #F1F2F4; color: var(--text); }
    .header-btn span { font-size: 11px; font-weight: 500; margin-top: 3px; }
    .header-btn.active { background: var(--brand-soft); color: var(--brand); }
    .header-btn.active:hover { background: var(--brand-soft); color: var(--brand-hover); }
    .header-btn .badge-dot { position: absolute; top: 4px; right: 12px; min-width: 18px; height: 18px; padding: 0 5px; background: var(--danger); color: #fff; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 2px solid #fff; }
    .avatar { width: 40px; height: 40px; border-radius: 999px; object-fit: cover; border: 2px solid var(--border); margin-left: 8px; cursor: pointer; }

    /* =========== Sub-bar =========== */
    .sub-bar { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 72px; z-index: 40; }
    .sub-bar .filter-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; flex-wrap: nowrap; }
    .sub-bar .filter-row .inline-cats { display: flex; gap: 8px; flex: 1; min-width: 0; overflow-x: auto; scrollbar-width: none; padding: 0 4px; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
    .sub-bar .filter-row .inline-cats::-webkit-scrollbar { display: none; }
    .sub-bar .filter-row .selector-pill { flex-shrink: 0; }

    /* =========== Category chips (saved-page sub-bar) =========== */
    /* Reuse .pill from tokens.css; add dot, curated-icon, focus & divider styling. */
    .sub-bar .inline-cats .pill { flex-shrink: 0; padding: 8px 14px; font-size: 13px; }
    .sub-bar .inline-cats .pill:focus-visible { outline: 3px solid rgba(55,189,105,.35); outline-offset: 1px; }
    .sub-bar .inline-cats .pill .cat-dot { width: 8px; height: 8px; border-radius: 999px; background: var(--brand); display: inline-block; flex-shrink: 0; }
    .sub-bar .inline-cats .pill.active .cat-dot { background: #fff !important; box-shadow: 0 0 0 1.5px rgba(255,255,255,.3); }
    .sub-bar .inline-cats .cat-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; flex-shrink: 0; align-self: center; }
    .sub-bar .inline-cats .pill i[data-lucide] { width: 14px; height: 14px; }

    /* Sort-trigger visual tweaks */
    #sortSelector { outline: none; }
    #sortSelector:focus-visible { outline: 3px solid rgba(55,189,105,.35); outline-offset: 1px; }
    #sortSelector.has-sort { border-color: var(--brand); background: var(--brand-soft); }
    #sortSelector.has-sort #sortTriggerLabel { color: var(--brand-hover); }
    #sortSelector.has-sort #sortLabel { color: var(--brand-hover); }

    /* Sort dropdown radio rows */
    #sortDropdown .dd-item { gap: 10px; padding: 9px 12px; }
    #sortDropdown .dd-item .sort-radio { width: 16px; height: 16px; border-radius: 999px; border: 2px solid var(--border-strong); background: #fff; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; position: relative; transition: .12s; }
    #sortDropdown .dd-item.active .sort-radio { border-color: var(--brand); }
    #sortDropdown .dd-item.active .sort-radio::after { content: ''; width: 7px; height: 7px; border-radius: 999px; background: var(--brand); }
    #sortDropdown .dd-item:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; }

    /* Empty-filters banner inside grid */
    .filters-empty { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .filters-empty .fe-ico { display: inline-flex; margin: 0 auto 12px; }
    .filters-empty .fe-title { font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .filters-empty .fe-sub { font-size: 13px; margin-bottom: 14px; }
    .filters-empty .fe-clear { background: #fff; color: var(--brand); border: 1.5px solid var(--brand); padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: .15s; }
    .filters-empty .fe-clear:hover { background: var(--brand-soft); }

    .selector-pill { display: inline-flex; align-items: center; gap: 10px; padding: 8px 14px 8px 10px; border-radius: 999px; background: #fff; border: 1px solid var(--border); cursor: pointer; transition: .15s; font-size: 14px; font-weight: 500; position: relative; }
    .selector-pill:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .selector-pill .pill-ico { width: 28px; height: 28px; border-radius: 999px; background: var(--brand-soft); display: inline-flex; align-items: center; justify-content: center; color: var(--brand); }
    .selector-pill .pill-avatar { width: 28px; height: 28px; border-radius: 999px; object-fit: cover; }

    .dropdown { position: absolute; top: calc(100% + 8px); left: 0; background: #fff; border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); min-width: 260px; max-height: 420px; overflow-y: auto; z-index: 60; padding: 8px; display: none; }
    .dropdown.open { display: block; animation: fadeUp .2s ease both; }
    .dropdown-right { left: auto; right: 0; }
    .dd-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; cursor: pointer; font-size: 13px; color: var(--text); }
    .dd-item:hover { background: #F4F5F7; }
    .dd-item .dd-avatar { width: 28px; height: 28px; border-radius: 999px; background: #F1F2F4; overflow: hidden; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; color: var(--text-muted); }
    .dd-item .dd-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .dd-label { flex: 1; }
    .dd-count { color: var(--text-subtle); font-size: 11px; }
    .dd-section { padding: 10px 12px 6px; font-size: 11px; font-weight: 600; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.08em; }
    .dd-item.active { background: var(--brand-soft); color: var(--brand-hover); font-weight: 600; }

    /* =========== Multi-select Species Picker (msp) =========== */
    .msp-trigger-stack { display: inline-flex; align-items: center; }
    .msp-trigger-stack .pill-avatar { border: 2px solid #fff; box-shadow: 0 0 0 1px var(--border); width: 28px; height: 28px; border-radius: 999px; object-fit: cover; }
    .msp-trigger-stack .pill-avatar + .pill-avatar { margin-left: -10px; }
    .msp-count-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 22px; padding: 0 6px; margin-left: -8px; background: var(--brand); color: #fff; border-radius: 999px; font-size: 11px; font-weight: 700; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--brand); z-index: 1; position: relative; }
    #speciesSelector.msp-has-selection { border-color: var(--brand); background: var(--brand-soft); }
    #speciesSelector.msp-has-selection:hover { background: #CDEFD7; }
    #speciesSelector.msp-has-selection #speciesLabel { color: var(--brand-hover); font-weight: 600; }

    .msp-panel {
      position: absolute; top: calc(100% + 8px); left: 0;
      background: #fff; border: 1px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow-lg);
      width: 380px; max-width: calc(100vw - 24px);
      z-index: 60; display: none; flex-direction: column;
      max-height: 560px; overflow: hidden; padding: 0;
    }
    .msp-panel.open { display: flex; animation: fadeUp .2s ease both; }
    .msp-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .msp-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .msp-clear { background: none; border: none; color: var(--brand); font-size: 13px; font-weight: 600; cursor: pointer; padding: 4px 6px; border-radius: 6px; }
    .msp-clear:hover { background: var(--brand-soft); }
    .msp-clear[hidden] { display: none !important; }

    .msp-search { position: sticky; top: 0; background: #fff; padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; z-index: 2; flex-shrink: 0; }
    .msp-search i[data-lucide="search"] { color: var(--text-muted); width: 16px; height: 16px; flex-shrink: 0; }
    .msp-search input { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; color: var(--text); min-width: 0; }
    .msp-search-clear { width: 20px; height: 20px; border-radius: 999px; background: #E5E7EB; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; color: var(--text-muted); padding: 0; flex-shrink: 0; }
    .msp-search-clear.show { display: inline-flex; }
    .msp-search-clear i { width: 12px; height: 12px; }

    .msp-list { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 6px 6px; min-height: 0; }
    .msp-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background-color .12s ease; user-select: none; border: 1.5px solid transparent; }
    .msp-row:hover { background: #F4F5F7; }
    .msp-row.selected { background: var(--brand-soft); }
    .msp-row.selected:hover { background: #CDEFD7; }
    .msp-row .msp-avatar { width: 44px; height: 44px; border-radius: 10px; overflow: hidden; flex-shrink: 0; background: #F1F2F4; }
    .msp-row .msp-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .msp-row .msp-text { flex: 1; min-width: 0; }
    .msp-row .msp-name { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .msp-row .msp-latin { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: var(--text-muted); font-style: italic; margin-top: 2px; }
    .msp-row .msp-cb { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border-strong); background: #fff; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; transition: background-color .12s, border-color .12s; }
    .msp-row .msp-cb i { width: 12px; height: 12px; color: #fff; opacity: 0; transform: scale(.6); transition: opacity .15s, transform .15s; }
    .msp-row.selected .msp-cb { background: var(--brand); border-color: var(--brand); }
    .msp-row.selected .msp-cb i { opacity: 1; transform: scale(1); }
    .msp-row.selected .msp-name { color: var(--brand-hover); }

    .msp-empty { padding: 28px 16px; text-align: center; font-size: 13px; color: var(--text-muted); }

    .msp-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--border); background: #fff; flex-shrink: 0; }
    .msp-footer-count { font-size: 13px; font-weight: 600; color: var(--text); }
    .msp-footer-count.empty { color: var(--text-muted); font-weight: 500; }
    .msp-apply { display: inline-flex; align-items: center; justify-content: center; padding: 9px 20px; border-radius: 999px; background: var(--brand); color: #fff; border: none; cursor: pointer; font-size: 13px; font-weight: 600; box-shadow: 0 4px 10px -3px rgba(55,189,105,.45); transition: background .15s, transform .1s; }
    .msp-apply:hover { background: var(--brand-hover); }
    .msp-apply:active { transform: scale(.97); }

    /* Chip rail under sub-bar */
    .msp-chiprail-wrap { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 128px; z-index: 39; display: none; }
    .msp-chiprail-wrap.show { display: block; }
    .msp-chiprail { max-width: 1400px; margin: 0 auto; padding: 10px 32px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; box-sizing: border-box; }
    .msp-chiprail-label { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.02em; margin-right: 2px; }
    .msp-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px; border-radius: 999px; background: var(--brand-soft); color: var(--brand-hover); font-size: 12px; font-weight: 600; border: 1px solid transparent; animation: msp-chip-in .25s cubic-bezier(.2,.8,.25,1) both; }
    @keyframes msp-chip-in { from { opacity: 0; transform: translateY(-4px) scale(.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .msp-chip img { width: 22px; height: 22px; border-radius: 999px; object-fit: cover; }
    .msp-chip span { padding: 0 2px; }
    .msp-chip button { width: 20px; height: 20px; border-radius: 999px; background: rgba(55,189,105,.22); border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: var(--brand-hover); margin-right: 2px; padding: 0; transition: background .12s; }
    .msp-chip button:hover { background: var(--brand); color: #fff; }
    .msp-chip button i { width: 12px; height: 12px; }
    .msp-chiprail-clear { background: none; border: none; color: var(--text-muted); font-size: 12px; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 999px; margin-left: auto; }
    .msp-chiprail-clear:hover { color: var(--text); background: #F1F2F4; }

    @media (max-width: 760px) {
      .msp-chiprail-wrap { top: 110px; }
      .msp-chiprail { padding: 10px 14px; }
      .msp-panel {
        position: fixed !important;
        top: auto !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
        width: 100vw !important; max-width: 100vw !important;
        border-radius: 18px 18px 0 0 !important;
        max-height: 86vh;
        transform: translateY(100%);
        transition: transform .25s cubic-bezier(.2,.8,.25,1);
        display: flex !important;
        animation: none !important;
        pointer-events: none;
      }
      .msp-panel.open { transform: translateY(0); pointer-events: auto; }
      .msp-panel::before { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 40px; height: 4px; border-radius: 999px; background: var(--border-strong); }
      .msp-header { padding-top: 22px; }
      .msp-list { max-height: calc(86vh - 240px); }
      .msp-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.5); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); z-index: 59; opacity: 0; pointer-events: none; transition: opacity .22s ease; }
      .msp-backdrop.show { opacity: 1; pointer-events: auto; }
    }
    @media (min-width: 761px) {
      .msp-backdrop { display: none !important; }
    }

    /* =========== Page header =========== */
    .crumbs { display: flex; align-items: center; gap: 8px; padding: 22px 0 8px; font-size: 13px; color: var(--text-muted); }
    .crumbs a:hover { color: var(--brand); }
    .crumbs .sep { color: var(--text-subtle); }

    .title-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .title-row h1 { font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; display: inline-flex; align-items: center; gap: 12px; }
    .count-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 999px; background: var(--brand-soft); color: var(--brand-hover); font-size: 13px; font-weight: 600; }
    .title-row .actions { display: flex; gap: 8px; align-items: center; }
    .btn-destructive-ghost { background: #fff; color: var(--danger); border: 1.5px solid #F5C2CB; padding: 10px 16px; border-radius: 999px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: .15s; }
    .btn-destructive-ghost:hover { background: var(--danger-bg); border-color: var(--danger); }
    .btn-brand-cta { background: var(--brand); color: #fff; padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: .15s; border: none; box-shadow: 0 4px 10px -3px rgba(55,189,105,.4); }
    .btn-brand-cta:hover { background: var(--brand-hover); }
    .btn-brand-cta:disabled { background: #D1D5DB; color: #fff; cursor: not-allowed; box-shadow: none; }

    /* =========== Product grid =========== */
    .prod-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; padding: 22px 0 60px; }
    @media (max-width: 1100px) { .prod-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 800px)  { .prod-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .prod-grid { grid-template-columns: 1fr; } }

    .prod-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; cursor: pointer; transition: .2s ease; display: flex; flex-direction: column; box-shadow: var(--shadow-xs); }
    .prod-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--border-strong); }

    .prod-img-wrap { position: relative; aspect-ratio: 1 / 1; background: var(--card-subtle); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
    .fav-btn { position: absolute; top: 10px; right: 10px; width: 34px; height: 34px; border-radius: 999px; background: #fff; border: none; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-sm); color: var(--danger); transition: .15s; z-index: 2; }
    .fav-btn:hover { transform: scale(1.08); }
    .fav-btn.active i { fill: currentColor; }

    .top-badge { position: absolute; top: 10px; left: 10px; background: var(--yellow); color: #6d4b00; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; z-index: 2; display: inline-flex; align-items: center; gap: 4px; }

    /* Product rating — Flipkart-style compact green pill */
    .prod-rating { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1; }
    .prod-rating .stars { display: inline-flex; align-items: center; gap: 3px; font-weight: 600; color: var(--text-muted); }
    .prod-rating .stars i,
    .prod-rating .stars svg { width: 10px !important; height: 10px !important; color: var(--brand) !important; fill: var(--brand) !important; stroke: var(--brand) !important; }
    .prod-rating .stars svg *,
    .prod-rating .stars svg polygon,
    .prod-rating .stars svg path { fill: var(--brand) !important; stroke: var(--brand) !important; }
    .prod-rating .rating-count { color: var(--text-muted); font-weight: 500; font-size: 11px; }
    .prod-rating .no-rating { color: var(--text-subtle); font-size: 11px; font-style: italic; }

    /* =========== Hover carousel (Myntra-style) =========== */
    .pi-stage { position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; }
    .pi-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity .4s ease; }
    .pi-img.pi-active { opacity: 1; }
    .prod-card:hover .pi-img.pi-active { transform: scale(1.02); }
    .pi-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; padding: 4px 8px; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); border-radius: 999px; opacity: 0; transition: opacity .2s; z-index: 2; pointer-events: none; }
    .prod-card:hover .pi-dots { opacity: 1; }
    .pi-dot { width: 5px; height: 5px; border-radius: 999px; background: rgba(255,255,255,0.5); transition: width .2s, background .2s; }
    .pi-dot.pi-dot-active { width: 14px; background: #fff; }
    @media (hover: none) { .pi-dots { opacity: 0.85; } }

    .prod-meta { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; min-height: 50px; }
    .prod-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .prod-cat { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .prod-cat .tag-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--brand); }

    .prod-bottom { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: auto; }
    .prod-price { font-size: 16px; font-weight: 700; color: var(--text); }
    .prod-price .unit { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-left: 2px; }

    .add-btn { background: #fff; color: var(--brand); height: 34px; padding: 0 14px; border-radius: 999px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--brand); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: .15s; box-shadow: none; box-sizing: border-box; line-height: 1; }
    .add-btn:hover { background: var(--brand-soft); color: var(--brand-hover); border-color: var(--brand-hover); transform: scale(1.02); }

    .stepper-mini { display: inline-flex; align-items: center; background: var(--brand); color: #fff; border-radius: 999px; padding: 3px; gap: 2px; height: 34px; box-sizing: border-box; }
    .stepper-mini button { width: 28px; height: 28px; border-radius: 999px; background: transparent; color: #fff; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
    .stepper-mini button:hover { background: rgba(255,255,255,.2); }
    .stepper-mini .qty { min-width: 20px; text-align: center; font-weight: 700; font-size: 13px; }

    /* =========== Empty state =========== */
    .empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 80px 24px 100px; gap: 16px; }
    .empty-state .ico-wrap { width: 88px; height: 88px; border-radius: 999px; background: var(--brand-soft); color: var(--brand); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 4px; }
    .empty-state h2 { font-size: 22px; font-weight: 700; color: var(--text); }
    .empty-state p { font-size: 14px; color: var(--text-muted); max-width: 380px; line-height: 1.5; }

    /* =========== Undo toast =========== */
    .undo-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: #fff;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 10px 30px -8px rgba(0,0,0,.4);
      opacity: 0;
      pointer-events: none;
      transition: .25s;
      z-index: 150;
      font-weight: 500;
    }
    .undo-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .undo-toast button { background: transparent; color: var(--brand-container); border: none; font-weight: 700; cursor: pointer; font-size: 13px; padding: 2px 4px; }
    .undo-toast button:hover { color: #fff; }

    /* =========== Responsive tweaks =========== */
    @media (max-width: 900px) {
      .app-header .row { height: 60px !important; gap: 10px; }
      .search-pill { display: none !important; }
      .header-btn span { display: none !important; }
      .header-btn { min-width: 40px !important; padding: 8px !important; }
      .page-wrap { padding: 0 16px !important; }
      .sub-bar { top: 60px !important; }
      .sub-bar .filter-row { padding: 10px 0; gap: 8px; flex-wrap: nowrap; }
      .sub-bar .filter-row .selector-pill { padding: 6px 10px 6px 8px; font-size: 13px; }
      .sub-bar .filter-row #speciesLabel { max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .title-row { flex-direction: column; align-items: stretch; gap: 12px; }
      .title-row h1 { font-size: 22px; }
      .title-row .actions { width: 100%; display: flex; gap: 8px; }
      .title-row .actions button { flex: 1; justify-content: center; }
    }
    @media (max-width: 767px) {
      /* Chip row takes the middle slot as a horizontally scrolling segment of equal
         weight between species pill and sort pill. */
      .sub-bar .filter-row { gap: 6px !important; }
      .sub-bar .inline-cats { padding: 0 2px !important; }
      .sub-bar .inline-cats .pill { padding: 6px 12px !important; font-size: 12px !important; }
      .sub-bar .inline-cats .cat-divider { margin: 0 2px !important; height: 18px !important; }
      #sortSelector #sortTriggerLabel { max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; }
    }
    @media (max-width: 600px) {
      .title-row h1 { font-size: 20px !important; }
      .prod-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px; padding: 16px 0 80px; }
      .prod-card { padding: 10px; }
      .prod-name { font-size: 14px; }
      .prod-price { font-size: 15px; }
      .empty-state { padding: 56px 16px 80px; }
      .empty-state h2 { font-size: 18px; }
      .undo-toast { left: 16px !important; right: 16px !important; bottom: 16px; transform: translateX(0) translateY(20px) !important; max-width: none; width: auto; justify-content: space-between; }
      .undo-toast.show { transform: translateX(0) translateY(0) !important; }
    }
    @media (max-width: 400px) {
      .brand-mark span:not(.logo-box) { display: none; }
    }

    /* =========== Add-to-cart species picker modal — gallery grid redesign =========== */
    .atc-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.5); opacity: 0; pointer-events: none; transition: opacity .22s ease; z-index: 100; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
    .atc-overlay.open { opacity: 1; pointer-events: auto; }
    .atc-modal {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-46%) scale(.98);
      opacity: 0; pointer-events: none;
      transition: transform .22s cubic-bezier(.2,.8,.25,1), opacity .22s ease;
      z-index: 110;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      width: min(760px, calc(100vw - 32px));
      max-height: calc(100vh - 48px);
      display: flex; flex-direction: column;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .atc-modal.open { transform: translate(-50%,-50%) scale(1); opacity: 1; pointer-events: auto; }
    .atc-grab { display: none; }
    .atc-head { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); background: #fff; flex-shrink: 0; }
    .atc-thumb { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; background: var(--card-subtle); flex-shrink: 0; }
    .atc-heading { flex: 1; min-width: 0; }
    .atc-title { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.25; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .atc-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .atc-close { width: 40px; height: 40px; border-radius: 999px; background: transparent; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: var(--text-muted); transition: background .15s, color .15s; flex-shrink: 0; }
    .atc-close:hover { background: #F1F2F4; color: var(--text); }
    .atc-close i { width: 18px; height: 18px; }
    .atc-body { padding: 16px 18px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; gap: 18px; flex: 1; }
    .atc-field { display: flex; flex-direction: column; gap: 8px; }
    .atc-lab { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
    .atc-lab .req { color: var(--danger); }
    .atc-lab .opt { font-weight: 500; color: var(--text-subtle); text-transform: none; letter-spacing: 0; }

    .atc-search-wrap { display: flex; align-items: center; gap: 8px; border: 1.5px solid var(--border); border-radius: 999px; padding: 0 14px; background: #fff; transition: border-color .15s, box-shadow .15s; }
    .atc-search-wrap:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .atc-search-wrap i[data-lucide="search"] { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
    .atc-search-wrap input { flex: 1; height: 40px; border: none; outline: none; background: transparent; font-size: 14px; font-family: inherit; color: var(--text); min-width: 0; }
    .atc-search-wrap input::-webkit-search-cancel-button { display: none; }
    .atc-search-clear { display: none; width: 22px; height: 22px; border-radius: 999px; background: #E5E7EB; border: none; cursor: pointer; align-items: center; justify-content: center; color: var(--text-muted); flex-shrink: 0; padding: 0; }
    .atc-search-clear.show { display: inline-flex; }
    .atc-search-clear:hover { background: #D1D5DB; color: var(--text); }
    .atc-search-clear i { width: 12px; height: 12px; }

    .atc-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .atc-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; border: 1.5px solid var(--border); background: #fff; color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; transition: .15s; white-space: nowrap; }
    .atc-chip:hover { border-color: var(--brand); color: var(--brand); }
    .atc-chip.active { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 4px 10px -3px rgba(55,189,105,.35); }

    .atc-meta-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .atc-count-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--brand-soft); color: var(--brand-hover); font-size: 12px; font-weight: 600; transition: transform .18s cubic-bezier(.2,.8,.25,1); }
    .atc-count-chip.pulse { animation: atc-count-pulse .4s ease-out; }
    @keyframes atc-count-pulse { 0% { transform: scale(1);} 40% { transform: scale(1.12);} 100% { transform: scale(1);} }
    .atc-count-chip .sp-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--brand); }
    .atc-count-chip.empty { background: #F1F2F4; color: var(--text-muted); }
    .atc-count-chip.empty .sp-dot { background: var(--text-muted); }
    .atc-select-all { background: none; border: none; color: var(--brand); font-size: 12px; font-weight: 600; cursor: pointer; padding: 4px 2px; text-decoration: none; }
    .atc-select-all:hover { text-decoration: underline; }
    .atc-select-all[disabled] { color: var(--text-subtle); cursor: default; text-decoration: none; }

    .sp-grid { display: grid; gap: 14px; grid-template-columns: repeat(3, 1fr); }
    .sp-card {
      position: relative; display: flex; flex-direction: column;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 10px; cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background-color .18s ease;
      opacity: 0; transform: translateY(6px);
      animation: sp-enter .32s cubic-bezier(.2,.8,.25,1) forwards;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    @keyframes sp-enter { to { opacity: 1; transform: translateY(0); } }
    .sp-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); border-color: var(--border-strong); }
    .sp-card:active { transform: scale(.98); transition-duration: .1s; }
    .sp-card.selected { border: 2px solid var(--brand); padding: 9px; background: var(--card); }
    .sp-card.selected:hover { border-color: var(--brand); box-shadow: 0 6px 16px -6px rgba(55,189,105,.45); }
    .sp-card[data-compatible="false"] { opacity: .55; cursor: not-allowed; }
    .sp-card[data-compatible="false"]:hover { transform: none; box-shadow: none; border-color: var(--border); }
    .sp-card[data-compatible="false"]:active { transform: none; }

    .sp-img-wrap { position: relative; aspect-ratio: 4 / 3; border-radius: 10px; overflow: hidden; background: #F1F2F4; margin-bottom: 8px; }
    .sp-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s ease, opacity .25s ease; }
    .sp-card:hover .sp-img-wrap img { transform: scale(1.03); }
    /* Neutral placeholder used when Pollinations fails or times out */
    .sp-img-wrap.is-placeholder { background: var(--card-subtle) !important; }
    .sp-img-wrap.is-placeholder img { display: none !important; }
    .sp-img-ph { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 8px; pointer-events: none; }
    .sp-img-ph i, .sp-img-ph svg { width: 32px; height: 32px; color: var(--text-subtle) !important; stroke: var(--text-subtle) !important; stroke-width: 1.5px; }
    .sp-img-ph .sp-img-ph-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-align: center; line-height: 1.2; max-width: 100%; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    /* Selected-state overlay on the image area (never tints placeholder bg) */
    .sp-img-wrap .sp-img-overlay { position: absolute; inset: 0; background: rgba(55,189,105,.12); opacity: 0; transition: opacity .18s ease; pointer-events: none; z-index: 1; }
    .sp-card.selected .sp-img-wrap .sp-img-overlay { opacity: 1; }

    .sp-check-badge { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 999px; background: var(--brand); display: none; align-items: center; justify-content: center; box-shadow: 0 4px 10px -3px rgba(55,189,105,.5), 0 0 0 3px rgba(255,255,255,.9); transform: scale(0); transition: transform .25s cubic-bezier(.2,1.4,.4,1.1); z-index: 2; }
    .sp-check-badge i, .sp-check-badge svg { width: 16px; height: 16px; color: #fff !important; stroke: #fff !important; stroke-width: 3px; }
    .sp-card.selected .sp-check-badge { display: inline-flex; transform: scale(1); }

    .sp-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.5em; }
    .sp-latin { font-size: 12px; font-weight: 500; font-style: italic; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-pill { margin-top: 8px; align-self: flex-start; display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; background: var(--brand-soft); color: var(--brand-hover); font-size: 11px; font-weight: 700; letter-spacing: .02em; }
    .sp-pill .dot { width: 5px; height: 5px; border-radius: 999px; background: var(--brand); }
    .sp-card[data-compatible="false"] .sp-pill { background: #FFE5EA; color: #B00020; }
    .sp-card[data-compatible="false"] .sp-pill .dot { background: transparent; border: 1.5px solid #B00020; width: 6px; height: 6px; border-radius: 0; }

    .sp-empty { padding: 36px 12px; text-align: center; color: var(--text-muted); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .sp-empty .ic { width: 40px; height: 40px; border-radius: 999px; background: #F1F2F4; display: inline-flex; align-items: center; justify-content: center; color: var(--text-muted); }
    .sp-empty .ic i { width: 20px; height: 20px; }

    .atc-field select, .atc-field textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 14px; font-family: inherit; outline: none; background: #fff; transition: border-color .15s, box-shadow .15s; }
    .atc-field select:focus, .atc-field textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .atc-field select { height: 40px; }
    .atc-field textarea { resize: none; }
    .atc-count { text-align: right; font-size: 11px; color: var(--text-subtle); }
    .atc-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--border); background: #fff; flex-shrink: 0; flex-wrap: wrap; }
    .atc-field--hidden { display: none !important; }
    .btn-outline { background: #fff; color: var(--brand); border: 1.5px solid var(--brand); padding: 10px 18px; border-radius: 999px; font-weight: 600; cursor: pointer; transition: .15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-outline:hover { background: var(--brand-soft); }

    @media (max-width: 759px) and (min-width: 600px) {
      .atc-modal { width: min(600px, calc(100vw - 24px)); }
      .sp-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
    @media (max-width: 599px) {
      .atc-overlay { background: rgba(15,23,42,.55); }
      .atc-modal {
        top: auto !important; left: 0 !important; right: 0; bottom: 0;
        transform: translateY(100%);
        width: 100%; max-width: 100%;
        max-height: 92vh; height: 92vh;
        border-radius: 20px 20px 0 0; border: none;
        border-top: 1px solid var(--border);
        box-shadow: 0 -16px 40px -10px rgba(15,23,42,.22);
        transition: transform .3s cubic-bezier(.2,.85,.25,1), opacity .25s ease;
      }
      .atc-modal.open { transform: translateY(0) !important; }
      .atc-grab { display: block; width: 36px; height: 4px; border-radius: 999px; background: #D1D5DB; margin: 8px auto 4px; flex-shrink: 0; cursor: grab; }
      .atc-grab:active { cursor: grabbing; }
      .atc-head { position: sticky; top: 0; padding: 10px 14px 12px; z-index: 3; }
      .atc-body { padding: 14px 14px 18px; }
      .atc-foot { position: sticky; bottom: 0; padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0px)); z-index: 3; box-shadow: 0 -6px 14px -10px rgba(15,23,42,.18); }
      .atc-foot .btn { flex: 1; min-height: 44px; justify-content: center; }
      .sp-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .sp-name { font-size: 13px; min-height: 2.4em; }
      .sp-latin { font-size: 11px; }
      .sp-pill { font-size: 10px; padding: 2px 7px; }
      .sp-card { padding: 8px; }
      .sp-card.selected { padding: 7px; }
    }
    @media (max-width: 374px) {
      .atc-body { padding: 12px 10px 14px; }
      .atc-head { padding: 10px 10px 10px; gap: 8px; }
      .atc-foot { padding: 10px 10px calc(10px + env(safe-area-inset-bottom, 0px)); }
      .sp-grid { gap: 8px; }
      .sp-card { padding: 7px; border-radius: 12px; }
      .sp-card.selected { padding: 6px; }
      .sp-name { font-size: 12px; min-height: 2.4em; }
      .sp-latin { font-size: 10px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .sp-card { animation: none; opacity: 1; transform: none; }
      .atc-modal, .atc-overlay { transition-duration: .01ms; }
      .sp-check-badge { transition: none; }
      .atc-count-chip.pulse { animation: none; }
    }

    /* Small toast used by the add-to-cart modal */
    .ze-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0F172A; color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 10px 30px -8px rgba(0,0,0,.4); opacity: 0; pointer-events: none; transition: .25s; z-index: 200; max-width: 360px; }
    .ze-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* =========== Wallet pill (header) — shared =========== */
    .ze-wallet-pill { display: none; align-items: stretch; flex-direction: column; padding: 0; background: #fff; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: .15s ease; box-shadow: var(--shadow-xs); margin-left: 4px; height: 44px; min-width: 110px; max-width: 220px; position: relative; text-align: left; font-family: inherit; }
    .ze-wallet-pill.is-ready { display: inline-flex; }
    .ze-wallet-pill:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .ze-wallet-pill .ze-wp-site { display: flex; align-items: center; gap: 4px; padding: 4px 10px 0; max-width: 100%; font-size: 10.5px; font-weight: 600; color: var(--text-muted); line-height: 1.1; cursor: pointer; border-radius: 11px 11px 0 0; }
    .ze-wallet-pill .ze-wp-site-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .ze-wallet-pill .ze-wp-site-chev { flex-shrink: 0; opacity: .7; }
    .ze-wallet-pill .ze-wp-site:hover { background: #F1F2F4; }
    .ze-wallet-pill .ze-wp-amt { padding: 2px 12px 6px; font-size: 14px; font-weight: 700; line-height: 1.1; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; color: var(--brand-hover); border-radius: 0 0 11px 11px; }
    .ze-wallet-pill .ze-wp-amt.ze-wp-amber { color: #B45309; }
    .ze-wallet-pill .ze-wp-amt.ze-wp-red { color: var(--danger); }
    .ze-wp-pop { position: absolute; top: calc(100% + 6px); right: 0; min-width: 280px; background: #fff; border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 8px; display: none; z-index: 70; }
    .ze-wp-pop.open { display: block; animation: zewpIn .18s ease-out; }
    @keyframes zewpIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .ze-wp-pop .ze-wp-head { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); padding: 8px 10px 6px; }
    .ze-wp-opt { display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: 10px; cursor: pointer; font-size: 13px; color: var(--text); }
    .ze-wp-opt:hover { background: #F1F2F4; }
    .ze-wp-opt.active { background: var(--brand-soft); color: var(--brand-hover); font-weight: 600; }
    .ze-wp-opt .ze-wp-opt-tick { margin-left: auto; color: var(--brand); opacity: 0; }
    .ze-wp-opt.active .ze-wp-opt-tick { opacity: 1; }
    .ze-wp-opt-name { flex: 1; min-width: 0; }
    .ze-wp-opt-city { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    @media (max-width: 520px) {
      .ze-wallet-pill .ze-wp-site { display: none; }
      .ze-wallet-pill .ze-wp-amt { padding: 0 12px; height: 100%; display: flex; align-items: center; border-radius: 11px; }
      .ze-wallet-pill { min-width: 70px; }
    }
    @media (max-width: 767px) {
      .ze-wallet-pill { height: 40px; }
    }
    /* Mobile drawer wallet row */
    .ze-wp-mobile-row { display: flex; flex-direction: column; padding: 10px 12px; border-radius: 10px; cursor: pointer; gap: 4px; text-decoration: none; color: inherit; }
