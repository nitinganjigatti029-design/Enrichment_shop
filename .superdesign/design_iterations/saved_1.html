<script>
(function(){
  const DB = window.DB;
  const ZE = window.ZE;

  if (ZE.user.role() === 'vendor') { window.location.replace('admin_dashboard_1.html'); return; }

  /* ---------- Pre-warm images ---------- */
  ZE.prewarm(DB.PRODUCTS.map(p => p.imgSmall).filter(Boolean));

  /* ---------- User slot (avatar / sign-in) ---------- */
  function renderUserSlot() {
    const slot = document.getElementById('userSlot');
    if (!slot) return;
    if (!ZE.user.isSignedIn()) {
      slot.innerHTML = `<a href="login_1.html" class="btn-brand-cta" style="text-decoration:none; padding:8px 16px;"><i data-lucide="log-in" class="w-4 h-4"></i> Sign in</a>`;
      ZE.refreshIcons();
      return;
    }
    const u = ZE.user.resolve() || {};
    const role = ZE.user.role();
    const avatarUrl = u.avatar || u.img || 'https://image.pollinations.ai/prompt/professional%20portrait%20headshot?width=80&height=80&seed=401&nologo=true';
    const name = u.name || 'Account';
    if (role === 'vendor') {
      slot.innerHTML = `
        <img class="avatar" id="userAvatar" src="${avatarUrl}" alt="${name}" style="margin-left:0;"/>
        <div class="dropdown dropdown-right" id="userDropdown">
          <div class="dd-section">${name}</div>
          <div class="dd-item" data-act="dashboard"><i data-lucide="layout-dashboard" class="w-4 h-4"></i><span class="dd-label">Go to Admin dashboard</span></div>
          <div class="dd-item" data-act="signout"><i data-lucide="log-out" class="w-4 h-4"></i><span class="dd-label">Sign out</span></div>
        </div>
      `;
    } else {
      slot.innerHTML = `
        <img class="avatar" id="userAvatar" src="${avatarUrl}" alt="${name}" style="margin-left:0;"/>
        <div class="dropdown dropdown-right" id="userDropdown">
          <div class="dd-section">${name}</div>
          <div class="dd-item" data-act="profile"><i data-lucide="user" class="w-4 h-4"></i><span class="dd-label">Profile</span></div>
          <div class="dd-item" data-act="orders"><i data-lucide="package" class="w-4 h-4"></i><span class="dd-label">Orders</span></div>
          <div class="dd-item active" data-act="saved"><i data-lucide="heart" class="w-4 h-4"></i><span class="dd-label">Saved</span></div>
          <div class="dd-item" id="personaSwitchItem" data-persona-item data-act="persona" data-mode-switch="to-other-persona" onclick="window.location.reload();return false;"><i data-lucide="user-cog" class="w-4 h-4"></i><span class="dd-label" data-persona-label>Switch persona</span></div><div class="dd-item" data-act="admin" data-mode-switch="to-admin" onclick="window.location.href='admin_dashboard_1.html';return false;"><i data-lucide="shield" class="w-4 h-4"></i><span class="dd-label">Switch to Admin view</span></div>
          <div class="dd-item" data-act="signout"><i data-lucide="log-out" class="w-4 h-4"></i><span class="dd-label">Sign out</span></div>
        </div>
      `;
    }
    const avatar = document.getElementById('userAvatar');
    const dd = document.getElementById('userDropdown');
    avatar.addEventListener('click', (e) => {
      e.stopPropagation();
      closeAllDropdowns(dd);
      dd.classList.toggle('open');
    });
    dd.querySelectorAll('.dd-item').forEach(it => {
      it.addEventListener('click', (e) => {
        e.stopPropagation();
        dd.classList.remove('open');
        const act = it.dataset.act;
        if (act === 'profile') window.location.href = 'profile_1.html';
        else if (act === 'orders') window.location.href = 'orders_1.html';
        else if (act === 'saved') window.scrollTo({ top: 0, behavior: 'smooth' });
        else if (act === 'admin') window.location.href = 'admin_dashboard_1.html';
        else if (act === 'dashboard') window.location.href = 'admin_dashboard_1.html';
        else if (act === 'signout') { ZE.user.signOut(); window.location.href = 'login_1.html'; }
      });
    });
    ZE.refreshIcons();
  }

  /* ---------- State ---------- */
  // speciesIds: [] = All species (multi-select OR logic). Persists via localStorage
  // under the same key used in index_1.html so selection travels between pages.
  const SPECIES_SEL_KEY = 'ze_species_selection_v1';
  function readSpeciesSelection() {
    try {
      const raw = localStorage.getItem(SPECIES_SEL_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      if (!Array.isArray(arr)) return [];
      const valid = new Set(DB.SPECIES.map(s => s.id));
      return arr.filter(id => valid.has(id));
    } catch { return []; }
  }
  function writeSpeciesSelection(arr) {
    try { localStorage.setItem(SPECIES_SEL_KEY, JSON.stringify(arr || [])); } catch {}
  }

  // ---------- URL-backed filter state (cat, sort) ----------
  // Taxonomy: the canonical category row taxonomy — always rendered in this order.
  // `All` is exclusive (clears specifics); specifics multi-select; `Deals` / `Trending` are curated.
  const CAT_TAXONOMY = [
    { id: 'tag_sen',  name: 'Sensory',   color: '#00D6C9', kind: 'tag' },
    { id: 'tag_cog',  name: 'Cognitive', color: '#8479F9', kind: 'tag' },
    { id: 'tag_phy',  name: 'Physical',  color: '#FA6140', kind: 'tag' },
    { id: 'tag_soc',  name: 'Social',    color: '#E4B819', kind: 'tag' },
    { id: 'tag_food', name: 'Food',      color: '#37BD69', kind: 'tag' },
    { id: 'deals',    name: 'Deals',     color: '#FA6140', kind: 'curated', icon: 'tag' },
    { id: 'trending', name: 'Trending',  color: '#FFA300', kind: 'curated', icon: 'flame' }
  ];
  const VALID_CAT_IDS = new Set(CAT_TAXONOMY.map(c => c.id));

  const SORT_OPTIONS = [
    { key: 'recent',     label: 'Recently saved' },
    { key: 'price_asc',  label: 'Price: low → high' },
    { key: 'price_desc', label: 'Price: high → low' },
    { key: 'rating',     label: 'Rating' },
    { key: 'name',       label: 'Name A → Z' }
  ];
  const VALID_SORT_KEYS = new Set(SORT_OPTIONS.map(s => s.key));

  function readUrlFilters() {
    try {
      const sp = new URLSearchParams(window.location.search);
      const cats = (sp.get('cat') || '').split(',').map(s => s.trim()).filter(s => VALID_CAT_IDS.has(s));
      let sort = sp.get('sort') || 'recent';
      if (!VALID_SORT_KEYS.has(sort)) sort = 'recent';
      return { selectedCats: cats, sortKey: sort };
    } catch { return { selectedCats: [], sortKey: 'recent' }; }
  }

  function writeUrlFilters() {
    try {
      const sp = new URLSearchParams(window.location.search);
      if (state.selectedCats && state.selectedCats.length) sp.set('cat', state.selectedCats.join(','));
      else sp.delete('cat');
      if (state.sortKey && state.sortKey !== 'recent') sp.set('sort', state.sortKey);
      else sp.delete('sort');
      const qs = sp.toString();
      const url = window.location.pathname + (qs ? '?' + qs : '') + window.location.hash;
      window.history.replaceState(null, '', url);
    } catch {}
  }

  const _initUrl = readUrlFilters();
  const state = {
    speciesIds: readSpeciesSelection(), // [] = All
    selectedCats: _initUrl.selectedCats, // [] = All category chips
    sortKey: _initUrl.sortKey,           // 'recent' | 'price_asc' | 'price_desc' | 'rating' | 'name'
    search: ''
  };

  /* ---------- Helpers ---------- */
  // "Recently saved" means newest-first. readSaved returns insertion order (oldest→newest);
  // reverse it so the most-recently-added saved items appear first.
  function orderedSavedProducts() {
    const ids = ZE.saved.read().slice().reverse();
    return ids.map(id => DB.byId(DB.PRODUCTS, id)).filter(Boolean);
  }

  // Predicates for the two curated chips — kept as pure functions so they can be reused
  // by filterList() AND by the "does any saved item match this chip?" visibility check.
  function isDeal(p)     { return (p && (p.discount > 0 || p.onSale === true || p.priority === '01')); }
  function isTrending(p) { return (p && (p.hot === true || (typeof p.uses === 'number' && p.uses >= 10))); }

  function filterList(products) {
    let list = products.slice();
    // Species multi-select (OR logic — match if ANY selected species is compatible)
    if (Array.isArray(state.speciesIds) && state.speciesIds.length > 0) {
      const sel = state.speciesIds;
      list = list.filter(p => {
        const compat = Array.isArray(p.compatibleSpecies) ? p.compatibleSpecies : [];
        return sel.some(id => compat.indexOf(id) !== -1);
      });
    }
    // Category chips (OR logic across selected chips; empty = All)
    if (Array.isArray(state.selectedCats) && state.selectedCats.length > 0) {
      const tags = state.selectedCats.filter(id => id.startsWith('tag_'));
      const deals    = state.selectedCats.indexOf('deals')    !== -1;
      const trending = state.selectedCats.indexOf('trending') !== -1;
      list = list.filter(p => {
        const pTags = Array.isArray(p.tags) ? p.tags : [];
        if (tags.length && tags.some(t => pTags.indexOf(t) !== -1)) return true;
        if (deals    && isDeal(p))     return true;
        if (trending && isTrending(p)) return true;
        return false;
      });
    }
    if (state.search) {
      const q = state.search.toLowerCase();
      list = list.filter(p => p.name.toLowerCase().indexOf(q) !== -1);
    }
    switch (state.sortKey) {
      case 'price_asc':  list.sort((a,b) => (a.price.material+a.price.labor) - (b.price.material+b.price.labor)); break;
      case 'price_desc': list.sort((a,b) => (b.price.material+b.price.labor) - (a.price.material+a.price.labor)); break;
      case 'rating':     list.sort((a,b) => (b.engagement || 0) - (a.engagement || 0)); break;
      case 'name':       list.sort((a,b) => (a.name || '').localeCompare(b.name || '')); break;
      // 'recent' leaves orderedSavedProducts() ordering intact (newest saved → first)
    }
    return list;
  }

  /* ---------- Header badges ---------- */
  function renderBadges() {
    const orders = ZE.orders.count();
    const ob = document.getElementById('ordersBadge');
    if (orders > 0) { ob.style.display = 'inline-flex'; ob.textContent = orders; } else ob.style.display = 'none';

    const saved = ZE.saved.count();
    const sb = document.getElementById('savedBadge');
    if (saved > 0) { sb.style.display = 'inline-flex'; sb.textContent = saved; } else sb.style.display = 'none';

    const cart = ZE.cart.count();
    const cb = document.getElementById('cartBadge');
    if (cart > 0) { cb.style.display = 'inline-flex'; cb.textContent = cart; } else cb.style.display = 'none';
  }

  /* ---------- Header nav wiring ---------- */
  document.getElementById('ordersBtn').addEventListener('click', () => {
    window.location.href = 'orders_1.html';
  });
  document.getElementById('cartBtn').addEventListener('click', () => {
    window.location.href = 'cart_1.html';
  });
  document.getElementById('savedBtn').addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  /* ---------- Species multi-select picker (Flipkart/Myntra-style) ---------- */
  (function initSpeciesMulti(){
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    const dd         = document.getElementById('speciesDropdown');
    const sel        = document.getElementById('speciesSelector');
    const stackEl    = document.getElementById('speciesAvatarStack');
    const lb         = document.getElementById('speciesLabel');
    const backdrop   = document.getElementById('speciesBackdrop');
    const chipRail   = document.getElementById('speciesChipRail');
    const chipListEl = document.getElementById('speciesChipList');
    const chipClear  = document.getElementById('speciesChipClear');

    let draftSet = new Set(state.speciesIds);

    function renderTrigger() {
      const ids = state.speciesIds;
      sel.classList.toggle('msp-has-selection', ids.length > 0);
      stackEl.innerHTML = '';
      if (ids.length === 0) {
        const span = document.createElement('span');
        span.className = 'pill-ico';
        span.innerHTML = '<i data-lucide="paw-print" class="w-4 h-4"></i>';
        stackEl.appendChild(span);
        lb.textContent = 'All species';
      } else {
        const showAvatars = ids.slice(0, Math.min(2, ids.length));
        showAvatars.forEach(id => {
          const sp = DB.byId(DB.SPECIES, id);
          if (!sp) return;
          const img = document.createElement('img');
          img.className = 'pill-avatar';
          img.src = DB.img(sp.imgQ, 60, 60, sp.seed);
          img.alt = sp.name;
          img.loading = 'eager';
          stackEl.appendChild(img);
        });
        if (ids.length > 2) {
          const badge = document.createElement('span');
          badge.className = 'msp-count-badge';
          badge.textContent = '+' + (ids.length - 2);
          stackEl.appendChild(badge);
        }
        if (ids.length === 1) {
          const sp = DB.byId(DB.SPECIES, ids[0]);
          lb.textContent = sp ? sp.name : '1 species';
        } else if (ids.length === 2) {
          const sp = DB.byId(DB.SPECIES, ids[0]);
          lb.textContent = (sp ? sp.name : '') + ' +1';
        } else {
          lb.textContent = ids.length + ' species';
        }
      }
      if (window.lucide && lucide.createIcons) lucide.createIcons();
    }

    function renderChipRail() {
      const ids = state.speciesIds;
      if (!ids.length) {
        chipRail.classList.remove('show');
        chipListEl.innerHTML = '';
        return;
      }
      chipRail.classList.add('show');
      chipListEl.innerHTML = ids.map(id => {
        const sp = DB.byId(DB.SPECIES, id);
        if (!sp) return '';
        return `<span class="msp-chip" data-sp="${sp.id}">
          <img src="${DB.img(sp.imgQ, 60, 60, sp.seed)}" alt=""/>
          <span>${esc(sp.name)}</span>
          <button type="button" aria-label="Remove ${esc(sp.name)}" data-remove="${sp.id}">
            <i data-lucide="x"></i>
          </button>
        </span>`;
      }).join('');
      chipListEl.querySelectorAll('button[data-remove]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.remove;
          state.speciesIds = state.speciesIds.filter(x => x !== id);
          draftSet.delete(id);
          writeSpeciesSelection(state.speciesIds);
          applyAll();
        });
      });
      if (window.lucide && lucide.createIcons) lucide.createIcons();
    }

    function buildPanel() {
      dd.innerHTML = `
        <div class="msp-header">
          <span class="msp-title">Select species</span>
          <button type="button" class="msp-clear" id="mspClear" hidden>Clear</button>
        </div>
        <div class="msp-search">
          <i data-lucide="search"></i>
          <input id="mspSearch" type="search" placeholder="Search species…" autocomplete="off" aria-label="Search species"/>
          <button type="button" class="msp-search-clear" id="mspSearchClear" aria-label="Clear search">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="msp-list" id="mspList" role="listbox" aria-multiselectable="true"></div>
        <div class="msp-footer">
          <span class="msp-footer-count empty" id="mspCount">0 selected</span>
          <button type="button" class="msp-apply" id="mspApply">Apply</button>
        </div>
      `;
    }
    buildPanel();

    const searchInput = dd.querySelector('#mspSearch');
    const searchClear = dd.querySelector('#mspSearchClear');
    const listEl      = dd.querySelector('#mspList');
    const applyBtn    = dd.querySelector('#mspApply');
    const clearBtn    = dd.querySelector('#mspClear');
    const countEl     = dd.querySelector('#mspCount');

    function renderList(query) {
      const q = (query || '').trim().toLowerCase();
      const filtered = !q
        ? DB.SPECIES.slice()
        : DB.SPECIES.filter(sp =>
            sp.name.toLowerCase().indexOf(q) !== -1 ||
            (sp.latin && sp.latin.toLowerCase().indexOf(q) !== -1)
          );
      if (!filtered.length) {
        listEl.innerHTML = `<div class="msp-empty">No species match "${esc(query)}"</div>`;
        return;
      }
      listEl.innerHTML = filtered.map(sp => {
        const isSel = draftSet.has(sp.id);
        return `<div class="msp-row ${isSel ? 'selected' : ''}" data-sp="${sp.id}" role="option" tabindex="0" aria-selected="${isSel}">
          <div class="msp-avatar"><img src="${DB.img(sp.imgQ, 80, 80, sp.seed)}" alt="" loading="lazy"/></div>
          <div class="msp-text">
            <div class="msp-name">${esc(sp.name)}</div>
            <div class="msp-latin">${esc(sp.latin || '')}</div>
          </div>
          <span class="msp-cb"><i data-lucide="check"></i></span>
        </div>`;
      }).join('');
      listEl.querySelectorAll('.msp-row').forEach(row => {
        const toggle = (e) => {
          e && e.stopPropagation();
          const id = row.dataset.sp;
          if (draftSet.has(id)) draftSet.delete(id);
          else draftSet.add(id);
          const nowSel = draftSet.has(id);
          row.classList.toggle('selected', nowSel);
          row.setAttribute('aria-selected', String(nowSel));
          syncFooter();
          if (window.matchMedia('(min-width: 761px)').matches) commitDraftLive();
        };
        row.addEventListener('click', toggle);
        row.addEventListener('keydown', (e) => {
          if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(e); }
        });
      });
      if (window.lucide && lucide.createIcons) lucide.createIcons();
    }

    function syncFooter() {
      const n = draftSet.size;
      countEl.textContent = n + ' selected';
      countEl.classList.toggle('empty', n === 0);
      clearBtn.hidden = n === 0;
    }

    function commitDraftLive() {
      const next = Array.from(draftSet);
      state.speciesIds = next;
      writeSpeciesSelection(next);
      renderTrigger();
      renderChipRail();
      render();
    }

    function applyAll() {
      renderTrigger();
      renderChipRail();
      render();
    }

    function openPanel() {
      closeAllDropdowns(dd);
      draftSet = new Set(state.speciesIds);
      searchInput.value = '';
      searchClear.classList.remove('show');
      renderList('');
      syncFooter();
      dd.classList.add('open');
      sel.setAttribute('aria-expanded', 'true');
      if (window.matchMedia('(max-width: 760px)').matches) backdrop.classList.add('show');
      if (!matchMedia('(pointer: coarse)').matches) setTimeout(() => searchInput.focus(), 50);
    }
    function closePanel() {
      dd.classList.remove('open');
      backdrop.classList.remove('show');
      sel.setAttribute('aria-expanded', 'false');
    }

    sel.addEventListener('click', (e) => {
      e.stopPropagation();
      if (dd.classList.contains('open')) closePanel();
      else openPanel();
    });
    dd.addEventListener('click', (e) => e.stopPropagation());
    backdrop.addEventListener('click', () => closePanel());

    let searchTimer = null;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const v = searchInput.value;
      searchClear.classList.toggle('show', v.length > 0);
      searchTimer = setTimeout(() => renderList(v), 80);
    });
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') e.preventDefault();
      if (e.key === 'Escape') { e.preventDefault(); closePanel(); }
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('show');
      renderList('');
      searchInput.focus();
    });

    clearBtn.addEventListener('click', () => {
      draftSet.clear();
      renderList(searchInput.value);
      syncFooter();
      if (window.matchMedia('(min-width: 761px)').matches) commitDraftLive();
    });

    applyBtn.addEventListener('click', () => {
      const next = Array.from(draftSet);
      state.speciesIds = next;
      writeSpeciesSelection(next);
      applyAll();
      closePanel();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && dd.classList.contains('open')) closePanel();
    });

    chipClear.addEventListener('click', () => {
      state.speciesIds = [];
      draftSet.clear();
      writeSpeciesSelection([]);
      applyAll();
    });

    renderTrigger();
    renderChipRail();

    // Expose a rehydrate hook so clearAllFilters() can refresh the trigger + rail
    // without having to re-init the whole picker.
    window.__mspRehydrate = function() {
      draftSet = new Set(state.speciesIds);
      renderTrigger();
      renderChipRail();
    };
  })();

  /* ---------- Sort dropdown (radio-style, instant-apply) ---------- */
  (function initSort(){
    const dd  = document.getElementById('sortDropdown');
    const sel = document.getElementById('sortSelector');

    function renderItems() {
      dd.innerHTML = SORT_OPTIONS.map(opt => `
        <div class="dd-item ${opt.key === state.sortKey ? 'active' : ''}"
             role="option" tabindex="-1" data-sort="${opt.key}" aria-selected="${opt.key === state.sortKey}">
          <span class="sort-radio" aria-hidden="true"></span>
          <span class="dd-label">${opt.label}</span>
        </div>
      `).join('');
      dd.querySelectorAll('.dd-item').forEach(it => {
        it.addEventListener('click', (e) => { e.stopPropagation(); chooseSort(it.dataset.sort); });
        it.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); chooseSort(it.dataset.sort); }
          else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
            e.preventDefault();
            const items = Array.from(dd.querySelectorAll('.dd-item'));
            const i = items.indexOf(it);
            const n = e.key === 'ArrowDown' ? (i + 1) % items.length : (i - 1 + items.length) % items.length;
            items[n].focus();
          } else if (e.key === 'Escape') {
            e.preventDefault(); closeSort(); sel.focus();
          }
        });
      });
    }

    function updateTrigger() {
      const opt = SORT_OPTIONS.find(o => o.key === state.sortKey) || SORT_OPTIONS[0];
      const triggerLabel = document.getElementById('sortTriggerLabel');
      const sortLabel = document.getElementById('sortLabel');
      // "Sort" alone when default; "Sort: <label>" otherwise
      if (state.sortKey === 'recent') {
        triggerLabel.firstChild.nodeValue = 'Sort ';
        sortLabel.textContent = '';
        sel.classList.remove('has-sort');
      } else {
        triggerLabel.firstChild.nodeValue = 'Sort: ';
        sortLabel.textContent = opt.label;
        sel.classList.add('has-sort');
      }
    }

    function chooseSort(key) {
      if (!VALID_SORT_KEYS.has(key)) return;
      state.sortKey = key;
      writeUrlFilters();
      updateTrigger();
      renderItems(); // refresh active radio
      closeSort();
      render();
    }

    function openSort() {
      closeAllDropdowns(dd);
      dd.classList.add('open');
      sel.setAttribute('aria-expanded', 'true');
      // Focus the current option for keyboard users
      requestAnimationFrame(() => {
        const active = dd.querySelector('.dd-item.active');
        if (active) active.focus();
      });
    }
    function closeSort() {
      dd.classList.remove('open');
      sel.setAttribute('aria-expanded', 'false');
    }

    sel.addEventListener('click', (e) => {
      e.stopPropagation();
      if (dd.classList.contains('open')) closeSort(); else openSort();
    });
    sel.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openSort(); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); openSort(); }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && dd.classList.contains('open')) { closeSort(); sel.focus(); }
    });

    // Expose for init-time calls after state rehydrates
    window.__sortRerender = () => { renderItems(); updateTrigger(); };
    renderItems();
    updateTrigger();
  })();

  function closeAllDropdowns(except) {
    document.querySelectorAll('.dropdown.open, .msp-panel.open').forEach(d => { if (d !== except) d.classList.remove('open'); });
    const bd = document.getElementById('speciesBackdrop');
    const sp = document.getElementById('speciesDropdown');
    if (bd && sp && !sp.classList.contains('open')) bd.classList.remove('show');
    const selEl = document.getElementById('speciesSelector');
    if (selEl && sp && !sp.classList.contains('open')) selEl.setAttribute('aria-expanded', 'false');
    // Sort trigger — also reset aria-expanded when its dropdown is closed
    const sortSel = document.getElementById('sortSelector');
    const sortDd = document.getElementById('sortDropdown');
    if (sortSel && sortDd && !sortDd.classList.contains('open')) sortSel.setAttribute('aria-expanded', 'false');
  }
  document.addEventListener('click', () => closeAllDropdowns(null));

  /* ---------- Small toast (used by add-to-cart modal) ---------- */
  function showAtcToast(msg) {
    let t = document.querySelector('.ze-toast');
    if (!t) { t = document.createElement('div'); t.className = 'ze-toast'; document.body.appendChild(t); }
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._hideTimer);
    t._hideTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  /* ---------- Add-to-cart species picker modal (gallery redesign) ---------- */
  const escAtc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const atcEls = {
    overlay: document.getElementById('atcOverlay'),
    modal:   document.getElementById('atcModal'),
    grab:    document.getElementById('atcGrab'),
    thumb:   document.getElementById('atcThumb'),
    title:   document.getElementById('atcTitle'),
    sub:     document.getElementById('atcSub'),
    close:   document.getElementById('atcClose'),
    cancel:  document.getElementById('atcCancel'),
    confirm: document.getElementById('atcConfirm'),
    spInput: document.getElementById('atcSpeciesInput'),
    spList:  document.getElementById('atcSpeciesList'),
    searchClear: document.getElementById('atcSearchClear'),
    chipAll:  document.getElementById('atcChipAll'),
    chipCompat: document.getElementById('atcChipCompat'),
    countChip: document.getElementById('atcCountChip'),
    countText: document.getElementById('atcCountText'),
    selectAllBtn: document.getElementById('atcSelectAll'),
    encField: document.getElementById('atcEnclosureField'),
    encSel:  document.getElementById('atcEnclosure'),
    note:    document.getElementById('atcNote'),
    noteCount: document.getElementById('atcNoteCount')
  };
  const atcState = { product: null, selectedSet: new Set(), filter: 'compat' };

  function atcCompatSet() {
    const prod = atcState.product;
    if (!prod) return new Set();
    const ids = Array.isArray(prod.compatibleSpecies) ? prod.compatibleSpecies : [];
    if (!ids.length) return new Set(DB.SPECIES.map(s => s.id));
    return new Set(ids);
  }

  function atcUpdateConfirm() {
    const size = atcState.selectedSet.size;
    atcEls.confirm.disabled = false;
    if (size >= 2) atcEls.confirm.textContent = `Add ${size} to cart`;
    else atcEls.confirm.textContent = 'Add to cart';
  }

  function atcUpdateEnclosureVisibility() {
    const size = atcState.selectedSet.size;
    if (size === 1) {
      const sid = Array.from(atcState.selectedSet)[0];
      atcPopulateEnclosures(sid);
      atcEls.encField.classList.remove('atc-field--hidden');
    } else {
      atcEls.encField.classList.add('atc-field--hidden');
      atcEls.encSel.innerHTML = '<option value="">— Not specified —</option>';
    }
  }

  function atcUpdateCountChip(pulse) {
    const totalShown = atcEls.spList.querySelectorAll('.sp-card').length;
    const n = atcState.selectedSet.size;
    atcEls.countText.textContent = `${n} selected · ${totalShown} species`;
    atcEls.countChip.classList.toggle('empty', n === 0);
    if (pulse) {
      atcEls.countChip.classList.remove('pulse');
      void atcEls.countChip.offsetWidth;
      atcEls.countChip.classList.add('pulse');
    }
  }

  function atcUpdateSelectAllState() {
    const compatIds = Array.from(atcCompatSet());
    const allSelected = compatIds.length > 0 && compatIds.every(id => atcState.selectedSet.has(id));
    atcEls.selectAllBtn.textContent = allSelected ? 'Clear selection' : 'Select all compatible';
    atcEls.selectAllBtn.disabled = compatIds.length === 0;
  }

  // Shimmer-first image loader with single retry + neutral placeholder fallback.
  function atcLoadSpeciesImage(wrap) {
    if (!wrap || wrap.dataset.spImgDone === '1') return;
    const imgEl = wrap.querySelector('img');
    const url = wrap.dataset.spImgUrl;
    const name = wrap.dataset.spName || '';
    if (!imgEl || !url) { atcRenderSpeciesPlaceholder(wrap, name); return; }
    let settled = false;
    const probe = new Image();
    const cleanup = () => {
      probe.onload = null;
      probe.onerror = null;
    };
    const onSuccess = () => {
      if (settled) return;
      settled = true;
      cleanup();
      if (timeoutId) clearTimeout(timeoutId);
      imgEl.src = url;
      // Fade the real image in once the DOM img also decodes.
      imgEl.onload = () => {
        imgEl.style.opacity = '1';
        wrap.classList.add('img-loaded');
      };
      // If DOM img somehow fails after probe success, still show placeholder.
      imgEl.onerror = () => atcRenderSpeciesPlaceholder(wrap, name);
      wrap.dataset.spImgDone = '1';
    };
    const onFail = () => {
      if (settled) return;
      settled = true;
      cleanup();
      if (timeoutId) clearTimeout(timeoutId);
      const retries = parseInt(wrap.dataset.spRetry || '0', 10);
      if (retries < 1) {
        // Retry once with a freshly randomized seed.
        wrap.dataset.spRetry = String(retries + 1);
        const q = wrap.dataset.spImgQ || name;
        const newSeed = Math.floor(Math.random() * 1000000) + 1;
        const retryUrl = (typeof DB.img === 'function')
          ? DB.img(q, 360, 270, newSeed)
          : url;
        wrap.dataset.spImgUrl = retryUrl;
        // Restart the loader.
        setTimeout(() => atcLoadSpeciesImage(wrap), 40);
        return;
      }
      atcRenderSpeciesPlaceholder(wrap, name);
    };
    probe.onload = onSuccess;
    probe.onerror = onFail;
    // 3-second timeout per attempt.
    const timeoutId = setTimeout(onFail, 3000);
    probe.src = url;
  }

  function atcRenderSpeciesPlaceholder(wrap, name) {
    if (!wrap) return;
    wrap.classList.add('is-placeholder');
    wrap.classList.add('img-loaded'); // stop shimmer
    wrap.dataset.spImgDone = '1';
    if (wrap.querySelector('.sp-img-ph')) return;
    const ph = document.createElement('span');
    ph.className = 'sp-img-ph';
    ph.setAttribute('aria-hidden', 'true');
    const icon = document.createElement('i');
    icon.setAttribute('data-lucide', 'paw-print');
    const label = document.createElement('span');
    label.className = 'sp-img-ph-label';
    label.textContent = name || '';
    ph.appendChild(icon);
    if (name) ph.appendChild(label);
    wrap.appendChild(ph);
    if (window.ZE && typeof ZE.refreshIcons === 'function') ZE.refreshIcons();
  }

  function atcRenderSpecies(q) {
    const p = atcState.product;
    const compatSet = atcCompatSet();
    const ordered = DB.SPECIES.slice().sort((a, b) => {
      const ac = compatSet.has(a.id) ? 0 : 1;
      const bc = compatSet.has(b.id) ? 0 : 1;
      return ac - bc;
    });
    const query = (q || '').trim().toLowerCase();
    let list = ordered;
    if (atcState.filter === 'compat') list = list.filter(s => compatSet.has(s.id));
    if (query) list = list.filter(sp =>
      sp.name.toLowerCase().indexOf(query) !== -1 ||
      (sp.latin && sp.latin.toLowerCase().indexOf(query) !== -1)
    );
    if (!list.length) {
      atcEls.spList.innerHTML = `
        <div class="sp-empty" style="grid-column: 1 / -1;">
          <span class="ic"><i data-lucide="search-x"></i></span>
          <div>No species match your search</div>
        </div>`;
      ZE.refreshIcons();
      atcUpdateCountChip(false);
      atcUpdateSelectAllState();
      return;
    }
    atcEls.spList.innerHTML = list.map((sp, idx) => {
      const isSel = atcState.selectedSet.has(sp.id);
      const isCompat = compatSet.has(sp.id);
      const selCls = isSel ? 'selected' : '';
      const delay = Math.min(idx, 8) * 30;
      const pillInner = isCompat ? `<span class="dot"></span>Compatible` : `<span class="dot"></span>Not compatible`;
      const imgUrl = DB.img(sp.imgQ, 360, 270, sp.seed);
      return `
        <article class="sp-card ${selCls}" data-sp-id="${sp.id}" data-compatible="${isCompat ? 'true' : 'false'}" role="option" aria-selected="${isSel ? 'true' : 'false'}" style="animation-delay:${delay}ms">
          <div class="sp-img-wrap img-frame" data-sp-img-url="${imgUrl}" data-sp-img-q="${escAtc(sp.imgQ || '')}" data-sp-name="${escAtc(sp.name)}" data-sp-retry="0">
            <img alt="${escAtc(sp.name)}" loading="lazy" style="opacity:0"/>
            <span class="sp-img-overlay" aria-hidden="true"></span>
          </div>
          <span class="sp-check-badge" aria-hidden="true"><i data-lucide="check"></i></span>
          <div class="sp-name">${escAtc(sp.name)}</div>
          <div class="sp-latin">${escAtc(sp.latin || '')}</div>
          <span class="sp-pill">${pillInner}</span>
        </article>`;
    }).join('');
    // Validate every image: shimmer-first, retry once, fall back to neutral placeholder.
    atcEls.spList.querySelectorAll('.sp-img-wrap[data-sp-img-url]').forEach(wrap => {
      atcLoadSpeciesImage(wrap);
    });
    atcEls.spList.querySelectorAll('.sp-card[data-sp-id]').forEach(card => {
      card.addEventListener('click', (e) => {
        if (card.dataset.compatible === 'false') return;
        e.preventDefault();
        const sid = card.dataset.spId;
        const wasSel = atcState.selectedSet.has(sid);
        if (wasSel) atcState.selectedSet.delete(sid); else atcState.selectedSet.add(sid);
        card.classList.toggle('selected', !wasSel);
        card.setAttribute('aria-selected', !wasSel ? 'true' : 'false');
        atcUpdateEnclosureVisibility();
        atcUpdateConfirm();
        atcUpdateCountChip(true);
        atcUpdateSelectAllState();
      });
    });
    ZE.refreshIcons();
    atcUpdateCountChip(false);
    atcUpdateSelectAllState();
  }

  function atcPopulateEnclosures(speciesId) {
    const sel = atcEls.encSel;
    sel.innerHTML = '<option value="">— Not specified —</option>';
    if (!speciesId) return;
    const enclosures = (typeof DB.enclosuresForSpecies === 'function')
      ? DB.enclosuresForSpecies(speciesId) : [];
    enclosures.forEach(e => {
      const site = DB.byId(DB.SITES, e.siteId);
      const opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = `${e.name}${site ? ' — ' + site.name : ''}`;
      sel.appendChild(opt);
    });
  }

  function openAddToCartModal(product) {
    if (!product) return;
    const compatIds = Array.isArray(product.compatibleSpecies) ? product.compatibleSpecies : [];
    const defaultFilter = compatIds.length > 0 ? 'compat' : 'all';
    atcState.product = product;
    atcState.selectedSet = new Set();
    atcState.filter = defaultFilter;
    const cat = DB.byId(DB.CATEGORIES, product.cat);
    atcEls.thumb.src = product.imgSmall || '';
    atcEls.thumb.alt = product.name || '';
    atcEls.title.textContent = product.name || 'Add to cart';
    atcEls.sub.textContent = cat ? cat.name : '';
    atcEls.spInput.value = '';
    atcEls.searchClear.classList.remove('show');
    atcEls.note.value = '';
    atcEls.noteCount.textContent = '0';
    atcEls.chipAll.classList.toggle('active', atcState.filter === 'all');
    atcEls.chipCompat.classList.toggle('active', atcState.filter === 'compat');
    atcRenderSpecies('');
    atcUpdateEnclosureVisibility();
    atcUpdateConfirm();
    atcEls.overlay.classList.add('open');
    atcEls.modal.classList.add('open');
    atcEls.modal.setAttribute('aria-hidden', 'false');
    setTimeout(() => {
      if (!matchMedia('(pointer: coarse)').matches) atcEls.spInput.focus();
    }, 80);
    ZE.refreshIcons();
  }
  function closeAtcModal() {
    atcEls.overlay.classList.remove('open');
    atcEls.modal.classList.remove('open');
    atcEls.modal.setAttribute('aria-hidden', 'true');
    atcEls.modal.style.transform = '';
  }
  // expose for possible external callers (keeps parity with index_1.html)
  window.openAddToCartModal = openAddToCartModal;

  atcEls.overlay.addEventListener('click', closeAtcModal);
  atcEls.close.addEventListener('click', closeAtcModal);
  atcEls.cancel.addEventListener('click', closeAtcModal);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && atcEls.modal.classList.contains('open')) closeAtcModal();
  });
  let atcSearchTimer = null;
  atcEls.spInput.addEventListener('input', () => {
    clearTimeout(atcSearchTimer);
    const v = atcEls.spInput.value;
    atcEls.searchClear.classList.toggle('show', v.length > 0);
    atcSearchTimer = setTimeout(() => atcRenderSpecies(v), 100);
  });
  atcEls.spInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.preventDefault(); });
  atcEls.searchClear.addEventListener('click', () => {
    atcEls.spInput.value = '';
    atcEls.searchClear.classList.remove('show');
    atcRenderSpecies('');
    atcEls.spInput.focus();
  });
  const setAtcFilter = (f) => {
    atcState.filter = f;
    atcEls.chipAll.classList.toggle('active', f === 'all');
    atcEls.chipCompat.classList.toggle('active', f === 'compat');
    atcRenderSpecies(atcEls.spInput.value);
  };
  atcEls.chipAll.addEventListener('click', () => setAtcFilter('all'));
  atcEls.chipCompat.addEventListener('click', () => setAtcFilter('compat'));
  atcEls.selectAllBtn.addEventListener('click', () => {
    const compatIds = Array.from(atcCompatSet());
    const allSelected = compatIds.length > 0 && compatIds.every(id => atcState.selectedSet.has(id));
    if (allSelected) atcState.selectedSet.clear();
    else compatIds.forEach(id => atcState.selectedSet.add(id));
    atcEls.spList.querySelectorAll('.sp-card[data-sp-id]').forEach(c => {
      const on = atcState.selectedSet.has(c.dataset.spId);
      c.classList.toggle('selected', on);
      c.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    atcUpdateEnclosureVisibility();
    atcUpdateConfirm();
    atcUpdateCountChip(true);
    atcUpdateSelectAllState();
  });
  // Mobile swipe-down on grab bar
  (function wireGrab(){
    if (!atcEls.grab) return;
    let startY = null, dragging = false;
    const onStart = (e) => {
      const y = (e.touches ? e.touches[0].clientY : e.clientY);
      startY = y; dragging = true;
      atcEls.modal.style.transition = 'none';
    };
    const onMove = (e) => {
      if (!dragging || startY == null) return;
      const y = (e.touches ? e.touches[0].clientY : e.clientY);
      const dy = Math.max(0, y - startY);
      atcEls.modal.style.transform = `translateY(${dy}px)`;
    };
    const onEnd = (e) => {
      if (!dragging) return;
      dragging = false;
      atcEls.modal.style.transition = '';
      const y = (e.changedTouches ? e.changedTouches[0].clientY : e.clientY);
      const dy = startY != null ? y - startY : 0;
      startY = null;
      if (dy > 90) { atcEls.modal.style.transform = ''; closeAtcModal(); }
      else { atcEls.modal.style.transform = ''; }
    };
    atcEls.grab.addEventListener('touchstart', onStart, { passive: true });
    atcEls.grab.addEventListener('touchmove', onMove, { passive: true });
    atcEls.grab.addEventListener('touchend', onEnd);
    atcEls.grab.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
  })();
  atcEls.note.addEventListener('input', () => {
    atcEls.noteCount.textContent = String(atcEls.note.value.length);
  });
  atcEls.confirm.addEventListener('click', () => {
    const p = atcState.product;
    if (!p) return;
    const size = atcState.selectedSet.size;
    const note = (atcEls.note.value || '').trim() || null;
    if (size === 0) {
      ZE.cart.addLine({
        productId: p.id,
        speciesId: null,
        enclosureId: null,
        qty: 1,
        note: note
      });
      closeAtcModal();
      showAtcToast('Added to cart');
      return;
    }
    const encId = (size === 1) ? (atcEls.encSel.value || null) : null;
    atcState.selectedSet.forEach(sid => {
      ZE.cart.addLine({
        productId: p.id,
        speciesId: sid,
        enclosureId: encId,
        qty: 1,
        note: note
      });
    });
    closeAtcModal();
    showAtcToast(`Added ${size} line${size === 1 ? '' : 's'} to cart`);
  });

  /* ---------- Category chip row (fixed taxonomy, multi-select) ---------- */
  // Builds: [All] · Sensory · Cognitive · Physical · Social · Food · | · Deals · Trending
  // - All: exclusive — clicking clears state.selectedCats[]
  // - Any specific: toggled in state.selectedCats[]; deactivates All implicitly
  // - Empty state.selectedCats ⇢ All visually active
  function renderCats(savedProducts) {
    const row = document.getElementById('catRow');

    const allActive = !state.selectedCats || state.selectedCats.length === 0;
    const pills = [];

    // Leading "All" chip
    pills.push(
      `<button class="pill ${allActive ? 'active' : ''}" type="button"
         data-cat="all" role="button" aria-pressed="${allActive}" tabindex="0"
         title="Show all saved items">All</button>`
    );

    // Tag chips
    CAT_TAXONOMY.filter(c => c.kind === 'tag').forEach(c => {
      const on = state.selectedCats.indexOf(c.id) !== -1;
      pills.push(
        `<button class="pill ${on ? 'active' : ''}" type="button"
           data-cat="${c.id}" role="button" aria-pressed="${on}" tabindex="0"
           title="Filter by ${c.name}">
           <span class="cat-dot" style="background:${c.color}"></span>${c.name}
         </button>`
      );
    });

    // Divider + curated chips
    pills.push(`<span class="cat-divider" aria-hidden="true"></span>`);
    CAT_TAXONOMY.filter(c => c.kind === 'curated').forEach(c => {
      const on = state.selectedCats.indexOf(c.id) !== -1;
      pills.push(
        `<button class="pill ${on ? 'active' : ''}" type="button"
           data-cat="${c.id}" role="button" aria-pressed="${on}" tabindex="0"
           title="Filter by ${c.name}">
           <i data-lucide="${c.icon}"></i>${c.name}
         </button>`
      );
    });

    row.innerHTML = pills.join('');

    const btns = Array.from(row.querySelectorAll('.pill'));
    btns.forEach(b => {
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleCat(b.dataset.cat);
      });
      b.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault(); toggleCat(b.dataset.cat);
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
          e.preventDefault();
          const i = btns.indexOf(b);
          const next = e.key === 'ArrowRight' ? (i + 1) % btns.length : (i - 1 + btns.length) % btns.length;
          btns[next].focus();
        } else if (e.key === 'Home') { e.preventDefault(); btns[0].focus(); }
          else if (e.key === 'End')  { e.preventDefault(); btns[btns.length - 1].focus(); }
      });
    });
    ZE.refreshIcons();
  }

  function toggleCat(catId) {
    if (catId === 'all') {
      state.selectedCats = [];
    } else {
      const i = state.selectedCats.indexOf(catId);
      if (i === -1) state.selectedCats.push(catId);
      else state.selectedCats.splice(i, 1);
    }
    writeUrlFilters();
    render();
  }

  function clearAllFilters() {
    state.selectedCats = [];
    state.speciesIds = [];
    writeSpeciesSelection([]);
    writeUrlFilters();
    // Rehydrate species trigger if the init function exposed it
    if (typeof window.__mspRehydrate === 'function') window.__mspRehydrate();
    render();
  }

  /* ---------- Undo toast ---------- */
  const toast = document.getElementById('undoToast');
  const toastText = document.getElementById('undoToastText');
  const undoBtn = document.getElementById('undoBtn');
  let toastTimer = null;
  let pendingUndoId = null;

  function showUndoToast(id, name) {
    pendingUndoId = id;
    toastText.textContent = `Removed "${name}" from saved`;
    toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toast.classList.remove('show');
      pendingUndoId = null;
    }, 4000);
  }
  undoBtn.addEventListener('click', () => {
    if (pendingUndoId) {
      ZE.saved.add(pendingUndoId);
      pendingUndoId = null;
    }
    toast.classList.remove('show');
    if (toastTimer) clearTimeout(toastTimer);
  });

  /* ---------- Product grid ---------- */
  function renderProducts(list) {
    const grid = document.getElementById('prodGrid');
    if (!list.length) {
      const hasFilters = (state.selectedCats && state.selectedCats.length) ||
                         (state.speciesIds && state.speciesIds.length);
      grid.innerHTML = `
        <div class="filters-empty">
          <div class="fe-ico"><i data-lucide="search-x" class="w-10 h-10"></i></div>
          <div class="fe-title">No saved items match these filters</div>
          <div class="fe-sub">${hasFilters ? 'Try removing a chip or picking a different species.' : 'Nothing to show.'}</div>
          ${hasFilters ? '<button type="button" class="fe-clear" id="feClearBtn"><i data-lucide="x-circle" class="w-4 h-4"></i> Clear filters</button>' : ''}
        </div>`;
      const cb = document.getElementById('feClearBtn');
      if (cb) cb.addEventListener('click', clearAllFilters);
      ZE.refreshIcons();
      return;
    }
    grid.innerHTML = list.map(p => {
      const cat = DB.byId(DB.CATEGORIES, p.cat);
      const price = p.price.material + p.price.labor;
      // Total qty across all species lines for this product
      const qty = ZE.cart.countForProduct(p.id);
      const gallery = (typeof DB.galleryFor === 'function')
        ? DB.galleryFor(p)
        : (Array.isArray(p.gallery) && p.gallery.length ? p.gallery : [p.imgSmall]);
      // Rating pill (Flipkart-style)
      const r = (typeof DB.productRating === 'function') ? DB.productRating(p.id) : { avg: 0, count: 0 };
      const ratingHtml = r && r.count > 0
        ? `<div class="prod-rating">
             <span class="stars"><i data-lucide="star"></i> ${r.avg.toFixed(1)}</span>
             <span class="rating-count">(${r.count})</span>
           </div>`
        : `<div class="prod-rating"><span class="no-rating">No reviews yet</span></div>`;
      let actionHtml;
      if (qty > 0) {
        actionHtml = `<div class="stepper-mini" data-id="${p.id}">
                       <button data-step="-1" aria-label="Decrease"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                       <span class="qty">${qty}</span>
                       <button data-step="1" aria-label="Increase"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
                     </div>`;
      } else {
        actionHtml = `<button class="add-btn" data-add="${p.id}">
                       <i data-lucide="plus" class="w-4 h-4"></i> Add
                     </button>`;
      }
      return `
        <article class="prod-card anim-in" data-id="${p.id}" tabindex="0">
          <div class="prod-img-wrap img-frame has-carousel">
            ${p.hot ? `<div class="top-badge"><i data-lucide="flame" class="w-3 h-3"></i> Top item</div>` : ''}
            <button class="fav-btn active" data-fav="${p.id}" aria-label="Remove from saved">
              <i data-lucide="heart" class="w-4 h-4"></i>
            </button>
            <div class="pi-stage">
              ${gallery.map((url, i) => `<img class="pi-img ${i===0?'pi-active':''}" src="${url}" alt="${p.name}" loading="lazy"/>`).join('')}
            </div>
            ${gallery.length > 1 ? `<div class="pi-dots">${gallery.map((_,i) => `<span class="pi-dot ${i===0?'pi-dot-active':''}"></span>`).join('')}</div>` : ''}
          </div>
          <div class="prod-meta">
            <div class="prod-name">${p.name}</div>
            <div class="prod-cat"><span class="tag-dot"></span>${cat ? cat.name : ''}</div>
            ${ratingHtml}
          </div>
          <div class="prod-bottom">
            <div class="prod-price">${DB.fmtINR(price)}<span class="unit">/ unit</span></div>
            <div class="action-slot" data-slot="${p.id}">
              ${actionHtml}
            </div>
          </div>
        </article>
      `;
    }).join('');

    function bindHoverCarousel(card) {
      const imgs = card.querySelectorAll('.pi-img');
      const dots = card.querySelectorAll('.pi-dot');
      if (imgs.length <= 1) return;
      let idx = 0, timer = null;
      const goto = (n) => {
        idx = ((n % imgs.length) + imgs.length) % imgs.length;
        imgs.forEach((im, i) => im.classList.toggle('pi-active', i === idx));
        dots.forEach((d, i) => d.classList.toggle('pi-dot-active', i === idx));
      };
      card.addEventListener('mouseenter', () => {
        if (timer) return;
        timer = setInterval(() => goto(idx + 1), 800);
      });
      card.addEventListener('mouseleave', () => {
        clearInterval(timer); timer = null; goto(0);
      });
      const stage = card.querySelector('.pi-stage');
      if (stage) {
        stage.addEventListener('click', (e) => {
          if (!window.matchMedia || !window.matchMedia('(hover: none)').matches) return;
          const rect = stage.getBoundingClientRect();
          const x = e.clientX - rect.left;
          if (x < rect.width / 2) goto(idx - 1); else goto(idx + 1);
          e.stopPropagation();
        });
      }
    }

    grid.querySelectorAll('.prod-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('.fav-btn') || e.target.closest('.add-btn') || e.target.closest('.stepper-mini')) return;
        window.location.href = 'product_detail_1.html?id=' + card.dataset.id;
      });
      bindHoverCarousel(card);
    });
    grid.querySelectorAll('.fav-btn').forEach(b => {
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = b.dataset.fav;
        const product = DB.byId(DB.PRODUCTS, id);
        ZE.saved.remove(id);
        if (product) showUndoToast(id, product.name);
      });
    });
    grid.querySelectorAll('.add-btn').forEach(b => {
      if (b.hasAttribute('disabled')) return;
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        const prod = DB.byId(DB.PRODUCTS, b.dataset.add);
        if (prod) openAddToCartModal(prod);
      });
    });
    // Stepper on saved page: qty shown is a SUM across species lines.
    // Both + and - just reopen the picker / jump to cart, since we don't know which line to target.
    grid.querySelectorAll('.stepper-mini').forEach(st => {
      st.addEventListener('click', (e) => { e.stopPropagation(); });
      const pid = st.dataset.id;
      st.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const step = parseInt(btn.dataset.step, 10);
          const prod = DB.byId(DB.PRODUCTS, pid);
          if (!prod) return;
          if (step > 0) {
            // + → open species picker so user can pick which line to add to
            openAddToCartModal(prod);
          } else {
            // - → can't know which species-line to decrement; jump to cart on index page
            window.location.href = 'index_1.html#cart';
          }
        });
      });
    });
    ZE.refreshIcons();
  }

  /* ---------- Empty state ---------- */
  function renderEmpty() {
    const body = document.getElementById('pageBody');
    body.innerHTML = `
      <div class="empty-state anim-in">
        <span class="ico-wrap"><i data-lucide="heart" class="w-10 h-10"></i></span>
        <h2>No saved items yet</h2>
        <p>Tap the heart on any product to save it for later. Your favourites will appear here so you can revisit them anytime.</p>
        <a href="index_1.html" class="btn-brand-cta" style="margin-top:8px; text-decoration:none;">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> Browse enrichments
        </a>
      </div>
    `;
    ZE.refreshIcons();
  }

  /* ---------- Master render ---------- */
  function render() {
    renderBadges();

    const savedProducts = orderedSavedProducts();
    const totalSaved = savedProducts.length;

    // Update count badge next to title
    const titleCount = document.getElementById('titleCount');
    titleCount.textContent = `${totalSaved} item${totalSaved === 1 ? '' : 's'}`;

    const actions = document.getElementById('pageActions');
    const subBar = document.getElementById('subBar');

    if (totalSaved === 0) {
      actions.style.display = 'none';
      subBar.style.display = 'none';
      renderEmpty();
      return;
    }

    actions.style.display = 'flex';
    subBar.style.display = 'block';

    // Enable/disable "Add all" — disabled when every saved product already has a line in cart
    const addAllBtn = document.getElementById('addAllBtn');
    const anyNotInCart = savedProducts.some(p => ZE.cart.countForProduct(p.id) === 0);
    addAllBtn.disabled = !anyNotInCart;

    // Restore grid container if empty-state was previously rendered
    const body = document.getElementById('pageBody');
    if (!document.getElementById('prodGrid')) {
      body.innerHTML = '<div class="prod-grid" id="prodGrid"></div>';
    }

    // Re-render category pills for the current saved set
    renderCats(savedProducts);

    // Filter + sort, then render
    const list = filterList(savedProducts);
    renderProducts(list);
    ZE.refreshIcons();
  }

  /* ---------- Top actions ---------- */
  // "Add all to cart" — line-items require a speciesId. Since we can't prompt per-item
  // here without a multi-step flow, we add each product with its first compatibleSpecies
  // (falling back to DB.SPECIES[0]) and surface a toast so the user knows to verify
  // species selection in the cart / checkout.
  document.getElementById('addAllBtn').addEventListener('click', () => {
    const ids = ZE.saved.read();
    let added = 0;
    ids.forEach(id => {
      const p = DB.byId(DB.PRODUCTS, id);
      if (!p) return;
      if (ZE.cart.countForProduct(p.id) > 0) return; // already in cart — skip
      const speciesId = (Array.isArray(p.compatibleSpecies) && p.compatibleSpecies[0])
        || (DB.SPECIES && DB.SPECIES[0] && DB.SPECIES[0].id);
      if (!speciesId) return;
      ZE.cart.addLine({ productId: p.id, speciesId: speciesId, qty: 1 });
      added++;
    });
    if (added) showAtcToast(`Added ${added} item${added === 1 ? '' : 's'} to cart — pick species per-item in checkout if needed.`);
  });

  document.getElementById('clearSavedBtn').addEventListener('click', () => {
    if (!ZE.saved.count()) return;
    const ok = window.confirm('Clear all saved items? This cannot be undone.');
    if (ok) ZE.saved.clear();
  });

  /* ---------- Search (debounced) ---------- */
  (function initSearch(){
    const input = document.getElementById('searchInput');
    let t = null;
    input.addEventListener('input', (e) => {
      const v = e.target.value.trim();
      if (t) clearTimeout(t);
      t = setTimeout(() => { state.search = v; render(); }, 180);
    });
  })();

  /* ---------- Event hooks ---------- */
  ZE.on('saved:change', render);
  ZE.on('cart:change', render);
  ZE.on('orders:change', renderBadges);

  /* ---------- Initial render ---------- */
  renderUserSlot();
  render();
  ZE.init();
})();
</script>
<script>
/* =========== Wallet pill renderer (shared inline) =========== */
(function(){
  if (window.__zeWalletPillInit) return;
  window.__zeWalletPillInit = true;
  function fmtCompactINR(n){
    n = Number(n) || 0;
    if (n >= 10000000) return '₹' + (n / 10000000).toFixed(1).replace(/\.0$/, '') + 'Cr';
    if (n >= 100000)   return '₹' + (n / 100000).toFixed(1).replace(/\.0$/, '') + 'L';
    if (n >= 1000)     return '₹' + Math.round(n / 1000) + 'K';
    return '₹' + n;
  }
  function colorClass(avail, allotted){
    if (!allotted) return '';
    var ratio = avail / allotted;
    if (ratio < 0.20) return 'ze-wp-red';
    if (ratio < 0.50) return 'ze-wp-amber';
    return '';
  }
  function closePop(){
    var pop = document.getElementById('walletPillPop');
    if (pop) pop.classList.remove('open');
  }
  function buildPop(siteIds, activeId){
    var html = '<div class="ze-wp-head">Switch site</div>';
    siteIds.forEach(function(sid){
      var s = (window.DB && DB.byId) ? DB.byId(DB.SITES, sid) : null;
      if (!s) return;
      html += '<div class="ze-wp-opt' + (sid === activeId ? ' active' : '') + '" data-wp-site="' + sid + '">' +
        '<div class="ze-wp-opt-name"><div>' + s.name + '</div><div class="ze-wp-opt-city">' + (s.city || '') + '</div></div>' +
        '<i data-lucide="check" class="ze-wp-opt-tick w-4 h-4"></i>' +
      '</div>';
    });
    return html;
  }
  function renderPill(){
    var pill = document.getElementById('walletPill');
    if (!pill) return;
    if (typeof ZE === 'undefined' || !ZE.user || !ZE.activeSite || !ZE.wallet) return;
    var u = ZE.user.read();
    if (!u || u.role !== 'buyer') { pill.style.display = 'none'; pill.classList.remove('is-ready'); return; }
    var sites = ZE.activeSite.availableFor(u.id) || [];
    var activeId = ZE.activeSite.get();
    if (!activeId && sites.length) activeId = sites[0];
    if (!activeId) { pill.style.display = 'none'; pill.classList.remove('is-ready'); return; }
    var siteObj = (window.DB && DB.byId) ? DB.byId(DB.SITES, activeId) : null;
    var w = ZE.wallet.forSite(activeId);
    var nameEl = pill.querySelector('[data-wallet-site-name]');
    var amtEl  = pill.querySelector('[data-wallet-amount]');
    var chev   = pill.querySelector('[data-wallet-site-chev]');
    var siteWrap = pill.querySelector('[data-wallet-site-switch]');
    if (nameEl) nameEl.textContent = siteObj ? siteObj.name : '—';
    if (amtEl) {
      amtEl.textContent = fmtCompactINR(w.available);
      amtEl.classList.remove('ze-wp-red','ze-wp-amber');
      var c = colorClass(w.available, w.allotted);
      if (c) amtEl.classList.add(c);
    }
    var multi = sites.length > 1;
    if (chev) chev.style.display = multi ? '' : 'none';
    if (siteWrap) siteWrap.style.cursor = multi ? 'pointer' : 'default';
    pill.classList.add('is-ready');
    var pop = pill.querySelector('[data-wallet-pop]');
    if (pop) pop.innerHTML = multi ? buildPop(sites, activeId) : '';
    if (window.lucide && lucide.createIcons) { try { lucide.createIcons(); } catch (e) {} }
    var mob = document.getElementById('mobileWalletRow');
    if (mob) {
      if (siteObj) {
        mob.style.display = '';
        var mn = mob.querySelector('[data-wallet-mob-name]');
        var ma = mob.querySelector('[data-wallet-mob-amt]');
        var ms = mob.querySelector('[data-wallet-mob-sub]');
        if (mn) mn.textContent = siteObj.name;
        if (ma) {
          ma.textContent = fmtCompactINR(w.available);
          ma.classList.remove('ze-wp-red','ze-wp-amber');
          var mc = colorClass(w.available, w.allotted);
          if (mc) ma.classList.add(mc);
        }
        if (ms) ms.textContent = (siteObj.city || '') + ' · Available · Open wallet →';
      } else { mob.style.display = 'none'; }
    }
  }
  function bind(){
    document.addEventListener('click', function(e){
      var pill = document.getElementById('walletPill');
      if (!pill) return;
      var siteSwitch = e.target.closest && e.target.closest('[data-wallet-site-switch]');
      var pop = document.getElementById('walletPillPop');
      if (siteSwitch && pill.contains(siteSwitch)) {
        var sites = (ZE.user.read && ZE.user.read()) ? (ZE.activeSite.availableFor(ZE.user.read().id) || []) : [];
        if (sites.length > 1 && pop) {
          e.preventDefault(); e.stopPropagation();
          pop.classList.toggle('open');
          return;
        }
      }
      var opt = e.target.closest && e.target.closest('[data-wp-site]');
      if (opt && pop && pop.contains(opt)) {
        e.preventDefault(); e.stopPropagation();
        var sid = opt.getAttribute('data-wp-site');
        if (sid && ZE.activeSite.set(sid)) { closePop(); window.location.reload(); }
        return;
      }
      if (pop && pop.classList.contains('open') && !pop.contains(e.target) && !pill.contains(e.target)) {
        closePop(); return;
      }
      var pillTarget = e.target.closest && e.target.closest('#walletPill');
      if (pillTarget && !siteSwitch && !opt) {
        window.location.href = 'wallet_1.html';
      }
    });
    document.addEventListener('click', function(e){
      var mob = e.target.closest && e.target.closest('#mobileWalletRow');
      if (mob) { window.location.href = 'wallet_1.html'; }
    });
    if (typeof ZE !== 'undefined' && ZE.on) {
      ZE.on('activeSite:change', renderPill);
      ZE.on('orders:change', renderPill);
      ZE.on('topup:change', renderPill);
      ZE.on('user:change', renderPill);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ renderPill(); bind(); });
  } else { renderPill(); bind(); }
})();
</script>
