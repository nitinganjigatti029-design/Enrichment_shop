<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>ZooEnrich · Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="tokens.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root{
      --st-amber-fg:#A16207; --st-amber-bg:#FEF3C7;
      --st-blue-fg:#0369A1;  --st-blue-bg:#E0F2FE;
      --st-red-fg:#B00020;   --st-red-bg:#FFE5EA;
      --st-ret-fg:#92400E;   --st-ret-bg:#FDE68A;
    }
    html,body{ background:var(--card-subtle) !important; }
    body{ font-family: 'Inter', ui-sans-serif, system-ui, sans-serif !important; color: var(--text) !important; }

    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 0 32px; }
    @media (max-width: 900px) { .page-wrap { padding: 0 16px; } }

    /* ========== HEADER ========== */
    .app-header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .app-header .row { display: flex; align-items: center; gap: 20px; height: 68px; }
    .brand-mark { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; color: var(--text); text-decoration:none; }
    .brand-mark .logo-box { width: 32px; height: 32px; border-radius: 10px; background: var(--brand); color:#fff; display:inline-flex; align-items:center; justify-content:center; }
    .search-pill { flex: 1; max-width: 560px; height: 44px; background: #F1F2F4; border-radius: 999px; display: flex; align-items: center; gap: 10px; padding: 0 18px; }
    .search-pill input { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); }
    .search-pill .kbd { font-size: 11px; color: var(--text-muted); background:#fff; padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border); font-family: ui-monospace, monospace; }
    .header-actions { display: flex; align-items: center; gap: 6px; }
    .header-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 6px 10px; border-radius: 12px; color: var(--text-muted); cursor: pointer; background: transparent; border: none; position: relative; min-width: 64px; transition: .15s; text-decoration:none; }
    .header-btn:hover { background: #F1F2F4; color: var(--text); }
    .header-btn span { font-size: 11px; font-weight: 500; margin-top: 3px; }
    .header-btn.active { background: var(--brand-soft); color: var(--brand-hover); }
    .badge-dot { position: absolute; top: 4px; right: 12px; min-width: 18px; height: 18px; padding: 0 5px; background: var(--danger); color: #fff; border-radius: 999px; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; border: 2px solid #fff; }
    .avatar { width: 40px; height: 40px; border-radius: 999px; object-fit: cover; border: 2px solid var(--border); margin-left: 8px; cursor: pointer; }

    /* Avatar dropdown */
    .user-wrap { position: relative; margin-left:8px; }
    .dd-menu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 240px; background:#fff; border:1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); padding:8px; display:none; z-index: 60; }
    .dd-menu.open { display:block; animation: ddIn .18s ease-out; }
    @keyframes ddIn { from{ opacity:0; transform:translateY(-4px);} to{ opacity:1; transform:none;} }
    .dd-head { padding: 10px 12px; border-bottom: 1px solid var(--border); margin-bottom:6px; }
    .dd-head .nm { font-weight:700; color:var(--text); font-size:14px; }
    .dd-head .em { font-size:12px; color:var(--text-muted); margin-top:2px; }
    .dd-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:10px; font-size:13.5px; color:var(--text); cursor:pointer; }
    .dd-item:hover { background:#F1F2F4; }
    .dd-item.active { color: var(--brand-hover); background: var(--brand-soft); font-weight:600; }

    /* ========== PAGE HEAD ========== */
    .crumbs { font-size: 12px; color: var(--text-muted); padding: 22px 0 10px; display: flex; gap: 8px; }
    .crumbs .sep { color: var(--text-subtle); }
    .crumbs .here { color: var(--text); font-weight:600; }

    .page-head-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
    .page-head-row h1 { font-size: 28px; font-weight: 700; color: var(--text); display: inline-flex; align-items: center; gap: 12px; margin:0; }
    .page-head-row h1 .count-badge { font-size: 12px; font-weight: 600; background: #F1F2F4; color: var(--text-muted); padding: 4px 10px; border-radius: 999px; }

    .btn-sm { padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; display:inline-flex; align-items:center; gap:6px; border: 1px solid transparent; transition: .15s; background:transparent; color: var(--text); }
    .btn-sm-ghost { background: #fff; color: var(--text); border-color: var(--border); }
    .btn-sm-ghost:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .btn-sm-primary { background: var(--brand); color:#fff; border-color: var(--brand); }
    .btn-sm-primary:hover { background: var(--brand-hover); }
    @media (max-width: 540px) {
      .btn-label-desk { display:none; }
    }

    /* ========== STATUS TABS ========== */
    .tabs-wrap { margin-bottom: 14px; overflow-x: auto; }
    .tabs { display: inline-flex; background: #F1F2F4; padding: 4px; border-radius: 999px; gap: 4px; }
    .tabs button { padding: 9px 18px; border-radius: 999px; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: .15s; display:inline-flex; align-items:center; gap:8px; white-space:nowrap; }
    .tabs button:hover { color: var(--text); }
    .tabs button.active { background: var(--brand); color:#fff; box-shadow: 0 2px 6px -2px rgba(55,189,105,.5); }
    .tabs button .count-pill { font-size: 11px; font-weight: 700; background: rgba(255,255,255,.25); padding: 1px 7px; border-radius: 999px; }
    .tabs button:not(.active) .count-pill { background:#fff; color: var(--text-muted); }

    /* ========== TOOLBAR ========== */
    .toolbar { display:flex; align-items:center; gap:10px; margin-bottom: 14px; flex-wrap: wrap; }
    .search-input-wrap { flex:1; min-width: 240px; position:relative; }
    .search-input-wrap i { position:absolute; left:14px; top:50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-input-wrap input { width:100%; padding: 11px 14px 11px 40px; border-radius: 999px; border: 1px solid var(--border); background:#fff; font-size: 14px; outline:none; color: var(--text); }
    .search-input-wrap input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .dd-trigger { display:inline-flex; align-items:center; gap:8px; padding: 11px 16px; border-radius: 999px; border:1px solid var(--border); background:#fff; font-size:13px; font-weight:600; color: var(--text); cursor:pointer; white-space:nowrap; position:relative; }
    .dd-trigger:hover { border-color: var(--border-strong); background:#F9FAFB; }
    .dd-trigger .val { color: var(--brand-hover); font-weight:700; margin-left: 2px; }
    .dd-pop { position:absolute; top: calc(100% + 6px); right:0; min-width: 220px; background:#fff; border:1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); padding:6px; display:none; z-index: 40; }
    .dd-pop.open { display:block; animation: ddIn .18s ease-out; }
    .dd-opt { display:flex; align-items:center; gap:10px; padding: 9px 12px; border-radius: 10px; font-size: 13px; color: var(--text); cursor:pointer; }
    .dd-opt:hover { background:#F1F2F4; }
    .dd-opt.active { background: var(--brand-soft); color: var(--brand-hover); font-weight:600; }
    .dd-opt .tick { margin-left:auto; color: var(--brand); opacity:0; }
    .dd-opt.active .tick { opacity:1; }

    /* ========== DESKTOP TABLE ========== */
    .table-wrap { background:#fff; border:1px solid var(--border); border-radius: 16px; overflow-x: auto; overflow-y: visible; position: relative; box-shadow: var(--shadow-xs); }
    .orders-table { width:100%; border-collapse: separate; border-spacing: 0; min-width: 960px; }
    .orders-table thead th { position: sticky; top: 0; background: var(--card-subtle); z-index: 2; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); padding: 14px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; user-select: none; }
    .orders-table thead th.sortable { cursor: pointer; }
    .orders-table thead th.sortable:hover { color: var(--text); }
    .orders-table thead th .chev { display: inline-block; margin-left: 4px; opacity: .35; transition: transform .18s, opacity .18s; }
    .orders-table thead th.sorted .chev { opacity: 1; color: var(--brand); }
    .orders-table thead th.sorted.desc .chev { transform: rotate(180deg); }
    .orders-table tbody td { padding: 10px 12px; font-size: 13px; color: var(--text); border-bottom: 1px solid var(--border); background:#fff; vertical-align: middle; height: 56px; }
    .orders-table tbody tr:last-child td { border-bottom: none; }
    .orders-table tbody tr:hover td { background: #F9FAFB; }
    .orders-table tbody tr.selected td { background: var(--brand-soft); }
    .orders-table tbody tr.selected td:first-child { box-shadow: inset 3px 0 0 var(--brand), 2px 0 6px -3px rgba(15,23,42,.08); }

    /* Column widths */
    .orders-table th.col-check, .orders-table td.col-check { width: 44px; padding-left: 14px; padding-right: 4px; }
    .orders-table th.col-id, .orders-table td.col-id { width: 140px; }
    .orders-table th.col-date, .orders-table td.col-date { width: 96px; }
    .orders-table th.col-items, .orders-table td.col-items { width: 220px; }
    .orders-table th.col-vendor, .orders-table td.col-vendor { width: 160px; }
    .orders-table th.col-total, .orders-table td.col-total { width: 104px; text-align: right; font-variant-numeric: tabular-nums; }
    .orders-table th.col-status, .orders-table td.col-status { width: 140px; }
    .orders-table th.col-act, .orders-table td.col-act { width: 72px; text-align: center; padding-right: 14px; padding-left: 4px; }

    /* Sticky left (checkbox) */
    .orders-table th.col-check, .orders-table td.col-check {
      position: sticky; left: 0; z-index: 3;
    }
    .orders-table thead th.col-check { z-index: 4; }
    .table-wrap.scrolled .orders-table td.col-check { box-shadow: 2px 0 6px -3px rgba(15,23,42,.18); }
    .table-wrap.scrolled .orders-table th.col-check { box-shadow: 2px 0 6px -3px rgba(15,23,42,.18); }

    /* Sticky right (download) */
    .orders-table th.col-act, .orders-table td.col-act {
      position: sticky; right: 0; z-index: 3;
    }
    .orders-table thead th.col-act { z-index: 4; }
    .table-wrap.scroll-end-hidden .orders-table td.col-act { box-shadow: -2px 0 6px -3px rgba(15,23,42,.18); }
    .table-wrap.scroll-end-hidden .orders-table th.col-act { box-shadow: -2px 0 6px -3px rgba(15,23,42,.18); }

    /* ID cell */
    .cell-id { display:flex; flex-direction:column; gap:2px; }
    .cell-id .id-main { font-family: ui-monospace, Menlo, monospace; font-size: 13px; font-weight: 600; color: var(--text); }
    .cell-id .id-sub { font-size: 11px; color: var(--text-muted); }

    /* Items cell */
    .cell-items { display:flex; align-items:center; gap:10px; }
    .cell-items .thumb-stack { display:inline-flex; }
    .cell-items .thumb { width: 36px; height: 36px; border-radius: 8px; overflow: hidden; background: #F1F2F4; border: 2px solid #fff; margin-left: -8px; box-shadow: 0 0 0 1px var(--border); }
    .cell-items .thumb:first-child { margin-left: 0; }
    .cell-items .thumb img { width: 100%; height: 100%; object-fit: cover; display:block; }
    .cell-items .more-thumb { width: 36px; height: 36px; border-radius: 8px; background:#F1F2F4; color: var(--text-muted); display:inline-flex; align-items:center; justify-content:center; font-size: 11px; font-weight:700; margin-left: -8px; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--border); }
    .cell-items .item-count-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    /* Vendor cell */
    .cell-vendor { display:inline-flex; align-items:center; gap:8px; }
    .cell-vendor img { width: 22px; height: 22px; border-radius: 999px; object-fit: cover; flex-shrink:0; }
    .cell-vendor .v-name { font-size: 13px; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }

    /* Total cell */
    .cell-total { font-weight: 700; color: var(--text); font-size: 13.5px; }

    /* Status cell chip */
    .st-chip { display:inline-flex; align-items:center; gap:6px; padding: 4px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
    .st-chip .dot { width: 6px; height: 6px; border-radius: 999px; flex-shrink:0; }
    .st-awaiting { background: var(--st-amber-bg); color: var(--st-amber-fg); }
    .st-awaiting .dot { background: var(--st-amber-fg); }
    .st-transit  { background: var(--st-blue-bg); color: var(--st-blue-fg); }
    .st-transit .dot { background: var(--st-blue-fg); }
    .st-delivered{ background: var(--brand-soft); color: #006D35; }
    .st-delivered .dot { background: var(--brand); }
    .st-cancel   { background: var(--st-red-bg); color: var(--st-red-fg); }
    .st-cancel .dot { background: var(--st-red-fg); }
    .st-return   { background: var(--st-ret-bg); color: var(--st-ret-fg); }
    .st-return .dot { background: var(--st-ret-fg); }

    /* Download icon button */
    .icon-dl { width: 36px; height: 36px; border-radius: 10px; background: var(--brand-soft); color: var(--brand-hover); border: none; cursor: pointer; display:inline-flex; align-items:center; justify-content:center; transition: .15s; }
    .icon-dl:hover { background: var(--brand); color: #fff; transform: translateY(-1px); box-shadow: 0 4px 10px -3px rgba(55,189,105,.5); }
    .icon-dl:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

    /* Checkbox */
    .cb { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border: 1.5px solid var(--border-strong); border-radius: 5px; background:#fff; cursor:pointer; position: relative; transition: .12s; vertical-align: middle; flex-shrink: 0; }
    .cb:hover { border-color: var(--brand); }
    .cb:checked { background: var(--brand); border-color: var(--brand); }
    .cb:checked::after { content:''; position: absolute; left: 4px; top: 0px; width: 6px; height: 11px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }
    .cb:indeterminate { background: var(--brand); border-color: var(--brand); }
    .cb:indeterminate::after { content:''; position: absolute; left: 3px; top: 7px; width: 10px; height: 2px; background: #fff; }
    .cb:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

    /* ========== MOBILE CARDS ========== */
    .orders-cards { display: none; flex-direction: column; gap: 10px; padding-bottom: 100px; }
    .o-card { background:#fff; border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; transition: .15s; position: relative; }
    .o-card:hover { background: #F9FAFB; }
    .o-card.selected { background: var(--brand-soft); border-color: var(--brand); border-width: 2px; padding: 13px; }
    .o-card .oc-top { display:flex; align-items:center; gap: 10px; margin-bottom: 8px; }
    .o-card .oc-top .cb { margin-top:0; }
    .o-card .oc-top .oid { font-family: ui-monospace, Menlo, monospace; font-size: 13px; font-weight: 700; color: var(--text); }
    .o-card .oc-top .spacer { flex: 1; }
    .o-card .sub-line { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; padding-left: 28px; }
    .o-card .thumbs-row { display:flex; align-items:center; gap: 10px; padding-left: 28px; margin-bottom: 8px; }
    .o-card .thumbs-row .thumb { width: 40px; height: 40px; border-radius: 8px; overflow:hidden; background:#F1F2F4; border:2px solid #fff; box-shadow: 0 0 0 1px var(--border); margin-left: -8px; }
    .o-card .thumbs-row .thumb:first-child { margin-left: 0; }
    .o-card .thumbs-row .thumb img { width:100%; height:100%; object-fit:cover; }
    .o-card .thumbs-row .more-thumb { width: 40px; height: 40px; border-radius: 8px; background:#F1F2F4; color: var(--text-muted); display:inline-flex; align-items:center; justify-content:center; font-size: 11px; font-weight:700; margin-left: -8px; border:2px solid #fff; box-shadow: 0 0 0 1px var(--border); }
    .o-card .vendor-line { display:inline-flex; align-items:center; gap: 8px; padding-left: 28px; margin-bottom: 10px; }
    .o-card .vendor-line img { width: 18px; height: 18px; border-radius:999px; }
    .o-card .vendor-line .v-name { font-size: 12.5px; color: var(--text-muted); }
    .o-card .vendor-line .v-name strong { color: var(--text); font-weight: 600; }
    .o-card .foot { display:flex; align-items:center; justify-content: space-between; padding-left: 28px; margin-top: 4px; }
    .o-card .foot .total-line { font-weight: 700; font-size: 15px; color: var(--text); }

    /* Empty */
    .empty-wrap { display:flex; flex-direction:column; align-items:center; text-align:center; padding: 72px 20px; background:#fff; border:1px solid var(--border); border-radius: 16px; }
    .empty-wrap .big-ico { width: 88px; height: 88px; border-radius: 999px; background: var(--brand-soft); color: var(--brand); display:inline-flex; align-items:center; justify-content:center; margin-bottom: 16px; }
    .empty-wrap h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-wrap p { color: var(--text-muted); font-size: 14px; max-width: 380px; margin-bottom: 18px; }

    /* ========== BULK BAR ========== */
    .bulk-bar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 80;
      display: none; justify-content: center; pointer-events: none;
      padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }
    .bulk-bar.show { display: flex; animation: bulkIn .22s cubic-bezier(.2,.8,.2,1); }
    @keyframes bulkIn { from{ transform: translateY(120%);} to{ transform: translateY(0);} }
    .bulk-inner {
      pointer-events: auto;
      display: inline-flex; align-items: center; gap: 12px;
      background: #0F172A; color: #fff;
      border-radius: 999px; padding: 10px 10px 10px 22px;
      box-shadow: 0 16px 40px -10px rgba(15,23,42,.35), 0 4px 10px -4px rgba(15,23,42,.25);
      max-width: calc(100vw - 32px);
      flex-wrap: wrap;
    }
    .bulk-inner .bulk-label { font-size: 13.5px; font-weight: 600; white-space: nowrap; }
    .bulk-inner .bulk-label .num { background: var(--brand); color: #fff; padding: 2px 10px; border-radius: 999px; font-weight:700; margin-right:4px; }
    .bulk-inner .bulk-dl {
      display:inline-flex; align-items:center; gap:8px;
      background: var(--brand); color:#fff; border:none; padding: 10px 18px;
      border-radius: 999px; font-size: 13.5px; font-weight: 700; cursor:pointer;
      transition: .15s;
    }
    .bulk-inner .bulk-dl:hover { background: var(--brand-hover); }
    .bulk-inner .bulk-clear {
      display:inline-flex; align-items:center; gap:6px;
      background: transparent; color:#fff; border:1px solid rgba(255,255,255,.25);
      padding: 9px 16px; border-radius: 999px; font-size:13px; cursor:pointer; font-weight:500;
    }
    .bulk-inner .bulk-clear:hover { border-color:#fff; }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 767px) {
      .table-wrap { display: none; }
      .orders-cards { display: flex; }
      .page-head-row h1 { font-size: 22px; }
      .crumbs { padding: 14px 0 6px; }
      .app-header .row { height: 60px; gap: 10px; }
      .search-pill { max-width: none; }
      .search-pill .kbd { display: none; }
      .header-btn span { display: none; }
      .header-btn { min-width: 44px; padding: 8px; }
      .avatar { width: 36px; height: 36px; }
    }
    @media (min-width: 768px) and (max-width: 1023px) {
      .orders-table { min-width: 800px; }
    }

    /* ========== PRINT-ONLY VIEW ========== */
    .print-only { display: none; }
    @media print {
      @page { size: A4; margin: 14mm; }
      html, body { background: #fff !important; }
      body > *:not(.print-only) { display: none !important; }
      .print-only { display: block !important; }
      .print-page { page-break-after: always; padding: 0; color: #0F172A; font-family: 'Inter', sans-serif; }
      .print-page:last-child { page-break-after: auto; }
      .p-head { display:flex; justify-content: space-between; align-items:flex-start; border-bottom: 2px solid #0F172A; padding-bottom: 10px; margin-bottom: 16px; }
      .p-brand { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
      .p-brand span { color: #37BD69; }
      .p-meta { text-align: right; font-size: 11px; color: #555; }
      .p-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
      .p-sub { font-size: 12px; color: #555; margin-bottom: 16px; }
      .p-grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
      .p-box h4 { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: #6B7280; margin-bottom: 4px; font-weight:700; }
      .p-box p { font-size: 12.5px; line-height: 1.5; color: #111; margin:0; }
      .p-table { width:100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12px; }
      .p-table th { text-align:left; background: #F1F2F4; padding: 8px 10px; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:#555; border-bottom: 1px solid #D1D5DB; font-weight:700; }
      .p-table td { padding: 10px; border-bottom: 1px solid #E5E7EB; vertical-align: top; }
      .p-table .p-r { text-align: right; font-variant-numeric: tabular-nums; }
      .p-totals { margin-top: 10px; display: flex; justify-content: flex-end; }
      .p-totals table { min-width: 260px; font-size: 12px; }

/* ================================================================

  tab: 'all',
  search: '',
  dateRange: 'all',
  sortBy: 'date_desc',
  selectedIds: new Set(),
  expandedRowId: null
};

const DATE_OPTS = [
  { k:'all',   label:'All time' },
  { k:'today', label:'Today' },
  { k:'7d',    label:'Last 7 days' },
  { k:'30d',   label:'Last 30 days' }
];
const SORT_OPTS = [
  { k:'date_desc', label:'Newest' },
  { k:'date_asc',  label:'Oldest' },
  { k:'total_asc', label:'Total ↑' },
  { k:'total_desc',label:'Total ↓' }
];

const fmtINR = n => '₹' + Number(n).toLocaleString('en-IN');
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); }
function fmtDateFull(iso){ const d = new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function statusClass(s){
  return ({ awaiting:'st-awaiting', transit:'st-transit', delivered:'st-delivered', cancelled: /Return/.test(s) ? 'st-return':'st-cancel' })[s] || 'st-transit';
}
function statusLabel(o){
  if (o.status === 'awaiting')  return 'Awaiting';
  if (o.status === 'transit')   return 'In transit';
  if (o.status === 'delivered') return 'Delivered';
  if (o.status === 'cancelled') return /Return/.test(o.subStatus) ? 'Return' : 'Cancelled';
  return 'Order';
}
function statusChipClass(o){
  if (o.status === 'awaiting')  return 'st-awaiting';
  if (o.status === 'transit')   return 'st-transit';
  if (o.status === 'delivered') return 'st-delivered';
  if (o.status === 'cancelled') return /Return/.test(o.subStatus) ? 'st-return':'st-cancel';
  return 'st-transit';
}

/* ================================================================
 *  FILTER + SORT
 * ================================================================ */
function filterList(){
  let list = ORDERS.slice();
  // tab
  if (state.tab !== 'all') list = list.filter(o => o.status === state.tab);
  // search
  const q = state.search.trim().toLowerCase();
  if (q) {
    list = list.filter(o => {
      if (o.id.toLowerCase().includes(q)) return true;
      if ((VENDORS[o.vendor]?.name||'').toLowerCase().includes(q)) return true;
      if (o.items.some(it => it.p.name.toLowerCase().includes(q))) return true;
      return false;
    });
  }
  // date
  if (state.dateRange !== 'all') {
    const now = new Date('2026-04-24');
    const cutoff = new Date(now);
    if (state.dateRange === 'today') cutoff.setHours(0,0,0,0);
    else if (state.dateRange === '7d')  cutoff.setDate(cutoff.getDate()-7);
    else if (state.dateRange === '30d') cutoff.setDate(cutoff.getDate()-30);
    list = list.filter(o => new Date(o.createdAt) >= cutoff);
  }
  // sort
  const cmp = {
    date_desc: (a,b) => new Date(b.createdAt) - new Date(a.createdAt),
    date_asc:  (a,b) => new Date(a.createdAt) - new Date(b.createdAt),
    total_asc: (a,b) => a.total - b.total,
    total_desc:(a,b) => b.total - a.total,
    id_asc:    (a,b) => a.id.localeCompare(b.id),
    id_desc:   (a,b) => b.id.localeCompare(a.id),
    vendor_asc:(a,b) => (VENDORS[a.vendor]?.name||'').localeCompare(VENDORS[b.vendor]?.name||''),
    vendor_desc:(a,b) => (VENDORS[b.vendor]?.name||'').localeCompare(VENDORS[a.vendor]?.name||''),
    status_asc:(a,b) => a.status.localeCompare(b.status),
    status_desc:(a,b) => b.status.localeCompare(a.status)
  }[state.sortBy] || ((a,b)=>0);
  list.sort(cmp);
  return list;
}

function updateCounts(){
  const c = { all: ORDERS.length, awaiting:0, transit:0, delivered:0, cancelled:0 };
  ORDERS.forEach(o => c[o.status]++);
  Object.entries(c).forEach(([k,v]) => {
    const el = document.querySelector(`[data-count="${k}"]`);
    if (el) el.textContent = v;
  });
  document.getElementById('totalBadge').textContent = `${ORDERS.length} orders`;
}

  const thumbs = shown.map(it => `<div class="thumb"><img src="${it.p.img}" loading="lazy" alt=""/></div>`).join('');
  const moreT = remaining > 0 ? `<div class="more-thumb">+${remaining}</div>` : '';
  return `<div class="cell-items">
    <div class="thumb-stack">${thumbs}${moreT}</div>
    <span class="item-count-label">· ${totalQty} itm</span>

}

          </div>
        </td>
        <td class="col-date">${fmtDate(o.createdAt)}<br><span style="font-size:11px;color:var(--text-muted)">${new Date(o.createdAt).getFullYear()}</span></td>
        <td class="col-items">${itemsCell(o)}</td>
        <td class="col-vendor">
          <div class="cell-vendor">
            <img src="${v?.logo}" alt=""/>
            <span class="v-name" title="${v?.name||''}">${v?.name||''}</span>
          </div>
        </td>
        <td class="col-total"><span class="cell-total">${fmtINR(o.total)}</span></td>
        <td class="col-status">
          <span class="st-chip ${statusChipClass(o)}">
            <span class="dot"></span>${statusLabel(o)}
          </span>
        </td>
        <td class="col-act">
          <button class="icon-dl" data-dl="${o.id}" aria-label="Download PDF for ${o.id}" title="Download PDF">
            <i data-lucide="download" class="w-4 h-4"></i>
          </button>
        </td>
      </tr>`;
  }).join('');
}

/* ================================================================
 *  RENDER CARDS (mobile)
 * ================================================================ */
function renderCards(list){
  const host = document.getElementById('ordersCards');
  if (!list.length) { host.innerHTML = ''; return; }
  host.innerHTML = list.map(o => {
    const v = VENDORS[o.vendor];
    const totalQty = o.items.reduce((s,it)=> s + it.qty, 0);
    const shown = o.items.slice(0,3);
    const remaining = o.items.length - shown.length;
    const thumbs = shown.map(it => `<div class="thumb"><img src="${it.p.img}" loading="lazy" alt=""/></div>`).join('');
    const moreT = remaining > 0 ? `<div class="more-thumb">+${remaining}</div>` : '';
    const sel = state.selectedIds.has(o.id);
    return `
      <article class="o-card ${sel?'selected':''}" data-id="${o.id}">
        <div class="oc-top">
          <input type="checkbox" class="cb row-cb" data-id="${o.id}" ${sel?'checked':''} aria-label="Select ${o.id}"/>
          <span class="oid">${o.id}</span>
          <div class="spacer"></div>
          <button class="icon-dl" data-dl="${o.id}" aria-label="Download PDF"><i data-lucide="download" class="w-4 h-4"></i></button>
        </div>
        <div class="sub-line">${fmtDateFull(o.createdAt)} · ${totalQty} ${totalQty===1?'item':'items'}</div>
        <div class="thumbs-row">${thumbs}${moreT}</div>
        <div class="vendor-line">
          <img src="${v?.logo}" alt=""/>
          <span class="v-name"><strong>${v?.name||''}</strong></span>
        </div>
        <div class="foot">
          <span class="total-line">${fmtINR(o.total)}</span>
          <span class="st-chip ${statusChipClass(o)}"><span class="dot"></span>${statusLabel(o)}</span>
        </div>
      </article>`;
  }).join('');
}

/* ================================================================
 *  RENDER ENTRY POINT
 * ================================================================ */
function render(){
  const list = filterList();
  const empty = document.getElementById('emptyState');
  const twrap = document.getElementById('tableWrap');
  const cards = document.getElementById('ordersCards');
  if (!list.length) {
    twrap.style.display = 'none';
    cards.style.display = 'none';
    empty.style.display = 'block';
    empty.innerHTML = renderEmpty();
  } else {
    empty.style.display = 'none';
    twrap.style.display = '';
    cards.style.display = '';
    renderTableRows(list);
    renderCards(list);
  }
  updateSelectAll(list);
  updateBulkBar();
  updateSortIndicators();
  refreshIcons();
}

function renderEmpty(){
  const hasFilters = state.tab !== 'all' || state.search || state.dateRange !== 'all';
  if (hasFilters) {
    return `<div class="empty-wrap">
      <span class="big-ico"><i data-lucide="package-search" class="w-10 h-10"></i></span>
      <h3>No orders match</h3>
      <p>Try another status or clear filters.</p>
      <button class="btn-sm btn-sm-ghost" id="clearFiltersBtn"><i data-lucide="rotate-ccw" class="w-4 h-4"></i> Clear filters</button>
    </div>`;
  }
  return `<div class="empty-wrap">
    <span class="big-ico"><i data-lucide="package" class="w-10 h-10"></i></span>
    <h3>You haven't placed an order</h3>
    <p>When you place an order, it will appear here for easy tracking.</p>
    <a class="btn-sm btn-sm-primary" href="index_1.html"><i data-lucide="shopping-bag" class="w-4 h-4"></i> Shop now</a>
  </div>`;
}

/* ================================================================
 *  SORT INDICATORS
 * ================================================================ */
function updateSortIndicators(){
  const mapping = {
    id:{a:'id_asc',d:'id_desc'},
    date:{a:'date_asc',d:'date_desc'},
    vendor:{a:'vendor_asc',d:'vendor_desc'},
    total:{a:'total_asc',d:'total_desc'},
    status:{a:'status_asc',d:'status_desc'}
  };
  document.querySelectorAll('.orders-table thead th.sortable').forEach(th => {
    th.classList.remove('sorted','desc');
    const k = th.dataset.sort;
    const m = mapping[k];
    if (!m) return;
    if (state.sortBy === m.a) th.classList.add('sorted');
    if (state.sortBy === m.d) th.classList.add('sorted','desc');
  });
}

/* ================================================================
 *  SELECT ALL (tri-state)
 * ================================================================ */
function updateSelectAll(list){
  const cb = document.getElementById('selectAll');
  if (!cb) return;
  const visibleIds = list.map(o => o.id);
  const selectedCount = visibleIds.filter(id => state.selectedIds.has(id)).length;
  cb.indeterminate = selectedCount > 0 && selectedCount < visibleIds.length;
  cb.checked = visibleIds.length > 0 && selectedCount === visibleIds.length;
}

/* ================================================================
 *  BULK BAR
 * ================================================================ */
function updateBulkBar(){
  const bar = document.getElementById('bulkBar');
  const n = state.selectedIds.size;
  bar.classList.toggle('show', n > 0);
  document.getElementById('bulkNum').textContent = n;
  document.getElementById('bulkDlCount').textContent = `(${n})`;
}

/* ================================================================
 *  EVENT WIRING
 * ================================================================ */
function wireEvents(){
  // Tabs
  document.querySelectorAll('#tabsRow button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#tabsRow button').forEach(x => { x.classList.remove('active'); x.setAttribute('aria-selected','false'); });
      b.classList.add('active'); b.setAttribute('aria-selected','true');
      state.tab = b.dataset.tab;
      render();
    });
  });

  // Toolbar search
  const tb = document.getElementById('tbSearch');
  tb.addEventListener('input', e => { state.search = e.target.value; render(); });

  // Dropdowns (date, sort)
  buildDropdown('datePop', DATE_OPTS, state.dateRange, k => { state.dateRange = k; document.getElementById('dateLabel').textContent = DATE_OPTS.find(o=>o.k===k).label; render(); });
  buildDropdown('sortPop', SORT_OPTS, state.sortBy,    k => { state.sortBy    = k; document.getElementById('sortLabel').textContent = SORT_OPTS.find(o=>o.k===k).label; render(); });

  document.getElementById('dateTrigger').addEventListener('click', e => toggleDD('datePop', e));
  document.getElementById('sortTrigger').addEventListener('click', e => toggleDD('sortPop', e));

  document.addEventListener('click', e => {
    document.querySelectorAll('.dd-pop.open').forEach(p => {
      if (!p.contains(e.target) && !p.parentElement.contains(e.target)) p.classList.remove('open');
    });
    // user menu
    const um = document.getElementById('userMenu');
    const uw = document.getElementById('userWrap');
    if (um.classList.contains('open') && !uw.contains(e.target)) um.classList.remove('open');
  });

  // Avatar menu
  document.getElementById('userAvatar').addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('userMenu').classList.toggle('open');
  });

  // Sort headers
  document.querySelectorAll('.orders-table thead th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      const map = {
        id:['id_desc','id_asc'],
        date:['date_desc','date_asc'],
        vendor:['vendor_asc','vendor_desc'],
        total:['total_desc','total_asc'],
        status:['status_asc','status_desc']
      }[k];
      if (!map) return;
      state.sortBy = state.sortBy === map[0] ? map[1] : map[0];
      render();
    });
    th.tabIndex = 0;
    th.addEventListener('keydown', e => { if (e.key==='Enter' || e.key===' ') { e.preventDefault(); th.click(); } });
  });

  // Select-all
  document.getElementById('selectAll').addEventListener('change', e => {
    const list = filterList();
    if (e.target.checked) list.forEach(o => state.selectedIds.add(o.id));
    else list.forEach(o => state.selectedIds.delete(o.id));
    render();
  });

  // Delegated row checkbox + download
  document.body.addEventListener('change', e => {
    if (!e.target.classList.contains('row-cb')) return;
    const id = e.target.dataset.id;
    if (e.target.checked) state.selectedIds.add(id); else state.selectedIds.delete(id);
    render();
  });
  document.body.addEventListener('click', e => {
    const dlBtn = e.target.closest('[data-dl]');
    if (dlBtn) {
      e.stopPropagation();
      const id = dlBtn.dataset.dl;
      const o = ORDERS.find(x => x.id === id);
      if (o) printOrders([o]);
      return;
    }
    // clear filters from empty state
    if (e.target.closest('#clearFiltersBtn')) {
      state.tab = 'all'; state.search = ''; state.dateRange = 'all';
      document.getElementById('tbSearch').value = '';
      document.getElementById('dateLabel').textContent = 'All time';
      document.querySelectorAll('#tabsRow button').forEach(x => x.classList.remove('active'));
      document.querySelector('#tabsRow button[data-tab="all"]').classList.add('active');
      render();
    }
  });

  // Bulk actions
  document.getElementById('bulkDownload').addEventListener('click', () => {
    const ords = ORDERS.filter(o => state.selectedIds.has(o.id));
    if (ords.length) printOrders(ords);
  });
  document.getElementById('bulkClear').addEventListener('click', () => {
    state.selectedIds.clear(); render();
  });

  // Download all visible
  document.getElementById('downloadAllBtn').addEventListener('click', () => {
    const list = filterList();
    if (list.length) printOrders(list);
  });

  // Sticky-shadow toggles on horizontal scroll
  const tw = document.getElementById('tableWrap');
  tw.addEventListener('scroll', () => {
    tw.classList.toggle('scrolled', tw.scrollLeft > 0);
    const atEnd = tw.scrollLeft + tw.clientWidth >= tw.scrollWidth - 1;
    tw.classList.toggle('scroll-end-hidden', !atEnd);
  });
  // Initial shadow state
  setTimeout(() => {
    const atEnd = tw.scrollLeft + tw.clientWidth >= tw.scrollWidth - 1;
    tw.classList.toggle('scroll-end-hidden', !atEnd);
  }, 50);

  // Esc closes dropdowns
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.dd-pop.open, .dd-menu.open').forEach(p => p.classList.remove('open'));
    }
  });
}

function buildDropdown(id, opts, current, onPick){
  const el = document.getElementById(id);
  el.innerHTML = opts.map(o => `<div class="dd-opt ${o.k===current?'active':''}" data-k="${o.k}" role="option">${o.label}<i data-lucide="check" class="tick w-4 h-4"></i></div>`).join('');
  el.querySelectorAll('.dd-opt').forEach(it => {
    it.addEventListener('click', e => {
      e.stopPropagation();
      el.classList.remove('open');
      onPick(it.dataset.k);
      // re-highlight
      el.querySelectorAll('.dd-opt').forEach(x => x.classList.remove('active'));
      it.classList.add('active');
      refreshIcons();
    });
  });
}
function toggleDD(id, e){
  e.stopPropagation();
  const el = document.getElementById(id);
  document.querySelectorAll('.dd-pop.open').forEach(p => { if (p !== el) p.classList.remove('open'); });
  el.classList.toggle('open');
}

/* ================================================================
 *  PRINT / PDF
 * ================================================================ */
function printOrders(orders){
  const host = document.getElementById('printArea');
  host.innerHTML = orders.map(renderPrintPage).join('');
  // Ensure layout before print
  setTimeout(() => { window.print(); }, 60);
}

function renderPrintPage(o){
  const v = VENDORS[o.vendor];
  const subtotal = o.total;
  const tax = Math.round(o.total * 0.18);
  const total = subtotal + tax;
  const addr = `${o.site} · ${o.pin}`;
  const user = 'Dr. S. Ramesh';
  const email = 'subhash@lifesciencetrust.com';
  const items = o.items.map(it => `
    <tr>
      <td style="width:48px;"><img src="${it.p.img}" style="width:42px; height:42px; object-fit:cover; border-radius:6px;" alt=""/></td>
      <td><div style="font-weight:600; color:#111;">${it.p.name}</div></td>
      <td class="p-r">${it.qty}</td>
      <td class="p-r">${fmtINR(Math.round(o.total / Math.max(1, o.items.reduce((s,x)=>s+x.qty,0))))}</td>
      <td class="p-r">${fmtINR(Math.round((it.qty * o.total) / Math.max(1, o.items.reduce((s,x)=>s+x.qty,0))))}</td>
    </tr>
  `).join('');

  const trackingBlock = o.tracking ? `
    <div class="p-box" style="margin-top:10px; padding:10px 12px; border:1px solid #E5E7EB; border-radius:6px; background:#F9FAFB;">
      <h4>Tracking</h4>
      <p><strong>${o.tracking.carrier}</strong> · AWB ${o.tracking.awb}<br>Latest: ${o.tracking.event}</p>
    </div>` : '';

  const reasonBlock = o.reason ? `
    <div class="p-box" style="margin-top:10px; padding:10px 12px; border:1px solid #FECDD3; border-radius:6px; background:#FFF1F2;">
      <h4>Cancellation note</h4>
      <p style="color:#B00020;">${o.reason}</p>
    </div>` : '';

  return `
    <section class="print-page">
      <div class="p-head">
        <div>
          <div class="p-brand">Zoo<span>Enrich</span></div>
          <div style="font-size:11px; color:#6B7280; margin-top:2px;">Wildlife Enrichment Marketplace</div>
        </div>
        <div class="p-meta">
          <div>Order confirmation</div>
          <div>Printed: ${fmtDateFull(new Date().toISOString())}</div>
        </div>
      </div>

      <div class="p-title">${o.id}</div>
      <div class="p-sub">Placed ${fmtDateFull(o.createdAt)} · <span class="p-status">${o.subStatus}</span></div>

      <div class="p-grid-2">
        <div class="p-box">
          <h4>Buyer</h4>
          <p><strong>${user}</strong><br>${email}</p>
        </div>
        <div class="p-box">
          <h4>Vendor</h4>
          <p><strong>${v?.name||''}</strong></p>
        </div>
        <div class="p-box">
          <h4>Ship to</h4>
          <p>${addr}</p>
        </div>
        <div class="p-box">
          <h4>Approver</h4>
          <p>${o.approver || '—'}</p>
        </div>
      </div>

      <table class="p-table">
        <thead>
          <tr>
            <th></th>
            <th>Item</th>
            <th class="p-r" style="width:60px;">Qty</th>
            <th class="p-r" style="width:90px;">Unit</th>
            <th class="p-r" style="width:100px;">Amount</th>
          </tr>
        </thead>
        <tbody>${items}</tbody>
      </table>

      <div class="p-totals">
        <table>
          <tr><td style="color:#6B7280;">Subtotal</td><td class="p-r">${fmtINR(subtotal)}</td></tr>
          <tr><td style="color:#6B7280;">GST (18%)</td><td class="p-r">${fmtINR(tax)}</td></tr>
          <tr class="p-grand"><td>Total</td><td class="p-r">${fmtINR(total)}</td></tr>
        </table>
      </div>

      ${trackingBlock}
      ${reasonBlock}

      <div class="p-foot">ZooEnrich · ${o.id} · Generated ${fmtDateFull(new Date().toISOString())}</div>
    </section>
  `;
}

/* ================================================================
 *  ICONS
 * ================================================================ */
function refreshIcons(){ if (window.lucide?.createIcons) window.lucide.createIcons(); }

/* ================================================================
 *  INIT
 * ================================================================ */
(function init(){
  // Try to pull signed-in user if ZE available
  try {
    if (window.ZE?.user?.resolve) {
      const u = window.ZE.user.resolve();
      if (u?.name)   document.getElementById('userName').textContent  = u.name;
      if (u?.email)  document.getElementById('userEmail').textContent = u.email;
      if (u?.avatar||u?.img) document.getElementById('userAvatar').src = u.avatar || u.img;
    }
  } catch {}

  updateCounts();
  wireEvents();
  render();
})();
</script>
