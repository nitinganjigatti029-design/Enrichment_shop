<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>ZooEnrich · Admin Order Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../tokens.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../data.js?v=20260504c"></script>
  <script src="../app.js?v=20260504c"></script>
  <script src="v2-bridge.js?v=20260505a"></script>
  <style>
    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 0 32px; }
    @media (max-width: 768px) { .page-wrap { padding: 0 16px; } }

    /* =========== Vendor header (UNIFIED — copied from admin_orders_1.html) =========== */
    .app-header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .app-header .row { display: flex; align-items: center; gap: 20px; height: 68px; }
    .brand-mark { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 19px; color: var(--text); flex-shrink: 0; text-decoration: none; }
    .brand-mark .logo-box { width: 32px; height: 32px; border-radius: 10px; background: var(--brand); color: #fff; display: inline-flex; align-items: center; justify-content: center; }
    .v-nav { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; overflow-x: auto; scrollbar-width: none; }
    .v-nav::-webkit-scrollbar { display: none; }
    .v-nav a { display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; color: var(--text-muted); white-space: nowrap; text-decoration: none; transition: .15s; }
    .v-nav a:hover { color: var(--text); background: #F1F2F4; }
    .v-nav a.active { background: var(--brand-soft); color: var(--brand-hover); }
    .v-nav a .nav-badge { min-width: 20px; height: 20px; padding: 0 6px; background: var(--danger); color: #fff; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; margin-left: 2px; }
    .v-right { margin-left: auto; display: inline-flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .v-avatar-wrap { position: relative; }
    .v-avatar-btn { display: inline-flex; align-items: center; gap: 10px; padding: 4px 10px 4px 4px; border-radius: 999px; border: 1px solid var(--border); background: var(--card); cursor: pointer; transition: .15s; }
    .v-avatar-btn:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .v-avatar-btn img { width: 32px; height: 32px; border-radius: 999px; object-fit: cover; background: var(--card-subtle); }
    .v-avatar-btn .v-name { font-size: 13px; font-weight: 600; color: var(--text); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .v-menu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 220px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 8px; display: none; z-index: 80; }
    .v-menu.open { display: block; }
    .v-menu a, .v-menu button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 12px; border-radius: 10px; font-size: 13px; color: var(--text); background: transparent; border: none; cursor: pointer; text-align: left; text-decoration: none; }
    .v-menu a:hover, .v-menu button:hover { background: #F1F2F4; }
    .v-menu .divider { height: 1px; background: var(--border); margin: 6px 4px; }
    .v-menu .muted { color: var(--text-muted); font-size: 12px; padding: 6px 12px; }
    @media (max-width: 900px) {
      .v-nav { display: none !important; }
      .v-avatar-btn .v-name { display: none; }
      .app-header .row { gap: 12px !important; }
    }
    @media (max-width: 400px) { .brand-mark > span:not(.logo-box) { display: none; } }

    /* Admin mobile drawer */
    .vendor-menu-btn { display: none; width: 40px; height: 40px; border-radius: 10px; background: #F1F2F4; border: none; align-items: center; justify-content: center; cursor: pointer; color: var(--text); flex-shrink: 0; }
    .vendor-menu-btn:hover { background: var(--brand-soft); color: var(--brand); }
    @media (max-width: 900px) { .vendor-menu-btn { display: inline-flex; } }
    .vendor-drawer-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); opacity: 0; pointer-events: none; transition: .2s; z-index: 90; }
    .vendor-drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .vendor-drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; max-width: 85vw; background: var(--card); transform: translateX(-100%); transition: .25s cubic-bezier(.2,.8,.2,1); z-index: 100; display: flex; flex-direction: column; box-shadow: 6px 0 20px rgba(0,0,0,.15); }
    .vendor-drawer.open { transform: translateX(0); }
    .vd-head { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); }
    .vd-head .brand-mark { font-size: 17px; }
    .vd-close { width: 36px; height: 36px; border-radius: 10px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .vd-close:hover { background: #F1F2F4; color: var(--text); }
    .vd-nav { display: flex; flex-direction: column; padding: 12px 0; gap: 2px; flex: 1; overflow-y: auto; }
    .vd-nav a { display: flex; align-items: center; gap: 12px; padding: 14px 18px; color: var(--text); font-size: 14px; font-weight: 500; text-decoration: none; }
    .vd-nav a:hover, .vd-nav a.active { background: var(--brand-soft); color: var(--brand-hover); }
    .vd-nav a i { color: var(--text-muted); }
    .vd-nav a:hover i, .vd-nav a.active i { color: var(--brand-hover); }
    .vd-nav a .nav-badge { min-width: 20px; height: 20px; padding: 0 6px; background: var(--danger); color: #fff; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; margin-left: auto; }
    .vd-foot { padding: 14px 16px; border-top: 1px solid var(--border); }
    .vd-foot .btn-ghost { width: 100%; padding: 11px 14px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .vd-foot .btn-ghost:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

    /* ================= Detail page structure ================= */
    .crumbs { font-size: 12px; color: var(--text-muted); padding: 22px 0 6px; display: flex; gap: 8px; align-items: center; }
    .crumbs a:hover { color: var(--brand); }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; font-weight: 600; padding: 6px 0; transition: .15s; }
    .back-link:hover { color: var(--brand); }

    /* Sample banner */
    .sample-banner { background: #FFF9DB; border: 1px solid #FDE68A; border-radius: 12px; padding: 10px 16px; font-size: 12.5px; color: #6D4B00; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .sample-banner i { color: #A16207; }

    /* Head block */
    .detail-head { display: flex; gap: 18px; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; margin-bottom: 20px; }
    .dh-left { flex: 1; min-width: 260px; }
    .dh-id-row { display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .dh-id { font-family: ui-monospace, Menlo, monospace; font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.01em; }
    .chip-big { display: inline-flex; align-items: center; gap: 7px; padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
    .chip-placed           { background: #F1F2F4;           color: #6B7280; }
    .chip-pending          { background: #F1F2F4;           color: #6B7280; }
    .chip-confirmed        { background: var(--brand-soft); color: #006D35; }
    .chip-in_production    { background: #FEF3C7;           color: #A16207; }
    .chip-packed           { background: #D1FAE5;           color: #065F46; }
    .chip-shipped          { background: #CFFAFE;           color: #0891B2; }
    .chip-out_for_delivery { background: #A7F3D0;           color: #065F46; }
    .chip-delivered        { background: var(--brand);      color: #fff; }
    .chip-cancelled        { background: var(--danger);     color: #fff; }
    .chip-returned         { background: #FDE68A;           color: #92400E; }

    .dh-meta { display: flex; gap: 14px; flex-wrap: wrap; font-size: 13px; color: var(--text-muted); margin-top: 4px; align-items: center; }
    .dh-meta .sep { color: var(--text-subtle); }
    .dh-meta strong { color: var(--text); font-weight: 600; }

    .cta-group { display: inline-flex; gap: 8px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
    .cta-btn { padding: 10px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; border: 1px solid transparent; transition: .15s; white-space: nowrap; }
    .cta-primary { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 4px 10px -3px rgba(55,189,105,.45); }
    .cta-primary:hover { background: var(--brand-hover); transform: translateY(-1px); box-shadow: 0 6px 14px -3px rgba(55,189,105,.55); }
    .cta-warn { background: var(--warning); color: #3B2A00; border-color: var(--warning); }
    .cta-warn:hover { background: #D1A716; }
    .cta-ghost { background: #fff; color: var(--text); border-color: var(--border); }
    .cta-ghost:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .cta-danger { background: #fff; color: var(--danger); border-color: #F5C2CB; }
    .cta-danger:hover { background: var(--danger-bg); border-color: var(--danger); }

    /* ============== Two-column layout ============== */
    .grid { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(0, 1fr); gap: 20px; padding-bottom: 80px; }
    @media (max-width: 960px) { .grid { grid-template-columns: 1fr; } }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow-xs); overflow: hidden; }
    .card + .card { margin-top: 16px; }
    .card-head { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--border); }
    .card-head h3 { font-size: 14px; font-weight: 700; color: var(--text); display: inline-flex; align-items: center; gap: 8px; }
    .card-head h3 i { color: var(--brand); }
    .card-head .tiny { font-size: 12px; color: var(--text-muted); }
    .card-body { padding: 18px 20px; }

    /* Progress tracker */
    .track-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 22px 20px 26px; }
    .track-step { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; position: relative; }
    .track-step .dot { width: 32px; height: 32px; border-radius: 999px; background: #F1F2F4; color: var(--text-muted); display: inline-flex; align-items: center; justify-content: center; border: 2px solid var(--border); font-weight: 700; font-size: 12px; z-index: 2; position: relative; transition: .3s; }
    .track-step.done .dot { background: var(--brand-soft); color: var(--brand); border-color: var(--brand); }
    .track-step.current .dot { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(55,189,105,.18); }
    .track-step .lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); line-height: 1.25; }
    .track-step.done .lbl, .track-step.current .lbl { color: var(--text); }
    .track-step .when { font-size: 10px; color: var(--text-subtle); }
    .track-step:not(:last-child)::after { content: ''; position: absolute; top: 15px; left: calc(50% + 18px); right: calc(-50% + 18px); height: 2px; background: var(--border); z-index: 1; }
    .track-step.done:not(:last-child)::after { background: var(--brand); }
    @media (max-width: 720px) {
      .track-grid { grid-template-columns: 1fr; gap: 14px; padding: 18px; }
      .track-step { flex-direction: row; align-items: flex-start; text-align: left; gap: 10px; }
      .track-step:not(:last-child)::after { left: 15px; top: 32px; bottom: -14px; right: auto; width: 2px; height: auto; }
    }

    /* Line items */
    .item { display: flex; gap: 14px; padding: 16px 20px; border-top: 1px solid var(--border); }
    .item:first-child { border-top: none; }
    .item .thumb { width: 80px; height: 80px; border-radius: 12px; overflow: hidden; background: var(--card-subtle); flex-shrink: 0; }
    .item .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .item .meta { flex: 1; min-width: 0; }
    .item .title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .item .sku { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .item .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
    .item-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 600; padding: 3px 8px; border-radius: 999px; background: var(--card-subtle); border: 1px solid var(--border); color: var(--text); }
    .item-chip.species { background: var(--brand-soft); color: var(--brand-hover); border-color: transparent; }
    .item-chip.species img { width: 14px; height: 14px; border-radius: 999px; object-fit: cover; }
    .item-chip.custom { background: #FFF8CC; color: #8A6D00; border-color: transparent; }
    .item .desc { font-size: 12.5px; color: var(--text-muted); margin-top: 8px; line-height: 1.45; }
    .item .price-line { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; font-size: 13px; gap: 8px; flex-wrap: wrap; }
    .item .price-line .left { color: var(--text-muted); }
    .item .price-line .left strong { color: var(--text); font-weight: 700; }
    .item .price-line .right { font-size: 15px; font-weight: 800; color: var(--text); }
    .item .add-cat { font-size: 11.5px; color: var(--brand); font-weight: 700; display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 999px; background: var(--brand-soft); margin-top: 8px; cursor: pointer; border: none; transition: .15s; }
    .item .add-cat:hover { background: var(--brand); color: #fff; }
    .item .added-badge { font-size: 11px; color: var(--brand-hover); font-weight: 700; display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 999px; background: var(--brand-soft); margin-top: 8px; }
    /* Cancelled (voided) line — additive treatment; status pill + popover untouched */
    .item.item-cancelled { opacity: 0.7; background: linear-gradient(0deg, #FFFBFB, #FFFBFB); }
    .item.item-cancelled .price-line .left,
    .item.item-cancelled .price-line .right { text-decoration: line-through; text-decoration-color: var(--text-muted); text-decoration-thickness: 1px; }
    .item-void-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: #B91C1C; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px; cursor: help; }
    /* Inline per-line action row — ETA chip + admin shortcuts */
    .line-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .eta-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; color: #1E40AF; background: #DBEAFE; padding: 4px 9px 4px 9px; border-radius: 999px; line-height: 1.1; }
    .eta-chip i { width: 12px; height: 12px; opacity: .8; }
    .eta-edit-btn { background: none; border: 1px solid var(--border); border-radius: 999px; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: .15s; padding: 0; }
    .eta-edit-btn:hover { color: var(--brand); border-color: var(--brand); background: var(--brand-soft); }
    .eta-edit-btn i { width: 12px; height: 12px; }
    .eta-edit-row { display: inline-flex; align-items: center; gap: 6px; }
    .eta-edit-row input[type="date"] { padding: 5px 8px; border: 1.5px solid var(--brand); border-radius: 8px; font-size: 12px; color: var(--text); outline: none; font-family: inherit; background: var(--card); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .eta-edit-row .eta-save, .eta-edit-row .eta-cancel { padding: 4px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 700; cursor: pointer; border: 1px solid transparent; font-family: inherit; }
    .eta-edit-row .eta-save { background: var(--brand); color: #fff; border-color: var(--brand); }
    .eta-edit-row .eta-save:hover { background: var(--brand-hover); }
    .eta-edit-row .eta-cancel { background: #fff; color: var(--text-muted); border-color: var(--border); }
    .eta-edit-row .eta-cancel:hover { border-color: var(--border-strong); }
    .line-action-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 999px; font-size: 11.5px; font-weight: 700; cursor: pointer; border: 1px solid transparent; font-family: inherit; transition: .15s; line-height: 1.1; }
    .line-action-btn i { width: 13px; height: 13px; }
    .line-action-btn.lab-ship { background: var(--brand-soft); color: var(--brand-hover); border-color: var(--brand-soft); }
    .line-action-btn.lab-ship:hover { background: var(--brand); color: #fff; border-color: var(--brand); }
    .line-action-btn.lab-deliver { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 2px 6px -2px rgba(55,189,105,.45); }
    .line-action-btn.lab-deliver:hover { background: var(--brand-hover); }
    /* Math card — cancelled-lines breakout row */
    .math-line .val.neg.cancelled-amt { color: var(--danger); }
    .math-foot { font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 6px; line-height: 1.4; }
    /* Fulfilment summary (read-only, mirrors decision captured during Accept Order) */
    .fl-pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; margin-top: 10px; line-height: 1; }
    .fl-pill-inhouse { background: #ECFDF5; color: #047857; }
    .fl-pill-inhouse i { color: #047857; }

    /* ============== Per-line status pill + popover ============== */
    .item .meta { position: relative; }
    .item .title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .item .title-row .title { flex: 1; min-width: 0; }
    .ls-pill-wrap { display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .ls-pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px 5px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 700; line-height: 1; border: 1px solid transparent; background: #F1F2F4; color: var(--text-muted); cursor: pointer; transition: .15s; white-space: nowrap; font-family: inherit; }
    .ls-pill:hover { filter: brightness(.97); transform: translateY(-1px); }
    .ls-pill:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(55,189,105,.25); }
    .ls-pill[disabled], .ls-pill.read-only { cursor: default; }
    .ls-pill[disabled]:hover, .ls-pill.read-only:hover { transform: none; filter: none; }
    .ls-pill .ls-dot { width: 7px; height: 7px; border-radius: 999px; background: currentColor; opacity: .85; flex-shrink: 0; }
    .ls-pill i { opacity: .65; }
    .ls-pill-pending     { background: #F1F2F4; color: var(--text-muted); }
    .ls-pill-in_progress { background: #FEF3C7; color: #A16207; }
    .ls-pill-ready       { background: #DBEAFE; color: #1E40AF; }
    .ls-pill-shipped     { background: #E0E7FF; color: #4338CA; }
    .ls-pill-delivered   { background: #ECFDF5; color: #047857; }
    .ls-pill-cancelled   { background: #FEE2E2; color: #B91C1C; }
    .ls-pill-suffix      { font-size: 10px; font-weight: 600; line-height: 1; color: #4338CA; margin-left: 4px; letter-spacing: 0.01em; flex-shrink: 0; }
    .ls-pill-suffix.delivered { color: #047857; }
    .ls-overdue { display: inline-flex; align-items: center; justify-content: center; color: var(--danger); cursor: help; }
    .ls-overdue i { width: 14px; height: 14px; }

    /* Shared popover (positioned absolutely below pill) */
    .ls-popover { position: absolute; z-index: 90; width: 280px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-lg); padding: 0; opacity: 0; transform: translateY(-4px); pointer-events: none; transition: opacity .14s ease, transform .14s ease; }
    .ls-popover.is-open { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .ls-pop-head { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
    .ls-pop-head .lbl { font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
    .ls-pop-head .nm { font-size: 13px; font-weight: 700; color: var(--text); margin-top: 2px; line-height: 1.3; word-break: break-word; }
    .ls-pop-section { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
    .ls-pop-section:last-child { border-bottom: none; }
    .ls-pop-section .ls-sec-lbl { font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
    .ls-pop-btn { width: 100%; padding: 9px 12px; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: 1px solid transparent; transition: .15s; font-family: inherit; }
    .ls-pop-btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 2px 6px -2px rgba(55,189,105,.5); }
    .ls-pop-btn-primary:hover { background: var(--brand-hover); }
    .ls-pop-btn-ghost { background: var(--card); color: var(--text); border-color: var(--border); }
    .ls-pop-btn-ghost:hover { background: #F9FAFB; border-color: var(--border-strong); }
    .ls-pop-btn-danger { background: #fff; color: var(--danger); border-color: #F5C2CB; }
    .ls-pop-btn-danger:hover:not(:disabled) { background: var(--danger-bg); border-color: var(--danger); }
    .ls-pop-btn:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; }
    .ls-eta-row { display: flex; gap: 6px; align-items: center; }
    .ls-eta-input { flex: 1; min-width: 0; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text); outline: none; font-family: inherit; background: var(--card); }
    .ls-eta-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .ls-ship-row { display: flex; gap: 8px; align-items: center; }
    .ls-ship-input { width: 72px; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text); outline: none; font-family: inherit; background: var(--card); font-weight: 700; text-align: center; -moz-appearance: textfield; }
    .ls-ship-input::-webkit-outer-spin-button, .ls-ship-input::-webkit-inner-spin-button { opacity: 1; }
    .ls-ship-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .ls-ship-of { font-size: 12.5px; color: var(--text-muted); font-weight: 600; }
    .ls-ship-helper { font-size: 11.5px; color: var(--text-muted); line-height: 1.3; min-height: 14px; }
    .ls-ship-helper.full { color: #047857; font-weight: 600; }
    .ls-ship-helper.partial { color: #A16207; font-weight: 600; }
    .ls-ship-helper .ls-ship-bo { color: #A16207; }
    .ls-cancel-section { background: #FEF7F7; }
    .ls-cancel-textarea { width: 100%; min-height: 64px; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text); outline: none; resize: vertical; font-family: inherit; line-height: 1.4; }
    .ls-cancel-textarea:focus { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(176,0,32,.12); }
    .ls-cancel-textarea.invalid { border-color: var(--danger); animation: lsShake .35s; }
    @keyframes lsShake { 0%,100%{transform:translateX(0)} 25%,75%{transform:translateX(-4px)} 50%{transform:translateX(4px)} }
    .ls-inline-err { font-size: 11px; color: var(--danger); font-weight: 600; display: none; }
    .ls-inline-err.show { display: block; }
    .ls-audit { font-size: 12px; color: var(--text-muted); line-height: 1.45; }
    .ls-audit strong { color: var(--text); font-weight: 700; }

    /* Rollup line in items card head */
    .ls-rollup { display: inline-flex; flex-wrap: wrap; align-items: center; gap: 8px 10px; font-size: 11.5px; color: var(--text-muted); font-weight: 600; }
    .ls-rollup .ls-rollup-sep { color: var(--text-subtle); }
    .ls-rollup-chip { display: inline-flex; align-items: center; gap: 5px; }
    .ls-rollup-chip .d { width: 7px; height: 7px; border-radius: 999px; }
    .ls-rollup-chip .d.pending     { background: #9CA3AF; }
    .ls-rollup-chip .d.in_progress { background: #D97706; }
    .ls-rollup-chip .d.ready       { background: #2563EB; }
    .ls-rollup-chip .d.shipped     { background: #4F46E5; }
    .ls-rollup-chip .d.partial     { background: #D97706; }
    .ls-rollup-chip .d.delivered   { background: #047857; }
    .ls-rollup-chip .d.cancelled   { background: #B91C1C; }
    .ls-rollup-chip strong { color: var(--text); font-weight: 700; }
    @media (max-width: 600px) {
      .item .title-row { flex-wrap: wrap; }
      .ls-popover { width: calc(100vw - 32px); max-width: 320px; }
    }
    .fl-summary { background: #FAFBFC; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-top: 10px; }
    .fl-summary-head { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .fl-summary-head i { width: 14px; height: 14px; color: var(--brand); }
    .fl-summary-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 13px; align-items: start; }
    .fl-row-k { font-weight: 600; color: var(--text-muted); }
    .fl-row-v { color: var(--text); min-width: 0; word-break: break-word; }
    .fl-row-v.mono { font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; }
    .fl-row-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; font-weight: 500; }
    .fl-row-sub-inline { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .fl-row-link { color: var(--brand-hover); text-decoration: underline; text-underline-offset: 2px; }
    .fl-row-link:hover { color: var(--brand); }
    @media (max-width: 480px) {
      .fl-summary-grid { grid-template-columns: 1fr; gap: 2px 0; }
      .fl-row-k { margin-top: 6px; }
      .fl-row-k:first-child { margin-top: 0; }
    }

    /* Address & tracking cards */
    .kv { display: grid; grid-template-columns: 120px 1fr; gap: 8px 16px; font-size: 13px; }
    .kv .k { color: var(--text-muted); font-weight: 500; }
    .kv .v { color: var(--text); font-weight: 600; }

    .track-card { display: flex; gap: 12px; flex-direction: column; }
    .awb-pill { font-family: ui-monospace, Menlo, monospace; font-size: 12px; font-weight: 700; color: var(--text); background: #F1F2F4; padding: 4px 10px; border-radius: 6px; display: inline-flex; gap: 4px; }
    .tr-event { display: flex; align-items: flex-start; gap: 10px; padding: 12px; background: var(--brand-soft); border-radius: 10px; }
    .tr-event i { color: var(--brand); margin-top: 2px; }
    .tr-event .nm { font-size: 13px; font-weight: 700; color: var(--text); }
    .tr-event .sub { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }

    /* Right column cards */
    .buyer-card-big { padding: 14px 16px 14px; }
    .buyer-card-big .top { display: flex; align-items: flex-start; gap: 12px; }
    .buyer-card-big .ba { width: 40px; height: 40px; border-radius: 999px; object-fit: cover; flex-shrink: 0; }
    .buyer-card-big .meta { min-width: 0; flex: 1; }
    .buyer-card-big .nm { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .buyer-card-big .role { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .buyer-card-big .zoo { display: none; }
    .buyer-card-big .info { font-size: 12px; color: var(--text-muted); margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
    .buyer-card-big .info-row { display: inline-flex; align-items: center; gap: 6px; line-height: 1.4; }
    .buyer-card-big .info-row i,
    .buyer-card-big .info-row svg { width: 13px !important; height: 13px !important; color: var(--text-muted); flex-shrink: 0; stroke-width: 2; }
    .buyer-card-big .info-row .star { color: #E4B819; font-size: 13px; line-height: 1; width: 13px; text-align: center; }
    .buyer-card-big .info-row strong { color: var(--text); font-weight: 700; }
    .buyer-card-big .info-row .dot { width: 3px; height: 3px; border-radius: 999px; background: var(--text-muted); opacity: 0.5; margin: 0 2px; }
    .card-head .head-chat { background: transparent; color: var(--brand); border: 0; padding: 0; font-size: 13px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: .15s; }
    .card-head .head-chat:hover { color: var(--brand-hover); }
    .card-head .head-chat i { width: 14px; height: 14px; color: var(--brand); }
    .card-head .head-chat:hover i { color: var(--brand-hover); }

    /* Chat preview */
    .chat-prev { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .prev-msg { display: flex; gap: 8px; }
    .prev-msg img { width: 28px; height: 28px; border-radius: 999px; flex-shrink: 0; object-fit: cover; }
    .prev-msg .bubble { background: var(--card-subtle); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 12.5px; color: var(--text); line-height: 1.4; flex: 1; min-width: 0; }
    .prev-msg .bubble .who { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .prev-msg .bubble .txt { color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .chat-open-btn { width: 100%; margin-top: 6px; padding: 10px; background: var(--brand-soft); border: none; border-radius: 10px; color: var(--brand-hover); font-weight: 700; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: .15s; }
    .chat-open-btn:hover { background: var(--brand); color: #fff; }
    .chat-empty { padding: 20px; text-align: center; font-size: 12.5px; color: var(--text-muted); }

    /* Math card */
    .math-line { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; }
    .math-line .lab { color: var(--text-muted); }
    .math-line .val { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
    .math-line .val.neg { color: var(--danger); }
    .math-divider { height: 1px; background: var(--border); margin: 6px 0; }
    .payout-line { display: flex; justify-content: space-between; padding: 10px 0 2px; font-size: 14px; }
    .payout-line .lab { color: var(--text); font-weight: 800; }
    .payout-line .val { color: var(--brand); font-weight: 800; font-size: 18px; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

    /* Timestamps card */
    .ts-line { display: flex; justify-content: space-between; padding: 7px 0; font-size: 12.5px; }
    .ts-line .lab { color: var(--text-muted); }
    .ts-line .val { color: var(--text); font-weight: 600; }

    /* ============== Chat side sheet (copied from admin_orders_1.html) ============== */
    .chat-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity .2s ease; z-index: 110; }
    .chat-overlay.open { opacity: 1; pointer-events: auto; }
    .chat-sheet { position: fixed; top: 0; right: 0; bottom: 0; width: 540px; max-width: 95vw; background: var(--card); box-shadow: -20px 0 50px -12px rgba(15,23,42,.22); transform: translateX(100%); transition: transform .32s cubic-bezier(.2,.8,.2,1); z-index: 120; display: flex; flex-direction: column; overflow: hidden; }
    .chat-sheet.open { transform: translateX(0); }
    .chat-sheet .chat-panel { display: flex; flex-direction: column; flex: 1; min-height: 0; border: none; background: var(--card); }
    .chat-sheet .messages { flex: 1; max-height: none; }
    @media (max-width: 600px) { .chat-sheet { width: 100vw; max-width: 100vw; } }

    .chat-panel { display: none; border-top: 1px solid var(--border); background: #FAFBFC; }
    .chat-head { padding: 14px 22px; display: flex; gap: 14px; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
    .chat-head .c-av { width: 40px; height: 40px; border-radius: 999px; overflow: hidden; background: var(--card-subtle); flex-shrink: 0; position: relative; }
    .chat-head .c-av img { width: 100%; height: 100%; object-fit: cover; }
    .chat-head .c-av .pres { position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-radius: 999px; background: var(--brand); border: 2px solid var(--card); }
    .chat-head .c-body { flex: 1; min-width: 0; }
    .chat-head .c-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .chat-head .c-sub { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .chat-head .c-sub .dot { color: var(--text-subtle); }
    .chat-head .c-sub .pres-dot { width: 6px; height: 6px; background: var(--brand); border-radius: 999px; display: inline-block; }
    .chat-head .c-actions { display: inline-flex; gap: 6px; align-items: center; }
    .chat-head .c-btn { width: 34px; height: 34px; border-radius: 10px; background: transparent; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: var(--text-muted); transition: .15s; }
    .chat-head .c-btn:hover { background: #F1F2F4; color: var(--text); }

    .spec-strip { padding: 10px 22px; background: #F4F6F8; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 11px; color: var(--text-muted); }
    .spec-strip .lab { font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-right: 6px; font-size: 10px; }
    .spec-strip .chip-at { background: var(--card); border: 1px solid var(--border); padding: 3px 8px; border-radius: 999px; font-weight: 600; color: var(--text); display: inline-flex; align-items: center; gap: 4px; }
    .spec-strip .chip-at i { color: var(--text-subtle); }

    .messages { padding: 16px 22px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 999px; }
    .day-sep { text-align: center; font-size: 10px; color: var(--text-subtle); font-weight: 800; letter-spacing: .08em; text-transform: uppercase; margin: 6px 0; }
    .day-sep::before, .day-sep::after { content: ''; display: inline-block; width: 40px; height: 1px; background: var(--border); vertical-align: middle; margin: 0 10px; }

    .msg { display: flex; gap: 8px; max-width: 78%; }
    .msg.them { align-self: flex-start; }
    .msg.me { align-self: flex-end; flex-direction: row-reverse; margin-left: auto; }
    .msg-av { width: 26px; height: 26px; border-radius: 999px; overflow: hidden; background: var(--card-subtle); flex-shrink: 0; }
    .msg-av img { width: 100%; height: 100%; object-fit: cover; }
    .msg-bubble { padding: 9px 12px; font-size: 13px; line-height: 1.45; border-radius: 12px; word-wrap: break-word; }
    .msg.them .msg-bubble { background: var(--card); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 3px; }
    .msg.me .msg-bubble { background: var(--brand); color: #fff; border-top-right-radius: 3px; box-shadow: 0 2px 4px -1px rgba(55,189,105,.3); }
    .msg-meta { font-size: 9.5px; color: var(--text-subtle); padding: 0 2px; display: flex; gap: 4px; align-items: center; margin-top: 1px; }
    .msg.me .msg-meta { justify-content: flex-end; }
    .msg-meta .tk { color: var(--brand); }
    .msg-img { max-width: 200px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
    .msg-img img { width: 100%; display: block; }

    .sys-chip { align-self: center; padding: 5px 12px; border-radius: 999px; font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; display: inline-flex; align-items: center; gap: 5px; max-width: 85%; text-align: center; }
    .sys-chip.neutral { background: var(--card); border: 1px solid var(--border); color: var(--text-muted); }
    .sys-chip.accent { background: var(--brand-soft); color: var(--brand-hover); }
    .sys-chip.warn { background: #FFF8CC; color: #8A6D00; }
    .sys-chip.danger { background: var(--danger-bg); color: #B00020; }
    .sys-chip.info { background: #E0F2FE; color: #0369A1; }

    .composer { padding: 12px 22px; background: var(--card); border-top: 1px solid var(--border); display: flex; align-items: flex-end; gap: 8px; }
    .comp-wrap { flex: 1; border: 1px solid var(--border); border-radius: 18px; background: var(--card); padding: 6px 8px 6px 14px; display: flex; align-items: flex-end; gap: 4px; transition: .15s; }
    .comp-wrap:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.12); }
    .comp-wrap textarea { flex: 1; border: none; outline: none; background: transparent; resize: none; min-height: 22px; max-height: 100px; font-size: 13.5px; color: var(--text); font-family: var(--font); padding: 5px 0; }
    .comp-tool { width: 28px; height: 28px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--text-muted); cursor: pointer; }
    .comp-tool:hover { background: #F1F2F4; color: var(--brand); }
    .send-btn { width: 38px; height: 38px; border-radius: 999px; background: var(--brand); color: #fff; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 3px 8px -2px rgba(55,189,105,.5); transition: .15s; flex-shrink: 0; }
    .send-btn:hover { background: var(--brand-hover); transform: scale(1.04); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ============== Modal (shared by Generic + Revert) ============== */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.55); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .2s ease; z-index: 130; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal { background: var(--card); border-radius: 18px; box-shadow: var(--shadow-xl); width: 640px; max-width: 100%; max-height: calc(100vh - 40px); display: flex; flex-direction: column; transform: scale(.96) translateY(10px); transition: transform .24s cubic-bezier(.2,.8,.2,1); overflow: hidden; }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; }
    .modal-head .title { font-size: 16px; font-weight: 800; color: var(--text); display: inline-flex; align-items: center; gap: 8px; }
    .modal-head .title i { color: var(--brand); }
    .modal-close { width: 36px; height: 36px; border-radius: 10px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .modal-close:hover { background: #F1F2F4; color: var(--text); }
    .modal-body { padding: 22px; overflow-y: auto; flex: 1; }
    .modal-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; background: var(--card-subtle); }
    @media (max-width: 600px) {
      .modal-overlay { padding: 0; align-items: stretch; justify-content: stretch; }
      .modal { max-height: 100vh; max-width: 100vw; border-radius: 0; height: 100vh; }
    }

    /* Revert modal */
    .revert-banner { display: flex; gap: 10px; padding: 12px 14px; background: #FFF8CC; border: 1px solid #FDE68A; border-radius: 12px; font-size: 12.5px; color: #6D4B00; line-height: 1.5; margin-bottom: 16px; }
    .revert-banner i { color: #A16207; flex-shrink: 0; margin-top: 1px; }
    .revert-current { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .revert-current strong { color: var(--text); font-weight: 700; }
    .revert-label { font-size: 12px; font-weight: 700; color: var(--text); margin: 12px 0 8px; display: block; }
    .revert-targets { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--card); }
    .revert-target { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; cursor: pointer; border-top: 1px solid var(--border); background: var(--card); transition: .15s; }
    .revert-target:first-child { border-top: none; }
    .revert-target:hover { background: var(--card-subtle); }
    .revert-target.selected { background: var(--brand-soft); }
    .revert-target .rt-radio { width: 18px; height: 18px; border-radius: 999px; border: 2px solid var(--border-strong); flex-shrink: 0; margin-top: 2px; display: inline-flex; align-items: center; justify-content: center; transition: .15s; }
    .revert-target.selected .rt-radio { border-color: var(--brand); background: var(--brand); }
    .revert-target.selected .rt-radio::after { content: ''; width: 6px; height: 6px; border-radius: 999px; background: #fff; }
    .revert-target .rt-body { flex: 1; min-width: 0; }
    .revert-target .rt-name { font-size: 13.5px; font-weight: 700; color: var(--text); }
    .revert-target .rt-desc { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
    .revert-reason { width: 100%; min-height: 90px; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 13.5px; color: var(--text); outline: none; resize: vertical; font-family: var(--font); line-height: 1.5; }
    .revert-reason:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .revert-reason.invalid { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(176,0,32,.12); animation: revertShake .4s; }
    @keyframes revertShake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
    .revert-count { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-align: right; }
    .revert-count.ok { color: var(--brand-hover); font-weight: 600; }
    .cta-btn:disabled { opacity: .5; cursor: not-allowed; box-shadow: none !important; transform: none !important; }

    /* Toast */
    .toast-stack { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
    .toast { pointer-events: auto; min-width: 260px; max-width: 90vw; padding: 12px 18px; background: var(--text); color: #fff; border-radius: 12px; box-shadow: var(--shadow-lg); font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 10px; animation: toastIn .28s cubic-bezier(.2,.8,.2,1) both; }
    .toast.success { background: var(--brand); }
    .toast.warn { background: var(--warning); color: #3B2A00; }

function daysFromToday(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const target = (d instanceof Date) ? new Date(d) : new Date(d);
  target.setHours(0,0,0,0);
  const diff = Math.round((target - today) / 86400000);
  if (diff < 0) return '';
  if (diff === 0) return 'today';
  if (diff === 1) return 'in 1 day';
  return 'in ' + diff + ' days';
}

/* ============ Step timeline ============ */
function timelineSteps(o) {
  const steps = [
    { key:'placed',        lbl:'New Request' },
    { key:'in_production', lbl:'In Production' },
    { key:'packed',        lbl:'Ready to Ship' },
    { key:'shipped',       lbl:'Shipped' },
    { key:'delivered',     lbl:'Delivered' }
  ];
  const order = ['placed','confirmed','in_production','packed','shipped','out_for_delivery','delivered'];
  let rawIdx = order.indexOf(o.status);
  // Treat legacy 'confirmed' as 'in_production' visually so the bar still lands on a real step.
  if (o.status === 'confirmed') rawIdx = order.indexOf('in_production');
  // Map raw chain index → visible step index (chain has 7, visible has 5).
  const chainToVisible = { placed:0, confirmed:1, in_production:1, packed:2, shipped:3, out_for_delivery:3, delivered:4 };
  let currentIdx = chainToVisible[o.status] ?? -1;
  if (o.status === 'cancelled' || o.status === 'returned') currentIdx = -1; // show all as inactive
  return steps.map((s, i) => {
    let cls = '';
    let when = '';
    if (currentIdx >= 0) {
      if (i < currentIdx) cls = 'done';
      else if (i === currentIdx) cls = 'current';
    }
    if (i === 0 && o.createdAt) when = fmtDate(o.createdAt);
    if (i === 2 && o.packedAt) when = fmtDate(o.packedAt);
    if (i === 4 && o.deliveredAt) when = fmtDate(o.deliveredAt);
    return `<div class="track-step ${cls}">
      <div class="dot">${cls==='done' ? '<i data-lucide=\'check\' class=\'w-3.5 h-3.5\'></i>' : (i+1)}</div>
      <div class="lbl">${s.lbl}</div>
      ${when?`<div class="when">${when}</div>`:''}
    </div>`;
  }).join('');
}

const LINE_STATUS_LABEL = { pending:'Pending', in_progress:'In production', ready:'Ready to ship', shipped:'Shipped', delivered:'Delivered', cancelled:'Cancelled' };
const LINE_STATUS_NEXT_LABEL = { pending:'In production', in_progress:'Ready to ship', ready:'Shipped', shipped:'Delivered' };
function lineStatusOf(fulfilment) {
  if (!fulfilment || !fulfilment.status) return 'pending';
  return fulfilment.status;
}
function isLineTerminal(s) { return s === 'delivered' || s === 'cancelled'; }
function isEtaOverdue(fulfilment) {
  if (!fulfilment || !fulfilment.eta) return false;
  const s = lineStatusOf(fulfilment);
  if (s === 'delivered' || s === 'cancelled') return false;
  const d = new Date(fulfilment.eta); d.setHours(23,59,59,999);
  return d.getTime() < Date.now();
}

  // Read-only fulfilment summary (decision captured during Accept Order)
  let fulfilmentHtml = '';

    fulfilmentHtml = `<span class="fl-pill fl-pill-inhouse"><i data-lucide="home" class="w-3 h-3"></i> Made in-house</span>`;
  } else if (fulfilment && fulfilment.mode === 'vendor' && fulfilment.vendor) {
    const v = fulfilment.vendor;
    const rows = [];
    rows.push(`<div class="fl-row-k">Vendor</div><div class="fl-row-v">${escapeHtml(v.name || '—')}</div>`);
    if (v.eta) {
      const d = new Date(v.eta);

    }
    if (v.cost && Number(v.cost) > 0) {

    }
    if (v.ref && String(v.ref).trim()) {
      const refStr = String(v.ref);
      const isUrl = /^https?:\/\//.test(refStr);
      const display = refStr.length > 60 ? refStr.slice(0, 57) + '…' : refStr;
      const refHtml = isUrl
        ? `<a href="${escapeHtml(refStr)}" target="_blank" rel="noopener" title="${escapeHtml(refStr)}" class="fl-row-link">${escapeHtml(display)}</a>`
        : `<span title="${escapeHtml(refStr)}">${escapeHtml(display)}</span>`;
      rows.push(`<div class="fl-row-k">Reference</div><div class="fl-row-v">${refHtml}</div>`);
    }
    fulfilmentHtml = `<div class="fl-summary">
      <div class="fl-summary-head"><i data-lucide="truck"></i> Outsourced to vendor</div>
      <div class="fl-summary-grid">${rows.join('')}</div>
    </div>`;
  }

  // Per-line status pill (always rendered; read-only when parent order cancelled)
  const status = lineStatusOf(fulfilment);
  const parentCancelled = orderStatus === 'cancelled';
  const overdue = isEtaOverdue(fulfilment);
  const overdueIcon = overdue
    ? `<span class="ls-overdue" title="ETA was ${fmtDate(fulfilment.eta)} — overdue"><i data-lucide="alert-triangle"></i></span>`
    : '';
  const pillCls = `ls-pill ls-pill-${status}${parentCancelled ? ' read-only' : ''}`;
  const pillAttrs = parentCancelled
    ? `disabled aria-disabled="true"`
    : `data-ls-pill data-line-idx="${idx}" aria-haspopup="dialog" aria-expanded="false"`;
  const chevron = parentCancelled ? '' : `<i data-lucide="chevron-down" class="w-3 h-3"></i>`;
  // Partial-ship aware label + suffix-chip
  const totalQtyForPill = it.qty;
  const shippedQtyForPill = (fulfilment && Number(fulfilment.shippedQty)) || 0;
  const isPartial = (status === 'shipped' || status === 'delivered') && shippedQtyForPill > 0 && shippedQtyForPill < totalQtyForPill;
  let pillLabel = LINE_STATUS_LABEL[status] || 'Pending';
  if (status === 'shipped' && isPartial) pillLabel = 'Partially shipped';
  else if (status === 'delivered' && isPartial) pillLabel = 'Delivered (partial)';
  const suffixChip = isPartial
    ? `<span class="ls-pill-suffix${status === 'delivered' ? ' delivered' : ''}" aria-label="${shippedQtyForPill} of ${totalQtyForPill} shipped">(${shippedQtyForPill}/${totalQtyForPill})</span>`
    : '';

    <button type="button" class="${pillCls}" ${pillAttrs}>
      <span class="ls-dot"></span>${pillLabel}${chevron}

  </div>`;

  // Voided-line additive visual: dim + strike price + small VOIDED tag (status pill / popover untouched)
  const lineCancelled = status === 'cancelled';
  const lineCancelReason = lineCancelled && fulfilment && fulfilment.cancelReason ? String(fulfilment.cancelReason) : '';
  const itemClass = `item${lineCancelled ? ' item-cancelled' : ''}`;
  const voidTag = lineCancelled
    ? `<span class="item-void-tag"${lineCancelReason ? ` title="Reason: ${escapeHtml(lineCancelReason)}"` : ''}><i data-lucide="ban" class="w-3 h-3"></i> Voided · won't be charged</span>`
    : '';

  // Inline line-action row: ETA chip + Edit ETA button + Mark shipped/delivered shortcuts.
  // (Popover continues to handle full edits — cancel, ship N/M, etc.)
  const currentOrderId = (typeof currentOrder !== 'undefined' && currentOrder) ? currentOrder.id : null;
  let lineActionsHtml = '';
  if (!lineCancelled && currentOrderId) {
    const etaCopy = (window.ZE && ZE.orders && typeof ZE.orders.deriveLineEtaCopy === 'function')
      ? ZE.orders.deriveLineEtaCopy(currentOrderId, idx) : '';
    const etaIso = (fulfilment && fulfilment.eta) ? String(fulfilment.eta).slice(0,10) : '';
    const parts = [];
    if (etaCopy) {
      parts.push(`<span class="eta-chip" data-line-eta-display="${idx}"><i data-lucide="calendar"></i> ${escapeHtml(etaCopy)}</span>`);
    }
    // Edit ETA icon button — applicable for any non-terminal line (not delivered/cancelled)
    if (status !== 'delivered') {
      parts.push(`<button type="button" class="eta-edit-btn" data-line-edit-eta="${idx}" data-eta-current="${escapeHtml(etaIso)}" title="Edit ETA" aria-label="Edit ETA"><i data-lucide="pencil"></i></button>`);
    }
    // Mark shipped — when status is in production-side states
    if (status === 'pending' || status === 'confirmed' || status === 'in_progress' || status === 'ready') {
      parts.push(`<button type="button" class="line-action-btn lab-ship" data-line-mark-shipped="${idx}"><i data-lucide="truck"></i> Mark shipped</button>`);
    }
    // Mark delivered — when shipped (full or partial)
    if (status === 'shipped') {
      parts.push(`<button type="button" class="line-action-btn lab-deliver" data-line-mark-delivered="${idx}"><i data-lucide="check-check"></i> Mark delivered</button>`);
    }
    if (parts.length) {
      lineActionsHtml = `<div class="line-actions" data-line-actions="${idx}">${parts.join('')}</div>`;
    }
  }

  return `<div class="${itemClass}" data-line-idx="${idx}">
    <div class="thumb"><img src="${it.p.img}" alt=""/></div>
    <div class="meta">
      <div class="title-row">

  </div>`;
}

/* ============ Per-line rollup line ============ */
function renderLineRollup(items, fulfilmentMap) {
  // Only render when at least one line has a record (otherwise no useful info)
  let hasAny = false;
  const counts = { pending:0, in_progress:0, ready:0, shipped:0, partial:0, delivered:0, cancelled:0 };
  for (let i = 0; i < items.length; i++) {
    const f = fulfilmentMap[i];
    const total = items[i] ? items[i].qty : 0;
    const sq = (f && Number(f.shippedQty)) || 0;
    if (f && f.status) {
      hasAny = true;
      counts[f.status] = (counts[f.status] || 0) + 1;
      if ((f.status === 'shipped' || f.status === 'delivered') && sq > 0 && sq < total) {
        counts.partial++;
      }
    }
    else counts.pending++;
  }
  if (!hasAny) return '';
  const pieces = [];
  // Show only non-zero, in workflow order; partial sits between shipped and delivered
  const order = ['delivered','partial','shipped','ready','in_progress','pending','cancelled'];
  const partialLabel = 'partial';
  for (const k of order) {
    if (counts[k] > 0) {
      const label = k === 'partial' ? partialLabel : LINE_STATUS_LABEL[k].toLowerCase();
      pieces.push(`<span class="ls-rollup-chip"><span class="d ${k}"></span><strong>${counts[k]}</strong> ${label}</span>`);
    }
  }
  if (!pieces.length) return '';
  return `<span class="ls-rollup-sep">·</span> <span class="ls-rollup">${pieces.join('<span class="ls-rollup-sep">·</span>')}</span>`;
}

/* ============ State-aware CTA group (reused on swap after revert/accept) ============ */
const REVERTABLE_STATUSES = ['confirmed','in_production','packed','shipped','out_for_delivery'];
// Chain of forward progression; earlier targets for revert come from this array
const STATUS_CHAIN = ['placed','confirmed','in_production','packed','shipped','out_for_delivery'];
const REVERT_TARGET_DESC = {
  placed: 'Restart the conversation — buyer will need to re-confirm',
  confirmed: 'Production paused — order goes back to the approved queue',
  in_production: 'Pause packing — fabrication still ongoing',
  packed: 'Unship — goods come back to packed / ready-to-ship',
  shipped: 'Recall from out-for-delivery — goods in transit'
};
function validRevertTargets(status) {
  const i = STATUS_CHAIN.indexOf(status);
  if (i <= 0) return [];
  // Return closest-first (i-1, i-2, …, 0)
  return STATUS_CHAIN.slice(0, i).reverse();
}
function revertBtn(o) {
  if (!REVERTABLE_STATUSES.includes(o.status)) return '';
  return `<button class="cta-btn cta-ghost" onclick="openRevertModal()" title="Move this order to an earlier state"><i data-lucide="corner-up-left" class="w-4 h-4"></i> Revert state</button>`;
}
function stateCTAs(o) {
  let ctas = '';
  if (o.status === 'placed') {
    ctas = `
      <a class="cta-btn cta-primary" href="admin_accept_order_1.html?id=${encodeURIComponent(o.id)}"><i data-lucide="sparkles" class="w-4 h-4"></i> Accept &amp; Confirm</a>
      <button class="cta-btn cta-ghost" onclick="toast('Queued for later · reminders in 24h','warn')"><i data-lucide="timer" class="w-4 h-4"></i> Queue for later</button>
      <button class="cta-btn cta-danger" onclick="openGen('decline')"><i data-lucide="x" class="w-4 h-4"></i> Decline</button>`;
  } else if (o.status === 'confirmed') {
    ctas = `
      <button class="cta-btn cta-primary" onclick="toast('Moved to In Production','success')"><i data-lucide="hammer" class="w-4 h-4"></i> Mark In Production</button>
      <button class="cta-btn cta-ghost" onclick="openChatSheet('${o.id}')"><i data-lucide="message-square" class="w-4 h-4"></i> Chat buyer</button>`;
  } else if (o.status === 'in_production') {
    ctas = `
      <button class="cta-btn cta-primary" onclick="openGen('progress')"><i data-lucide="pencil" class="w-4 h-4"></i> Update Progress</button>
      <button class="cta-btn cta-ghost" onclick="toast('Ready to Ship · buyer notified','success')"><i data-lucide="package-check" class="w-4 h-4"></i> Mark Ready to Ship</button>`;
  } else if (o.status === 'packed') {
    ctas = `
      <button class="cta-btn cta-warn" onclick="openGen('label')"><i data-lucide="printer" class="w-4 h-4"></i> Generate courier label</button>
      <button class="cta-btn cta-primary" onclick="openGen('shipped')"><i data-lucide="truck" class="w-4 h-4"></i> Mark Shipped</button>`;
  } else if (o.status === 'shipped' || o.status === 'out_for_delivery') {
    ctas = `
      <button class="cta-btn cta-primary" onclick="openGen('tracking')"><i data-lucide="pencil" class="w-4 h-4"></i> Update Tracking</button>
      <button class="cta-btn cta-ghost" onclick="openChatSheet('${o.id}')"><i data-lucide="message-square" class="w-4 h-4"></i> Chat buyer</button>`;
  } else if (o.status === 'delivered') {
    ctas = `
      <button class="cta-btn cta-primary" onclick="toast('Invoice downloaded','success')"><i data-lucide="download" class="w-4 h-4"></i> Download Invoice</button>
      <button class="cta-btn cta-ghost" onclick="toast('Review requested · buyer nudged','success')"><i data-lucide="star" class="w-4 h-4"></i> Request Review</button>`;
  } else if (o.status === 'cancelled') {
    ctas = `
      <button class="cta-btn cta-ghost" onclick="openGen('reason')"><i data-lucide="eye" class="w-4 h-4"></i> View reason</button>
      <button class="cta-btn cta-ghost" onclick="openChatSheet('${o.id}')"><i data-lucide="message-square" class="w-4 h-4"></i> Chat buyer</button>`;
  } else if (o.status === 'returned') {
    ctas = `
      <a class="cta-btn cta-primary" href="admin_returns_1.html?id=${o.id}"><i data-lucide="rotate-ccw" class="w-4 h-4"></i> Manage Return</a>`;
  }
  return ctas + revertBtn(o);
}

/* ============ Revert to earlier state modal ============ */
let revertState = { target: null, reason: '' };

function openRevertModal() {
  if (!currentOrder || !REVERTABLE_STATUSES.includes(currentOrder.status)) return;
  const targets = validRevertTargets(currentOrder.status);
  revertState = { target: targets[0] || null, reason: '' };
  renderRevertModal();
  document.getElementById('revertOverlay').classList.add('open');
}
function closeRevertModal() {
  document.getElementById('revertOverlay').classList.remove('open');
}
function renderRevertModal() {
  const o = currentOrder;
  const modal = document.getElementById('revertModal');
  const targets = validRevertTargets(o.status);
  const targetsHtml = targets.map(k => `
    <label class="revert-target ${revertState.target === k ? 'selected' : ''}" data-target="${k}">
      <span class="rt-radio"></span>
      <span class="rt-body">
        <span class="rt-name">${escapeHtml(STATUS_LABEL[k])}</span>
        <span class="rt-desc">${escapeHtml(REVERT_TARGET_DESC[k] || '')}</span>
      </span>
    </label>`).join('');
  const reasonLen = revertState.reason.trim().length;
  const valid = reasonLen >= 15 && revertState.target;
  modal.innerHTML = `
    <div class="modal-head">
      <div class="title" id="revertTitle"><i data-lucide="corner-up-left" class="w-5 h-5"></i> Revert order to earlier state</div>
      <button class="modal-close" onclick="closeRevertModal()"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div class="modal-body">
      <div class="revert-banner">
        <i data-lucide="alert-triangle" class="w-4 h-4"></i>
        <div>Buyer will be notified of this change. Reverting backward is a last resort — use only when forward progress truly isn't possible.</div>
      </div>
      <div class="revert-current">Current state: <span class="chip-big chip-${o.status}"><i data-lucide="${STATUS_ICON[o.status]}" class="w-3.5 h-3.5"></i> ${escapeHtml(STATUS_LABEL[o.status])}</span></div>
      <label class="revert-label">Revert to</label>
      <div class="revert-targets" id="revertTargets">${targetsHtml}</div>
      <label class="revert-label" style="margin-top:16px;">Reason <span style="color:var(--danger);font-weight:700;">*</span> <span style="font-weight:500;color:var(--text-muted);">(visible to buyer)</span></label>
      <textarea class="revert-reason" id="revertReason" placeholder="e.g., Material shortage — need to pause production until new batch arrives next week">${escapeHtml(revertState.reason)}</textarea>
      <div class="revert-count ${reasonLen >= 15 ? 'ok' : ''}" id="revertCount">${reasonLen} / 15 min chars${reasonLen >= 15 ? ' ✓' : ''}</div>
    </div>
    <div class="modal-foot" style="justify-content:flex-end;">
      <button class="cta-btn cta-ghost" onclick="closeRevertModal()">Cancel</button>
      <button class="cta-btn cta-primary" id="revertConfirmBtn" ${valid?'':'disabled'} onclick="confirmRevert()"><i data-lucide="corner-up-left" class="w-4 h-4"></i> Confirm revert</button>
    </div>`;
  // Wire target radio clicks
  modal.querySelectorAll('.revert-target').forEach(el => {
    el.addEventListener('click', () => {
      revertState.target = el.dataset.target;
      modal.querySelectorAll('.revert-target').forEach(x => x.classList.toggle('selected', x.dataset.target === revertState.target));
      updateRevertConfirmBtn();
    });
  });
  // Wire reason textarea
  const ta = modal.querySelector('#revertReason');
  ta.addEventListener('input', e => {
    revertState.reason = e.target.value;
    const len = revertState.reason.trim().length;
    const counter = modal.querySelector('#revertCount');
    counter.textContent = `${len} / 15 min chars${len >= 15 ? ' ✓' : ''}`;
    counter.classList.toggle('ok', len >= 15);
    ta.classList.remove('invalid');
    updateRevertConfirmBtn();
  });
  if (window.lucide?.createIcons) window.lucide.createIcons();
}
function updateRevertConfirmBtn() {
  const btn = document.getElementById('revertConfirmBtn');
  if (!btn) return;
  const valid = revertState.reason.trim().length >= 15 && revertState.target;
  btn.disabled = !valid;
}
function confirmRevert() {
  const reason = revertState.reason.trim();
  const target = revertState.target;
  if (reason.length < 15 || !target) {
    const ta = document.getElementById('revertReason');
    if (ta) { ta.classList.add('invalid'); ta.focus(); }
    return;
  }
  const o = currentOrder;
  const oldStatus = o.status;
  const oldLabel = STATUS_LABEL[oldStatus];
  const newLabel = STATUS_LABEL[target];
  // Mutate order
  o.status = target;
  // Clear now-invalid forward timestamps/fields
  if (STATUS_CHAIN.indexOf(target) < STATUS_CHAIN.indexOf('packed')) { delete o.packedAt; delete o.shipBy; delete o.suggestedCarrier; }
  if (STATUS_CHAIN.indexOf(target) < STATUS_CHAIN.indexOf('shipped')) { delete o.tracking; }
  if (STATUS_CHAIN.indexOf(target) < STATUS_CHAIN.indexOf('in_production')) { delete o.productionStage; }
  if (STATUS_CHAIN.indexOf(target) < STATUS_CHAIN.indexOf('confirmed')) { delete o.approvedAt; delete o.readyBy; }
  // Push chat system message
  if (!o.chat) o.chat = [];
  o.chat.push({ sys: 'warn', body: `Vendor reverted from ${oldLabel} to ${newLabel} — ${reason}` });
  // Close modal
  closeRevertModal();
  // Toast
  toast(`Order reverted to ${newLabel} · buyer notified`, 'warn');
  // Update chip
  const chip = document.querySelector('.dh-id-row .chip-big');
  if (chip) {
    chip.className = `chip-big chip-${target}`;
    chip.innerHTML = `<i data-lucide="${STATUS_ICON[target]}" class="w-3.5 h-3.5"></i> ${STATUS_LABEL[target]}`;
  }
  // Swap CTAs
  const ctaGrp = document.querySelector('.cta-group');
  if (ctaGrp) ctaGrp.innerHTML = stateCTAs(o);
  // Update timeline
  const track = document.querySelector('.track-grid');
  if (track) track.innerHTML = timelineSteps(o);
  // If chat sheet is open for this order, live-insert the system chip
  const sheet = document.getElementById('chatSheet');
  if (sheet && sheet.classList.contains('open')) {
    const panel = sheet.querySelector(`[data-chat-for="${o.id}"]`);
    if (panel) {
      const msgs = panel.querySelector('.messages');
      if (msgs) {
        msgs.insertAdjacentHTML('beforeend', `<div class="sys-chip warn"><i data-lucide="clock" class="w-3 h-3"></i> ${escapeHtml('Vendor reverted from ' + oldLabel + ' to ' + newLabel + ' — ' + reason)}</div>`);
        msgs.scrollTop = msgs.scrollHeight;
      }
    }
  }
  if (window.lucide?.createIcons) window.lucide.createIcons();
}

function openChatSheet(orderId) {
  const o = ORDERS.find(x => x.id === orderId) || currentOrder;
  if (!o) return;
  const sheet = document.getElementById('chatSheet');
  const overlay = document.getElementById('chatOverlay');
  sheet.innerHTML = chatPanel(o);
  sheet.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  sheet.querySelectorAll('[data-close-chat]').forEach(btn => btn.addEventListener('click', closeChatSheet));
  const ta = sheet.querySelector('.comp-wrap textarea');
  const sendBtn = sheet.querySelector('.send-btn');
  if (ta && sendBtn) {
    ta.addEventListener('input', () => {
      sendBtn.disabled = !ta.value.trim();
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
    });
    ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendInSheet(ta, sendBtn); } });
    sendBtn.addEventListener('click', () => sendInSheet(ta, sendBtn));
    setTimeout(() => ta.focus(), 300);
  }
  setTimeout(() => { const msgs = sheet.querySelector('.messages'); if (msgs) msgs.scrollTop = msgs.scrollHeight; }, 40);
  if (window.lucide?.createIcons) window.lucide.createIcons();
}
function closeChatSheet() {
  document.getElementById('chatSheet').classList.remove('open');
  document.getElementById('chatOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function sendInSheet(ta, sendBtn) {
  const text = ta.value.trim();
  if (!text) return;
  const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit', minute:'2-digit'});
  const msgs = document.querySelector('#chatSheet .messages');
  msgs.insertAdjacentHTML('beforeend', `<div class="msg me"><div><div class="msg-bubble">${escapeHtml(text).replace(/\n/g,'<br/>')}</div><div class="msg-meta">${now} <i data-lucide="check-check" class="w-3 h-3 tk"></i></div></div></div>`);
  ta.value = ''; ta.style.height = 'auto'; sendBtn.disabled = true;
  msgs.scrollTop = msgs.scrollHeight;
  if (window.lucide?.createIcons) window.lucide.createIcons();
}
