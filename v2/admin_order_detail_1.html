/* ============ Toasts ============ */
function toast(msg, kind='default') {
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = `toast ${kind==='success'?'success':kind==='warn'?'warn':''}`;
  const icon = kind==='success'?'check-circle':kind==='warn'?'alert-triangle':'info';
  el.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i><span>${escapeHtml(msg)}</span>`;
  stack.appendChild(el);
  if (window.lucide?.createIcons) window.lucide.createIcons();
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 2800);
}

/* ============ Per-line status popover ============ */
let lsPopState = { open: false, lineIdx: null, anchorEl: null };

function lsClosePopover() {
  const pop = document.getElementById('lsPopover');
  if (!pop) return;
  if (lsPopState.open && lsPopState.anchorEl) {
    try { lsPopState.anchorEl.setAttribute('aria-expanded', 'false'); } catch(e) {}
  }
  pop.classList.remove('is-open');
  pop.innerHTML = '';
  lsPopState = { open: false, lineIdx: null, anchorEl: null };
}

function lsBuildPopoverHtml(o, idx, fulfilment, item) {
  const status = lineStatusOf(fulfilment);
  const eta = (fulfilment && fulfilment.eta) ? String(fulfilment.eta).slice(0,10) : '';
  const lineName = item ? item.p.name : ('Line ' + (idx + 1));
  const isTerminal = isLineTerminal(status);
  let sections = '';
  // Header
  sections += `<div class="ls-pop-head">
    <div class="lbl">Update line</div>
    <div class="nm">${escapeHtml(lineName)}</div>
  </div>`;

  if (status === 'cancelled') {
    const reason = fulfilment && fulfilment.cancelReason ? fulfilment.cancelReason : '';
    const hist = fulfilment && Array.isArray(fulfilment.history) ? fulfilment.history.filter(h => h.status === 'cancelled').slice(-1)[0] : null;
    const who = hist && hist.byName ? hist.byName : 'Admin';
    const at = hist && hist.at ? fmtDate(hist.at) : 'just now';
    sections += `<div class="ls-pop-section">
      <div class="ls-sec-lbl">Cancelled</div>
      <div class="ls-audit">Cancelled by <strong>${escapeHtml(who)}</strong> · ${escapeHtml(at)}${reason?`<div style="margin-top:6px;">Reason: ${escapeHtml(reason)}</div>`:''}</div>
    </div>`;
  } else if (status === 'delivered') {
    const hist = fulfilment && Array.isArray(fulfilment.history) ? fulfilment.history.filter(h => h.status === 'delivered').slice(-1)[0] : null;
    const who = hist && hist.byName ? hist.byName : 'Admin';
    const at = hist && hist.at ? fmtDate(hist.at) : 'just now';
    sections += `<div class="ls-pop-section">
      <div class="ls-sec-lbl">Delivered</div>
      <div class="ls-audit">Delivered · marked by <strong>${escapeHtml(who)}</strong> · ${escapeHtml(at)}</div>
    </div>`;
  } else {
    // Advance section
    const next = LINE_STATUS_NEXT_LABEL[status];
    if (next) {
      sections += `<div class="ls-pop-section">
        <button type="button" class="ls-pop-btn ls-pop-btn-primary" data-ls-action="advance">
          <i data-lucide="arrow-right-circle" class="w-4 h-4"></i> Mark as ${escapeHtml(next)}
        </button>
      </div>`;
    }
    // Ship N of M section — only when status is in the shippable window
    if (['pending','in_progress','ready','shipped'].includes(status)) {
      const totalQty = item ? Number(item.qty) || 0 : 0;
      const currentShipped = (fulfilment && Number(fulfilment.shippedQty)) || 0;
      // Default input value: existing shippedQty if any, else totalQty (full ship)
      const inputVal = currentShipped > 0 ? currentShipped : totalQty;
      // If status is already 'shipped', clamp min to 1 to prevent regression to 0
      const minVal = status === 'shipped' ? 1 : 0;
      let helperHtml = '';
      let helperCls = '';
      if (currentShipped === totalQty && totalQty > 0) {
        helperHtml = 'Full shipment';
        helperCls = 'full';
      } else if (currentShipped > 0 && currentShipped < totalQty) {
        const bo = totalQty - currentShipped;
        helperHtml = `${currentShipped} of ${totalQty} shipped · <span class="ls-ship-bo">${bo} backordered</span>`;
        helperCls = 'partial';
      }
      sections += `<div class="ls-pop-section">
        <div class="ls-sec-lbl">Ship units</div>
        <div class="ls-ship-row">
          <input type="number" class="ls-ship-input" id="lsShipInput" min="${minVal}" max="${totalQty}" step="1" value="${inputVal}" aria-label="Units to ship"/>
          <span class="ls-ship-of">of ${totalQty}</span>
        </div>
        <div class="ls-ship-helper ${helperCls}" id="lsShipHelper">${helperHtml}</div>
        <button type="button" class="ls-pop-btn ls-pop-btn-primary" data-ls-action="ship" id="lsShipBtn" disabled>
          <i data-lucide="package-check" class="w-4 h-4"></i> Update shipment
        </button>
      </div>`;
    }
    // ETA section
    sections += `<div class="ls-pop-section">
      <div class="ls-sec-lbl">Estimated delivery</div>
      <div class="ls-eta-row">
        <input type="date" class="ls-eta-input" id="lsEtaInput" value="${escapeHtml(eta)}" aria-label="ETA date"/>
        <button type="button" class="ls-pop-btn ls-pop-btn-ghost" data-ls-action="save-eta" style="width:auto;padding:8px 12px;flex-shrink:0;">Update</button>
      </div>
    </div>`;
    // Cancel section
    sections += `<div class="ls-pop-section ls-cancel-section">
      <div class="ls-sec-lbl" style="color:#B91C1C;">Cancel this line</div>
      <textarea class="ls-cancel-textarea" id="lsCancelReason" placeholder="Reason (visible to buyer) — required" aria-label="Cancellation reason"></textarea>
      <div class="ls-inline-err" id="lsCancelErr">Please add a reason before cancelling.</div>
      <button type="button" class="ls-pop-btn ls-pop-btn-danger" data-ls-action="cancel" disabled>
        <i data-lucide="x-circle" class="w-4 h-4"></i> Cancel this line
      </button>
    </div>`;
  }
  return sections;
}

function lsPositionPopover(pop, anchor) {
  // Position the popover under the anchor button, right-aligned to the meta column edge.
  const r = anchor.getBoundingClientRect();
  // Append to body so it floats — position with page coords
  const sx = window.scrollX || window.pageXOffset;
  const sy = window.scrollY || window.pageYOffset;
  const popW = 280;
  // Right-align to anchor's right edge but never overflow viewport
  let left = r.right + sx - popW;
  if (left < 8 + sx) left = 8 + sx;
  const maxLeft = sx + document.documentElement.clientWidth - popW - 8;
  if (left > maxLeft) left = maxLeft;
  let top = r.bottom + sy + 6;
  // If popover would overflow bottom of viewport, flip above
  // (Estimate popover height ~ 280px worst case)
  const estHeight = 320;
  if (r.bottom + estHeight > window.innerHeight && r.top > estHeight) {
    top = r.top + sy - estHeight - 6;
  }
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
}

function lsOpenPopover(anchorBtn) {
  if (!currentOrder) return;
  const idx = Number(anchorBtn.dataset.lineIdx);
  if (Number.isNaN(idx)) return;
  // If clicking the same pill again, treat as toggle
  if (lsPopState.open && lsPopState.lineIdx === idx) {
    lsClosePopover();
    return;
  }
  // Close any open popover first
  if (lsPopState.open) lsClosePopover();
  const pop = document.getElementById('lsPopover');
  if (!pop) return;
  const fulfilmentMap = (window.ZE && ZE.orders && ZE.orders.lineFulfilment)
    ? ZE.orders.lineFulfilment.forOrder(currentOrder.id)
    : {};
  const fulfilment = fulfilmentMap[idx] || null;
  const item = currentOrder.items[idx];
  pop.innerHTML = lsBuildPopoverHtml(currentOrder, idx, fulfilment, item);
  // Move to body if not already
  if (pop.parentNode !== document.body) document.body.appendChild(pop);
  lsPositionPopover(pop, anchorBtn);
  pop.classList.add('is-open');
  anchorBtn.setAttribute('aria-expanded', 'true');
  lsPopState = { open: true, lineIdx: idx, anchorEl: anchorBtn };

  // Wire actions inside popover
  pop.querySelectorAll('[data-ls-action]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const act = btn.dataset.lsAction;
      lsHandleAction(act, idx);
    });
  });

  // Cancel reason textarea — gate the Cancel button + clear inline error on type
  const ta = pop.querySelector('#lsCancelReason');
  const cancelBtn = pop.querySelector('[data-ls-action="cancel"]');
  const err = pop.querySelector('#lsCancelErr');
  if (ta && cancelBtn) {
    ta.addEventListener('input', () => {
      const ok = ta.value.trim().length > 0;
      cancelBtn.disabled = !ok;
      ta.classList.remove('invalid');
      if (err) err.classList.remove('show');
    });
  }

  // Ship N of M: live helper update + button enable based on diff vs current shippedQty
  const shipInput = pop.querySelector('#lsShipInput');
  const shipBtn = pop.querySelector('#lsShipBtn');
  const shipHelper = pop.querySelector('#lsShipHelper');
  if (shipInput && shipBtn) {
    const totalQty = item ? Number(item.qty) || 0 : 0;
    const currentShipped = (fulfilment && Number(fulfilment.shippedQty)) || 0;
    const status = lineStatusOf(fulfilment);
    const minVal = status === 'shipped' ? 1 : 0;
    const syncShip = () => {
      let v = parseInt(shipInput.value, 10);
      if (Number.isNaN(v)) v = currentShipped;
      // Clamp visually
      if (v < minVal) v = minVal;
      if (v > totalQty) v = totalQty;
      if (String(v) !== shipInput.value) shipInput.value = String(v);
      // Update helper line
      if (shipHelper) {
        shipHelper.classList.remove('full','partial');
        if (v === totalQty && totalQty > 0) {
          shipHelper.textContent = 'Full shipment';
          shipHelper.classList.add('full');
        } else if (v > 0 && v < totalQty) {
          const bo = totalQty - v;
          shipHelper.innerHTML = `${v} of ${totalQty} shipped · <span class="ls-ship-bo">${bo} backordered</span>`;
          shipHelper.classList.add('partial');
        } else {
          shipHelper.textContent = '';
        }
      }
      // Enable button only when value differs from current shippedQty
      shipBtn.disabled = (v === currentShipped);
    };
    shipInput.addEventListener('input', syncShip);
    shipInput.addEventListener('change', syncShip);
    shipInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); if (!shipBtn.disabled) lsHandleAction('ship', idx); }
    });
    syncShip();
  }

  // ETA: commit on blur for the input (UX nicety: explicit Update button is also wired above)
  const etaInput = pop.querySelector('#lsEtaInput');
  if (etaInput) {
    etaInput.addEventListener('blur', e => {
      // Only commit if changed (don't fire on simple focus-out of unchanged value)
      const before = (fulfilment && fulfilment.eta) ? String(fulfilment.eta).slice(0,10) : '';
      const after = etaInput.value || '';
      if (before === after) return;
      // Commit only if the user has tabbed away to a different element (not a popover button)
      const next = e.relatedTarget;
      if (next && pop.contains(next)) return;
      lsHandleAction('save-eta', idx);
    });
    // Commit on Enter key as well
    etaInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); lsHandleAction('save-eta', idx); }
    });
  }

  // Re-render lucide icons inside the popover
  if (window.lucide?.createIcons) window.lucide.createIcons();

  // Focus first interactive element for keyboard users
  setTimeout(() => {
    const firstBtn = pop.querySelector('button:not(:disabled), input, textarea');
    if (firstBtn) firstBtn.focus();
  }, 30);
}

function lsHandleAction(act, idx) {
  if (!currentOrder || !window.ZE || !ZE.orders || !ZE.orders.lineFulfilment) return;
  const orderId = currentOrder.id;
  const pop = document.getElementById('lsPopover');
  if (act === 'advance') {
    ZE.orders.lineFulfilment.advance(orderId, idx);
    toast('Line moved forward', 'success');
    lsClosePopover();
  } else if (act === 'ship') {
    const inp = pop && pop.querySelector('#lsShipInput');
    const item = currentOrder.items[idx];
    const totalQty = item ? Number(item.qty) || 0 : 0;
    let v = inp ? parseInt(inp.value, 10) : 0;
    if (Number.isNaN(v)) v = 0;
    if (v < 0) v = 0;
    if (v > totalQty) v = totalQty;
    if (typeof ZE.orders.lineFulfilment.setShipped === 'function') {
      ZE.orders.lineFulfilment.setShipped(orderId, idx, v, totalQty);
    }
    const msg = v === totalQty ? 'Full shipment recorded' : (v === 0 ? 'Shipment cleared' : `Partial shipment: ${v} of ${totalQty}`);
    toast(msg, 'success');
    lsClosePopover();
  } else if (act === 'save-eta') {
    const inp = pop && pop.querySelector('#lsEtaInput');
    const v = inp ? inp.value : '';
    ZE.orders.lineFulfilment.setEta(orderId, idx, v || null);
    toast(v ? 'ETA updated' : 'ETA cleared', 'success');
    lsClosePopover();
  } else if (act === 'cancel') {
    const ta = pop && pop.querySelector('#lsCancelReason');
    const err = pop && pop.querySelector('#lsCancelErr');
    const reason = ta ? ta.value.trim() : '';
    if (!reason) {
      if (ta) { ta.classList.add('invalid'); ta.focus(); }
      if (err) err.classList.add('show');
      return;
    }
    ZE.orders.lineFulfilment.cancel(orderId, idx, reason);
    toast('Line cancelled', 'warn');
    lsClosePopover();
  }
}

// Delegated listeners — pill clicks, outside-click, Esc, focus trap
document.addEventListener('click', e => {
  // Pill open
  const pill = e.target.closest('[data-ls-pill]');
  if (pill) {
    e.preventDefault();
    e.stopPropagation();
    lsOpenPopover(pill);
    return;
  }
  // Click outside the popover when open → close
  if (lsPopState.open) {
    const pop = document.getElementById('lsPopover');
    if (pop && !pop.contains(e.target)) lsClosePopover();
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && lsPopState.open) {
    e.stopPropagation();
    const anchor = lsPopState.anchorEl;
    lsClosePopover();
    if (anchor) try { anchor.focus(); } catch(err) {}
    return;
  }
  // Focus trap inside popover
  if (e.key === 'Tab' && lsPopState.open) {
    const pop = document.getElementById('lsPopover');
    if (!pop) return;
    const focusables = pop.querySelectorAll('button:not(:disabled), input, textarea, [tabindex]:not([tabindex="-1"])');
    if (!focusables.length) return;
    const first = focusables[0];
    const last = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }
});
window.addEventListener('resize', () => { if (lsPopState.open) lsClosePopover(); });
window.addEventListener('scroll', () => { if (lsPopState.open) lsClosePopover(); }, true);

/* ============ Boot ============ */
let currentOrder = null;
function boot() {
  const id = getParam('id');
  let o = null;
  if (id) o = ORDERS.find(x => x.id === id);
  if (!o) o = ORDERS.find(x => x.status === 'placed') || ORDERS[0];
  currentOrder = o;
  document.getElementById('pageMain').innerHTML = renderDetail(o);
  if (window.lucide?.createIcons) window.lucide.createIcons();
  // Overlay click-to-close
  document.getElementById('chatOverlay').addEventListener('click', closeChatSheet);
  document.getElementById('genOverlay').addEventListener('click', e => { if (e.target.id === 'genOverlay') closeGen(); });
  document.getElementById('revertOverlay').addEventListener('click', e => { if (e.target.id === 'revertOverlay') closeRevertModal(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('revertOverlay').classList.contains('open')) closeRevertModal();
      else if (document.getElementById('genOverlay').classList.contains('open')) closeGen();
      else closeChatSheet();
    }
  });
}

/* Unified header: mobile drawer + avatar menu */
(function(){
  const menuBtn = document.getElementById('vendorMenuBtn');
  const drawer  = document.getElementById('vDrawer');
  const overlay = document.getElementById('vDrawerOverlay');
  const closeBtn = drawer && drawer.querySelector('.vd-close');
  function openDrawer(){ drawer.classList.add('open'); overlay.classList.add('open'); drawer.setAttribute('aria-hidden','false'); }
  function closeDrawer(){ drawer.classList.remove('open'); overlay.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); }
  if (menuBtn) menuBtn.addEventListener('click', openDrawer);
  if (overlay) overlay.addEventListener('click', closeDrawer);
  if (closeBtn) closeBtn.addEventListener('click', closeDrawer);

  const avatarBtn = document.getElementById('avatarBtn');
  const vMenu = document.getElementById('vMenu');
  if (avatarBtn && vMenu) {
    avatarBtn.addEventListener('click', e => { e.stopPropagation(); vMenu.classList.toggle('open'); });
    document.addEventListener('click', e => { if (!vMenu.contains(e.target) && e.target !== avatarBtn) vMenu.classList.remove('open'); });
  }
})();

boot();

/* Re-render if fulfilment decision is captured (e.g. on Accept Order in another tab) */
if (typeof ZE !== 'undefined' && ZE.on) {
  ZE.on('orders:change', () => {
    // Close any per-line popover first (anchor will be replaced on render)
    lsClosePopover();
    const id = getParam('id');
    const o = id ? ORDERS.find(x => x.id === id) : (currentOrder || ORDERS[0]);
    if (!o) return;
    currentOrder = o;
    document.getElementById('pageMain').innerHTML = renderDetail(o);
    if (window.lucide?.createIcons) window.lucide.createIcons();
  });
}
</script>
