<script>
  (function(){
    'use strict';

    /* ---------- helpers ---------- */
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function safeFmt(n) {
      try { if (typeof DB !== 'undefined' && DB && typeof DB.fmtINR === 'function') return DB.fmtINR(n); } catch(e){}
      const v = Number(n||0);
      return '₹' + v.toLocaleString('en-IN');
    }
    function safeById(coll, id) {
      try { if (typeof DB !== 'undefined' && DB && typeof DB.byId === 'function') return DB.byId(coll, id); } catch(e){}
      if (Array.isArray(coll)) return coll.find(x => x && x.id === id);
      return null;
    }
    function findOrder(id) {
      let list = [];
      try { if (typeof ZE !== 'undefined' && ZE && ZE.orders && typeof ZE.orders.read === 'function') list = ZE.orders.read() || []; } catch(e){}
      let demo = [];
      try { if (typeof DB !== 'undefined' && DB && Array.isArray(DB.DEMO_ORDERS)) demo = DB.DEMO_ORDERS; } catch(e){}
      return list.concat(demo).find(o => o && o.id === id) || null;
    }
    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      try { return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }); }
      catch(e) { return d.toDateString(); }
    }
    function fmtRelative(iso) {
      if (!iso) return '';
      const t = Date.parse(iso);
      if (!isFinite(t)) return '';
      const diff = Date.now() - t;
      const day = 86400000;
      const hr  = 3600000;
      const min = 60000;
      if (diff < min)        return 'just now';
      if (diff < hr)         { const m = Math.round(diff/min); return m + ' min ago'; }
      if (diff < day)        { const h = Math.round(diff/hr);  return h + ' hr ago'; }
      const d = Math.round(diff/day);
      if (d === 1) return '1 day ago';
      if (d < 30)  return d + ' days ago';
      const mo = Math.round(d/30);
      return mo + (mo === 1 ? ' month ago' : ' months ago');
    }
    function pollinations(q, seed) {
      return 'https://image.pollinations.ai/prompt/' + encodeURIComponent(q || 'wildlife')
           + '?width=64&height=64&seed=' + (seed || 1) + '&nologo=true';
    }
    function refreshIcons() {
      try { if (typeof lucide !== 'undefined' && lucide && typeof lucide.createIcons === 'function') lucide.createIcons(); } catch(e){}
    }

    /* ---------- toast ---------- */
    let toastTimer = null;
    function toast(msg, kind) {
      const el = document.getElementById('approvalSheetToast');
      if (!el) return;
      el.textContent = msg;
      el.classList.remove('is-success','is-error');
      if (kind === 'success') el.classList.add('is-success');
      if (kind === 'error') el.classList.add('is-error');
      el.classList.add('is-open');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function(){ el.classList.remove('is-open'); }, 2400);
    }

    /* ---------- species avatar render ---------- */
    function renderSpeciesAvatar(sp) {
      if (!sp) return '<div class="ap-avatar">?</div>';
      const initial = (sp.name || '?').trim().charAt(0).toUpperCase();
      const url = pollinations(sp.imgQ, sp.seed);
      return '<div class="ap-avatar">'
           +   '<img src="' + esc(url) + '" alt="" loading="lazy" '
           +   'onerror="this.remove()" />'
           +   '<span style="position:absolute">' + esc(initial) + '</span>'
           + '</div>';
    }

    /* ---------- sheet open / close primitives ---------- */
    const SHEETS = {
      species: { sheet: 'approvalSpeciesSheet', overlay: 'approvalSpeciesSheetOverlay' },
      detail:  { sheet: 'approvalDetailSheet',  overlay: 'approvalDetailSheetOverlay'  }
    };
    let openSheet = null;
    let lastFocus = null;

    function openSheetEl(key) {
      // Close any other open sheet first
      Object.keys(SHEETS).forEach(function(k){
        if (k !== key) closeSheetEl(k, true);
      });
      const cfg = SHEETS[key]; if (!cfg) return;
      const sheet = document.getElementById(cfg.sheet);
      const overlay = document.getElementById(cfg.overlay);
      if (!sheet || !overlay) return;
      lastFocus = document.activeElement;
      sheet.hidden = false; overlay.hidden = false;
      sheet.setAttribute('aria-hidden', 'false');
      // force reflow so transition triggers
      void sheet.offsetWidth;
      sheet.classList.add('is-open'); overlay.classList.add('is-open');
      document.body.classList.add('ap-sheet-locked');
      openSheet = key;
      // focus first focusable
      setTimeout(function(){
        const focusable = sheet.querySelector('button, [href], input, textarea, select, [tabindex]:not([tabindex="-1"])');
        if (focusable) focusable.focus();
      }, 50);
    }

    function closeSheetEl(key, immediate) {
      const cfg = SHEETS[key]; if (!cfg) return;
      const sheet = document.getElementById(cfg.sheet);
      const overlay = document.getElementById(cfg.overlay);
      if (!sheet || !overlay) return;
      sheet.classList.remove('is-open'); overlay.classList.remove('is-open');
      sheet.setAttribute('aria-hidden', 'true');
      const finish = function(){
        sheet.hidden = true; overlay.hidden = true;
      };
      if (immediate) finish();
      else setTimeout(finish, 280);
      if (openSheet === key) {
        openSheet = null;
        document.body.classList.remove('ap-sheet-locked');
        if (lastFocus && typeof lastFocus.focus === 'function') {
          try { lastFocus.focus(); } catch(e){}
        }
      }
    }

    /* ---------- focus trap ---------- */
    function trapFocus(e) {
      if (!openSheet) return;
      if (e.key !== 'Tab') return;
      const cfg = SHEETS[openSheet];
      const sheet = document.getElementById(cfg.sheet);
      if (!sheet) return;
      const nodes = sheet.querySelectorAll('button, [href], input, textarea, select, [tabindex]:not([tabindex="-1"])');
      const list = Array.prototype.filter.call(nodes, function(n){ return !n.disabled && n.offsetParent !== null; });
      if (!list.length) return;
      const first = list[0], last = list[list.length-1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }

    /* ---------- species sheet renderer ---------- */
    function renderSpeciesSheet(orderId) {
      const o = findOrder(orderId);
      const titleEl = document.getElementById('approvalSpeciesSheetTitle');
      const body = document.getElementById('approvalSpeciesSheetBody');
      if (!body || !titleEl) return;
      titleEl.textContent = 'Species in ' + (o ? o.id : orderId);

      if (!o) {
        body.innerHTML = '<div class="ap-species-count">Order not found.</div>';
        return;
      }

      // collect unique species ids
      const ids = [];
      const seen = {};
      function add(spId) {
        if (!spId || seen[spId]) return;
        seen[spId] = 1; ids.push(spId);
      }
      add(o.speciesId);
      if (Array.isArray(o.items)) o.items.forEach(function(it){ if (it) add(it.speciesId); });

      const species = ids.map(function(id){ return safeById((typeof DB!=='undefined'?DB.SPECIES:[]), id); }).filter(Boolean);

      if (!species.length) {
        body.innerHTML = '<div class="ap-species-count">No species linked to this request.</div>';
        return;
      }

      const rows = species.map(function(sp){
        return '<div class="ap-list-row">'
             +   renderSpeciesAvatar(sp)
             +   '<div class="ap-list-name">' + esc(sp.name) + '</div>'
             + '</div>';
      }).join('');

      body.innerHTML =
          '<div class="ap-species-count">' + species.length + (species.length === 1 ? ' species' : ' species') + '</div>'
        + '<div class="ap-list">' + rows + '</div>';
      refreshIcons();
    }

    /* ---------- detail sheet renderer ---------- */
    function renderDetailSheet(orderId) {
      const o = findOrder(orderId);
      const titleEl = document.getElementById('approvalDetailSheetTitle');
      const subEl   = document.getElementById('approvalDetailSheetSub');
      const body    = document.getElementById('approvalDetailSheetBody');
      const foot    = document.getElementById('approvalDetailSheetFoot');
      if (!titleEl || !body || !foot) return;

      titleEl.textContent = o ? o.id : (orderId || 'Order');

      if (!o) {
        subEl.textContent = '';
        body.innerHTML = '<div class="ap-species-count">Order not found.</div>';
        foot.innerHTML = '';
        return;
      }

      subEl.textContent = 'Requested ' + fmtDate(o.createdAt) + (fmtRelative(o.createdAt) ? ' · ' + fmtRelative(o.createdAt) : '');

      // requester
      const requesterId = o.buyerId || o.createdBy;
      const u = requesterId ? safeById((typeof DB!=='undefined'?DB.USERS:[]), requesterId) : null;
      const site = o.siteId ? safeById((typeof DB!=='undefined'?DB.SITES:[]), o.siteId) : null;
      const reqInitial = u && u.name ? u.name.trim().charAt(0).toUpperCase() : '?';
      const reqRoleQ = u ? ((u.role === 'biologist') ? 'professional zoo biologist portrait headshot smile'
              : (u.role === 'keeper') ? 'professional zoo keeper portrait headshot smile'
              : (u.role === 'vet') ? 'professional veterinarian portrait headshot smile'
              : (u.role === 'curator') ? 'professional zoo curator portrait headshot smile'
              : (u.role === 'lab_manager') ? 'professional laboratory manager portrait headshot smile'
              : (u.role === 'lab_tech') ? 'professional laboratory technician portrait headshot smile'
              : 'professional zoo staff portrait headshot smile') : '';
      const reqAvatarUrl = u ? pollinations(reqRoleQ, u.seed || 400) : '';
      const reqMetaParts = [];
      if (u && u.title) reqMetaParts.push(u.title);
      if (site && site.name) reqMetaParts.push(site.name);
      const reqHtml = u
        ? ('<div class="ap-section">'
           + '<div class="ap-section-label">Requester</div>'
           + '<div class="ap-req-block">'
           +   '<div class="ap-req-avatar">'
           +     '<img src="' + esc(reqAvatarUrl) + '" alt="" loading="lazy" onerror="this.remove()" />'
           +     '<span style="position:absolute">' + esc(reqInitial) + '</span>'
           +   '</div>'
           +   '<div class="ap-req-info">'
           +     '<div class="ap-req-name">' + esc(u.name) + '</div>'
           +     (reqMetaParts.length ? '<div class="ap-req-meta">' + esc(reqMetaParts.join(' · ')) + '</div>' : '')
           +   '</div>'
           + '</div>'
           + '</div>')
        : '';

      // V2 product hero — single product per order with gallery + description
      const items = Array.isArray(o.items) ? o.items : [];
      const it0 = items[0] || {};
      const p0 = it0 && it0.productId ? safeById((typeof DB!=='undefined'?DB.PRODUCTS:[]), it0.productId) : null;
      const pname0 = p0 ? p0.name : (it0.productId || 'Item');
      const gallery = p0 && DB.galleryFor ? (DB.galleryFor(p0) || []) : (p0 && p0.gallery ? p0.gallery : []);
      const galleryList = gallery.length ? gallery : (p0 && (p0.img || p0.imgSmall) ? [p0.img || p0.imgSmall] : []);
      const cfg0 = (it0.config && Object.values(it0.config).filter(Boolean).join(' · ')) || '';
      const sp0 = it0.speciesId ? safeById((typeof DB!=='undefined'?DB.SPECIES:[]), it0.speciesId) : null;
      const enc0 = it0.enclosureId ? safeById((typeof DB!=='undefined'?DB.ENCLOSURES:[]), it0.enclosureId) : null;
      const metaBits = [];
      metaBits.push('Qty ' + (it0.qty != null ? it0.qty : 1));
      if (cfg0) metaBits.push(cfg0);
      if (sp0 && sp0.name) metaBits.push(sp0.name);
      if (enc0 && enc0.name) metaBits.push(enc0.name);
      // Description synthesized from product attributes + vendor tagline
      const ven = p0 && p0.vendorId ? safeById((typeof DB!=='undefined'?DB.VENDORS:[]), p0.vendorId) : null;
      const descBits = [];
      if (p0 && p0.mat && p0.mat.length) descBits.push('Materials: ' + p0.mat.join(', '));
      if (p0 && p0.size) descBits.push('Size ' + p0.size);
      if (p0 && p0.scent && p0.scent.length) descBits.push('Scent: ' + p0.scent.join(', '));
      if (p0 && p0.duration) descBits.push('Duration ' + p0.duration);
      if (p0 && p0.prep) descBits.push('Prep ' + p0.prep);
      const venLine = ven && ven.tagline ? ven.tagline : '';
      const heroHtml = items.length
        ? ('<div class="ap-hero">'
           + '<div class="ap-hero-main"><img class="ap-hero-img" id="apHeroMain" src="' + esc(galleryList[0] || '') + '" alt="' + esc(pname0) + '" loading="lazy" /></div>'
           + (galleryList.length > 1
              ? ('<div class="ap-hero-thumbs" role="tablist">'
                 + galleryList.map(function(src, i){
                     return '<button type="button" class="ap-hero-thumb' + (i === 0 ? ' active' : '') + '" data-ap-thumb data-src="' + esc(src) + '"><img src="' + esc(src) + '" alt="' + esc(pname0) + ' view ' + (i+1) + '" loading="lazy"/></button>';
                   }).join('')
                 + '</div>')
              : '')
           + '<div class="ap-hero-meta">'
           +   '<div class="ap-hero-name">' + esc(pname0) + '</div>'
           +   '<div class="ap-hero-bits">' + esc(metaBits.join(' · ')) + '</div>'
           + '</div>'
           + (venLine || descBits.length
              ? ('<div class="ap-hero-desc">'
                 + (venLine ? '<div class="ap-hero-tagline">' + esc(venLine) + '</div>' : '')
                 + (descBits.length ? '<div class="ap-hero-attrs">' + esc(descBits.join(' · ')) + '</div>' : '')
                 + '</div>')
              : '')
           + '</div>')
        : '';

      // notes
      const notes = (o.notes || '').trim();
      const notesHtml = notes
        ? ('<div class="ap-section">'
           + '<div class="ap-section-label">Notes</div>'
           + '<div class="ap-note">' + esc(notes) + '</div>'
           + '</div>')
        : '';

      body.innerHTML = reqHtml + heroHtml + notesHtml;

      // Wire gallery thumb clicks (swap main image)
      const mainImgEl = body.querySelector('#apHeroMain');
      body.querySelectorAll('[data-ap-thumb]').forEach(function(btn){
        btn.addEventListener('click', function(){
          const src = btn.getAttribute('data-src');
          if (mainImgEl && src) mainImgEl.src = src;
          body.querySelectorAll('.ap-hero-thumb.active').forEach(function(a){ a.classList.remove('active'); });
          btn.classList.add('active');
        });
      });

      // footer
      const totalHtml = '<div class="ap-foot-total">'
        +   '<span class="lbl">Total</span>'
        +   '<span class="amt">' + safeFmt(o.total != null ? o.total : 0) + '</span>'
        + '</div>';

      if (o.approvalStatus === 'approved') {
        // Already approved — single "Cancel approval" action that reverts to pending
        foot.innerHTML = totalHtml
          + '<div class="ap-foot-actions">'
          +   '<button type="button" class="ap-btn ap-btn-reject" data-ap-action="revert">'
          +     '<i data-lucide="undo-2" class="w-4 h-4"></i> Cancel approval'
          +   '</button>'
          + '</div>';
      } else if (o.approvalStatus === 'rejected') {
        // Already rejected — no destructive action; user can re-open via listing if needed
        foot.innerHTML = totalHtml;
      } else {
        // Pending — original Approve / Reject flow
        foot.innerHTML = totalHtml
          + '<div class="ap-foot-actions">'
          +   '<button type="button" class="ap-btn ap-btn-reject" data-ap-action="reject-toggle">'
          +     '<i data-lucide="x" class="w-4 h-4"></i> Reject'
          +   '</button>'
          +   '<button type="button" class="ap-btn ap-btn-approve" data-ap-action="approve">'
          +     '<i data-lucide="check" class="w-4 h-4"></i> Approve'
          +   '</button>'
          + '</div>'
          + '<div class="ap-reject-panel" data-ap-reject>'
          +   '<label for="approvalRejectReason">Reject reason</label>'
          +   '<textarea id="approvalRejectReason" placeholder="Why is this being rejected?"></textarea>'
          +   '<div class="ap-reject-panel-actions">'
          +     '<button type="button" class="ap-btn ap-btn-cancel" data-ap-action="reject-cancel">Cancel</button>'
          +     '<button type="button" class="ap-btn ap-btn-confirm-reject" data-ap-action="reject-confirm">Confirm reject</button>'
          +   '</div>'
          + '</div>';
      }

      // wire footer actions
      const revertBtn = foot.querySelector('[data-ap-action="revert"]');
      if (revertBtn) revertBtn.addEventListener('click', function(){
        try {
          const raw = localStorage.getItem('ze_orders_v1');
          const list = raw ? JSON.parse(raw) : [];
          const idx = list.findIndex(x => x && x.id === o.id);
          if (idx !== -1) {
            const order = Object.assign({}, list[idx]);
            order.approvalStatus = 'pending';
            order.approvedAt = null;
            order.status = 'pending_approval';
            const tracking = Object.assign({}, order.tracking || { events: [] });
            tracking.events = Array.isArray(tracking.events) ? tracking.events.slice() : [];
            tracking.events.push({ status: 'pending_approval', at: new Date().toISOString(), location: 'Approver', note: 'Approval reverted' });
            order.tracking = tracking;
            list[idx] = order;
            localStorage.setItem('ze_orders_v1', JSON.stringify(list));
            if (window.ZE && ZE.emit) ZE.emit('orders:change', order);
          }
          toast('Approval reverted · ' + o.id, 'success');
        } catch(err) {
          console.error(err);
          toast('Could not revert approval', 'error');
        }
        closeSheetEl('detail');
      });
      const approveBtn = foot.querySelector('[data-ap-action="approve"]');
      const rejectToggle = foot.querySelector('[data-ap-action="reject-toggle"]');
      const rejectCancel = foot.querySelector('[data-ap-action="reject-cancel"]');
      const rejectConfirm = foot.querySelector('[data-ap-action="reject-confirm"]');
      const rejectPanel = foot.querySelector('[data-ap-reject]');
      const reasonInput = foot.querySelector('#approvalRejectReason');

      if (approveBtn) approveBtn.addEventListener('click', function(){
        try {
          if (typeof ZE !== 'undefined' && ZE && ZE.orders && typeof ZE.orders.approveRequest === 'function') {
            ZE.orders.approveRequest(o.id, {});
          }
          toast('Approved ' + o.id, 'success');
        } catch(err) {
          console.error(err);
          toast('Could not approve', 'error');
        }
        closeSheetEl('detail');
      });

      if (rejectToggle) rejectToggle.addEventListener('click', function(){
        if (rejectPanel) {
          rejectPanel.classList.add('is-open');
          if (reasonInput) reasonInput.focus();
        }
      });
      if (rejectCancel) rejectCancel.addEventListener('click', function(){
        if (rejectPanel) rejectPanel.classList.remove('is-open');
      });
      if (rejectConfirm) rejectConfirm.addEventListener('click', function(){
        const reason = reasonInput ? (reasonInput.value || '').trim() : '';
        if (!reason) {
          if (reasonInput) {
            reasonInput.focus();
            reasonInput.style.borderColor = 'var(--danger, #DC2626)';
          }
          toast('Please add a reason', 'error');
          return;
        }
        try {
          if (typeof ZE !== 'undefined' && ZE && ZE.orders && typeof ZE.orders.rejectRequest === 'function') {
            ZE.orders.rejectRequest(o.id, { reason: reason });
          }
          toast('Rejected ' + o.id, 'success');
        } catch(err) {
          console.error(err);
          toast('Could not reject', 'error');
        }
        closeSheetEl('detail');
      });

      refreshIcons();
    }

    /* ---------- public API ---------- */
    window.openApprovalSpecies = function(orderId) {
      renderSpeciesSheet(orderId);
      openSheetEl('species');
      refreshIcons();
    };
    window.openApprovalDetail = function(orderId) {
      renderDetailSheet(orderId);
      openSheetEl('detail');
      refreshIcons();
    };

    /* ---------- global wiring ---------- */
    document.addEventListener('click', function(e){
      const closeBtn = e.target.closest && e.target.closest('[data-ap-close]');
      if (closeBtn) {
        const key = closeBtn.getAttribute('data-ap-close');
        closeSheetEl(key);
        return;
      }
      // overlay click
      if (e.target && e.target.id === 'approvalSpeciesSheetOverlay') closeSheetEl('species');
      if (e.target && e.target.id === 'approvalDetailSheetOverlay')  closeSheetEl('detail');
    });

    document.addEventListener('keydown', function(e){
      if (e.key === 'Escape' && openSheet) { closeSheetEl(openSheet); return; }
      trapFocus(e);
    });
  })();
</script>
<!-- ===== END APPROVAL SIDE SHEETS ===== -->
</body>
