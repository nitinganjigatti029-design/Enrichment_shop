<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>ZooEnrich · Approvals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../tokens.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../data.js?v=20260504c"></script>
  <script src="../app.js?v=20260504c"></script>
  <script src="v2-bridge.js?v=20260505a"></script>
  <style>
    /* =========== Page layout =========== */
    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 0 32px; }

    /* =========== Header (cloned from orders_1) =========== */
    .app-header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .app-header .row { display: flex; align-items: center; gap: 20px; height: 72px; }
    .brand-mark { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; color: var(--text); letter-spacing: -0.01em; }
    .brand-mark .logo-box { width: 32px; height: 32px; border-radius: 10px; background: var(--brand); color: #fff; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px -3px rgba(55,189,105,.5); }

    .search-pill { flex: 1; max-width: 560px; height: 48px; background: #F1F2F4; border-radius: 999px; display: flex; align-items: center; gap: 10px; padding: 0 18px; color: var(--text-muted); transition: .15s; border: 1.5px solid transparent; }
    .search-pill:focus-within { background: #fff; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(55,189,105,.12); }
    .search-pill input { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); }
    .search-pill .kbd { background: #fff; border: 1px solid var(--border); color: var(--text-muted); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }

    .header-actions { display: flex; align-items: center; gap: 6px; }
    .header-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 10px; border-radius: 12px; color: var(--text-muted); cursor: pointer; transition: .15s; background: transparent; border: none; position: relative; min-width: 64px; }
    .header-btn:hover { background: #F1F2F4; color: var(--text); }
    .header-btn.active { background: var(--brand-soft); color: var(--brand-hover); }
    .header-btn span { font-size: 11px; font-weight: 500; margin-top: 3px; }
    .header-btn .badge-dot { position: absolute; top: 4px; right: 12px; min-width: 18px; height: 18px; padding: 0 5px; background: var(--danger); color: #fff; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 2px solid #fff; }
    .avatar { width: 40px; height: 40px; border-radius: 999px; object-fit: cover; border: 2px solid var(--border); margin-left: 8px; cursor: pointer; }

    /* Avatar dropdown */
    .avatar-wrap { position: relative; margin-left: 8px; }
    .avatar-menu { position: absolute; top: calc(100% + 8px); right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-md); min-width: 220px; padding: 6px; z-index: 60; opacity: 0; transform: translateY(-4px); pointer-events: none; transition: .15s; }
    .avatar-menu.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .avatar-menu .menu-header { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
    .avatar-menu .menu-header .name { font-size: 13px; font-weight: 600; color: var(--text); }
    .avatar-menu .menu-header .email { font-size: 11px; color: var(--text-muted); margin-top: 2px; word-break: break-all; }
    .avatar-menu a, .avatar-menu button { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; padding: 9px 12px; border-radius: 8px; font-size: 13px; color: var(--text); background: transparent; border: none; cursor: pointer; transition: .12s; text-decoration: none; }
    .avatar-menu a:hover, .avatar-menu button:hover { background: var(--card-subtle); color: var(--brand-hover); }
    .avatar-menu a.current { background: var(--brand-soft); color: var(--brand-hover); font-weight: 600; }
    .avatar-menu .menu-sep { height: 1px; background: var(--border); margin: 6px 0; }
    .avatar-menu .sign-out { color: var(--danger); }
    .avatar-menu .menu-badge { margin-left: auto; font-size: 10px; font-weight: 700; background: var(--danger); color: #fff; padding: 2px 7px; border-radius: 999px; }
    .signin-pill { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 999px; background: var(--brand); color: #fff; font-size: 13px; font-weight: 600; text-decoration: none; margin-left: 8px; transition: .15s; }
    .signin-pill:hover { background: var(--brand-hover); }

    /* =========== Page header strip =========== */
    .crumbs { font-size: 12px; color: var(--text-muted); padding: 22px 0 10px; display: flex; align-items: center; gap: 8px; }
    .crumbs a { color: var(--text-muted); }
    .crumbs a:hover { color: var(--brand); }
    .crumbs .sep { color: var(--text-subtle); }

    .page-head-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .page-head-row h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
    .page-head-row .sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .page-head-right { display: inline-flex; align-items: center; gap: 10px; }
    .me-chip { display: inline-flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px 4px 4px; }
    .me-chip .me-avatar { width: 28px; height: 28px; border-radius: 999px; object-fit: cover; }
    .me-chip .me-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .me-chip .me-role { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; background: var(--brand-soft); color: var(--brand-hover); padding: 3px 8px; border-radius: 999px; margin-left: 4px; }

    /* =========== Stats strip =========== */
    .stats-strip { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-pill { display: inline-flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; border: 1px solid transparent; }
    .stat-pill .stat-dot { width: 8px; height: 8px; border-radius: 999px; background: currentColor; }
    .stat-pill .stat-num { font-weight: 700; font-size: 15px; }
    .stat-pending   { background: #FFF8CC; color: #8A6D00; border-color: #FCD34D; }
    .stat-approved  { background: var(--brand-soft); color: #006D35; border-color: #A7F3D0; }
    .stat-rejected  { background: var(--danger-bg); color: var(--danger); border-color: #F5C2CB; }

    /* =========== Tabs =========== */
    .tabs-wrap { margin-bottom: 22px; }
    .tabs { display: inline-flex; background: #F1F2F4; padding: 4px; border-radius: 999px; gap: 4px; flex-wrap: wrap; }
    .tabs button { padding: 9px 18px; border-radius: 999px; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: .15s; display: inline-flex; align-items: center; gap: 8px; }
    .tabs button:hover { color: var(--text); }
    .tabs button.active { background: var(--brand); color: #fff; box-shadow: 0 2px 6px -2px rgba(55,189,105,.5); }
    .tabs button .count-pill { font-size: 11px; font-weight: 700; background: rgba(255,255,255,.25); padding: 1px 7px; border-radius: 999px; }
    .tabs button:not(.active) .count-pill { background: #fff; color: var(--text-muted); }

    /* =========== Filter bar =========== */
    .filter-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 14px; margin-bottom: 18px; box-shadow: var(--shadow-xs);
    }
    .filter-bar .filter-search { position: relative; flex: 1; min-width: 220px; max-width: 360px; }
    .filter-bar .filter-search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
    .filter-bar .filter-search input { width: 100%; height: 36px; padding: 0 14px 0 36px; border: 1px solid var(--border); border-radius: 999px; background: #FAFBFC; font-size: 13px; outline: none; transition: .15s; font-family: inherit; }
    .filter-bar .filter-search input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.12); background: #fff; }
    .filter-sel {
      position: relative; display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px; border: 1px solid var(--border); border-radius: 999px;
      background: #fff; color: var(--text); font-size: 13px; font-weight: 600;
      cursor: pointer; user-select: none; font-family: inherit;
    }
    .filter-sel:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .filter-sel.has-value { background: var(--brand-soft); color: var(--brand-hover); border-color: var(--brand-soft); }
    .filter-pop {
      position: absolute; top: calc(100% + 6px); left: 0; min-width: 240px; max-height: 320px; overflow-y: auto;
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      box-shadow: var(--shadow-lg); padding: 6px; display: none; z-index: 70; text-align: left;
    }
    .filter-pop.open { display: block; animation: fbDdIn .18s ease-out; }
    @keyframes fbDdIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .filter-opt { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text); }
    .filter-opt:hover { background: #F1F2F4; }
    .filter-opt input[type="checkbox"] { accent-color: var(--brand); width: 14px; height: 14px; flex-shrink: 0; cursor: pointer; }
    .filter-opt .name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .filter-reset {
      font-size: 12px; font-weight: 600; color: var(--text-muted); background: transparent; border: none;
      padding: 6px 10px; cursor: pointer; border-radius: 8px; font-family: inherit;
    }
    .filter-reset:hover { color: var(--text); background: #F1F2F4; }
    .filter-count {
      margin-left: auto; font-size: 12px; color: var(--text-muted); white-space: nowrap; padding: 0 4px;
    }
    @media (max-width: 600px) {
      .filter-bar { padding: 10px 12px; gap: 8px; }
      .filter-bar .filter-search { min-width: 140px; }
      .filter-count { width: 100%; margin-left: 0; text-align: right; }
    }

    /* =========== Requests data table =========== */
    .ap-table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: clip; box-shadow: var(--shadow-xs); margin-bottom: 60px; }
    .ap-table { width: 100%; min-width: 1100px; border-collapse: separate; border-spacing: 0; font-size: 13px; }
    .ap-table thead th { position: sticky; top: 72px; z-index: 30; background: #F8F9FA; color: var(--text-muted); text-transform: uppercase; font-size: 11px; font-weight: 700; letter-spacing: .04em; text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .ap-table thead th.right { text-align: right; }
    .ap-table thead th.col-actions { position: sticky; right: 0; top: 72px; z-index: 31; background: #F8F9FA; box-shadow: -8px 0 12px -8px rgba(0,0,0,0.08); }
    .ap-table tbody tr.ap-row { cursor: pointer; transition: background-color .12s; }
    .ap-table tbody tr.ap-row:hover { background: var(--brand-soft, #ECFDF5); }
    .ap-table tbody tr.ap-row:hover td { background: var(--brand-soft, #ECFDF5); }
    .ap-table tbody tr.ap-row:focus-visible { outline: 2px solid var(--brand); outline-offset: -2px; background: var(--brand-soft); }
    .ap-table tbody tr.ap-row + tr.ap-row > td,
    .ap-table tbody tr.ap-row:not(:first-child) > td { border-top: 1px solid var(--border); }
    .ap-table tbody td { padding: 12px 14px; vertical-align: middle; background: var(--card); height: 64px; }
    .ap-table tbody td.right { text-align: right; }
    .ap-table tbody td.col-actions { position: sticky; right: 0; z-index: 3; background: var(--card); box-shadow: -8px 0 12px -8px rgba(0,0,0,0.08); }
    .ap-prod { display:flex; gap:10px; align-items:center; }
    .ap-prod-thumb { width:40px; height:40px; border-radius:8px; overflow:hidden; background:var(--muted); flex-shrink:0; }
    .ap-prod-thumb img { width:100%; height:100%; object-fit:cover; }
    .ap-prod-meta { min-width:0; }
    .ap-prod-name { font-weight:700; font-size:13.5px; color:var(--text); line-height:1.25; max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .ap-prod-cfg { font-size:11.5px; color:var(--text-muted); margin-top:2px; }
    .ap-prod-id { font-size:10.5px; color:var(--text-subtle); margin-top:2px; font-family: ui-monospace, monospace; opacity:.7; }
    /* V2 detail-sheet product hero */
    .ap-hero { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
    .ap-hero-main { width: 100%; aspect-ratio: 4/3; border-radius: 12px; background: var(--muted); overflow: hidden; }
    .ap-hero-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity .15s; }
    .ap-hero-thumbs { display: flex; gap: 8px; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; }
    .ap-hero-thumb { flex: 0 0 auto; width: 64px; height: 64px; padding: 0; border: 2px solid var(--border); border-radius: 8px; background: var(--muted); cursor: pointer; overflow: hidden; transition: .12s; }
    .ap-hero-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ap-hero-thumb:hover { border-color: var(--brand); }
    .ap-hero-thumb.active { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(55,189,105,.2); }
    .ap-hero-meta { display: flex; flex-direction: column; gap: 4px; }
    .ap-hero-name { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .ap-hero-bits { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
    .ap-hero-desc { padding: 12px 14px; background: var(--card-subtle, #F9FAFB); border-radius: 10px; display: flex; flex-direction: column; gap: 6px; }
    .ap-hero-tagline { font-size: 13px; font-weight: 600; color: var(--text); }
    .ap-hero-attrs { font-size: 12.5px; color: var(--text-muted); line-height: 1.55; }
    .ap-table tbody tr.ap-row:hover td.col-actions { background: var(--brand-soft, #ECFDF5); }

    .ap-id-pill { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12.5px; font-weight: 600; color: var(--text); white-space: nowrap; }

    .ap-requester { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .ap-requester .ap-rq-avatar { width: 28px; height: 28px; border-radius: 999px; object-fit: cover; border: 1.5px solid var(--border); flex-shrink: 0; }
    .ap-requester .ap-rq-text { display: flex; flex-direction: column; gap: 1px; min-width: 0; line-height: 1.25; }
    .ap-requester .ap-rq-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .ap-requester .ap-rq-title { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }

    .ap-site { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; display: block; }

    .ap-items-count { display: inline-flex; align-items: baseline; gap: 5px; line-height: 1.2; }
    .ap-items-count .num { font-size: 14px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
    .ap-items-count em { font-style: normal; font-weight: 600; color: var(--text-muted); font-size: 12px; }
    .ap-items-count .sub { font-size: 11px; color: var(--text-muted); margin-left: 6px; }
    .ap-more-pill { background: #F1F2F4; color: var(--text-muted); font-size: 10.5px; font-weight: 700; padding: 2px 6px; border-radius: 999px; margin-left: 6px; flex-shrink: 0; }

    .ap-sp-cell { display: inline-flex; align-items: center; gap: 6px; }
    .ap-sp-cell.is-clickable { cursor: pointer; }
    .ap-sp-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--brand-soft); color: var(--brand-hover); font-size: 12px; font-weight: 600; white-space: nowrap; }

    .ap-total { text-align: right; font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; font-variant-numeric: tabular-nums; }

    .ap-date-cell { font-size: 12.5px; color: var(--text-muted); white-space: nowrap; }

    .ap-actions-cell { display: inline-flex; gap: 6px; align-items: center; justify-content: flex-end; }

    .btn-sm { padding: 7px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; border: 1px solid transparent; transition: .15s; white-space: nowrap; }
    .btn-sm-approve { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn-sm-approve:hover { background: var(--brand-hover); border-color: var(--brand-hover); }
    .btn-sm-reject { background: #fff; color: var(--danger); border-color: var(--danger); }
    .btn-sm-reject:hover { background: var(--danger-bg); }
    .btn-sm-ghost { background: #fff; color: var(--text); border-color: var(--border); }
    .btn-sm-ghost:hover { border-color: var(--border-strong); background: #F9FAFB; }

    /* Status strip (for approved/rejected view) */
    .status-strip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; border: 1px solid transparent; white-space: nowrap; }
    .status-strip.approved { background: var(--brand-soft); color: #006D35; border-color: #A7F3D0; }
    .status-strip.rejected { background: var(--danger-bg); color: var(--danger); border-color: #F5C2CB; }

    /* Inline drawer (full-width row inserted under the active row for approve note / reject reason) */
    .rc-drawer-row { display: none; }
    .rc-drawer-row:has(.rc-drawer.open) { display: table-row; }
    .rc-drawer-row td { padding: 0 !important; background: var(--card-subtle) !important; border-top: 1px solid var(--border) !important; }
    .rc-drawer { background: var(--card-subtle); padding: 14px 18px; display: none; animation: dropIn .22s cubic-bezier(.2,.8,.2,1); }
    .rc-drawer.open { display: block; }
    .rc-drawer .drawer-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .rc-drawer .drawer-title.reject { color: var(--danger); }
    .rc-drawer textarea { width: 100%; min-height: 72px; max-height: 160px; resize: vertical; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); font-size: 13px; font-family: var(--font); color: var(--text); outline: none; transition: .15s; }
    .rc-drawer textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.15); }
    .rc-drawer textarea.reject-ta:focus { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(233,51,83,.15); }
    .rc-drawer .char-count { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-align: right; }
    .rc-drawer .char-count.warn { color: var(--danger); }
    .rc-drawer .drawer-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .rc-drawer .drawer-helper { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }

    @keyframes dropIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    /* Empty state */
    .empty-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 70px 20px; background: var(--card); }
    .empty-wrap .big-ico { width: 88px; height: 88px; border-radius: 999px; background: var(--brand-soft); color: var(--brand); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 18px; }
    .empty-wrap h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-wrap p { font-size: 14px; color: var(--text-muted); max-width: 380px; }
    .ap-empty-row td { padding: 0 !important; background: var(--card) !important; }

    /* Access denied */
    .denied-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 48px 28px; text-align: center; max-width: 540px; margin: 60px auto; box-shadow: var(--shadow-xs); }
    .denied-wrap .big-ico { width: 88px; height: 88px; border-radius: 999px; background: var(--danger-bg); color: var(--danger); display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 18px; }
    .denied-wrap h2 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .denied-wrap p { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; }

    /* =========== Toast =========== */
    .ze-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0F172A; color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 10px 30px -8px rgba(0,0,0,.4); opacity: 0; pointer-events: none; transition: .25s; z-index: 100; max-width: 360px; }
    .ze-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* =========== Responsive =========== */
    @media (max-width: 900px) {
      .app-header .row { height: 60px !important; gap: 10px; }
      .search-pill { display: none !important; }
      .header-btn span { display: none !important; }
      .header-btn { min-width: 40px !important; padding: 8px !important; }
      .page-wrap { padding: 0 16px !important; }
      .page-head-row h1 { font-size: 22px; }
    }
    @media (max-width: 700px) {
      .page-head-row { flex-direction: column; align-items: stretch; gap: 10px; }
      .page-head-right { justify-content: flex-start; }
      .tabs-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-left: -16px; margin-right: -16px; padding: 0 16px; }

    /* Mobile: collapse table rows into vertical cards */
    @media (max-width: 767px) {
      .ap-table-wrap { overflow: visible; border-radius: 14px; }

      .page-head-row h1 { font-size: 20px; }

    .ze-wallet-pill.is-ready { display: inline-flex; }
    .ze-wallet-pill:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .ze-wallet-pill .ze-wp-site { display: flex; align-items: center; gap: 4px; padding: 4px 10px 0; max-width: 100%; font-size: 10.5px; font-weight: 600; color: var(--text-muted); line-height: 1.1; cursor: pointer; border-radius: 11px 11px 0 0; }
    .ze-wallet-pill .ze-wp-site-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .ze-wallet-pill .ze-wp-site-chev { flex-shrink: 0; opacity: .7; }
    .ze-wallet-pill .ze-wp-site:hover { background: #F1F2F4; }
    .ze-wallet-pill .ze-wp-amt { padding: 2px 12px 6px; font-size: 14px; font-weight: 700; line-height: 1.1; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; color: var(--brand-hover); border-radius: 0 0 11px 11px; }
    .ze-wallet-pill .ze-wp-amt.ze-wp-amber { color: #B45309; }
    .ze-wallet-pill .ze-wp-amt.ze-wp-red { color: var(--danger); }
    .ze-wp-pop { position: absolute; top: calc(100% + 6px); right: 0; min-width: 280px; background: #fff; border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 8px; display: none; z-index: 70; }
    .ze-wp-pop.open { display: block; animation: zewpIn .18s ease-out; }
    @keyframes zewpIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .ze-wp-pop .ze-wp-head { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); padding: 8px 10px 6px; }
    .ze-wp-opt { display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: 10px; cursor: pointer; font-size: 13px; color: var(--text); }
    .ze-wp-opt:hover { background: #F1F2F4; }
    .ze-wp-opt.active { background: var(--brand-soft); color: var(--brand-hover); font-weight: 600; }
    .ze-wp-opt .ze-wp-opt-tick { margin-left: auto; color: var(--brand); opacity: 0; }
    .ze-wp-opt.active .ze-wp-opt-tick { opacity: 1; }
    .ze-wp-opt-name { flex: 1; min-width: 0; }
    .ze-wp-opt-city { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    @media (max-width: 520px) {
      .ze-wallet-pill .ze-wp-site { display: none; }

    }
    @media (max-width: 767px) {
      .ze-wallet-pill { height: 40px; }
    }
    /* Mobile drawer wallet row */
    .ze-wp-mobile-row { display: flex; flex-direction: column; padding: 10px 12px; border-radius: 10px; cursor: pointer; gap: 4px; text-decoration: none; color: inherit; }
    .ze-wp-mobile-row:hover { background: #F1F2F4; }
    .ze-wp-mobile-row .ze-wp-mob-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

    .ze-wp-mobile-row .ze-wp-mob-amt.ze-wp-red { color: var(--danger); }
    .ze-wp-mobile-row .ze-wp-mob-sub { font-size: 12px; color: var(--text-muted); }
  </style>

<!-- =============== SCRIPTS =============== -->
<script>
(function(){
  const DB = window.DB;
  const ZE = window.ZE;

  /* ---------- Guard: buyer only ---------- */
  if (!ZE.user.requireRole('buyer')) return;

  const user = ZE.user.resolve();
  if (!user) {
    window.location.assign('login_1.html');
    return;
  }

  const isApproverUser = !!(DB.isApprover && DB.isApprover(user.id));

  /* ---------- State ---------- */
  const state = {
    tab: 'pending',
    q: '',
    sites: new Set(),
    requesters: new Set(),
    species: new Set()
  };
  function activeFilterCount(){
    return (state.q ? 1 : 0) + state.sites.size + state.requesters.size + state.species.size;
  }
  function applyFilters(list){
    return list.filter(o => {
      if (state.q) {
        const q = state.q.toLowerCase();
        const requester = DB.byId(DB.USERS, o.createdBy);
        const rqName = requester ? requester.name : (o.createdBy || '');
        const siteObj = o.siteId ? DB.byId(DB.SITES, o.siteId) : null;
        const siteName = siteObj ? String(siteObj.name || '').split(' · ')[0] : '';
        const itemNames = (o.items || []).map(it => {
          const p = DB.byId(DB.PRODUCTS, it.productId);
          return p ? p.name : '';
        }).join(' ');
        const hay = `${o.id} ${rqName} ${siteName} ${itemNames}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      if (state.sites.size && !state.sites.has(o.siteId)) return false;
      if (state.requesters.size && !state.requesters.has(o.createdBy)) return false;
      if (state.species.size) {
        const sIds = [];
        if (o.speciesId) sIds.push(o.speciesId);
        (o.items || []).forEach(it => { if (it.speciesId && sIds.indexOf(it.speciesId) < 0) sIds.push(it.speciesId); });
        if (!sIds.some(id => state.species.has(id))) return false;
      }
      return true;
    });
  }

  /* ---------- Helpers ---------- */
  function fmtDate(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch (e) { return iso || ''; }
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2200);
  }

  /* ---------- Data: all requests addressed to me ---------- */
  function getAllForMe() {
    const userList = (ZE.orders.read() || []).map(o => Object.assign({}, o, { source: o.source || 'user' }));
    const demoList = (DB.DEMO_ORDERS || []).map(o => Object.assign({}, o, { source: o.source || 'demo' }));
    const merged = userList.concat(demoList);
    return merged
      .filter(o => o && o.requiresApproval === true && o.approverId === user.id)
      .sort((a, b) => {
        const ta = a.createdAt ? Date.parse(a.createdAt) : 0;
        const tb = b.createdAt ? Date.parse(b.createdAt) : 0;
        return (isFinite(tb) ? tb : 0) - (isFinite(ta) ? ta : 0);
      });
  }

  function countByStatus(list) {
    const c = { pending: 0, approved: 0, rejected: 0, all: list.length };
    list.forEach(o => {
      if (o.approvalStatus === 'pending') c.pending++;
      else if (o.approvalStatus === 'approved') c.approved++;
      else if (o.approvalStatus === 'rejected') c.rejected++;
    });
    return c;
  }

  function monthlyCounts(list) {
    const now = new Date();
    const cy = now.getFullYear();
    const cm = now.getMonth();
    let approvedThisMonth = 0, rejectedThisMonth = 0;
    list.forEach(o => {
      if (o.approvalStatus === 'approved' && o.approvedAt) {
        const d = new Date(o.approvedAt);
        if (!isNaN(d) && d.getFullYear() === cy && d.getMonth() === cm) approvedThisMonth++;
      } else if (o.approvalStatus === 'rejected' && (o.approvedAt || o.createdAt)) {
        // rejection timestamp isn't stored separately; fall back to createdAt
        const ts = o.approvedAt || o.createdAt;
        const d = new Date(ts);
        if (!isNaN(d) && d.getFullYear() === cy && d.getMonth() === cm) rejectedThisMonth++;
      }
    });
    return { approvedThisMonth, rejectedThisMonth };
  }

  function requesterAvatar(u) {
    if (!u) return '';
    const role = (u.role === 'biologist') ? 'professional zoo biologist portrait headshot smile'
            : (u.role === 'keeper') ? 'professional zoo keeper portrait headshot smile'
            : (u.role === 'vet') ? 'professional veterinarian portrait headshot smile'
            : (u.role === 'curator') ? 'professional zoo curator portrait headshot smile'
            : (u.role === 'lab_manager') ? 'professional laboratory manager portrait headshot smile'
            : (u.role === 'lab_tech') ? 'professional laboratory technician portrait headshot smile'
            : 'professional zoo staff portrait headshot smile';
    return DB.img ? DB.img(role, 60, 60, u.seed || 400)
                  : `https://image.pollinations.ai/prompt/${encodeURIComponent(role)}?width=60&height=60&seed=${u.seed||400}&nologo=true`;
  }

  /* ---------- Renderers ---------- */

  function renderAccessDenied() {
    const body = document.getElementById('pageBody');
    body.innerHTML = `
      <div class="crumbs">
        <a href="index_1.html">Home</a>
        <span class="sep">·</span>
        <span style="color:var(--text); font-weight:600">Approvals</span>
      </div>
      <div class="denied-wrap anim-in">
        <span class="big-ico"><i data-lucide="shield-off" class="w-10 h-10"></i></span>
        <h2>Access denied</h2>
        <p>Only team leads with direct reports can review approval requests.</p>
        <a href="index_1.html" class="btn btn-brand" style="text-decoration:none">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to shop
        </a>
      </div>`;
    ZE.refreshIcons();
  }

  function renderPageChrome(counts, monthly) {
    const body = document.getElementById('pageBody');
    body.innerHTML = `
      <!-- Breadcrumb -->
      <div class="crumbs">
        <a href="index_1.html">Home</a>
        <span class="sep">·</span>
        <span style="color:var(--text); font-weight:600">Approvals</span>
      </div>

      <!-- Page head -->
      <div class="page-head-row">
        <div>
          <h1>Purchase approvals</h1>
          <div class="sub">Review and decide on requests from your team.</div>
        </div>
        <div class="page-head-right">
          <div class="me-chip">
            <img class="me-avatar" src="${requesterAvatar(user)}" alt="${esc(user.name)}" loading="eager"/>
            <span class="me-name">${esc(user.name)}</span>
            <span class="me-role">Approver</span>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs-wrap">
        <div class="tabs" id="tabsRow">
          <button data-tab="pending"  class="${state.tab==='pending'?'active':''}">Pending <span class="count-pill" data-count="pending">${counts.pending}</span></button>
          <button data-tab="approved" class="${state.tab==='approved'?'active':''}">Approved <span class="count-pill" data-count="approved">${counts.approved}</span></button>
          <button data-tab="rejected" class="${state.tab==='rejected'?'active':''}">Rejected <span class="count-pill" data-count="rejected">${counts.rejected}</span></button>
          <button data-tab="all"      class="${state.tab==='all'?'active':''}">All <span class="count-pill" data-count="all">${counts.all}</span></button>
        </div>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar" id="filterBar">
        <div class="filter-search">
          <i data-lucide="search" class="w-4 h-4"></i>
          <input id="fSearch" type="search" placeholder="Search request ID, requester, site…" autocomplete="off"/>
        </div>
        <div class="filter-sel" id="fSiteBtn" data-filter="sites">
          <i data-lucide="building-2" class="w-4 h-4"></i>
          <span class="lbl">All sites</span>
          <i data-lucide="chevron-down" class="w-3 h-3"></i>
          <div class="filter-pop" id="fSitePop"></div>
        </div>
        <div class="filter-sel" id="fRequesterBtn" data-filter="requesters">
          <i data-lucide="user" class="w-4 h-4"></i>
          <span class="lbl">All requesters</span>
          <i data-lucide="chevron-down" class="w-3 h-3"></i>
          <div class="filter-pop" id="fRequesterPop"></div>
        </div>
        <div class="filter-sel" id="fSpeciesBtn" data-filter="species">
          <i data-lucide="paw-print" class="w-4 h-4"></i>
          <span class="lbl">All species</span>
          <i data-lucide="chevron-down" class="w-3 h-3"></i>
          <div class="filter-pop" id="fSpeciesPop"></div>
        </div>
        <button type="button" class="filter-reset" id="fReset" style="display:none">Reset</button>
        <span class="filter-count" id="fCount"></span>
      </div>

      <!-- Table -->
      <div class="ap-table-wrap">
        <table class="ap-table" id="apTable">
          <thead>
            <tr>
              <th class="col-id">Product</th>
              <th class="col-requester">Requester</th>
              <th class="col-site">Site</th>
              <th class="col-items">Qty</th>
              <th class="col-species">Species</th>
              <th class="col-total right">Amount</th>
              <th class="col-date">Requested</th>
              <th class="col-actions right">Actions</th>
            </tr>
          </thead>
          <tbody id="reqList"></tbody>
        </table>
      </div>
    `;
  }

  function relativeTime(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const diffMs = Date.now() - d.getTime();
      if (diffMs < 0) return 'just now';
      const mins = Math.floor(diffMs / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days === 1) return '1 day ago';
      if (days < 30) return days + ' days ago';
      const months = Math.floor(days / 30);
      if (months === 1) return '1 month ago';
      if (months < 12) return months + ' months ago';
      const years = Math.floor(days / 365);
      return years + (years === 1 ? ' year ago' : ' years ago');
    } catch (e) { return ''; }
  }

  function renderEmptyRow() {
    const messages = {
      pending:  { h: "Nothing to approve right now. You're caught up.", p: "New requests from your team will appear here." },
      approved: { h: "No approvals yet.",   p: "Once you approve a request, it will show up here." },
      rejected: { h: "No rejections yet.",  p: "Rejected requests with reasons will show up here." },
      all:      { h: "No requests from your team yet.", p: "When your team members submit purchase requests, they'll land here for review." }
    };
    const m = messages[state.tab] || messages.all;
    const ico = state.tab === 'pending' ? 'party-popper'
             : state.tab === 'approved' ? 'check-check'
             : state.tab === 'rejected' ? 'x-circle'
             : 'inbox';
    return `
      <tr class="ap-empty-row">
        <td colspan="8">
          <div class="empty-wrap anim-in">
            <span class="big-ico"><i data-lucide="${ico}" class="w-10 h-10"></i></span>
            <h3>${esc(m.h)}</h3>
            <p>${esc(m.p)}</p>
          </div>
        </td>
      </tr>`;
  }

  function renderRow(o) {
    const requester = DB.byId(DB.USERS, o.createdBy);
    const items = o.items || [];

    const rqAvatar = requesterAvatar(requester);
    const rqName = requester ? requester.name : (o.createdBy || 'Unknown');
    const rqTitle = requester ? (requester.title || requester.role || '') : '';

    const siteObj = o.siteId ? DB.byId(DB.SITES, o.siteId) : null;
    const siteInstitution = siteObj ? String(siteObj.name || '').split(' · ')[0] : '';

    // Items column — count only; user opens the side sheet for full detail
    const totalQty = items.reduce((s, it) => s + (it.qty || it.quantity || 1), 0);
    const skuCount = items.length;
    const itemsHtml = skuCount
      ? `<div class="ap-items-count"><span class="num">${totalQty}</span><em>${totalQty === 1 ? 'unit' : 'units'}</em>${skuCount > 1 ? `<span class="sub">${skuCount} SKUs</span>` : ''}</div>`
      : '<span style="color:var(--text-muted); font-style:italic;">No items</span>';

    // Species column — collect unique species ids across line items + order-level
    const spIds = [];
    const seenSp = {};
    if (o.speciesId && !seenSp[o.speciesId]) { spIds.push(o.speciesId); seenSp[o.speciesId] = 1; }
    items.forEach(it => {
      if (it.speciesId && !seenSp[it.speciesId]) { spIds.push(it.speciesId); seenSp[it.speciesId] = 1; }
    });
    const firstSp = spIds[0] ? DB.byId(DB.SPECIES, spIds[0]) : null;
    const moreSpCount = Math.max(0, spIds.length - 1);
    const spClickable = moreSpCount > 0;
    const spHtml = firstSp
      ? `<span class="ap-sp-cell ${spClickable ? 'is-clickable' : ''}"${spClickable ? ` data-species-trigger data-id="${esc(o.id)}"` : ''}>
          <span class="ap-sp-chip">${esc(firstSp.name)}</span>
          ${moreSpCount > 0 ? `<span class="ap-more-pill">+${moreSpCount}</span>` : ''}
        </span>`
      : '<span style="color:var(--text-muted); font-size:12px;">—</span>';

    // Date column — absolute date only
    const reqIso = o.requestedAt || o.createdAt;
    const dateAbs = esc(fmtDate(reqIso));

    // Actions column
    let actionsHtml = '';
    if (o.approvalStatus === 'pending') {
      actionsHtml = `
        <div class="ap-actions-cell">
          <button class="btn-sm btn-sm-reject" data-action="reject" data-id="${esc(o.id)}">
            <i data-lucide="x" class="w-3.5 h-3.5"></i> Reject
          </button>
          <button class="btn-sm btn-sm-approve" data-action="approve" data-id="${esc(o.id)}">
            <i data-lucide="check" class="w-3.5 h-3.5"></i> Approve
          </button>
        </div>`;
    } else if (o.approvalStatus === 'approved') {
      actionsHtml = `
        <span class="status-strip approved">
          <i data-lucide="check-check" class="w-3.5 h-3.5"></i> Approved
        </span>`;
    } else if (o.approvalStatus === 'rejected') {
      actionsHtml = `
        <span class="status-strip rejected">
          <i data-lucide="x-circle" class="w-3.5 h-3.5"></i> Rejected
        </span>`;
    }

    // Drawer row (only for pending) — lives directly after the row
    let drawerRowHtml = '';
    if (o.approvalStatus === 'pending') {
      drawerRowHtml = `
        <tr class="rc-drawer-row" data-drawer-row-for="${esc(o.id)}">
          <td colspan="8">
            <div class="rc-drawer" id="drawer-approve-${esc(o.id)}">
              <div class="drawer-title"><i data-lucide="check-circle" class="w-4 h-4" style="color:var(--brand)"></i> Approve request ${esc(o.id)}</div>
              <div class="drawer-helper">Add an optional note for the requester. Once approved, the order is forwarded to the vendor.</div>
              <textarea maxlength="200" placeholder="Optional note to requester…" data-drawer-field="note-${esc(o.id)}"></textarea>
              <div class="char-count" data-char-for="note-${esc(o.id)}">0 / 200</div>
              <div class="drawer-actions">
                <button class="btn-sm btn-sm-ghost" data-action="approve-cancel" data-id="${esc(o.id)}">Cancel</button>
                <button class="btn-sm btn-sm-approve" data-action="approve-confirm" data-id="${esc(o.id)}">
                  <i data-lucide="check" class="w-4 h-4"></i> Confirm approval
                </button>
              </div>
            </div>
            <div class="rc-drawer" id="drawer-reject-${esc(o.id)}">
              <div class="drawer-title reject"><i data-lucide="x-circle" class="w-4 h-4"></i> Reject request ${esc(o.id)}</div>
              <div class="drawer-helper">Please share a brief reason — the requester will see this.</div>
              <textarea class="reject-ta" maxlength="200" placeholder="Reason for rejection (required)…" data-drawer-field="reason-${esc(o.id)}"></textarea>
              <div class="char-count" data-char-for="reason-${esc(o.id)}">0 / 200</div>
              <div class="drawer-actions">
                <button class="btn-sm btn-sm-ghost" data-action="reject-cancel" data-id="${esc(o.id)}">Cancel</button>
                <button class="btn-sm btn-sm-reject" data-action="reject-confirm" data-id="${esc(o.id)}">
                  <i data-lucide="x" class="w-4 h-4"></i> Confirm rejection
                </button>
              </div>
            </div>
          </td>
        </tr>`;
    }

    /* V2 product-centric column: surface the actual product (image + name + config),
       not the order ID. The order ID still exists internally (data-id) and shows as
       small muted text under the product name for ops reference. */
    const it0 = items[0] || {};
    const prod = it0.productId ? DB.byId(DB.PRODUCTS, it0.productId) : null;
    const prodImg = prod ? (prod.images && prod.images[0]) || (typeof DB.img === 'function' ? DB.img(prod) : '') : '';
    const cfg = (it0.config && Object.values(it0.config).filter(Boolean).join(' · ')) || '';
    const productHtml = prod
      ? `<div class="ap-prod">
          <div class="ap-prod-thumb">${prodImg ? `<img src="${prodImg}" alt="">` : ''}</div>
          <div class="ap-prod-meta">
            <div class="ap-prod-name">${esc(prod.name)}</div>
            ${cfg ? `<div class="ap-prod-cfg">${esc(cfg)}</div>` : ''}
          </div>
        </div>`
      : `<span class="ap-id-pill">${esc(o.id)}</span>`;
    const qtyHtml = `<div class="ap-items-count"><span class="num">${totalQty}</span><em>${totalQty === 1 ? 'unit' : 'units'}</em></div>`;

    return `
      <tr class="ap-row" data-id="${esc(o.id)}" tabindex="0">
        <td class="col-id">${productHtml}</td>
        <td class="col-requester">
          <div class="ap-requester">
            <img class="ap-rq-avatar" src="${rqAvatar}" alt="${esc(rqName)}" loading="lazy"/>
            <div class="ap-rq-text">
              <span class="ap-rq-name">${esc(rqName)}</span>
              ${rqTitle ? `<span class="ap-rq-title">${esc(rqTitle)}</span>` : ''}
            </div>
          </div>
        </td>
        <td class="col-site"><span class="ap-site">${esc(siteInstitution)}</span></td>
        <td class="col-items">${qtyHtml}</td>
        <td class="col-species">${spHtml}</td>
        <td class="col-total ap-total">${DB.fmtINR(o.total || 0)}</td>
        <td class="col-date">
          <div class="ap-date-cell">${dateAbs || '—'}</div>
        </td>
        <td class="col-actions right">${actionsHtml}</td>
      </tr>
      ${drawerRowHtml}`;
  }

  function renderList() {
    const all = getAllForMe();
    const tabList = (state.tab === 'all') ? all : all.filter(o => o.approvalStatus === state.tab);
    const filtered = applyFilters(tabList);

    // Filter count + reset visibility
    const fCount = document.getElementById('fCount');
    if (fCount) {
      fCount.textContent = activeFilterCount() > 0
        ? `Showing ${filtered.length} of ${tabList.length}`
        : `${filtered.length} ${filtered.length === 1 ? 'request' : 'requests'}`;
    }
    const fReset = document.getElementById('fReset');
    if (fReset) fReset.style.display = activeFilterCount() > 0 ? '' : 'none';
    refreshFilterButtons();

    const list = document.getElementById('reqList');
    if (!list) return;
    if (!filtered.length) {
      list.innerHTML = renderEmptyRow();
      ZE.refreshIcons();
      return;
    }
    list.innerHTML = filtered.map(o => renderRow(o)).join('');
    bindListEvents();
    ZE.refreshIcons();
  }

  /* ---------- Filter dropdown helpers ---------- */
  function uniqueSitesForMe() {
    const all = getAllForMe();
    const ids = new Set();
    all.forEach(o => { if (o.siteId) ids.add(o.siteId); });
    return Array.from(ids).map(id => ({ id, name: (DB.byId(DB.SITES, id) || {}).name || id })).sort((a, b) => a.name.localeCompare(b.name));
  }
  function uniqueRequestersForMe() {
    const all = getAllForMe();
    const ids = new Set();
    all.forEach(o => { if (o.createdBy) ids.add(o.createdBy); });
    return Array.from(ids).map(id => ({ id, name: (DB.byId(DB.USERS, id) || {}).name || id })).sort((a, b) => a.name.localeCompare(b.name));
  }
  function uniqueSpeciesForMe() {
    const all = getAllForMe();
    const ids = new Set();
    all.forEach(o => {
      if (o.speciesId) ids.add(o.speciesId);
      (o.items || []).forEach(it => { if (it.speciesId) ids.add(it.speciesId); });
    });
    return Array.from(ids).map(id => ({ id, name: (DB.byId(DB.SPECIES, id) || {}).name || id })).sort((a, b) => a.name.localeCompare(b.name));
  }
  function populateFilterDropdowns() {
    const sitePop = document.getElementById('fSitePop');
    if (sitePop) {
      sitePop.innerHTML = uniqueSitesForMe().map(s => `
        <label class="filter-opt">
          <input type="checkbox" data-filter-opt="sites" value="${esc(s.id)}"${state.sites.has(s.id) ? ' checked' : ''}/>
          <span class="name">${esc(s.name)}</span>
        </label>`).join('');
    }
    const rqPop = document.getElementById('fRequesterPop');
    if (rqPop) {
      rqPop.innerHTML = uniqueRequestersForMe().map(r => `
        <label class="filter-opt">
          <input type="checkbox" data-filter-opt="requesters" value="${esc(r.id)}"${state.requesters.has(r.id) ? ' checked' : ''}/>
          <span class="name">${esc(r.name)}</span>
        </label>`).join('');
    }
    const spPop = document.getElementById('fSpeciesPop');
    if (spPop) {
      spPop.innerHTML = uniqueSpeciesForMe().map(sp => `
        <label class="filter-opt">
          <input type="checkbox" data-filter-opt="species" value="${esc(sp.id)}"${state.species.has(sp.id) ? ' checked' : ''}/>
          <span class="name">${esc(sp.name)}</span>
        </label>`).join('');
    }
  }
  function refreshFilterButtons() {
    const lbl = (sel, set, all, singular) => {
      const btn = document.getElementById(sel);
      if (!btn) return;
      btn.classList.toggle('has-value', set.size > 0);
      const span = btn.querySelector('.lbl');
      if (!span) return;
      if (set.size === 0) span.textContent = all;
      else if (set.size === 1) {
        const v = Array.from(set)[0];
        const item = singular(v);
        span.textContent = item || `1 selected`;
      } else span.textContent = `${set.size} selected`;
    };
    lbl('fSiteBtn',      state.sites,      'All sites',      v => (DB.byId(DB.SITES, v) || {}).name);
    lbl('fRequesterBtn', state.requesters, 'All requesters', v => (DB.byId(DB.USERS, v) || {}).name);
    lbl('fSpeciesBtn',   state.species,    'All species',    v => (DB.byId(DB.SPECIES, v) || {}).name);
  }
  function closeAllFilterPops() {
    document.querySelectorAll('.filter-pop.open').forEach(p => p.classList.remove('open'));
  }
  function bindFilterBar() {
    const search = document.getElementById('fSearch');
    if (search) {
      let t;
      search.addEventListener('input', e => {
        clearTimeout(t);
        t = setTimeout(() => { state.q = e.target.value.trim(); renderList(); }, 120);
      });
    }
    document.querySelectorAll('.filter-sel').forEach(btn => {
      btn.addEventListener('click', e => {
        if (e.target.closest('.filter-pop')) return;
        const pop = btn.querySelector('.filter-pop');
        const wasOpen = pop && pop.classList.contains('open');
        closeAllFilterPops();
        if (pop && !wasOpen) pop.classList.add('open');
        e.stopPropagation();
      });
    });
    document.addEventListener('change', e => {
      const cb = e.target.closest('input[data-filter-opt]');
      if (!cb) return;
      const which = cb.dataset.filterOpt;
      if (cb.checked) state[which].add(cb.value); else state[which].delete(cb.value);
      renderList();
    });
    const reset = document.getElementById('fReset');
    if (reset) reset.addEventListener('click', () => {
      state.q = '';
      state.sites.clear(); state.requesters.clear(); state.species.clear();
      if (search) search.value = '';
      populateFilterDropdowns();
      renderList();
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.filter-sel')) closeAllFilterPops();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAllFilterPops(); });
    populateFilterDropdowns();
  }

  function render() {
    if (!isApproverUser) {
      renderAccessDenied();
      return;
    }
    const all = getAllForMe();
    const counts = countByStatus(all);
    const monthly = monthlyCounts(all);
    renderPageChrome(counts, monthly);

    // Tabs bind
    document.querySelectorAll('#tabsRow button').forEach(b => {
      b.addEventListener('click', () => {
        state.tab = b.dataset.tab;
        document.querySelectorAll('#tabsRow button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        renderList();
      });
    });

    bindFilterBar();
    renderList();
  }

  /* ---------- Drawer helpers ---------- */
  function closeAllDrawers() {
    document.querySelectorAll('.rc-drawer.open').forEach(d => d.classList.remove('open'));
  }

  function openDrawer(kind, id) {
    closeAllDrawers();
    const d = document.getElementById(`drawer-${kind}-${id}`);
    if (d) {
      d.classList.add('open');
      const ta = d.querySelector('textarea');
      if (ta) setTimeout(() => ta.focus(), 60);
    }
  }

  /* ---------- Event bindings for list rows ---------- */
  function bindListEvents() {
    // Approve click → open drawer (stop row-click)
    document.querySelectorAll('[data-action="approve"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        openDrawer('approve', btn.dataset.id);
      });
    });
    // Reject click → open drawer (stop row-click)
    document.querySelectorAll('[data-action="reject"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        openDrawer('reject', btn.dataset.id);
      });
    });

    // Cancel drawers (stop row-click)
    document.querySelectorAll('[data-action="approve-cancel"], [data-action="reject-cancel"]').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); closeAllDrawers(); });
    });

    // Approve confirm
    document.querySelectorAll('[data-action="approve-confirm"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const ta = document.querySelector(`[data-drawer-field="note-${id}"]`);
        const note = ta ? ta.value.trim() : '';
        _ensureOrderInUserStore(id);
        ZE.orders.approveRequest(id, { note });
        showToast('Approved · Forwarded to vendor');
        closeAllDrawers();
      });
    });

    // Reject confirm
    document.querySelectorAll('[data-action="reject-confirm"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const ta = document.querySelector(`[data-drawer-field="reason-${id}"]`);
        const reason = ta ? ta.value.trim() : '';
        if (!reason) {
          if (ta) { ta.focus(); ta.style.borderColor = 'var(--danger)'; }
          showToast('A reason is required to reject.');
          return;
        }
        _ensureOrderInUserStore(id);
        ZE.orders.rejectRequest(id, { reason });
        showToast('Rejected · Requester will be notified');
        closeAllDrawers();
      });
    });

    // Species trigger (only present when species count > 1) → side-sheet
    document.querySelectorAll('[data-species-trigger]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = el.dataset.id;
        if (typeof window.openApprovalSpecies === 'function') {
          try { window.openApprovalSpecies(id); } catch (err) { /* noop */ }
        }
      });
    });

    // Stop drawer textarea clicks from bubbling to the row
    document.querySelectorAll('.rc-drawer-row').forEach(row => {
      row.addEventListener('click', (e) => e.stopPropagation());
    });

    // Whole row click → side-sheet detail (graceful no-op if not loaded yet)
    document.querySelectorAll('tr.ap-row').forEach(row => {
      row.addEventListener('click', () => {
        const id = row.dataset.id;
        if (typeof window.openApprovalDetail === 'function') {
          try { window.openApprovalDetail(id); } catch (err) { /* noop */ }
        }
      });
      row.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          const id = row.dataset.id;
          if (typeof window.openApprovalDetail === 'function') {
            try { window.openApprovalDetail(id); } catch (err) { /* noop */ }
          }
        }
      });
    });

    // Char counters
    document.querySelectorAll('.rc-drawer textarea').forEach(ta => {
      ta.addEventListener('input', () => {
        const field = ta.dataset.drawerField;
        const counter = document.querySelector(`[data-char-for="${field}"]`);
        if (counter) {
          const len = ta.value.length;
          counter.textContent = len + ' / 200';
          counter.classList.toggle('warn', len >= 190);
        }
        ta.style.borderColor = '';
      });
    });
  }

  /* ---------- If the order only exists in DEMO_ORDERS, promote it into ze_orders_v1
               so approveRequest/rejectRequest (which write to localStorage) can act on it. ---------- */
  function _ensureOrderInUserStore(id) {
    try {
      const userList = ZE.orders.read() || [];
      if (userList.some(o => o && o.id === id)) return;
      const demo = (DB.DEMO_ORDERS || []).find(o => o && o.id === id);
      if (!demo) return;
      const clone = JSON.parse(JSON.stringify(demo));
      clone.source = 'user';
      const nextList = userList.concat([clone]);
      localStorage.setItem('ze_orders_v1', JSON.stringify(nextList));
    } catch (e) { /* ignore */ }
  }

  /* ---------- Header: badges, nav, user slot ---------- */
  function renderBadges() {
    const cartN = ZE.cart.count();
    const cartB = document.getElementById('cartBadge');
    if (cartN > 0) { cartB.style.display = 'inline-flex'; cartB.textContent = cartN; }
    else cartB.style.display = 'none';

    const savN = ZE.saved.count();
    const savB = document.getElementById('savedBadge');
    if (savN > 0) { savB.style.display = 'inline-flex'; savB.textContent = savN; }
    else savB.style.display = 'none';

    const ordN = ZE.orders.count();
    const ordB = document.getElementById('ordersBadge');
    if (ordN > 0) { ordB.style.display = 'inline-flex'; ordB.textContent = ordN; }
    else ordB.style.display = 'none';

    // Approvals pill visible only if approver
    const apprBtn = document.getElementById('approvalsBtn');
    if (isApproverUser) {
      apprBtn.style.display = '';
      const n = (ZE.orders.pendingApprovalsFor ? ZE.orders.pendingApprovalsFor(user.id) : []).length;
      const apprB = document.getElementById('approvalsBadge');
      if (n > 0) { apprB.style.display = 'inline-flex'; apprB.textContent = n; }
      else apprB.style.display = 'none';
    } else {
      apprBtn.style.display = 'none';
    }
  }

  function renderUserSlot() {
    const slot = document.getElementById('userSlot');
    if (!slot) return;
    const role = (ZE && ZE.user && ZE.user.role) ? ZE.user.role() : null;
    const u = (role && ZE.user.resolve) ? ZE.user.resolve() : null;

    if (!role || !u) {
      slot.innerHTML = `<a href="login_1.html" class="signin-pill">
        <i data-lucide="log-in" class="w-4 h-4"></i> Sign in
      </a>`;
      ZE.refreshIcons();
      return;
    }

    const avatarUrl = requesterAvatar(u);
    const name = u.name || 'Account';
    const email = u.email || '';
    const pendingN = isApproverUser && ZE.orders.pendingApprovalsFor
      ? ZE.orders.pendingApprovalsFor(u.id).length
      : 0;

    slot.innerHTML = `
      <div class="avatar-wrap">
        <img class="avatar" id="avatarTrigger" src="${avatarUrl}" alt="${esc(name)}" loading="eager" style="margin-left:0;"/>
        <div class="avatar-menu" id="avatarMenu" role="menu">
          <div class="menu-header">
            <div class="name">${esc(name)}</div>
            ${email ? `<div class="email">${esc(email)}</div>` : ''}
          </div>
          <a href="profile_1.html" role="menuitem"><i data-lucide="user" class="w-4 h-4"></i> Profile</a>
          <a href="orders_1.html" role="menuitem"><i data-lucide="package" class="w-4 h-4"></i> Orders</a>
          <a href="saved_1.html" role="menuitem"><i data-lucide="heart" class="w-4 h-4"></i> Saved</a>
          <a id="personaSwitchItem" data-persona-item role="menuitem" href="javascript:void(0)" data-mode-switch="to-other-persona" onclick="window.location.reload();return false;" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit"><i data-lucide="user-cog" class="w-4 h-4"></i> <span data-persona-label>Switch persona</span></a>
          <a role="menuitem" href="admin_dashboard_1.html" id="adminNavItem" data-mode-switch="to-admin" onclick="window.location.href='admin_dashboard_1.html';return false;"><i data-lucide="shield" class="w-4 h-4"></i> Switch to Admin view</a>
          ${isApproverUser ? `
          <a href="approvals_1.html" role="menuitem" class="current">
            <i data-lucide="clipboard-check" class="w-4 h-4"></i> Approvals
            ${pendingN > 0 ? `<span class="menu-badge">${pendingN}</span>` : ''}
          </a>` : ''}
          <div class="menu-sep"></div>
          <button type="button" class="sign-out" id="signOutBtn" role="menuitem">
            <i data-lucide="log-out" class="w-4 h-4"></i> Sign out
          </button>
        </div>
      </div>`;

    const trigger = document.getElementById('avatarTrigger');
    const menu = document.getElementById('avatarMenu');
    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      menu.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (!menu.contains(e.target) && e.target !== trigger) menu.classList.remove('open');
    });
    const signOut = document.getElementById('signOutBtn');
    if (signOut) {
      signOut.addEventListener('click', () => {
        if (ZE.user && ZE.user.signOut) ZE.user.signOut();
        window.location.href = 'login_1.html';
      });
    }

    ZE.refreshIcons();
  }

  /* ---------- Header button nav ---------- */
  document.getElementById('savedBtn').addEventListener('click', () => {
    window.location.href = 'saved_1.html';
  });
  document.getElementById('cartBtn').addEventListener('click', () => {
    window.location.href = 'cart_1.html';
  });
  document.getElementById('ordersBtn').addEventListener('click', () => {
    window.location.href = 'orders_1.html';
  });
  document.getElementById('approvalsBtn').addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  /* ---------- Subscriptions ---------- */
  ZE.on('orders:change', () => { render(); renderBadges(); });
  ZE.on('cart:change',   renderBadges);
  ZE.on('saved:change',  renderBadges);
  ZE.on('user:change',   renderUserSlot);

  /* ---------- Initial render ---------- */
  render();
  renderBadges();
  renderUserSlot();
  ZE.init();
})();
</script>
<script>
/* =========== Wallet pill renderer (shared inline) =========== */
(function(){
  if (window.__zeWalletPillInit) return;
  window.__zeWalletPillInit = true;
  function fmtCompactINR(n){
    n = Number(n) || 0;
    if (n >= 10000000) return '₹' + (n / 10000000).toFixed(1).replace(/\.0$/, '') + 'Cr';
    if (n >= 100000)   return '₹' + (n / 100000).toFixed(1).replace(/\.0$/, '') + 'L';
    if (n >= 1000)     return '₹' + Math.round(n / 1000) + 'K';
    return '₹' + n;
  }
  function colorClass(avail, allotted){
    if (!allotted) return '';
    var ratio = avail / allotted;
    if (ratio < 0.20) return 'ze-wp-red';
    if (ratio < 0.50) return 'ze-wp-amber';
    return '';
  }
  function closePop(){
    var pop = document.getElementById('walletPillPop');
    if (pop) pop.classList.remove('open');
  }
  function buildPop(siteIds, activeId){
    var html = '<div class="ze-wp-head">Switch site</div>';
    siteIds.forEach(function(sid){
      var s = (window.DB && DB.byId) ? DB.byId(DB.SITES, sid) : null;
      if (!s) return;
      html += '<div class="ze-wp-opt' + (sid === activeId ? ' active' : '') + '" data-wp-site="' + sid + '">' +
        '<div class="ze-wp-opt-name"><div>' + s.name + '</div><div class="ze-wp-opt-city">' + (s.city || '') + '</div></div>' +
        '<i data-lucide="check" class="ze-wp-opt-tick w-4 h-4"></i>' +
      '</div>';
    });
    return html;
  }
  function renderPill(){
    var pill = document.getElementById('walletPill');
    if (!pill) return;
    if (typeof ZE === 'undefined' || !ZE.user || !ZE.activeSite || !ZE.wallet) return;
    var u = ZE.user.read();
    if (!u || u.role !== 'buyer') { pill.style.display = 'none'; pill.classList.remove('is-ready'); return; }
    var sites = ZE.activeSite.availableFor(u.id) || [];
    var activeId = ZE.activeSite.get();
    if (!activeId && sites.length) activeId = sites[0];
    if (!activeId) { pill.style.display = 'none'; pill.classList.remove('is-ready'); return; }
    var siteObj = (window.DB && DB.byId) ? DB.byId(DB.SITES, activeId) : null;
    var w = ZE.wallet.forSite(activeId);
    var nameEl = pill.querySelector('[data-wallet-site-name]');
    var amtEl  = pill.querySelector('[data-wallet-amount]');
    var chev   = pill.querySelector('[data-wallet-site-chev]');
    var siteWrap = pill.querySelector('[data-wallet-site-switch]');
    if (nameEl) nameEl.textContent = siteObj ? siteObj.name : '—';
    if (amtEl) {
      amtEl.textContent = fmtCompactINR(w.available);
      amtEl.classList.remove('ze-wp-red','ze-wp-amber');
      var c = colorClass(w.available, w.allotted);
      if (c) amtEl.classList.add(c);
    }
    var multi = sites.length > 1;
    if (chev) chev.style.display = multi ? '' : 'none';
    if (siteWrap) siteWrap.style.cursor = multi ? 'pointer' : 'default';
    pill.classList.add('is-ready');
    var pop = pill.querySelector('[data-wallet-pop]');
    if (pop) pop.innerHTML = multi ? buildPop(sites, activeId) : '';
    if (window.lucide && lucide.createIcons) { try { lucide.createIcons(); } catch (e) {} }
    var mob = document.getElementById('mobileWalletRow');
    if (mob) {
      if (siteObj) {
        mob.style.display = '';
        var mn = mob.querySelector('[data-wallet-mob-name]');
        var ma = mob.querySelector('[data-wallet-mob-amt]');
        var ms = mob.querySelector('[data-wallet-mob-sub]');
        if (mn) mn.textContent = siteObj.name;
        if (ma) {
          ma.textContent = fmtCompactINR(w.available);
          ma.classList.remove('ze-wp-red','ze-wp-amber');
          var mc = colorClass(w.available, w.allotted);
          if (mc) ma.classList.add(mc);
        }
        if (ms) ms.textContent = (siteObj.city || '') + ' · Available · Open wallet →';
      } else { mob.style.display = 'none'; }
    }
  }
  function bind(){
    document.addEventListener('click', function(e){
      var pill = document.getElementById('walletPill');
      if (!pill) return;
      var siteSwitch = e.target.closest && e.target.closest('[data-wallet-site-switch]');
      var pillTrigger = e.target.closest && e.target.closest('#walletPill');
      var popClick = e.target.closest && e.target.closest('[data-wp-site]');
      var pop = document.getElementById('walletPillPop');
      if ((siteSwitch || (pillTrigger && pill.contains(pillTrigger) && !popClick)) ) {
        var sites = (ZE.user.read && ZE.user.read()) ? (ZE.activeSite.availableFor(ZE.user.read().id) || []) : [];
        if (sites.length > 1 && pop) {
          e.preventDefault(); e.stopPropagation();
          pop.classList.toggle('open');
          return;
        }
      }
      var opt = e.target.closest && e.target.closest('[data-wp-site]');
      if (opt && pop && pop.contains(opt)) {
        e.preventDefault(); e.stopPropagation();
        var sid = opt.getAttribute('data-wp-site');
        if (sid && ZE.activeSite.set(sid)) { closePop(); window.location.reload(); }
        return;
      }
      if (pop && pop.classList.contains('open') && !pop.contains(e.target) && !pill.contains(e.target)) {
        closePop(); return;
      }
      var pillTarget = e.target.closest && e.target.closest('#walletPill');
      
    });
    document.addEventListener('click', function(e){
      var mob = e.target.closest && e.target.closest('#mobileWalletRow');
      if (mob) { window.location.href = 'wallet_1.html'; }
    });
    if (typeof ZE !== 'undefined' && ZE.on) {
      ZE.on('activeSite:change', renderPill);
      ZE.on('orders:change', renderPill);
      ZE.on('topup:change', renderPill);
      ZE.on('user:change', renderPill);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ renderPill(); bind(); });
  } else { renderPill(); bind(); }
})();
</script>
