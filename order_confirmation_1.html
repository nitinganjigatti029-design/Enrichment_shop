<head>
  <meta charset="utf-8"/>
  <title>ZooEnrich · Order placed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="tokens.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script src="app.js?v=20260504c"></script>

  <style>
    /* =========== Page layout =========== */
    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 0 32px; }

    /* =========== Header (mirrors index_1) =========== */
    .app-header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .app-header .row { display: flex; align-items: center; gap: 20px; height: 72px; }
    .brand-mark { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; color: var(--text); letter-spacing: -0.01em; }
    .brand-mark .logo-box { width: 32px; height: 32px; border-radius: 10px; background: var(--brand); color: #fff; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px -3px rgba(55,189,105,.5); }

    .search-pill { flex: 1; max-width: 560px; height: 48px; background: #F1F2F4; border-radius: 999px; display: flex; align-items: center; gap: 10px; padding: 0 18px; color: var(--text-muted); transition: .15s; border: 1.5px solid transparent; }
    .search-pill:focus-within { background: #fff; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(55,189,105,.12); }
    .search-pill input { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); }
    .search-pill .kbd { background: #fff; border: 1px solid var(--border); color: var(--text-muted); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }

    .header-actions { display: flex; align-items: center; gap: 6px; }
    .header-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 10px; border-radius: 12px; color: var(--text-muted); cursor: pointer; transition: .15s; background: transparent; border: none; position: relative; min-width: 64px; }
    .header-btn:hover { background: #F1F2F4; color: var(--text); }
    .header-btn span { font-size: 11px; font-weight: 500; margin-top: 3px; }
    .header-btn .badge-dot { position: absolute; top: 4px; right: 12px; min-width: 18px; height: 18px; padding: 0 5px; background: var(--danger); color: #fff; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 2px solid #fff; }
    .avatar { width: 40px; height: 40px; border-radius: 999px; object-fit: cover; border: 2px solid var(--border); margin-left: 8px; cursor: pointer; }

    /* =========== Confirmation page =========== */
    .confirm-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 56px 0;
      text-align: center;
    }
    .confirm-wrap h1 {
      font-size: 32px !important;
      font-weight: 700 !important;
      line-height: 1.15 !important;
      letter-spacing: -0.01em !important;
      color: var(--text) !important;
      margin: 18px 0 10px !important;
    }
    .confirm-wrap .sub {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.55;
      max-width: 520px;
      margin: 0 auto 32px;
    }

    /* =========== Success icon =========== */
    .success-icon {
      width: 96px;
      height: 96px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      position: relative;
      animation: scaleIn 500ms ease-out both;
      box-shadow: 0 10px 28px -10px rgba(55,189,105,.45);
    }
    .success-icon i,
    .success-icon svg {
      width: 56px !important;
      height: 56px !important;
    }
    @keyframes scaleIn {
      0%   { opacity: 0; transform: scale(0.9); }
      60%  { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* =========== Confetti (lightweight, pure CSS) =========== */
    .confetti-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    body { overflow-x: hidden; }
    .confetti-layer .piece {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      opacity: 0;
      transform: translate(-50%, -50%);
      animation: burst 900ms cubic-bezier(.2,.8,.2,1) 250ms forwards;
    }
    .confetti-layer .p1 { background: var(--brand); --tx: -70px; --ty: -80px; --rot: -25deg; }
    .confetti-layer .p2 { background: var(--warning); --tx: 70px; --ty: -90px; --rot: 20deg; }
    .confetti-layer .p3 { background: var(--brand-hover); --tx: 90px; --ty: 40px; --rot: 15deg; }
    .confetti-layer .p4 { background: var(--yellow); --tx: -90px; --ty: 30px; --rot: -15deg; }
    .confetti-layer .p5 { background: var(--danger); --tx: 20px; --ty: -110px; --rot: 35deg; border-radius: 999px; }
    .confetti-layer .p6 { background: var(--brand); --tx: -20px; --ty: -120px; --rot: -35deg; border-radius: 999px; }
    @keyframes burst {
      0%   { opacity: 0; transform: translate(-50%, -50%) rotate(0deg) scale(0.4); }
      30%  { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) rotate(var(--rot)) scale(1); }
    }

    /* =========== Summary card =========== */
    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow-sm);
      text-align: left;
      margin-bottom: 24px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    .summary-col .lbl {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-subtle);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .summary-col .val {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .summary-col .val.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      letter-spacing: 0.01em;
    }
    .summary-col.align-right { text-align: right; }
    .summary-col .val.big {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    /* =========== Items strip =========== */
    .items-strip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 22px;
      box-shadow: var(--shadow-sm);
      text-align: left;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .items-strip .strip-lbl {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .items-thumbs { display: flex; align-items: center; gap: 10px; flex: 1; flex-wrap: wrap; }
    .thumb {
      position: relative;
      width: 56px;
      height: 56px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--card-subtle);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb .qty-overlay {
      position: absolute;
      top: -6px;
      right: -6px;
      min-width: 22px;
      height: 22px;
      padding: 0 5px;
      background: var(--brand);
      color: #fff;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      border: 2px solid #fff;
    }
    .more-pill {
      padding: 0 14px;
      height: 56px;
      border-radius: 12px;
      background: var(--brand-soft);
      color: var(--brand-hover);
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* =========== CTA row =========== */
    .cta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 999px;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: .15s;
      text-decoration: none;
      line-height: 1;
    }
    .btn-primary {
      background: var(--brand);
      color: #fff;
      box-shadow: 0 6px 16px -6px rgba(55,189,105,.5);
    }
    .btn-primary:hover {
      background: var(--brand-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px -8px rgba(55,189,105,.55);
    }
    .btn-secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--border-strong);
    }
    .btn-secondary:hover {
      border-color: var(--brand);
      color: var(--brand-hover);
      background: var(--brand-soft);
    }
    .btn-tertiary {
      background: transparent;
      color: var(--text-muted);
      padding: 12px 16px;
    }
    .btn-tertiary:hover { color: var(--brand); }

    .footnote {
      margin-top: 22px;
      font-size: 12px;
      color: var(--text-subtle);
    }

    /* =========== Error state =========== */
    .error-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 28px;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
    .error-icon {
      width: 72px; height: 72px;
      border-radius: 999px;
      background: var(--danger-bg);
      color: var(--danger);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .error-icon i, .error-icon svg { width: 36px !important; height: 36px !important; }
    .error-card h2 {
      font-size: 22px !important;
      font-weight: 700 !important;
      color: var(--text) !important;
      margin-bottom: 8px !important;
    }
    .error-card p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 420px;
      margin: 0 auto 20px;
      line-height: 1.5;
    }

    /* =========== Responsive =========== */
    @media (max-width: 900px) {
      .app-header .row, .site-header-inner { height: 60px !important; gap: 10px; }
      .search-pill { display: none !important; }
      .header-btn span { display: none !important; }
      .header-btn { min-width: 40px !important; padding: 8px !important; }
      .page-wrap { padding: 0 16px !important; }
    }
    @media (max-width: 640px) {
      .confirm-wrap { padding: 36px 0; }
      .confirm-wrap h1 { font-size: 26px !important; }
      .summary-card { padding: 18px; }
      .summary-grid {
        grid-template-columns: 1fr !important;
        gap: 16px;
        text-align: left;
      }
      .summary-col.align-right { text-align: left; }
      .cta-row { flex-direction: column; align-items: stretch; gap: 10px; }
      .cta-row .btn { width: 100%; min-height: 44px; }
      .items-strip { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px 16px; }
      .success-icon { width: 80px; height: 80px; }
      .success-icon i, .success-icon svg { width: 48px !important; height: 48px !important; }
    }
    /* =========== Wallet pill (header) — shared =========== */
    .ze-wallet-pill { display: none; align-items: stretch; flex-direction: column; padding: 0; background: #fff; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: .15s ease; box-shadow: var(--shadow-xs); margin-left: 4px; height: 44px; min-width: 110px; max-width: 220px; position: relative; text-align: left; font-family: inherit; }
    .ze-wallet-pill.is-ready { display: inline-flex; }
    .ze-wallet-pill:hover { border-color: var(--border-strong); background: #F9FAFB; }
    .ze-wallet-pill .ze-wp-site { display: flex; align-items: center; gap: 4px; padding: 4px 10px 0; max-width: 100%; font-size: 10.5px; font-weight: 600; color: var(--text-muted); line-height: 1.1; cursor: pointer; border-radius: 11px 11px 0 0; }
    .ze-wallet-pill .ze-wp-site-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .ze-wallet-pill .ze-wp-site-chev { flex-shrink: 0; opacity: .7; }
    .ze-wallet-pill .ze-wp-site:hover { background: #F1F2F4; }
    .ze-wallet-pill .ze-wp-amt { padding: 2px 12px 6px; font-size: 14px; font-weight: 700; line-height: 1.1; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; color: var(--brand-hover); border-radius: 0 0 11px 11px; }
    .ze-wallet-pill .ze-wp-amt.ze-wp-amber { color: #B45309; }
    .ze-wallet-pill .ze-wp-amt.ze-wp-red { color: var(--danger); }
    .ze-wp-pop { position: absolute; top: calc(100% + 6px); right: 0; min-width: 280px; background: #fff; border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 8px; display: none; z-index: 70; }
    .ze-wp-pop.open { display: block; animation: zewpIn .18s ease-out; }
    @keyframes zewpIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .ze-wp-pop .ze-wp-head { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); padding: 8px 10px 6px; }
    .ze-wp-opt { display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: 10px; cursor: pointer; font-size: 13px; color: var(--text); }
    .ze-wp-opt:hover { background: #F1F2F4; }
    .ze-wp-opt.active { background: var(--brand-soft); color: var(--brand-hover); font-weight: 600; }
    .ze-wp-opt .ze-wp-opt-tick { margin-left: auto; color: var(--brand); opacity: 0; }
    .ze-wp-opt.active .ze-wp-opt-tick { opacity: 1; }
    .ze-wp-opt-name { flex: 1; min-width: 0; }
    .ze-wp-opt-city { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    @media (max-width: 520px) {
      .ze-wallet-pill .ze-wp-site { display: none; }
      .ze-wallet-pill .ze-wp-amt { padding: 0 12px; height: 100%; display: flex; align-items: center; border-radius: 11px; }
      .ze-wallet-pill { min-width: 70px; }
    }
    @media (max-width: 767px) {
      .ze-wallet-pill { height: 40px; }
    }
    /* Mobile drawer wallet row */
    .ze-wp-mobile-row { display: flex; flex-direction: column; padding: 10px 12px; border-radius: 10px; cursor: pointer; gap: 4px; text-decoration: none; color: inherit; }
    .ze-wp-mobile-row:hover { background: #F1F2F4; }
    .ze-wp-mobile-row .ze-wp-mob-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .ze-wp-mobile-row .ze-wp-mob-name { font-weight: 600; color: var(--text); font-size: 13px; }
    .ze-wp-mobile-row .ze-wp-mob-amt { font-weight: 700; font-size: 14px; color: var(--brand-hover); font-variant-numeric: tabular-nums; }
    .ze-wp-mobile-row .ze-wp-mob-amt.ze-wp-amber { color: #B45309; }
    .ze-wp-mobile-row .ze-wp-mob-amt.ze-wp-red { color: var(--danger); }
    .ze-wp-mobile-row .ze-wp-mob-sub { font-size: 12px; color: var(--text-muted); }
  </style>

<script>
(function () {
  /* ---------- URL param ---------- */
  function getParam(name) {
    const m = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }

  /* ---------- ETA formatter: "27 April 2026" ---------- */
  function fmtEta(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '—';
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }

  /* ---------- HTML escape ---------- */
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  /* ---------- Render error state ---------- */
  function renderError() {
    const root = document.getElementById('confirmRoot');
    root.innerHTML = `
      <div class="error-card">
        <div class="error-icon"><i data-lucide="alert-circle"></i></div>
        <h2>We can't find this order</h2>
        <p>It may have been cleared from local storage, or the link is incomplete.</p>
        <div class="cta-row">
          <a href="orders_1.html" class="btn btn-primary">
            <i data-lucide="package" class="w-4 h-4"></i>
            View all orders
          </a>
          <a href="index_1.html" class="btn btn-tertiary">Continue shopping</a>
        </div>
      </div>
    `;
    if (window.lucide?.createIcons) window.lucide.createIcons();
  }

  /* ---------- Render confirmation ---------- */
  function renderOrder(order) {
    const root = document.getElementById('confirmRoot');
    const items = Array.isArray(order.items) ? order.items : [];
    const eta = order.tracking && order.tracking.eta ? order.tracking.eta : null;

    // Build thumbs (up to 3)
    const shown = items.slice(0, 3);
    const extra = items.length - shown.length;
    const thumbsHtml = shown.map(it => {
      const p = DB.byId(DB.PRODUCTS, it.productId);
      const imgSrc = p && (p.imgSmall || p.img) ? (p.imgSmall || p.img) : '';
      const name = p ? p.name : it.productId;
      return `
        <div class="thumb" title="${esc(name)}">
          <img src="${esc(imgSrc)}" alt="${esc(name)}" loading="eager"/>
          <span class="qty-overlay">${it.qty}</span>
        </div>
      `;
    }).join('');
    const moreHtml = extra > 0 ? `<div class="more-pill">+${extra} more</div>` : '';

    root.innerHTML = `
      <div style="position:relative; display:inline-block;">
        <div class="success-icon">
          <i data-lucide="check-circle-2"></i>
        </div>
        <div class="confetti-layer" aria-hidden="true">
          <span class="piece p1"></span>
          <span class="piece p2"></span>
          <span class="piece p3"></span>
          <span class="piece p4"></span>
          <span class="piece p5"></span>
          <span class="piece p6"></span>
        </div>
      </div>

      <h1>Thank you — your order is placed</h1>
      <p class="sub">We've emailed a confirmation. You'll get tracking updates as your parcel moves.</p>

      <div class="summary-card">
        <div class="summary-grid">
          <div class="summary-col">
            <div class="lbl">Order ID</div>
            <div class="val mono">${esc(order.id)}</div>
          </div>
          <div class="summary-col">
            <div class="lbl">Estimated delivery</div>
            <div class="val">${esc(fmtEta(eta))}</div>
          </div>
          <div class="summary-col align-right">
            <div class="lbl">Total</div>
            <div class="val big">${esc(DB.fmtINR(order.total || 0))}</div>
          </div>
        </div>
      </div>

      ${items.length ? `
      <div class="items-strip">
        <span class="strip-lbl">${items.length} item${items.length === 1 ? '' : 's'}</span>
        <div class="items-thumbs">
          ${thumbsHtml}
          ${moreHtml}
        </div>
      </div>
      ` : ''}

      <div class="cta-row">
        <a href="order_detail_1.html?id=${encodeURIComponent(order.id)}" class="btn btn-primary" id="trackBtn">
          <i data-lucide="map-pin" class="w-4 h-4"></i>
          Track this order
        </a>
        <a href="orders_1.html" class="btn btn-secondary" id="allOrdersBtn">
          <i data-lucide="package" class="w-4 h-4"></i>
          View all orders
        </a>
        <a href="index_1.html" class="btn btn-tertiary" id="continueBtn">Continue shopping</a>
      </div>

      <p class="footnote">Order progress updates appear on the Orders page.</p>
    `;

    if (window.lucide?.createIcons) window.lucide.createIcons();
  }

  /* ---------- Header badges ---------- */
  function renderBadges() {
    const cartN = ZE.cart.count();
    const cartB = document.getElementById('cartBadge');
    if (cartN > 0) { cartB.style.display = 'inline-flex'; cartB.textContent = cartN; }
    else cartB.style.display = 'none';

    const savN = ZE.saved.count();
    const savB = document.getElementById('savedBadge');
    if (savN > 0) { savB.style.display = 'inline-flex'; savB.textContent = savN; }
    else savB.style.display = 'none';

    const ordN = ZE.orders.count();
    const ordB = document.getElementById('ordersBadge');
    if (ordN > 0) { ordB.style.display = 'inline-flex'; ordB.textContent = ordN; }
    else ordB.style.display = 'none';
  }

  /* ---------- Header nav ---------- */
  document.getElementById('ordersBtn').addEventListener('click', () => {
    window.location.href = 'orders_1.html';
  });
  document.getElementById('savedBtn').addEventListener('click', () => {
    window.location.href = 'saved_1.html';
  });
  document.getElementById('cartBtn').addEventListener('click', () => {
    window.location.href = 'cart_1.html';
  });

  /* ---------- Avatar dropdown ---------- */
  (function(){
    const trig = document.getElementById('ocAvatarTrigger');
    const menu = document.getElementById('ocAvatarMenu');
    if (!trig || !menu) return;
    trig.addEventListener('click', (e) => {
      e.stopPropagation();
      menu.style.display = (menu.style.display === 'none' || !menu.style.display) ? 'block' : 'none';
    });
    document.addEventListener('click', (e) => {
      if (!menu.contains(e.target) && !trig.contains(e.target)) menu.style.display = 'none';
    });
    menu.querySelectorAll('a[role="menuitem"]').forEach(it => {
      it.addEventListener('mouseenter', () => { it.style.background = '#F4F5F7'; });
      it.addEventListener('mouseleave', () => { it.style.background = ''; });
    });
  })();

  /* ---------- Subscribe ---------- */
  ZE.on('cart:change',   renderBadges);
  ZE.on('saved:change',  renderBadges);
  ZE.on('orders:change', renderBadges);

  /* ---------- Boot ---------- */
  const idsParam = getParam('ids');
  const id = getParam('id');
  if (idsParam) {
    const ids = idsParam.split(',').map(s => s.trim()).filter(Boolean);
    const orders = ids.map(x => ZE.orders.byId(x)).filter(Boolean);
    if (orders.length === 1) {
      renderOrder(orders[0]);
    } else if (orders.length > 1) {
      renderMultiOrder(orders);
    } else {
      renderError();
    }
  } else {
    const order = id ? ZE.orders.byId(id) : null;
    if (!order) renderError(); else renderOrder(order);
  }

  function renderMultiOrder(orders) {
    const root = document.getElementById('confirmRoot');
    if (!root) return;
    const isApproval = orders[0] && (orders[0].status === 'pending_approval' || orders[0].approvalStatus === 'pending');
    const totalAmt = orders.reduce((s, o) => s + (Number(o.total) || 0), 0);
    const cardsHtml = orders.map(o => {
      const it = (o.items && o.items[0]) || {};
      const p = DB.byId(DB.PRODUCTS, it.productId) || {};
      let img = '';
      if (p.images && p.images[0]) img = p.images[0];
      else if (typeof DB.img === 'function' && p.imgQ) img = DB.img(p.imgQ, 160, 160, p.seed || 0);
      const cfg = (it.config && Object.values(it.config).filter(Boolean).join(' · ')) || '';
      const subBits = [];
      if (cfg) subBits.push(esc(cfg));
      subBits.push(`Qty ${it.qty || 1}`);
      return `<a href="order_detail_1.html?id=${encodeURIComponent(o.id)}" class="moc-card">
        <div class="moc-thumb">${img ? `<img src="${img}" alt="" loading="lazy">` : '<i data-lucide="package" style="color:var(--text-subtle);width:22px;height:22px;"></i>'}</div>
        <div class="moc-meta">
          <div class="moc-name">${esc(p.name || '')}</div>
          <div class="moc-sub">${subBits.join(' · ')}</div>
          <div class="moc-amount">${DB.fmtINR(Number(o.total) || 0)}</div>
        </div>
      </a>`;
    }).join('');
    root.innerHTML = `
      <div class="oc-hero" style="text-align:center;padding:24px 16px 12px;">
        <div class="oc-tick"><i data-lucide="${isApproval ? 'send' : 'check'}"></i></div>
        <h1 style="font-size:22px;font-weight:700;margin:0;">${isApproval ? `${orders.length} orders sent for approval` : `${orders.length} orders placed`}</h1>
        <div style="margin-top:8px;font-size:14px;color:var(--text-muted);">Total ${DB.fmtINR(totalAmt)}</div>
      </div>
      <div style="max-width:680px;margin:0 auto;padding:0 16px 24px;display:flex;flex-direction:column;gap:10px;">
        ${cardsHtml}
      </div>
      <div style="text-align:center;padding:0 16px 32px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;">
        <a href="orders_1_2.html" class="oc-btn oc-btn-primary">
          <i data-lucide="package"></i> View all orders
        </a>
        <a href="../index_1.html" class="oc-btn oc-btn-outline">
          Continue shopping
        </a>
      </div>
      <style>
        .oc-tick {
          width:72px;height:72px;border-radius:999px;background:var(--brand);
          display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;
          box-shadow: 0 8px 24px -8px rgba(22,163,74,.45);
        }
        .oc-tick i, .oc-tick svg { width:36px !important; height:36px !important; color:#fff !important; stroke-width:3; }
        .moc-card {
          display:flex; align-items:flex-start; gap:8px; padding:14px;
          border:1px solid var(--border); border-radius:12px; background:var(--card);
          text-decoration:none; color:var(--text); transition:.15s; text-align:left;
        }
        .moc-card:hover { border-color:var(--brand); box-shadow: var(--shadow-sm); }
        .moc-thumb {
          width:72px; height:72px; border-radius:10px; overflow:hidden;
          background:var(--muted); flex-shrink:0;
          display:flex; align-items:center; justify-content:center;
        }
        .moc-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
        .moc-meta { flex:1; min-width:0; text-align:left; }
        .moc-name { font-weight:700; font-size:14px; line-height:1.3; color:var(--text); text-align:left; }
        .moc-sub  { font-size:12px; color:var(--text-muted); margin-top:4px; text-align:left; }
        .moc-amount { font-size:14px; font-weight:700; color:var(--text); margin-top:6px; font-variant-numeric: tabular-nums; text-align:left; }
        .oc-btn {
          display:inline-flex; align-items:center; gap:8px; padding:10px 18px;
          border-radius:10px; font-weight:600; text-decoration:none;
          font-size:14px; line-height:1; transition:.15s;
        }
        .oc-btn i, .oc-btn svg { width:16px !important; height:16px !important; }
        .oc-btn-primary { background:var(--brand); color:#fff; border:1px solid var(--brand); }
        .oc-btn-primary:hover { background:var(--brand-hover); border-color:var(--brand-hover); }
        .oc-btn-outline { background:var(--card); color:var(--text); border:1px solid var(--border); }
        .oc-btn-outline:hover { border-color:var(--brand); color:var(--brand); }
      </style>
    `;
    if (window.lucide && lucide.createIcons) lucide.createIcons();
  }
  renderBadges();
  ZE.init();
})();
</script>
<script>
/* =========== Wallet pill renderer (shared inline) =========== */
(function(){
  if (window.__zeWalletPillInit) return;
  window.__zeWalletPillInit = true;
  function fmtCompactINR(n){
    n = Number(n) || 0;
    if (n >= 10000000) return '₹' + (n / 10000000).toFixed(1).replace(/\.0$/, '') + 'Cr';
    if (n >= 100000)   return '₹' + (n / 100000).toFixed(1).replace(/\.0$/, '') + 'L';
    if (n >= 1000)     return '₹' + Math.round(n / 1000) + 'K';
    return '₹' + n;
  }
  function colorClass(avail, allotted){
    if (!allotted) return '';
    var ratio = avail / allotted;
    if (ratio < 0.20) return 'ze-wp-red';
    if (ratio < 0.50) return 'ze-wp-amber';
    return '';
  }
  function closePop(){
    var pop = document.getElementById('walletPillPop');
    if (pop) pop.classList.remove('open');
  }
  function buildPop(siteIds, activeId){
    var html = '<div class="ze-wp-head">Switch site</div>';
    siteIds.forEach(function(sid){
      var s = (window.DB && DB.byId) ? DB.byId(DB.SITES, sid) : null;
      if (!s) return;
      html += '<div class="ze-wp-opt' + (sid === activeId ? ' active' : '') + '" data-wp-site="' + sid + '">' +
        '<div class="ze-wp-opt-name"><div>' + s.name + '</div><div class="ze-wp-opt-city">' + (s.city || '') + '</div></div>' +
        '<i data-lucide="check" class="ze-wp-opt-tick w-4 h-4"></i>' +
      '</div>';
    });
    return html;
  }
  function renderPill(){
    var pill = document.getElementById('walletPill');
    if (!pill) return;
    if (typeof ZE === 'undefined' || !ZE.user || !ZE.activeSite || !ZE.wallet) return;
    var u = ZE.user.read();
    if (!u || u.role !== 'buyer') { pill.style.display = 'none'; pill.classList.remove('is-ready'); return; }
    var sites = ZE.activeSite.availableFor(u.id) || [];
    var activeId = ZE.activeSite.get();
    if (!activeId && sites.length) activeId = sites[0];
    if (!activeId) { pill.style.display = 'none'; pill.classList.remove('is-ready'); return; }
    var siteObj = (window.DB && DB.byId) ? DB.byId(DB.SITES, activeId) : null;
    var w = ZE.wallet.forSite(activeId);
    var nameEl = pill.querySelector('[data-wallet-site-name]');
    var amtEl  = pill.querySelector('[data-wallet-amount]');
    var chev   = pill.querySelector('[data-wallet-site-chev]');
    var siteWrap = pill.querySelector('[data-wallet-site-switch]');
    if (nameEl) nameEl.textContent = siteObj ? siteObj.name : '—';
    if (amtEl) {
      amtEl.textContent = fmtCompactINR(w.available);
      amtEl.classList.remove('ze-wp-red','ze-wp-amber');
      var c = colorClass(w.available, w.allotted);
      if (c) amtEl.classList.add(c);
    }
    var multi = sites.length > 1;
    if (chev) chev.style.display = multi ? '' : 'none';
    if (siteWrap) siteWrap.style.cursor = multi ? 'pointer' : 'default';
    pill.classList.add('is-ready');
    var pop = pill.querySelector('[data-wallet-pop]');
    if (pop) pop.innerHTML = multi ? buildPop(sites, activeId) : '';
    if (window.lucide && lucide.createIcons) { try { lucide.createIcons(); } catch (e) {} }
    var mob = document.getElementById('mobileWalletRow');
    if (mob) {
      if (siteObj) {
        mob.style.display = '';
        var mn = mob.querySelector('[data-wallet-mob-name]');
        var ma = mob.querySelector('[data-wallet-mob-amt]');
        var ms = mob.querySelector('[data-wallet-mob-sub]');
        if (mn) mn.textContent = siteObj.name;
        if (ma) {
          ma.textContent = fmtCompactINR(w.available);
          ma.classList.remove('ze-wp-red','ze-wp-amber');
          var mc = colorClass(w.available, w.allotted);
          if (mc) ma.classList.add(mc);
        }
        if (ms) ms.textContent = (siteObj.city || '') + ' · Available · Open wallet →';
      } else { mob.style.display = 'none'; }
    }
  }
  function bind(){
    document.addEventListener('click', function(e){
      var pill = document.getElementById('walletPill');
      if (!pill) return;
      var siteSwitch = e.target.closest && e.target.closest('[data-wallet-site-switch]');
      var pillTrigger = e.target.closest && e.target.closest('#walletPill');
      var popClick = e.target.closest && e.target.closest('[data-wp-site]');
      var pop = document.getElementById('walletPillPop');
      if ((siteSwitch || (pillTrigger && pill.contains(pillTrigger) && !popClick)) ) {
        var sites = (ZE.user.read && ZE.user.read()) ? (ZE.activeSite.availableFor(ZE.user.read().id) || []) : [];
        if (sites.length > 1 && pop) {
          e.preventDefault(); e.stopPropagation();
          pop.classList.toggle('open');
          return;
        }
      }
      var opt = e.target.closest && e.target.closest('[data-wp-site]');
      if (opt && pop && pop.contains(opt)) {
        e.preventDefault(); e.stopPropagation();
        var sid = opt.getAttribute('data-wp-site');
        if (sid && ZE.activeSite.set(sid)) { closePop(); window.location.reload(); }
        return;
      }
      if (pop && pop.classList.contains('open') && !pop.contains(e.target) && !pill.contains(e.target)) {
        closePop(); return;
      }
      var pillTarget = e.target.closest && e.target.closest('#walletPill');
      
    });
    document.addEventListener('click', function(e){
      var mob = e.target.closest && e.target.closest('#mobileWalletRow');
      if (mob) { window.location.href = 'wallet_1.html'; }
    });
    if (typeof ZE !== 'undefined' && ZE.on) {
      ZE.on('activeSite:change', renderPill);
      ZE.on('orders:change', renderPill);
      ZE.on('topup:change', renderPill);
      ZE.on('user:change', renderPill);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ renderPill(); bind(); });
  } else { renderPill(); bind(); }
})();
</script>
</body>
