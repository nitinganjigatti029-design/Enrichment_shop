<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>ZooEnrich · Vendor Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="tokens.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <style>
    /* =========== Page layout =========== */
    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 0 32px; }

    /* =========== Header (matches index_1.html buyer header) =========== */
    .app-header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .app-header .row { display: flex; align-items: center; gap: 20px; height: 72px; }
    .brand-mark { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; color: var(--text); letter-spacing: -0.01em; }
    .brand-mark .logo-box { width: 32px; height: 32px; border-radius: 10px; background: var(--brand); color: #fff; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px -3px rgba(55,189,105,.5); }

    .search-pill { flex: 1; max-width: 560px; height: 48px; background: #F1F2F4; border-radius: 999px; display: flex; align-items: center; gap: 10px; padding: 0 18px; color: var(--text-muted); transition: .15s; border: 1.5px solid transparent; }
    .search-pill:focus-within { background: #fff; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(55,189,105,.12); }
    .search-pill input { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); }
    .search-pill .kbd { background: #fff; border: 1px solid var(--border); color: var(--text-muted); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }

    .header-actions { display: flex; align-items: center; gap: 6px; }
    .header-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 10px; border-radius: 12px; color: var(--text-muted); cursor: pointer; transition: .15s; background: transparent; border: none; position: relative; min-width: 64px; }
    .header-btn:hover { background: #F1F2F4; color: var(--text); }
    .header-btn span { font-size: 11px; font-weight: 500; margin-top: 3px; }
    .header-btn .badge-dot { position: absolute; top: 4px; right: 12px; min-width: 18px; height: 18px; padding: 0 5px; background: var(--danger); color: #fff; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 2px solid #fff; }

    .avatar-wrap { position: relative; margin-left: 8px; }
    .avatar { width: 40px; height: 40px; border-radius: 999px; object-fit: cover; border: 2px solid var(--border); cursor: pointer; display: block; }
    .avatar-wrap .sign-in-btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 999px; background: var(--brand); color: #fff; font-weight: 600; font-size: 13px; border: none; cursor: pointer; box-shadow: 0 4px 10px -3px rgba(55,189,105,.4); }
    .avatar-wrap .sign-in-btn:hover { background: var(--brand-hover); }
    .avatar-menu { position: absolute; top: 48px; right: 0; background: #fff; border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); min-width: 220px; padding: 8px; display: none; z-index: 60; }
    .avatar-menu.open { display: block; animation: fadeUp .2s ease both; }
    .avatar-menu .menu-head { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
    .avatar-menu .menu-head .nm { font-weight: 600; font-size: 13px; color: var(--text); }
    .avatar-menu .menu-head .rl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
    .avatar-menu a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; font-size: 13px; color: var(--text); cursor: pointer; }
    .avatar-menu a:hover { background: #F4F5F7; color: var(--brand-hover); }
    .avatar-menu a.danger:hover { background: var(--danger-bg); color: var(--danger); }
    .avatar-menu .sep { height: 1px; background: var(--border); margin: 6px 0; }

    /* =========== Hero (branded vendor cover) =========== */
    .vs-hero {
      position: relative;
      width: 100%;
      min-height: 260px;
      overflow: hidden;
      background: #0F172A;
    }
    .vs-hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    .vs-hero::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.55) 100%);
      z-index: 1;
    }
    .vs-hero-inner {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      min-height: 260px;
      padding: 36px 0 24px;
      gap: 28px;
      flex-wrap: wrap;
    }
    .vs-hero-left { display: flex; align-items: flex-end; gap: 20px; color: #fff; flex: 1; min-width: 260px; }
    .vs-logo-square {
      width: 80px; height: 80px; border-radius: 16px;
      background: #fff; box-shadow: var(--shadow-lg);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .vs-logo-square img { width: 100%; height: 100%; object-fit: cover; }
    .vs-hero-title { display: flex; flex-direction: column; gap: 6px; padding-bottom: 4px; }
    .vs-hero-title h1 { font-size: 32px; font-weight: 700; color: #fff !important; letter-spacing: -0.02em; line-height: 1.1; margin: 0; }
    .vs-hero-title .tagline { font-size: 14px; color: rgba(255,255,255,.85); max-width: 520px; }

    .vs-hero-right { display: flex; flex-direction: column; align-items: flex-end; gap: 14px; color: #fff; }
    .vs-info-strip { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .vs-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 13px; border-radius: 999px;
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.22);
      color: #fff; font-size: 13px; font-weight: 500;
    }
    .vs-pill.rating { background: rgba(255,255,255,.95); color: var(--text); }
    .vs-pill.rating .star { color: var(--warning); }
    .vs-cta-row { display: flex; gap: 10px; }
    .vs-cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 999px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: 1.5px solid rgba(255,255,255,.4);
      background: rgba(255,255,255,.12);
      color: #fff; backdrop-filter: blur(10px);
      transition: .15s;
    }
    .vs-cta:hover { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.7); }
    .vs-cta.primary { background: #fff; color: var(--brand-hover); border-color: #fff; }
    .vs-cta.primary:hover { background: var(--brand-soft); }
    .vs-cta.primary.following { background: rgba(255,255,255,.12); color: #fff; }

    /* =========== Tab bar =========== */
    .tab-bar {
      position: sticky; top: 72px; z-index: 40;
      background: var(--page);
      padding: 16px 0 8px;
      border-bottom: 1px solid var(--border);
    }
    .tab-pills {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: var(--shadow-xs);
      overflow-x: auto;
      max-width: 100%;
      scrollbar-width: none;
    }
    .tab-pills::-webkit-scrollbar { display: none; }
    .tab-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 999px;
      font-size: 14px; font-weight: 600;
      background: transparent; color: var(--text-muted);
      border: none; cursor: pointer; white-space: nowrap; transition: .15s;
    }
    .tab-pill:hover { color: var(--text); }
    .tab-pill.active { background: var(--brand); color: #fff; box-shadow: 0 3px 8px -2px rgba(55,189,105,.45); }
    .tab-pill .count { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 999px; background: rgba(15,23,42,.08); color: var(--text-muted); }
    .tab-pill.active .count { background: rgba(255,255,255,.22); color: #fff; }

    .tab-panel { display: none; padding: 28px 0 60px; }
    .tab-panel.active { display: block; animation: fadeUp .35s ease both; }

    /* =========== Filter strip (products tab) =========== */
    .vs-filter-strip {
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap; margin-bottom: 22px;
    }
    .vs-cats { display: flex; gap: 8px; flex: 1; min-width: 0; overflow-x: auto; scrollbar-width: none; padding: 2px; }
    .vs-cats::-webkit-scrollbar { display: none; }
    .vs-search {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 14px; border-radius: 999px;
      background: #fff; border: 1px solid var(--border);
      min-width: 220px; transition: .15s;
    }
    .vs-search:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(55,189,105,.12); }
    .vs-search input { flex: 1; border: none; outline: none; background: transparent; font-size: 13px; color: var(--text); }

    .vs-sort { position: relative; }
    .vs-sort-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 14px 9px 12px; border-radius: 999px;
      background: #fff; border: 1px solid var(--border);
      cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text);
    }
    .vs-sort-btn:hover { border-color: var(--border-strong); }
    .vs-sort-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: #fff; border: 1px solid var(--border);
      border-radius: 12px; box-shadow: var(--shadow-lg);
      padding: 6px; min-width: 200px; z-index: 30;
      display: none;
    }
    .vs-sort-menu.open { display: block; animation: fadeUp .2s ease both; }
    .vs-sort-menu .item {
      padding: 8px 12px; border-radius: 8px; font-size: 13px;
      cursor: pointer; color: var(--text);
    }
    .vs-sort-menu .item:hover { background: #F4F5F7; }
    .vs-sort-menu .item.active { background: var(--brand-soft); color: var(--brand-hover); font-weight: 600; }

    /* =========== Product grid (reused from index) =========== */
    .prod-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    @media (max-width: 1100px) { .prod-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 800px)  { .prod-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .prod-grid { grid-template-columns: 1fr; } }

    .prod-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; cursor: pointer; transition: .2s ease; display: flex; flex-direction: column; box-shadow: var(--shadow-xs); }
    .prod-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--border-strong); }

    .prod-img-wrap { position: relative; aspect-ratio: 1 / 1; background: var(--card-subtle); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }

    /* ----- Myntra-style hover carousel ----- */
    .pi-stage { position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; }
    .pi-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity .4s ease; }
    .pi-img.pi-active { opacity: 1; }
    .prod-card:hover .pi-img.pi-active { transform: scale(1.02); }
    .pi-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; padding: 4px 8px; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); border-radius: 999px; opacity: 0; transition: opacity .2s; z-index: 2; pointer-events: none; }
    .prod-card:hover .pi-dots { opacity: 1; }
    .pi-dot { width: 5px; height: 5px; border-radius: 999px; background: rgba(255,255,255,0.5); transition: width .2s, background .2s; }
    .pi-dot.pi-dot-active { width: 14px; background: #fff; }
    @media (hover: none) { .pi-dots { opacity: 0.85; } }

    .top-badge {
      position: absolute; top: 10px; left: 10px; z-index: 2;
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700; padding: 4px 10px;
      border-radius: 999px; background: var(--brand); color: #fff;
    }

    .fav-btn { position: absolute; top: 10px; right: 10px; width: 34px; height: 34px; border-radius: 999px; background: #fff; border: none; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-sm); color: var(--text-muted); transition: .15s; z-index: 2; }
    .fav-btn:hover { color: var(--danger); transform: scale(1.08); }
    .fav-btn.active { color: var(--danger); }
    .fav-btn.active i { fill: currentColor; }

    .prod-meta { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; min-height: 50px; }
    .prod-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .prod-cat { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .prod-cat .tag-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--brand); }

    .prod-bottom { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: auto; }
    .prod-price { font-size: 16px; font-weight: 700; color: var(--text); }
    .prod-price .unit { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-left: 2px; }

    .add-btn { background: #fff; color: var(--brand); height: 34px; padding: 0 14px; border-radius: 999px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--brand); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: .15s; box-sizing: border-box; line-height: 1; }
    .add-btn:hover { background: var(--brand-soft); color: var(--brand-hover); border-color: var(--brand-hover); transform: scale(1.02); }
    .add-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .stepper-mini { display: inline-flex; align-items: center; background: var(--brand); color: #fff; border-radius: 999px; padding: 3px; gap: 2px; height: 34px; box-sizing: border-box; }
    .stepper-mini button { width: 28px; height: 28px; border-radius: 999px; background: transparent; color: #fff; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
    .stepper-mini button:hover { background: rgba(255,255,255,.2); }
    .stepper-mini .qty { min-width: 20px; text-align: center; font-weight: 700; font-size: 13px; }

    .empty-card {
      grid-column: 1 / -1;
      background: var(--card); border: 1px dashed var(--border-strong);
      border-radius: 16px; padding: 48px 20px; text-align: center;
      color: var(--text-muted);
    }
    .empty-card .big { font-weight: 700; color: var(--text); font-size: 16px; margin: 10px 0 4px; }

    /* =========== About tab =========== */
    .about-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
    @media (max-width: 900px) { .about-grid { grid-template-columns: 1fr; } }
    .about-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: var(--shadow-xs); }
    .about-card h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 10px; letter-spacing: -0.01em; }
    .about-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 12px; }

    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    @media (max-width: 700px) { .stat-row { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 18px 16px; display: flex; flex-direction: column; gap: 4px;
    }
    .stat-card .k { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .stat-card .v { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .stat-card .sub { font-size: 11px; color: var(--text-subtle); }

    .map-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-xs); }
    .map-img { width: 100%; height: 180px; object-fit: cover; background: var(--card-subtle); display: block; }
    .map-meta { padding: 16px 18px; }
    .map-meta .title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .map-meta .sub { font-size: 13px; color: var(--text-muted); }

    /* =========== Reviews tab =========== */
    .reviews-grid { display: grid; grid-template-columns: 360px 1fr; gap: 24px; align-items: start; }
    @media (max-width: 900px) { .reviews-grid { grid-template-columns: 1fr; } }

    .rv-agg-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: var(--shadow-xs); position: sticky; top: 140px; }
    .rv-agg-big { font-size: 48px; font-weight: 800; color: var(--text); letter-spacing: -0.03em; line-height: 1; }
    .rv-agg-stars { display: inline-flex; gap: 3px; color: var(--warning); margin: 10px 0 8px; }
    .rv-agg-stars .off { color: #E5E7EB; }
    .rv-agg-sub { font-size: 13px; color: var(--text-muted); }
    .dist-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; font-size: 12px; color: var(--text-muted); }
    .dist-row .lbl { min-width: 32px; display: inline-flex; align-items: center; gap: 3px; font-weight: 600; color: var(--text); }
    .dist-row .bar { flex: 1; height: 8px; background: #F1F2F4; border-radius: 999px; overflow: hidden; }
    .dist-row .bar .fill { height: 100%; background: var(--warning); border-radius: 999px; }
    .dist-row .cnt { min-width: 28px; text-align: right; }

    .rv-list { display: flex; flex-direction: column; gap: 14px; }
    .rv-item { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow-xs); }
    .rv-head { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .rv-head .rv-avatar { width: 40px; height: 40px; border-radius: 999px; overflow: hidden; flex-shrink: 0; background: var(--card-subtle); }
    .rv-head .rv-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .rv-head .nm { font-weight: 600; font-size: 14px; color: var(--text); }
    .rv-head .dt { font-size: 12px; color: var(--text-subtle); }
    .rv-head .stars { display: inline-flex; gap: 2px; color: var(--warning); font-size: 14px; }
    .rv-head .stars .off { color: #E5E7EB; }
    .rv-prod-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 3px 10px; border-radius: 999px; background: var(--brand-soft); color: var(--brand-hover); font-weight: 600; margin-bottom: 8px; }
    .rv-prod-link:hover { background: var(--brand); color: #fff; }
    .rv-body { font-size: 14px; color: var(--text); line-height: 1.5; }
    .rv-reply {
      margin-top: 14px; padding: 14px 16px; border-left: 3px solid var(--brand);
      background: var(--brand-soft); border-radius: 8px;
    }
    .rv-reply .reply-head { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--brand-hover); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .rv-reply .reply-body { font-size: 13px; color: var(--text); line-height: 1.5; }

    /* =========== Policies tab =========== */
    .policies-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media (max-width: 900px) { .policies-grid { grid-template-columns: 1fr; } }
    .policy-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: var(--shadow-xs); }
    .policy-card .ico-wrap { width: 44px; height: 44px; border-radius: 12px; background: var(--brand-soft); color: var(--brand-hover); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    .policy-card h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .policy-card p { font-size: 13px; color: var(--text-muted); line-height: 1.55; margin-bottom: 10px; }
    .policy-card .row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px dashed var(--border); color: var(--text); }
    .policy-card .row:last-child { border-bottom: none; }
    .policy-card .row .k { color: var(--text-muted); }

    /* =========== Not found =========== */
    .not-found {
      max-width: 520px; margin: 60px auto; background: var(--card);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 36px; text-align: center; box-shadow: var(--shadow-md);
    }
    .not-found .ico-big { width: 64px; height: 64px; border-radius: 999px; background: var(--danger-bg); color: var(--danger); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 18px; }
    .not-found h2 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .not-found p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }

    /* =========== Toast =========== */
    .ze-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0F172A; color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 10px 30px -8px rgba(0,0,0,.4); opacity: 0; pointer-events: none; transition: .25s; z-index: 200; max-width: 360px; }
    .ze-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* =========== Responsive =========== */
    @media (max-width: 900px) {
      .app-header .row { height: 60px !important; gap: 10px; }
      .search-pill { display: none !important; }
      .header-btn span { display: none !important; }
      .header-btn { min-width: 40px !important; padding: 8px !important; }
      .page-wrap { padding: 0 16px !important; }
      .vs-hero { min-height: 200px; }
      .vs-hero-inner { min-height: 200px; padding: 24px 0 16px; flex-direction: column; align-items: stretch; }
      .vs-hero-left { flex-direction: column; align-items: flex-start; gap: 14px; }
      .vs-hero-title h1 { font-size: 26px; }
      .vs-hero-right { align-items: flex-start; }
      .vs-info-strip {
        justify-content: flex-start;
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: none;
        padding-bottom: 4px;
        margin: 0 -16px;
        padding-left: 16px; padding-right: 16px;
      }
      .vs-info-strip::-webkit-scrollbar { display: none; }
      .vs-pill { flex-shrink: 0; padding: 6px 11px; font-size: 12px; }
      .vs-cta { padding: 9px 14px; font-size: 13px; }
      .tab-bar { top: 60px !important; padding: 12px 0 6px; }
      .tab-pills { display: flex; width: 100%; overflow-x: auto; }
      .tab-pill { padding: 9px 14px; font-size: 13px; }
      .rv-agg-card { position: static !important; }
      .vs-filter-strip { gap: 8px; margin-bottom: 16px; }
      .vs-search { min-width: 0; flex: 1 1 160px; }
    }
    @media (max-width: 600px) {
      .vs-hero { min-height: 180px; }
      .vs-hero-inner { min-height: 180px; padding: 20px 0 14px; }
      .vs-logo-square { width: 64px; height: 64px; border-radius: 12px; }
      .vs-hero-title h1 { font-size: 22px !important; line-height: 1.15 !important; }
      .vs-hero-title .tagline { font-size: 13px; }
      .prod-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px; }
      .prod-card { padding: 10px; }
      .prod-name { font-size: 14px; }
      .vs-cta-row { flex-wrap: wrap; }
      .vs-cta { flex: 1 1 auto; justify-content: center; }
      .stat-row { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (max-width: 400px) {
      .brand-mark span:not(.logo-box) { display: none; }
    }

    /* =========== Vendor preview mode banner =========== */
    .vs-preview-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: 12px;
      background: var(--brand-soft); color: var(--brand-hover);
      border: 1px solid var(--brand);
      font-size: 13px; font-weight: 600;
      margin-bottom: 18px;
    }
    .vs-preview-banner i { width: 18px; height: 18px; }

    /* =========== Add-to-cart species picker modal (shared across pages) =========== */
    .atc-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); opacity: 0; pointer-events: none; transition: .2s; z-index: 100; }
    .atc-overlay.open { opacity: 1; pointer-events: auto; }
    .atc-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-46%) scale(.98); opacity: 0; pointer-events: none; transition: .2s; z-index: 110; background: #fff; border: 1px solid var(--border); border-radius: 18px; width: min(560px, calc(100vw - 32px)); max-height: calc(100vh - 48px); display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
    .atc-modal.open { transform: translate(-50%,-50%) scale(1); opacity: 1; pointer-events: auto; }
    .atc-head { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .atc-thumb { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; background: var(--card-subtle); }
    .atc-heading { flex: 1; min-width: 0; }
    .atc-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .atc-sub { font-size: 12px; color: var(--text-muted); }
    .atc-close { width: 36px; height: 36px; border-radius: 999px; background: #F1F2F4; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .atc-body { padding: 16px 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .atc-field { display: flex; flex-direction: column; gap: 6px; }
    .atc-lab { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; display: flex; justify-content: space-between; }
    .atc-lab .req { color: var(--danger); }
    .atc-lab .opt { font-weight: 500; color: var(--text-subtle); text-transform: none; letter-spacing: 0; }
    .atc-search-wrap { display: flex; align-items: center; gap: 6px; border: 1.5px solid var(--border); border-radius: 10px; padding: 0 10px; }
    .atc-search-wrap input { flex: 1; height: 40px; border: none; outline: none; background: transparent; font-size: 14px; }
    .atc-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; margin-top: 4px; border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
    .atc-list .row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .atc-list .row:hover { background: #F4F5F7; }
    .atc-list .row.selected { background: var(--brand-soft); color: var(--brand-hover); font-weight: 600; }
    .atc-list .row img { width: 28px; height: 28px; border-radius: 999px; object-fit: cover; }
    .atc-list .row .row-cb { width: 16px; height: 16px; accent-color: var(--brand); cursor: pointer; flex-shrink: 0; }
    .atc-list .row .name { font-weight: 500; }
    .atc-list .row .latin { color: var(--text-subtle); font-style: italic; font-size: 11px; margin-left: 6px; }
    .atc-list .row.compat .compat-badge { margin-left: auto; color: var(--brand); font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
    .atc-field select, .atc-field textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 14px; font-family: inherit; outline: none; background: #fff; }
    .atc-field select { height: 40px; }
    .atc-field textarea { resize: none; }
    .atc-count { text-align: right; font-size: 11px; color: var(--text-subtle); }
    .atc-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 18px; border-top: 1px solid var(--border); }
    .btn-outline { background: #fff; color: var(--brand); border: 1.5px solid var(--brand); padding: 10px 18px; border-radius: 999px; font-weight: 600; cursor: pointer; transition: .15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-outline:hover { background: var(--brand-soft); }
  </style>
</head>
<body data-device="desktop">
<div class="device-shell"><div class="device-inner">

  <!-- =============== HEADER =============== -->
  <header class="app-header">
    <div class="page-wrap row">
      <a href="index_1.html" class="brand-mark">
        <span class="logo-box"><i data-lucide="paw-print" class="w-4 h-4"></i></span>
        <span>ZooEnrich</span>
      </a>

      <label class="search-pill">
        <i data-lucide="search" class="w-4 h-4"></i>
        <input id="globalSearch" type="text" placeholder="Search enrichments, species, materials…"/>
        <span class="kbd">⌘K</span>
      </label>

      <div class="header-actions">
        <button class="header-btn" type="button" id="ordersBtn">
          <i data-lucide="package" class="w-5 h-5"></i><span>Orders</span>
          <span class="badge-dot" id="ordersBadge" style="display:none">0</span>
        </button>
        <button class="header-btn" type="button" id="savedBtn">
          <i data-lucide="heart" class="w-5 h-5"></i><span>Saved</span>
          <span class="badge-dot" id="savedBadge" style="display:none">0</span>
        </button>
        <button class="header-btn" type="button" id="cartBtn">
          <i data-lucide="shopping-bag" class="w-5 h-5"></i><span>Cart</span>
          <span class="badge-dot" id="cartBadge" style="display:none">0</span>
        </button>
        <div class="avatar-wrap" id="avatarWrap"></div>

    </div>
  </header>

  <!-- =============== MAIN =============== -->
  <main id="mainRoot"></main>

</div></div>

<!-- =============== ADD-TO-CART SPECIES PICKER MODAL =============== -->
<div class="atc-overlay" id="atcOverlay"></div>
<aside class="atc-modal" id="atcModal" role="dialog" aria-hidden="true">
  <div class="atc-head">
    <img class="atc-thumb" id="atcThumb" alt=""/>
    <div class="atc-heading"><div class="atc-title" id="atcTitle">Add to cart</div><div class="atc-sub" id="atcSub"></div></div>
    <button class="atc-close" id="atcClose"><i data-lucide="x"></i></button>
  </div>
  <div class="atc-body">
    <label class="atc-field">
      <div class="atc-lab">Species <span class="req">*</span></div>
      <div class="atc-search-wrap"><i data-lucide="search"></i><input id="atcSpeciesInput" type="search" placeholder="Search species…" autocomplete="off"/></div>
      <div class="atc-list" id="atcSpeciesList"></div>
    </label>
    <label class="atc-field" id="atcEnclosureField" style="display:none">

      <select id="atcEnclosure"><option value="">— Not specified —</option></select>

<!-- =============== SCRIPTS =============== -->
<script>
(function(){
  const DB = window.DB;
  const ZE = window.ZE;

  /* ---------- Utilities ---------- */
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function showToast(msg) {
    let t = document.querySelector('.ze-toast');
    if (!t) { t = document.createElement('div'); t.className = 'ze-toast'; document.body.appendChild(t); }
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._hideTimer);
    t._hideTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }
  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch (e) { return ''; }
  }
  function starsHtml(avg, size = 14) {
    const full = Math.round(avg);
    let h = '';
    for (let i = 1; i <= 5; i++) {
      h += `<i data-lucide="star" class="w-${size === 14 ? '3.5' : '4'} h-${size === 14 ? '3.5' : '4'} ${i <= full ? '' : 'off'}" ${i <= full ? 'fill="currentColor"' : ''}></i>`;
    }
    return h;
  }

  /* ---------- Resolve vendor from URL ---------- */
  const urlParams = new URLSearchParams(location.search);
  const vendorId = urlParams.get('id');
  const vendor = vendorId ? DB.byId(DB.VENDORS, vendorId) : null;

  /* ---------- Is the signed-in user a vendor previewing their own store? ---------- */
  function isOwnStorePreview() {
    try {
      if (!ZE.user || typeof ZE.user.role !== 'function') return false;
      if (ZE.user.role() !== 'vendor') return false;
      const u = typeof ZE.user.resolve === 'function' ? ZE.user.resolve() : null;
      if (!u || !vendor) return false;
      // Vendor ids are the same as the vendor user's vendor profile id (u.id === vendor.id)
      return u.id === vendor.id;
    } catch (e) { return false; }
  }
  const previewMode = !!(vendor && isOwnStorePreview());

  if (!vendor) {
    document.getElementById('mainRoot').innerHTML = `
      <div class="page-wrap">
        <div class="not-found">
          <div class="ico-big"><i data-lucide="store" class="w-7 h-7"></i></div>
          <h2>Vendor not found</h2>
          <p>We couldn't find a storefront for that id. It may have been removed or the link was mistyped.</p>
          <a class="btn btn-brand" href="index_1.html">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to shop
          </a>
        </div>
      </div>`;
    renderHeaderCommon();
    if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();
    if (ZE && ZE.init) ZE.init();
    return;
  }

  /* ---------- Vendor data ---------- */
  const vendorProducts = DB.PRODUCTS.filter(p => p.vendorId === vendor.id);
  const vendorProductIds = new Set(vendorProducts.map(p => p.id));
  const vendorReviews = (DB.REVIEWS || []).filter(r => vendorProductIds.has(r.productId));

  // Aggregate rating across vendor's products (from reviews)
  const aggCount = vendorReviews.length;
  const aggAvg = aggCount
    ? Math.round((vendorReviews.reduce((s, r) => s + (r.stars || 0), 0) / aggCount) * 10) / 10
    : (vendor.rating || 0);

  // Distribution
  const dist = [5, 4, 3, 2, 1].map(n => ({
    star: n,
    count: vendorReviews.filter(r => r.stars === n).length
  }));

  /* ---------- State ---------- */
  const state = {
    tab: 'products',
    cat: 'all',
    sort: 'popular',
    search: '',
    following: false
  };

  /* Parse URL hash for tab */
  const allowedTabs = ['products', 'about', 'reviews', 'policies'];
  const hashTab = (location.hash || '').replace('#', '');
  if (allowedTabs.indexOf(hashTab) !== -1) state.tab = hashTab;

  /* ---------- Render ---------- */
  function renderPage() {
    document.getElementById('mainRoot').innerHTML = `
      ${renderHero()}
      ${renderTabBar()}
      <div class="page-wrap">
        <section id="tabProducts" class="tab-panel ${state.tab === 'products' ? 'active' : ''}">${renderProductsTab()}</section>
        <section id="tabAbout"    class="tab-panel ${state.tab === 'about'    ? 'active' : ''}">${renderAboutTab()}</section>
        <section id="tabReviews"  class="tab-panel ${state.tab === 'reviews'  ? 'active' : ''}">${renderReviewsTab()}</section>
        <section id="tabPolicies" class="tab-panel ${state.tab === 'policies' ? 'active' : ''}">${renderPoliciesTab()}</section>
      </div>
    `;
    bindHero();
    bindTabs();
    bindProductsTab();
    if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();
  }

  function renderHero() {
    return `
      <section class="vs-hero">
        <img class="vs-hero-bg" src="${DB.vendorCover(vendor)}" alt="${esc(vendor.name)}" loading="eager"/>
        <div class="page-wrap">
          <div class="vs-hero-inner">
            <div class="vs-hero-left">
              <div class="vs-logo-square img-frame">
                <img src="${DB.vendorLogo(vendor)}" alt="${esc(vendor.name)} logo" loading="eager"/>
              </div>
              <div class="vs-hero-title">
                <h1>${esc(vendor.name)}</h1>
                <div class="tagline">${esc(vendor.tagline || '')}</div>
              </div>
            </div>
            <div class="vs-hero-right">
              <div class="vs-info-strip">
                <span class="vs-pill rating">
                  <span class="star"><i data-lucide="star" class="w-4 h-4" fill="currentColor"></i></span>
                  <strong>${aggAvg.toFixed(1)}</strong>
                  <span style="color:var(--text-muted); font-weight:500;">· ${aggCount} review${aggCount === 1 ? '' : 's'}</span>
                </span>
                <span class="vs-pill"><i data-lucide="package-check" class="w-4 h-4"></i> ${vendor.orders || 0} orders fulfilled</span>
                <span class="vs-pill"><i data-lucide="calendar" class="w-4 h-4"></i> Since ${vendor.yearFounded || '—'}</span>
                <span class="vs-pill"><i data-lucide="map-pin" class="w-4 h-4"></i> ${esc(vendor.city || '')}, ${esc(vendor.state || '')}</span>
              </div>
              <div class="vs-cta-row">
                <button class="vs-cta" id="followBtn">
                  <i data-lucide="heart" class="w-4 h-4"></i>
                  <span id="followLabel">Follow store</span>
                </button>
                <button class="vs-cta primary" id="contactBtn">
                  <i data-lucide="mail" class="w-4 h-4"></i> Contact seller
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    `;
  }

  function bindHero() {
    const fb = document.getElementById('followBtn');
    if (fb) fb.addEventListener('click', () => {
      state.following = !state.following;
      document.getElementById('followLabel').textContent = state.following ? 'Following' : 'Follow store';
      fb.classList.toggle('following', state.following);
      showToast(state.following ? `Following ${vendor.name}` : `Unfollowed ${vendor.name}`);
    });
    const cb = document.getElementById('contactBtn');
    if (cb) cb.addEventListener('click', () => {
      alert(`Contact ${vendor.name}\n\nThis would open a message thread with the seller.`);
    });
  }

  function renderTabBar() {
    const reviewCount = aggCount;
    const productCount = vendorProducts.length;
    return `
      <div class="tab-bar">
        <div class="page-wrap">
          <nav class="tab-pills" role="tablist">
            <button class="tab-pill ${state.tab==='products'?'active':''}" data-tab="products">
              <i data-lucide="grid-2x2" class="w-4 h-4"></i> Products <span class="count">${productCount}</span>
            </button>
            <button class="tab-pill ${state.tab==='about'?'active':''}" data-tab="about">
              <i data-lucide="info" class="w-4 h-4"></i> About
            </button>
            <button class="tab-pill ${state.tab==='reviews'?'active':''}" data-tab="reviews">
              <i data-lucide="star" class="w-4 h-4"></i> Reviews <span class="count">${reviewCount}</span>
            </button>
            <button class="tab-pill ${state.tab==='policies'?'active':''}" data-tab="policies">
              <i data-lucide="shield-check" class="w-4 h-4"></i> Policies
            </button>
          </nav>
        </div>
      </div>
    `;
  }

  function bindTabs() {
    document.querySelectorAll('.tab-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        const t = btn.dataset.tab;
        state.tab = t;
        location.hash = t;
        document.querySelectorAll('.tab-pill').forEach(x => x.classList.toggle('active', x.dataset.tab === t));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        const activeId = 'tab' + t.charAt(0).toUpperCase() + t.slice(1);
        const panel = document.getElementById(activeId);
        if (panel) panel.classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  /* =============== TAB 1 · PRODUCTS =============== */
  function renderProductsTab() {
    // Categories: only those this vendor has products in
    const catIds = Array.from(new Set(vendorProducts.map(p => p.cat)));
    const cats = [{ id: 'all', name: 'All' }].concat(
      catIds.map(id => DB.byId(DB.CATEGORIES, id)).filter(Boolean).map(c => ({ id: c.id, name: c.name }))
    );

    const previewBanner = previewMode
      ? `<div class="vs-preview-banner"><i data-lucide="eye" class="w-4 h-4"></i> Preview mode — this is how buyers see your store.</div>`
      : '';

    return `
      ${previewBanner}
      <div class="vs-filter-strip">
        <div class="vs-cats" id="vsCats">
          ${cats.map(c => `<button class="pill ${c.id === state.cat ? 'active' : ''}" data-cat="${esc(c.id)}">${esc(c.name)}</button>`).join('')}
        </div>
        <label class="vs-search">
          <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
          <input type="text" id="vsSearch" placeholder="Search this store…" value="${esc(state.search)}"/>
        </label>
        <div class="vs-sort">
          <button class="vs-sort-btn" id="vsSortBtn" type="button">
            <i data-lucide="arrow-up-down" class="w-4 h-4 text-gray-500"></i>
            <span>Sort: <strong id="vsSortLabel">${sortLabel(state.sort)}</strong></span>
            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
          </button>
          <div class="vs-sort-menu" id="vsSortMenu">
            ${[
              ['popular','Popular'],
              ['newest','Newest'],
              ['price-low','Price: low to high'],
              ['price-high','Price: high to low'],
              ['rating','Top rated']
            ].map(([v,l]) => `<div class="item ${state.sort===v?'active':''}" data-sort="${v}">${l}</div>`).join('')}
          </div>
        </div>
      </div>

      <div class="prod-grid" id="vsProdGrid">${renderProductCards()}</div>
    `;
  }

  function sortLabel(v) {
    return ({
      'popular':'Popular','newest':'Newest','price-low':'Price: low to high',
      'price-high':'Price: high to low','rating':'Top rated'
    })[v] || 'Popular';
  }

  function filteredProducts() {
    let list = vendorProducts.slice();
    if (state.cat !== 'all') list = list.filter(p => p.cat === state.cat);
    if (state.search.trim()) {
      const q = state.search.trim().toLowerCase();
      list = list.filter(p => p.name.toLowerCase().indexOf(q) !== -1);
    }
    switch (state.sort) {
      case 'newest':     list.sort((a,b) => b.id.localeCompare(a.id)); break;
      case 'price-low':  list.sort((a,b) => (a.price.material+a.price.labor) - (b.price.material+b.price.labor)); break;
      case 'price-high': list.sort((a,b) => (b.price.material+b.price.labor) - (a.price.material+a.price.labor)); break;
      case 'rating':     list.sort((a,b) => b.engagement - a.engagement); break;
      default:           list.sort((a,b) => (b.hot?1:0) - (a.hot?1:0) || b.uses - a.uses);
    }
    return list;
  }

  function renderProductCards() {
    const list = filteredProducts();
    if (!vendorProducts.length) {
      return `<div class="empty-card">
        <i data-lucide="package-x" class="w-8 h-8" style="margin:0 auto; color:var(--text-subtle)"></i>
        <div class="big">No products yet</div>
        <div style="font-size:13px">This vendor hasn't listed any products yet.</div>
      </div>`;
    }
    if (!list.length) {
      return `<div class="empty-card">
        <i data-lucide="search-x" class="w-8 h-8" style="margin:0 auto; color:var(--text-subtle)"></i>
        <div class="big">No matches</div>
        <div style="font-size:13px">Try clearing the filter or search.</div>
      </div>`;
    }
    return list.map(productCard).join('');
  }

  function productCard(p) {
    const cat = DB.byId(DB.CATEGORIES, p.cat);
    const price = p.price.material + p.price.labor;
    // Sum across species-lines for this product
    const qty = ZE.cart.countForProduct(p.id);
    const fav = ZE.saved.has(p.id);
    const gallery = DB.galleryFor(p);

    // In preview mode, vendors see no interactive Add / heart affordances
    const favBtn = previewMode
      ? ''
      : `<button class="fav-btn ${fav?'active':''}" data-fav="${p.id}" aria-label="Favourite"><i data-lucide="heart" class="w-4 h-4"></i></button>`;

    let actionSlot;
    if (previewMode) {
      actionSlot = '';
    } else if (qty > 0) {
      actionSlot = `<div class="stepper-mini" data-id="${p.id}">

  function bindHoverCarousel(card) {
    const imgs = card.querySelectorAll('.pi-img');
    const dots = card.querySelectorAll('.pi-dot');
    if (imgs.length <= 1) return;
    let idx = 0, timer = null;
    const goto = (n) => {
      idx = ((n % imgs.length) + imgs.length) % imgs.length;
      imgs.forEach((im, i) => im.classList.toggle('pi-active', i === idx));
      dots.forEach((d, i) => d.classList.toggle('pi-dot-active', i === idx));
    };
    card.addEventListener('mouseenter', () => {
      if (timer) return;
      timer = setInterval(() => goto(idx + 1), 800);
    });
    card.addEventListener('mouseleave', () => {
      clearInterval(timer); timer = null; goto(0);
    });
    const stage = card.querySelector('.pi-stage');
    if (stage) {
      stage.addEventListener('click', (e) => {
        if (!window.matchMedia || !window.matchMedia('(hover: none)').matches) return;
        const rect = stage.getBoundingClientRect();
        const x = e.clientX - rect.left;
        if (x < rect.width / 2) goto(idx - 1); else goto(idx + 1);
        e.stopPropagation();
      });
    }
  }

  const atcEls = {

    title:   document.getElementById('atcTitle'),

  const atcState = { product: null, selectedSet: new Set() };

  function atcUpdateConfirm() {
    const size = atcState.selectedSet.size;
    atcEls.confirm.disabled = false;
    if (size >= 2) atcEls.confirm.textContent = `Add ${size} to cart`;
    else atcEls.confirm.textContent = 'Add to cart';
  }

  function atcUpdateEnclosureVisibility() {
    const size = atcState.selectedSet.size;
    if (size === 1) {
      const sid = Array.from(atcState.selectedSet)[0];
      atcPopulateEnclosures(sid);
      atcEls.encField.style.display = '';
    } else {
      atcEls.encField.style.display = 'none';
      atcEls.encSel.innerHTML = '<option value="">— Not specified —</option>';
    }
  }

  function atcRenderSpecies(q) {
    const p = atcState.product;
    const compat = (p && Array.isArray(p.compatibleSpecies)) ? p.compatibleSpecies : [];
    const compatSet = new Set(compat);
    const ordered = DB.SPECIES.slice().sort((a, b) => {
      const ac = compatSet.has(a.id) ? 0 : 1;
      const bc = compatSet.has(b.id) ? 0 : 1;
      return ac - bc;
    });
    const query = (q || '').trim().toLowerCase();
    const filtered = !query ? ordered : ordered.filter(sp =>
      sp.name.toLowerCase().indexOf(query) !== -1 ||
      (sp.latin && sp.latin.toLowerCase().indexOf(query) !== -1)
    );
    if (!filtered.length) {
      atcEls.spList.innerHTML = `<div style="padding:12px; text-align:center; color:var(--text-muted); font-size:13px;">No species found</div>`;
      return;
    }
    atcEls.spList.innerHTML = filtered.map(sp => {
      const checked = atcState.selectedSet.has(sp.id) ? 'checked' : '';
      const selCls = atcState.selectedSet.has(sp.id) ? 'selected' : '';
      const compatCls = compatSet.has(sp.id) ? 'compat' : '';
      const compatBadge = compatSet.has(sp.id) ? '<span class="compat-badge">compatible</span>' : '';
      return `
        <label class="row ${selCls} ${compatCls}" data-sp-id="${sp.id}">
          <input type="checkbox" class="row-cb" ${checked}/>
          <img src="${DB.img(sp.imgQ, 60, 60, sp.seed)}" alt="" loading="lazy"/>
          <div style="flex:1; min-width:0;">
            <div><span class="name">${esc(sp.name)}</span><span class="latin">${esc(sp.latin || '')}</span></div>
          </div>
          ${compatBadge}
        </label>
      `;
    }).join('');
    atcEls.spList.querySelectorAll('.row').forEach(r => {
      const cb = r.querySelector('.row-cb');
      cb.addEventListener('change', () => {
        const sid = r.dataset.spId;
        if (cb.checked) atcState.selectedSet.add(sid);
        else atcState.selectedSet.delete(sid);
        r.classList.toggle('selected', cb.checked);
        atcUpdateEnclosureVisibility();
        atcUpdateConfirm();
      });
    });
    if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();
  }

  function atcPopulateEnclosures(speciesId) {
    const sel = atcEls.encSel;
    sel.innerHTML = '<option value="">— Not specified —</option>';
    if (!speciesId) return;
    const enclosures = (typeof DB.enclosuresForSpecies === 'function')
      ? DB.enclosuresForSpecies(speciesId) : [];
    enclosures.forEach(e => {
      const site = DB.byId(DB.SITES, e.siteId);
      const opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = `${e.name}${site ? ' — ' + site.name : ''}`;
      sel.appendChild(opt);
    });
  }

  function openAddToCartModal(product) {
    if (!product) return;
    atcState.product = product;
    atcState.selectedSet = new Set();
    const cat = DB.byId(DB.CATEGORIES, product.cat);
    atcEls.thumb.src = product.imgSmall || '';
    atcEls.thumb.alt = product.name || '';
    atcEls.title.textContent = product.name || 'Add to cart';
    atcEls.sub.textContent = cat ? cat.name : '';
    atcEls.spInput.value = '';
    atcEls.note.value = '';
    atcEls.noteCount.textContent = '0';
    atcRenderSpecies('');
    atcUpdateEnclosureVisibility();
    atcUpdateConfirm();
    atcEls.overlay.classList.add('open');
    atcEls.modal.classList.add('open');
    atcEls.modal.setAttribute('aria-hidden', 'false');
    setTimeout(() => atcEls.spInput.focus(), 80);
    if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();
  }
  function closeAtcModal() {
    atcEls.overlay.classList.remove('open');
    atcEls.modal.classList.remove('open');
    atcEls.modal.setAttribute('aria-hidden', 'true');
  }
  window.openAddToCartModal = openAddToCartModal;

  atcEls.overlay.addEventListener('click', closeAtcModal);
  atcEls.close.addEventListener('click', closeAtcModal);
  atcEls.cancel.addEventListener('click', closeAtcModal);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && atcEls.modal.classList.contains('open')) closeAtcModal();
  });
  let atcSearchTimer = null;
  atcEls.spInput.addEventListener('input', () => {
    clearTimeout(atcSearchTimer);
    const v = atcEls.spInput.value;
    atcSearchTimer = setTimeout(() => atcRenderSpecies(v), 100);
  });
  atcEls.spInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.preventDefault(); });
  atcEls.note.addEventListener('input', () => {
    atcEls.noteCount.textContent = String(atcEls.note.value.length);
  });
  atcEls.confirm.addEventListener('click', () => {
    const p = atcState.product;
    if (!p) return;
    const size = atcState.selectedSet.size;
    const note = (atcEls.note.value || '').trim() || null;
    if (size === 0) {
      ZE.cart.addLine({
        productId: p.id,
        speciesId: null,
        enclosureId: null,
        qty: 1,
        note: note
      });
      closeAtcModal();
      showToast('Added to cart');
      return;
    }
    const encId = (size === 1) ? (atcEls.encSel.value || null) : null;
    atcState.selectedSet.forEach(sid => {
      ZE.cart.addLine({
        productId: p.id,
        speciesId: sid,
        enclosureId: encId,
        qty: 1,
        note: note
      });
    });
    closeAtcModal();
    showToast(`Added ${size} line${size === 1 ? '' : 's'} to cart`);
  });

  /* =============== Boot =============== */
  renderPage();
  renderHeaderCommon();
  ZE.init();

  /* Listen for hash changes (deep linking to tab) */
  window.addEventListener('hashchange', () => {
    const h = (location.hash || '').replace('#', '');
    if (allowedTabs.indexOf(h) !== -1 && h !== state.tab) {
      state.tab = h;
      document.querySelectorAll('.tab-pill').forEach(x => x.classList.toggle('active', x.dataset.tab === h));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      const activeId = 'tab' + h.charAt(0).toUpperCase() + h.slice(1);
      const panel = document.getElementById(activeId);
      if (panel) panel.classList.add('active');
    }
  });

})();
</script>
</body>
</html>
